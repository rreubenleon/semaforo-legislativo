<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const STORAGE_KEY = 'fiat_consola_pro_config_v2';
const SESSION_KEY = 'fiat_consola_pro_session';

const CATEGORY_COLORS = [
  '#2563eb', '#dc2626', '#059669', '#d97706', '#7c3aed',
  '#db2777', '#0891b2', '#65a30d', '#ea580c', '#4f46e5',
  '#0d9488', '#b91c1c', '#1d4ed8', '#9333ea',
];

// ─── Helpers nombres (idéntico al index.html) ───
const _PARTICULAS = new Set(['de','del','la','las','los','van','von','da','di','du','y']);

function flipNombreDiputado(nombre) {
  if (!nombre) return nombre;
  const tokens = nombre.trim().split(/\s+/);
  if (tokens.length < 3) return nombre;
  let cutIdx = 2;
  let sawParticle = false;
  while (cutIdx < tokens.length) {
    const cur = tokens[cutIdx].toLowerCase().replace(/\./g, '');
    if (_PARTICULAS.has(cur)) {
      cutIdx++; sawParticle = true;
    } else if (sawParticle) {
      cutIdx++; sawParticle = false;
      if (cutIdx >= tokens.length || !_PARTICULAS.has(tokens[cutIdx].toLowerCase().replace(/\./g, ''))) break;
    } else { break; }
  }
  if (cutIdx >= tokens.length) return nombre;
  const apellidos = tokens.slice(0, cutIdx).join(' ');
  const nombres = tokens.slice(cutIdx).join(' ');
  return `${nombres} ${apellidos}`;
}

function formatNombreLegislador(leg) {
  if (!leg) return '';
  if (leg.camara === 'Cámara de Diputados') return flipNombreDiputado(leg.nombre);
  return leg.nombre;
}

function getInitials(nombreFmt) {
  const tokens = (nombreFmt || '').split(/\s+/).filter(t => t.length > 2 && !_PARTICULAS.has(t.toLowerCase()));
  return tokens.slice(0, 2).map(t => t[0]).join('').toUpperCase();
}

function _catLabel(catKey, semaforo) {
  if (!catKey) return '';
  const found = (semaforo || []).find(s => s.categoria === catKey);
  return found ? found.nombre : catKey;
}

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ─── ScoreRing ───
function ScoreRing({ score, color, size = 80 }) {
  const radius = (size - 8) / 2;
  const half = size / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score / 100) * circumference;
  const gradientColors = {
    verde: ['#66bb6a', '#2e7d32'],
    amarillo: ['#e0a82b', '#c6972b'],
    rojo: ['#ef5350', '#c62828'],
  };
  const [c1, c2] = gradientColors[color] || ['#bdbdbd', '#9ca3af'];
  const gradId = `grad-${color}-${size}-${Math.random().toString(36).slice(2,6)}`;
  const fontSize = size > 70 ? '16px' : size > 50 ? '13px' : '11px';
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>
        <linearGradient id={gradId} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor={c1} /><stop offset="100%" stopColor={c2} />
        </linearGradient>
      </defs>
      <circle cx={half} cy={half} r={radius} stroke="#e5e7eb" strokeWidth="6" fill="none" />
      <circle cx={half} cy={half} r={radius} stroke={`url(#${gradId})`} strokeWidth="6" fill="none"
        strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
        className="score-ring" transform={`rotate(-90 ${half} ${half})`} />
      <text x={half} y={half} textAnchor="middle" dominantBaseline="central"
        style={{fontSize}} fill="#1a365d" fontWeight="bold">{score.toFixed(0)}%</text>
    </svg>
  );
}

// ─── Password Gate ───
function PasswordGate({ onAuth }) {
  const [pwd, setPwd] = useState('');
  const [err, setErr] = useState(false);
  const [loading, setLoading] = useState(false);
  const tryLogin = async () => {
    setLoading(true); setErr(false);
    const hash = await sha256(pwd);
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem(SESSION_KEY, '1');
      onAuth();
    } else { setErr(true); setLoading(false); }
  };
  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div className="bg-white rounded-2xl border border-gray-200 p-8 max-w-sm w-full" style={{boxShadow: '0 20px 60px rgba(0,0,0,0.06)'}}>

        <div className="badge-alpha inline-block mt-4 mb-1">CONSOLE PRO · ALPHA</div>
        <h1 className="text-xl font-black text-gray-900 mt-3">Acceso restringido</h1>
        <p className="text-xs text-gray-500 mt-1 mb-5">Introduce la contraseña para continuar.</p>
        <input type="password" value={pwd} onChange={e => setPwd(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && tryLogin()}
          placeholder="Contraseña" autoFocus
          className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-full text-sm focus:outline-none focus:border-acento focus:bg-white transition" />
        {err && <div className="text-xs text-rose-600 mt-2 font-mono">Contraseña incorrecta</div>}
        <button onClick={tryLogin} disabled={loading || !pwd}
          className="w-full mt-4 text-white font-semibold py-2.5 rounded-full text-sm transition shadow-sm disabled:opacity-50"
          style={{background: loading ? '#9ca3af' : 'linear-gradient(135deg, #2e7d32 0%, #388e3c 100%)'}}>
          {loading ? <span className="spinner"></span> : 'Entrar'}
        </button>
        <p className="text-[10px] text-gray-400 mt-4 text-center font-mono">FIAT México · Console Pro v1.0</p>
      </div>
    </div>
  );
}

// ─── Tendencia Chart (idéntico HistorialScoresChart) ───
function TendenciaTemas({ historial, semaforo, temasSelectos }) {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  useEffect(() => {
    if (!chartRef.current || !historial || temasSelectos.size === 0) return;
    if (chartInstance.current) chartInstance.current.destroy();

    const INICIO_PERIODO = '2026-02-01';
    const rawFechas = historial.fechas;
    const rawCategorias = historial.categorias;
    const idxInicio = rawFechas.findIndex(f => f >= INICIO_PERIODO);
    const fechas = idxInicio >= 0 ? rawFechas.slice(idxInicio) : rawFechas;
    const categorias = {};
    for (const cat of Object.keys(rawCategorias)) {
      categorias[cat] = { ...rawCategorias[cat], scores: idxInicio >= 0 ? rawCategorias[cat].scores.slice(idxInicio) : rawCategorias[cat].scores };
    }
    const catKeys = Object.keys(categorias).filter(c => temasSelectos.has(c));

    const labels = fechas.map(f => {
      const d = new Date(f + 'T12:00:00');
      return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
    });

    const datasets = catKeys.map((cat) => {
      const catData = categorias[cat];
      const colorIdx = Object.keys(rawCategorias).indexOf(cat);
      const color = CATEGORY_COLORS[colorIdx % CATEGORY_COLORS.length];
      const scores = catData.scores.map(s => s === null ? undefined : s);
      const lastIdx = scores.length - 1;
      return {
        label: catData.nombre, data: scores,
        borderColor: color, backgroundColor: 'transparent',
        borderWidth: 2, fill: false, stepped: 'before', tension: 0,
        pointRadius: scores.map((_, i) => i === lastIdx ? 5 : 0),
        pointHitRadius: 10, pointHoverRadius: 6,
        pointBackgroundColor: color, pointBorderColor: '#fff', pointBorderWidth: 2,
        spanGaps: true,
      };
    });

    const thresholdPlugin = {
      id: 'thresholds',
      beforeDraw(chart) {
        const { ctx, chartArea, scales } = chart;
        if (!chartArea) return;
        const yScale = scales.y;
        ctx.save();
        ctx.setLineDash([2, 6]); ctx.lineWidth = 0.8;
        [{value: 65, color: 'rgba(46,125,50,0.15)'}, {value: 40, color: 'rgba(198,40,40,0.15)'}].forEach(t => {
          const y = yScale.getPixelForValue(t.value);
          ctx.beginPath(); ctx.strokeStyle = t.color;
          ctx.moveTo(chartArea.left, y); ctx.lineTo(chartArea.right, y); ctx.stroke();
        });
        ctx.restore();
      }
    };

    chartInstance.current = new Chart(chartRef.current, {
      type: 'line', plugins: [thresholdPlugin], data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 600, easing: 'easeOutQuad' },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(15,23,42,0.92)', titleColor: '#f1f5f9', bodyColor: '#cbd5e1',
            borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1,
            padding: { top: 10, bottom: 10, left: 14, right: 14 }, cornerRadius: 10,
            displayColors: true, boxWidth: 8, boxHeight: 8, boxPadding: 6,
            titleFont: { size: 12, weight: '600', family: 'JetBrains Mono, monospace' },
            bodyFont: { size: 11, family: 'JetBrains Mono, monospace' },
            callbacks: { label: (item) => ` ${item.dataset.label}: ${item.raw?.toFixed(1)}%` },
            itemSort: (a, b) => (b.raw || 0) - (a.raw || 0),
          }
        },
        scales: {
          y: { min: 0, max: 100, position: 'right',
            ticks: { color: '#b0b8c4', font: { size: 10 }, stepSize: 25, padding: 12, callback: v => v + '%' },
            grid: { color: (ctx) => ctx.tick.value === 0 ? 'transparent' : 'rgba(0,0,0,0.04)', lineWidth: 0.5, drawBorder: false, drawTicks: false },
            border: { display: false },
          },
          x: { ticks: { color: '#b0b8c4', font: { size: 10 }, maxRotation: 0, maxTicksLimit: 8, padding: 8 },
            grid: { display: false }, border: { display: false } }
        },
      }
    });
    return () => { if (chartInstance.current) try { chartInstance.current.destroy(); } catch (e) {} };
  }, [historial, temasSelectos]);

  if (temasSelectos.size === 0) {
    return (
      <div className="glass border border-borde rounded-xl p-8 text-center h-full flex flex-col items-center justify-center">
        <div className="text-xs uppercase tracking-widest text-gray-400 font-bold">TENDENCIA DE MIS TEMAS</div>
        <div className="text-sm text-gray-500 mt-2">Selecciona temas en Configurar</div>
      </div>
    );
  }

  return (
    <div className="glass border border-borde rounded-xl p-4 h-full flex flex-col">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="text-xs font-semibold uppercase tracking-widest text-gray-400">Tendencia de mis temas</div>
          <div className="text-[10px] text-gray-400 mt-0.5">Evolución del score compuesto</div>
        </div>
        <div className="text-[10px] text-gray-400 font-mono">{temasSelectos.size}/8</div>
      </div>
      <div className="flex-1" style={{minHeight: '260px'}}><canvas ref={chartRef}></canvas></div>
    </div>
  );
}

    rojo: 'border-semaforo-rojo/40 hover:border-semaforo-rojo',
  };
  const colorDot = { verde: 'bg-semaforo-verde', amarillo: 'bg-semaforo-amarillo', rojo: 'bg-semaforo-rojo' };
  const momentum = data.momentum || {};
  const trendArrow = momentum.tendencia === 'up' ? '↑' : momentum.tendencia === 'down' ? '↓' : '';
  const trendColor = momentum.tendencia === 'up' ? 'text-green-600' : momentum.tendencia === 'down' ? 'text-red-500' : 'text-gray-400';

  return (
    <div className={`glass border ${colorClasses[data.color]} rounded-xl p-4 transition-all cursor-pointer`}
      onClick={onClick}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2 min-w-0 flex-1">
          <div className={`w-3 h-3 rounded-full ${colorDot[data.color]} flex-shrink-0`}></div>

            <h3 className="font-semibold text-sm text-gray-800 truncate">{data.nombre}</h3>
            {momentum.etiqueta && (
              <div className="flex items-center gap-1">
                {trendArrow && <span className={`text-[10px] font-bold ${trendColor}`}>{trendArrow}</span>}
                <span className="text-[10px] text-gray-400 font-mono">{momentum.etiqueta}</span>
              </div>
            )}
          </div>
        </div>
        <div className="flex items-center gap-1 flex-shrink-0">
          <ScoreRing score={data.score_total} color={data.color} size={56} />
          <button onClick={e => { e.stopPropagation(); onRemove(data.categoria); }} title="Quitar tema"
            className="text-gray-300 hover:text-rose-600 hover:bg-rose-50 w-6 h-6 rounded-full flex items-center justify-center text-sm leading-none transition flex-shrink-0">×</button>
        </div>
      </div>
      <div className="grid grid-cols-5 gap-2 text-xs text-gray-500">
        {[
          { label: 'Media', value: data.score_media },
          { label: 'Trends', value: data.score_trends },
          { label: 'Congreso', value: data.score_congreso },
          { label: 'CSP', value: data.score_mananera || 0, danger: true },
          { label: 'Urgencia', value: data.score_urgencia },
        ].map(m => (
          <div key={m.label}>
            <div className="flex items-center gap-1.5 mb-0.5">
              <div className="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden">
                <div className="h-full rounded-full" style={{ width: `${Math.min(Math.max(m.value, 0), 100)}%`, backgroundColor: m.danger ? '#c62828' : '#2e7d32' }} />
              </div>
              <span className={`text-[10px] font-mono font-medium ${m.danger ? 'text-rose-600' : 'text-gray-700'}`}>{m.value.toFixed(0)}%</span>
            </div>
            <div className="text-[9px] uppercase tracking-wider text-gray-400">{m.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function LegisladorModal({ leg, semaforo, onClose }) {
  if (!leg) return null;

  const l3pProp = leg.l3p_proposiciones ?? 0;
  const iniProy = leg.iniciativas_proy_15d;

  const insights = [];
  if (hitPct != null && hitPct >= 50 && tema) {
    insights.push(`Reacciona rápido a picos mediáticos en ${tema}: ${hitPct}% de los últimos ${leg.hit_total} picos relevantes.`);
  } else if (hitPct === 0 && leg.hit_total > 0) {
    insights.push(`No ha presentado instrumentos dentro de los 7 días de los picos en ${tema || 'su tema dominante'}. Bajo oportunismo informativo.`);

  if (iniProy != null && iniProy > 1.5) {

  // proyección simplificada del mapa (x: 0-320, y: 0-220)

  coahuila: [135, 80], colima: [140, 145], durango: [125, 100], estado_de_mexico: [160, 140],
  guanajuato: [155, 130], guerrero: [170, 165], hidalgo: [170, 135], jalisco: [135, 135],
  michoacan: [145, 150], morelos: [165, 150], nayarit: [115, 120], nuevo_leon: [150, 80],
  oaxaca: [200, 175], puebla: [185, 150], queretaro: [165, 130], quintana_roo: [265, 135],
  san_luis_potosi: [155, 110], sinaloa: [95, 95], sonora: [70, 75], tabasco: [225, 165],
  tamaulipas: [165, 95], tlaxcala: [180, 145], veracruz: [195, 150], yucatan: [255, 130],
  zacatecas: [140, 110],
};

function MapaMexico({ mapa, estadosSelectos, onRemove }) {
  if (estadosSelectos.size === 0) {
    return (
      <div className="glass border border-borde rounded-xl p-8 text-center">
        <div className="text-xs uppercase tracking-widest text-gray-400 font-bold">MIS ESTADOS</div>
        <div className="text-sm text-gray-500 mt-2">Selecciona estados en Configurar</div>
      </div>
    );
  }
  const estados = Array.from(estadosSelectos)
    .map(key => ({ key, info: mapa[key] }))
    .filter(e => e.info)
    .sort((a, b) => (b.info.total_articulos || 0) - (a.info.total_articulos || 0));
  const maxArts = Math.max(...estados.map(e => e.info.total_articulos || 0), 1);

  const getColor = (count) => {
    const intensity = count / maxArts;
    if (intensity > 0.5) return { fill: '#c62828', label: 'Alto' };
    if (intensity > 0.2) return { fill: '#c6972b', label: 'Medio' };
    return { fill: '#2e7d32', label: 'Bajo' };
  };

  return (
    <div className="glass border border-borde rounded-xl p-4">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="text-xs font-semibold uppercase tracking-widest text-gray-400">Mis estados</div>
          <div className="text-[10px] text-gray-400 mt-0.5">Cobertura mediática · últimos 30 días</div>
        </div>
        <div className="text-[10px] text-gray-400 font-mono">{estados.length}/12</div>
      </div>
      <div className="relative w-full" style={{aspectRatio: '320/220', background: '#f8faf8', borderRadius: '8px', overflow: 'hidden'}}>
        <svg viewBox="0 0 320 220" className="w-full h-full">
          {/* México silhouette estilizado */}
          <path d="M 25 60 Q 50 50 80 70 L 110 70 Q 140 60 165 65 L 200 55 Q 230 60 250 70 L 280 90 L 290 110 L 280 125 L 270 135 L 280 150 L 270 165 L 250 175 L 230 180 L 210 185 L 190 188 L 170 192 L 150 188 L 130 180 L 110 165 L 95 150 L 80 135 L 65 120 L 50 105 L 35 90 Z"
                fill="#e5e7eb" stroke="#cbd5e1" strokeWidth="1" opacity="0.6" />
          <text x="160" y="30" fontSize="10" fontFamily="Inter" fontWeight="600" fill="#9ca3af" textAnchor="middle" letterSpacing="0.1em">MÉXICO</text>
        </svg>
        {/* Dots de los estados */}
        {estados.map(({ key, info }) => {
          const coords = MEX_COORDS[key];
          if (!coords) return null;
          const { fill, label } = getColor(info.total_articulos || 0);
          const intensity = (info.total_articulos || 0) / maxArts;
          const coreSize = Math.max(6, Math.min(14, 6 + intensity * 8));
          const ringMax = coreSize + 18 + intensity * 10;
          const numRings = intensity > 0.5 ? 3 : intensity > 0.2 ? 2 : 1;
          const xPct = (coords[0] / 320) * 100;
          const yPct = (coords[1] / 220) * 100;
          return (
            <div key={key} style={{ position: 'absolute', left: `${xPct}%`, top: `${yPct}%`, transform: 'translate(-50%,-50%)' }} title={`${info.nombre || info.abreviatura}: ${info.total_articulos || 0} notas`}>
              {[...Array(numRings)].map((_, r) => (
                <div key={r} className="map-ring" style={{
                  width: ringMax, height: ringMax, borderColor: fill,
                  animationDelay: `${(r * 2 / numRings).toFixed(2)}s`
                }}></div>
              ))}
              <div style={{
                position: 'relative', width: coreSize, height: coreSize,
                borderRadius: '50%', background: fill,
                boxShadow: `0 0 0 1.5px white, 0 1px 4px rgba(0,0,0,0.2)`,
              }}></div>
              <div style={{
                position: 'absolute', top: coreSize / 2 + 4, left: '50%', transform: 'translateX(-50%)',
                fontSize: 9, fontFamily: 'Inter', fontWeight: 600, color: '#1f2937',
                whiteSpace: 'nowrap', background: 'rgba(255,255,255,0.92)',
                padding: '1px 5px', borderRadius: 3, marginTop: 2,
              }}>{(info.abreviatura || key).toUpperCase().slice(0, 5)}</div>
            </div>
          );
        })}
      </div>
      <div className="mt-3 space-y-1 text-xs">
        {estados.map(({ key, info }) => {
          const { fill } = getColor(info.total_articulos || 0);
          return (
            <div key={key} className="flex items-center justify-between p-1.5 hover:bg-gray-50 rounded group">
              <div className="flex items-center gap-2 min-w-0">
                <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: fill }}></div>
                <span className="text-gray-800 truncate">{info.nombre || info.abreviatura}</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-gray-500 font-mono">{info.total_articulos || 0}</span>
                <button onClick={() => onRemove(key)} className="text-gray-300 hover:text-rose-600 opacity-0 group-hover:opacity-100 w-5 h-5 text-base leading-none">×</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Actividad Reciente con tabs y scroll ───
function ActividadReciente({ data, semaforo, legisladoresIds, temasSelectos, allLegisladores }) {
  const [tab, setTab] = useState('todo');
  const [search, setSearch] = useState('');

  // Construir actividad de última semana (7 días)
  const { porLegislador, porTema, porAlerta, todo } = useMemo(() => {
    const out_leg = [];
    const out_tema = [];
    const out_alerta = [];
    if (!data) return { porLegislador: [], porTema: [], porAlerta: [], todo: [] };

    // Alertas del data.json (relevancia score)
    const ahora = new Date();
    const haceUnaSem = new Date(ahora.getTime() - 7 * 24 * 60 * 60 * 1000);

    (data.alertas || []).forEach(a => {
      const fecha = a.fecha || a.created_at || '';
      if (!fecha || new Date(fecha) < haceUnaSem) return;
      out_alerta.push({
        tipo: 'alerta',
        ts: fecha,
        titulo: a.descripcion || a.titulo || 'Alerta del sistema',
        sub: a.categoria ? _catLabel(a.categoria, semaforo) : '',
        url: null,
      });
    });

    // Artículos de mis temas
    const fuentes = data.fuentes || {};
    Array.from(temasSelectos).forEach(cat => {
      const arts = (fuentes[cat]?.articulos_medios || []);
      arts.forEach(a => {
        const fecha = a.fecha || '';
        if (!fecha || new Date(fecha) < haceUnaSem) return;
        out_tema.push({
          tipo: 'tema', ts: fecha, titulo: a.titulo,
          sub: `${a.fuente} · ${_catLabel(cat, semaforo)}`,
          url: a.url, categoria: cat,
        });
      });
    });

    // Para legisladores: como no tenemos endpoint con su actividad reciente,
    // usamos la autoria si existe
    const autoria = data.autoria || {};
    Object.entries(autoria).forEach(([cat, items]) => {
      (items || []).forEach(it => {
        if (legisladoresIds.has(it.legislador_id)) {
          (it.instrumentos || []).slice(0, 3).forEach(inst => {
            const fecha = inst.fecha || '';
            if (!fecha || new Date(fecha) < haceUnaSem) return;
            out_leg.push({
              tipo: 'legislador', ts: fecha,
              titulo: inst.titulo || 'Instrumento legislativo',
              sub: `${formatNombreLegislador({nombre: it.nombre, camara: it.camara || ''})} · ${_catLabel(cat, semaforo)}`,
              url: inst.url, leg_id: it.legislador_id,
            });
          });
        }
      });
    });

    out_leg.sort((a,b) => (b.ts||'').localeCompare(a.ts||''));
    out_tema.sort((a,b) => (b.ts||'').localeCompare(a.ts||''));
    out_alerta.sort((a,b) => (b.ts||'').localeCompare(a.ts||''));
    const todo = [...out_leg, ...out_tema, ...out_alerta]
      .sort((a,b) => (b.ts||'').localeCompare(a.ts||''));

    return { porLegislador: out_leg, porTema: out_tema, porAlerta: out_alerta, todo };
  }, [data, legisladoresIds, temasSelectos, semaforo]);

  const fuente = tab === 'legisladores' ? porLegislador : tab === 'temas' ? porTema : tab === 'alertas' ? porAlerta : todo;
  const filtrada = search.length >= 2
    ? fuente.filter(it => (it.titulo || '').toLowerCase().includes(search.toLowerCase()) || (it.sub || '').toLowerCase().includes(search.toLowerCase()))
    : fuente;

  return (
    <div className="glass border border-borde rounded-xl p-4">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <div>
          <div className="text-xs font-semibold uppercase tracking-widest text-gray-400">Actividad reciente</div>
          <div className="text-[10px] text-gray-400 mt-0.5">Tus legisladores y temas · última semana</div>
        </div>
        <input type="text" placeholder="Buscar..." value={search} onChange={e => setSearch(e.target.value)}
          className="text-xs px-3 py-1.5 border border-gray-200 rounded-full bg-gray-50 w-32 focus:outline-none focus:border-acento focus:bg-white" />
      </div>
      <div className="flex gap-1 mb-3 border-b border-gray-100">
        <button onClick={() => setTab('todo')} className={`px-3 py-2 text-xs font-semibold border-b-2 -mb-px transition ${tab === 'todo' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-800'}`}>
          Todo · {todo.length}
        </button>
        <button onClick={() => setTab('legisladores')} className={`px-3 py-2 text-xs font-semibold border-b-2 -mb-px transition ${tab === 'legisladores' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-800'}`}>
          Mis legisladores · {porLegislador.length}
        </button>
        <button onClick={() => setTab('temas')} className={`px-3 py-2 text-xs font-semibold border-b-2 -mb-px transition ${tab === 'temas' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-800'}`}>
          Mis temas · {porTema.length}
        </button>
        <button onClick={() => setTab('alertas')} className={`px-3 py-2 text-xs font-semibold border-b-2 -mb-px transition ${tab === 'alertas' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-800'}`}>
          Alertas · {porAlerta.length}
        </button>
      </div>
      {filtrada.length === 0 ? (
        <div className="text-xs text-gray-500 italic text-center py-8">Sin actividad en este filtro</div>
      ) : (
        <div className="max-h-96 overflow-y-auto scroll-fina pr-1 space-y-1.5">
          {filtrada.map((it, i) => (
            <div key={i} className="flex items-start gap-3 p-2 hover:bg-gray-50 rounded -mx-1 transition">
              <div className="text-[10px] text-gray-400 font-mono w-16 flex-shrink-0 mt-0.5">{(it.ts || '').slice(5, 10) || '—'}</div>
              <div className="w-1 self-stretch rounded-full mt-1 flex-shrink-0" style={{
                background: it.tipo === 'legislador' ? '#2e7d32' : it.tipo === 'tema' ? '#1a365d' : '#c6972b'
              }}></div>
              <div className="flex-1 min-w-0">
                {it.url ? (
                  <a href={it.url} target="_blank" rel="noopener" className="text-xs text-gray-800 hover:underline block leading-snug">{it.titulo}</a>
                ) : (
                  <div className="text-xs text-gray-800 leading-snug">{it.titulo}</div>
                )}
                <div className="text-[10px] text-gray-500 mt-0.5">{it.sub}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Mis Alertas ───
function MisAlertas({ alertas, semaforo, allLegisladores, onAdd, onRemove, onToggle }) {
  const [showForm, setShowForm] = useState(false);
  const [tipo, setTipo] = useState('tema_score');
  const [tema, setTema] = useState('');
  const [umbral, setUmbral] = useState(75);
  const [legislador, setLegislador] = useState('');

  const reset = () => { setTipo('tema_score'); setTema(''); setUmbral(75); setLegislador(''); setShowForm(false); };

  const submit = () => {
    let nombre = '';
    let trigger = {};
    if (tipo === 'tema_score') {
      if (!tema) return;
      nombre = `${_catLabel(tema, semaforo)} score > ${umbral}`;
      trigger = { tipo, tema, umbral };
    } else if (tipo === 'legislador_actividad') {
      if (!legislador) return;
      const leg = allLegisladores.find(l => l.id === Number(legislador));
      nombre = `${formatNombreLegislador(leg)} presenta nuevo instrumento`;
      trigger = { tipo, legislador_id: Number(legislador) };
    }
    onAdd({ id: Date.now(), nombre, trigger, activa: true, fecha_creada: new Date().toISOString() });
    reset();
  };

  return (
    <div className="glass border border-borde rounded-xl p-4">
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className="text-xs font-semibold uppercase tracking-widest text-gray-400">Mis alertas</div>
          <div className="text-[10px] text-gray-400 mt-0.5">{alertas.length} configuradas</div>
        </div>
        <button onClick={() => setShowForm(!showForm)}
          className="text-[11px] font-semibold px-3 py-1.5 rounded-full transition" style={{color: '#1a365d', background: '#f8faf8', border: '1px solid #e0e7e0'}}>
          {showForm ? 'Cancelar' : '+ Crear alerta'}
        </button>
      </div>

      {showForm && (
        <div className="mb-4 p-3 bg-gray-50 rounded-lg border border-gray-200 space-y-2.5">
          <div>
            <label className="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Tipo</label>
            <select value={tipo} onChange={e => setTipo(e.target.value)}
              className="w-full mt-1 px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white">
              <option value="tema_score">Score de tema sube de un umbral</option>
              <option value="legislador_actividad">Legislador presenta nuevo instrumento</option>
            </select>
          </div>
          {tipo === 'tema_score' && (
            <>
              <div>
                <label className="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Tema</label>
                <select value={tema} onChange={e => setTema(e.target.value)}
                  className="w-full mt-1 px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white">
                  <option value="">Elige tema...</option>
                  {semaforo.map(s => <option key={s.categoria} value={s.categoria}>{s.nombre}</option>)}
                </select>
              </div>
              <div>
                <label className="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Umbral · {umbral}</label>
                <input type="range" min="40" max="95" value={umbral} onChange={e => setUmbral(Number(e.target.value))}
                  className="w-full mt-1" />
              </div>
            </>
          )}
          {tipo === 'legislador_actividad' && (
            <div>
              <label className="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Legislador</label>
              <select value={legislador} onChange={e => setLegislador(e.target.value)}
                className="w-full mt-1 px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white">
                <option value="">Elige legislador...</option>
                {allLegisladores.map(l => <option key={l.id} value={l.id}>{formatNombreLegislador(l)}</option>)}
              </select>
            </div>
          )}
          <button onClick={submit}
            className="w-full mt-1 text-white font-semibold py-2 rounded-full text-xs"
            style={{background: 'linear-gradient(135deg, #2e7d32 0%, #388e3c 100%)'}}>
            Guardar alerta
          </button>
        </div>
      )}

      {alertas.length === 0 && !showForm && (
        <div className="text-xs text-gray-500 italic text-center py-6">Aún no has creado alertas</div>
      )}

      <div className="space-y-2">
        {alertas.map(a => (
          <div key={a.id} className="border border-gray-200 rounded-lg p-2.5 flex items-center justify-between gap-2">
            <div className="flex-1 min-w-0">
              <div className="text-xs font-semibold text-gray-800 truncate">{a.nombre}</div>
              <div className="text-[10px] text-gray-500 font-mono">
                {a.activa ? 'Activa' : 'Pausada'} · creada {new Date(a.fecha_creada).toLocaleDateString('es-MX', {day:'2-digit', month:'short'})}
              </div>
            </div>
            <button onClick={() => onToggle(a.id)} className={`text-[10px] px-2 py-1 rounded font-bold ${a.activa ? 'text-amber-700 bg-amber-50' : 'text-emerald-700 bg-emerald-50'}`}>
              {a.activa ? 'Pausar' : 'Activar'}
            </button>
            <button onClick={() => onRemove(a.id)} className="text-gray-300 hover:text-rose-600 w-6 h-6 text-base leading-none">×</button>
          </div>
        ))}
      </div>
      <div className="mt-3 text-[10px] text-gray-400 italic">
        Las alertas se guardan en este navegador. Email automático disponible en V2.
      </div>
    </div>
  );
}

function ConfigModal({ data, allLegisladores, config, setConfig, onClose }) {
  const [tab, setTab] = useState('legisladores');
  const [search, setSearch] = useState('');
  const [filtroCamara, setFiltroCamara] = useState('');
  const [filtroPartido, setFiltroPartido] = useState('');

  const legisladoresFiltrados = useMemo(() => {
    let list = allLegisladores;
    if (search.length >= 2) {
      const q = search.toLowerCase();
      list = list.filter(l => formatNombreLegislador(l).toLowerCase().includes(q));
    }
    if (filtroCamara) list = list.filter(l => l.camara === filtroCamara);
    if (filtroPartido) list = list.filter(l => l.partido === filtroPartido);
    return list;
  }, [allLegisladores, search, filtroCamara, filtroPartido]);

  const partidosUnicos = useMemo(() =>
    [...new Set(allLegisladores.map(l => l.partido).filter(Boolean))].sort(), [allLegisladores]
  );

  const toggleLeg = (id) => {
    const set = new Set(config.legisladores);
    if (set.has(id)) set.delete(id);
    else if (set.size < 20) set.add(id);
    setConfig({ ...config, legisladores: Array.from(set) });

  const toggleTema = (cat) => {
    const set = new Set(config.temas);
    if (set.has(cat)) set.delete(cat);

    setConfig({ ...config, temas: Array.from(set) });

    setConfig({ ...config, estados: Array.from(set) });

                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold text-gray-800">{s.nombre}</div>
                        <div className="text-[10px] text-gray-500 font-mono">Score {s.score_total.toFixed(0)}</div>
                      </div>
                      <div className={`text-[11px] font-bold ${sel ? 'text-emerald-700' : 'text-gray-400'}`}>
                        {sel ? '✓ Sí' : '+ Agregar'}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {tab === 'estados' && (
            <div>
              <div className="text-xs text-gray-500 mb-3">Selecciona hasta 12 estados para vigilar su cobertura mediática.</div>
              <div className="divide-y divide-gray-100 border border-gray-200 rounded-lg overflow-hidden">
                {estadosList.map(([key, info]) => {
                  const sel = config.estados.includes(key);
                  return (
                    <button key={key} onClick={() => toggleEstado(key)}
                      className={`w-full flex items-center justify-between px-3 py-2.5 text-left transition ${sel ? 'bg-emerald-50' : 'hover:bg-gray-50'}`}>
                      <div className="flex items-center gap-3 min-w-0">
                        <span className="text-sm text-gray-800 truncate">{info.nombre || info.abreviatura}</span>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className="text-[10px] text-gray-500 font-mono">{info.total_articulos || 0} notas</span>
                        <span className={`text-[11px] font-bold ${sel ? 'text-emerald-700' : 'text-gray-400'}`}>
                          {sel ? '✓ Sí' : '+ Agregar'}
                        </span>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        <div className="px-5 py-3 border-t border-gray-100 flex items-center justify-between bg-gray-50 rounded-b-2xl">
          <div className="text-[10px] text-gray-500 font-mono">
            Cambios se guardan automáticamente en este navegador
          </div>
          <button onClick={onClose}
            className="text-white font-semibold px-5 py-2 rounded-full text-xs"
            style={{background: 'linear-gradient(135deg, #2e7d32 0%, #388e3c 100%)'}}>
            Listo
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── App ───
function App() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem(SESSION_KEY) === '1');
  const [data, setData] = useState(null);
  const [allLegisladores, setAllLegisladores] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showConfig, setShowConfig] = useState(false);
  const [legSel, setLegSel] = useState(null);
  const [temaSel, setTemaSel] = useState(null);
  const [filtroCSP, setFiltroCSP] = useState(null);
  const [config, setConfigState] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { legisladores: [], temas: [], estados: [], alertas: [] };
    } catch { return { legisladores: [], temas: [], estados: [], alertas: [] }; }
  });

  const setConfig = (next) => {
    setConfigState(next);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  };

  useEffect(() => {
    if (!authed) return;
    setLoading(true);
    Promise.all([
      fetch('./data.json?t=' + Date.now()).then(r => r.ok ? r.json() : Promise.reject()),
      fetch(`${WORKER_URL}/radar?limite=100`).then(r => r.ok ? r.json() : { legisladores: [] }),
    ]).then(([d, radar]) => {
      setData(d);
      setAllLegisladores(radar.legisladores || []);
      const total = radar.total || 0;
      if (total > 100) {
        const pages = Math.ceil(total / 100);
        const promises = [];
        for (let p = 2; p <= pages; p++) {
          promises.push(fetch(`${WORKER_URL}/radar?limite=100&pagina=${p}`).then(r => r.ok ? r.json() : { legisladores: [] }));
        }
        Promise.all(promises).then(results => {
          const todos = [...(radar.legisladores || [])];
          results.forEach(r => todos.push(...(r.legisladores || [])));
          setAllLegisladores(todos);
        });
      }
      setLoading(false);
    }).catch(() => setLoading(false));
  }, [authed]);

  if (!authed) return <PasswordGate onAuth={() => setAuthed(true)} />;
  if (loading || !data) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="spinner inline-block"></div>
          <div className="text-xs text-gray-500 mt-3 font-mono">Cargando tu console...</div>
        </div>
      </div>
    );
  }

  const semaforo = data.semaforo || [];
  const temasSelectos = new Set(config.temas);
  const estadosSelectos = new Set(config.estados);
  const legisladoresIds = new Set(config.legisladores);
  const legisladoresEnConfig = allLegisladores.filter(l => legisladoresIds.has(l.id));
  const temasEnConfig = semaforo.filter(s => temasSelectos.has(s.categoria));
  const configCount = config.legisladores.length + config.temas.length + config.estados.length;
  const alertas = config.alertas || [];

  return (
    <div className="max-w-7xl mx-auto px-4 pt-4 pb-24 space-y-4">
      <Header onConfigClick={() => setShowConfig(true)} configCount={configCount} ultimaActualizacion={data.metadata?.generado} />

      {configCount === 0 && (
        <div className="glass border border-borde rounded-2xl p-12 text-center">
          <div className="text-3xl font-black text-gray-900">Bienvenido a Console Pro</div>
          <p className="text-sm text-gray-600 mt-2 max-w-md mx-auto">
            Empieza configurando los legisladores, temas y estados que quieres monitorear.
            Tus selecciones se guardan en este navegador.
          </p>
          <button onClick={() => setShowConfig(true)}
            className="mt-6 text-white font-semibold px-6 py-3 rounded-full text-sm shadow-sm"
            style={{background: 'linear-gradient(135deg, #2e7d32 0%, #388e3c 100%)'}}>
            Empezar configuración
          </button>
          <div className="grid grid-cols-3 gap-3 mt-8 max-w-2xl mx-auto text-xs text-gray-600">
            <div className="p-3 border border-gray-200 rounded-xl">
              <div className="text-2xl font-black text-gray-900 font-mono">{allLegisladores.length || '—'}</div>
              <div className="text-[10px] uppercase tracking-wider mt-1 font-bold text-gray-500">Legisladores</div>
            </div>
            <div className="p-3 border border-gray-200 rounded-xl">
              <div className="text-2xl font-black text-gray-900 font-mono">{semaforo.length}</div>
              <div className="text-[10px] uppercase tracking-wider mt-1 font-bold text-gray-500">Categorías</div>
            </div>
            <div className="p-3 border border-gray-200 rounded-xl">
              <div className="text-2xl font-black text-gray-900 font-mono">32</div>
              <div className="text-[10px] uppercase tracking-wider mt-1 font-bold text-gray-500">Estados</div>
            </div>
          </div>
        </div>
      )}

      {/* ROW 1: Tendencia 50% + Terminal IA mockup 50% */}
      {configCount > 0 && (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
          <TendenciaTemas historial={data.historial_scores} semaforo={semaforo} temasSelectos={temasSelectos} />
          <TerminalIAMockup />
        </div>
      )}

      {/* Mis temas */}
      {temasEnConfig.length > 0 && (
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold uppercase tracking-widest text-gray-400">Mis temas · {temasEnConfig.length}/8</div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            {temasEnConfig.map(t => (
              <TemaCard key={t.categoria} data={t}
                onRemove={(cat) => setConfig({ ...config, temas: config.temas.filter(c => c !== cat) })}
                onClick={() => setTemaSel(t)} />
            ))}
          </div>
        </div>
      )}

      {/* ROW: Mapa estados | Menciones CSP */}
      {(estadosSelectos.size > 0 || temasSelectos.size > 0) && (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
          <MapaMexico mapa={data.mapa || {}} estadosSelectos={estadosSelectos}
            onRemove={(key) => setConfig({ ...config, estados: config.estados.filter(e => e !== key) })} />
          <MencionesCSP data={data} semaforo={semaforo} temasSelectos={temasSelectos}
            filtroTema={filtroCSP} setFiltroTema={setFiltroCSP} />
        </div>
      )}

      {/* Mis legisladores */}
      {legisladoresEnConfig.length > 0 && (
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold uppercase tracking-widest text-gray-400">Mis legisladores · {legisladoresEnConfig.length}/20</div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            {legisladoresEnConfig.map(l => (
              <LegisladorCard key={l.id} leg={l} semaforo={semaforo}
                onRemove={(id) => setConfig({ ...config, legisladores: config.legisladores.filter(x => x !== id) })}
                onClick={() => setLegSel(l)} />
            ))}
          </div>
        </div>
      )}

      {/* ROW: Actividad reciente | Mis alertas */}
      {configCount > 0 && (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
          <ActividadReciente data={data} semaforo={semaforo}
            legisladoresIds={legisladoresIds} temasSelectos={temasSelectos}
            allLegisladores={allLegisladores} />
          <MisAlertas alertas={alertas} semaforo={semaforo} allLegisladores={allLegisladores}
            onAdd={(a) => setConfig({ ...config, alertas: [...alertas, a] })}
            onRemove={(id) => setConfig({ ...config, alertas: alertas.filter(x => x.id !== id) })}
            onToggle={(id) => setConfig({ ...config, alertas: alertas.map(x => x.id === id ? { ...x, activa: !x.activa } : x) })} />
        </div>
      )}

      <div className="text-center text-[10px] text-gray-400 font-mono pt-6">
        FIAT Console Pro · v1 ALPHA · Datos actualizados cada 4 horas
      </div>

      {/* FAB Configurar */}
      <button onClick={() => setShowConfig(true)}
        className="fab-config fixed bottom-6 right-6 px-5 py-3 rounded-full font-semibold text-sm flex items-center gap-2 z-30">
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Configurar
      </button>

      {showConfig && <ConfigModal data={data} allLegisladores={allLegisladores} config={config} setConfig={setConfig} onClose={() => setShowConfig(false)} />}
      {legSel && <LegisladorModal leg={legSel} semaforo={semaforo} onClose={() => setLegSel(null)} />}
      {temaSel && <TemaModal tema={temaSel} fuentes={data.fuentes} onClose={() => setTemaSel(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
