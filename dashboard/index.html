<body class="min-h-screen text-gray-800">

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        /* ── Supabase Auth (URL + anon key son públicas por diseño) ── */
        const SUPABASE_URL = 'https://cvkmqjybsqowxivczmwx.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2a21xanlic3Fvd3hpdmN6bXd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTIwMzMsImV4cCI6MjA5NDUyODAzM30.W7TGmPkEYmWFbq9Ev_-nINSVGwQixjc-8J36xUL2kj0';
        const sb = (window.supabase && window.supabase.createClient)

        /* Nombre para mostrar: metadata.full_name → si no, deriva del correo */
        function displayName(u) {
            if (!u) return '';
            const m = u.user_metadata || {};
            const n = (m.full_name || m.name || '').trim();
            if (n) return n;
            const local = (u.email || '').split('@')[0].replace(/[._-]+/g, ' ').trim();
            return local ? local.replace(/\b\w/g, c => c.toUpperCase()) : (u.email || '');
        }
        function primerNombre(u) {
            return (displayName(u) || '').split(' ')[0] || '';
        }
        function inicialesDe(u) {
            const p = (displayName(u) || '').trim().split(/\s+/).filter(Boolean);
            if (!p.length) return '·';
            return ((p[0][0] || '') + (p.length > 1 ? p[p.length - 1][0] : '')).toUpperCase();
        }
        /* Clave de config de consola POR USUARIO. Antes era global
           (`fiat_consola_pro_config_v3`) → las configs se filtraban entre
           cuentas en el mismo navegador. Ahora se sufija con el user id de
           Supabase. Usuario nuevo / sin sesión → config vacía. */
        const _CONSOLA_CFG_BASE = 'fiat_consola_pro_config_v3';
        function consolaConfigKey(user) {
            const uid = user && user.id ? user.id : null;
            return uid ? `${_CONSOLA_CFG_BASE}::${uid}` : _CONSOLA_CFG_BASE;
        }
        function loadConsolaConfig(user) {
            try {
                const c = JSON.parse(localStorage.getItem(consolaConfigKey(user))) || {};
                return { legisladores: [], temas: [], estados: [], comisiones: [], alertas: [], ...c };
            } catch { return { legisladores: [], temas: [], estados: [], comisiones: [], alertas: [] }; }
        }
        /* ¿El usuario ya configuró su consola? (config vive en localStorage,
           por usuario). */
        function consolaConfigurada(user) {
            try {
                const c = loadConsolaConfig(user);
                return ((c.legisladores || []).length + (c.temas || []).length + (c.estados || []).length) > 0;
            } catch { return false; }
        }

        /* ================================================================
           HELPERS
           ================================================================ */

        /**
         * Formatea un timestamp ISO del servidor a tiempo relativo del usuario.
         * Muestra "Hace X min/horas" si es reciente, o "Hoy, HH:MM" / "Ayer, HH:MM" / fecha completa.
         */
        function formatearActualizacion(isoString) {
            if (!isoString) return '';
            const fechaServer = new Date(isoString);
            if (isNaN(fechaServer.getTime())) return '';
            const ahora = new Date();
            const diffMs = ahora - fechaServer;
            const diffMin = Math.floor(diffMs / 60000);
            const diffHoras = Math.floor(diffMs / 3600000);

            const horaLocal = fechaServer.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: true });
            const hoy = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
            const ayer = new Date(hoy.getTime() - 86400000);
            const fechaDia = new Date(fechaServer.getFullYear(), fechaServer.getMonth(), fechaServer.getDate());

            if (diffMin < 1) return 'Justo ahora';
            if (diffMin < 60) return `Hace ${diffMin} min`;
            if (diffHoras < 6) return `Hace ${diffHoras}h (${horaLocal})`;
            if (fechaDia.getTime() === hoy.getTime()) return `Hoy, ${horaLocal}`;
            if (fechaDia.getTime() === ayer.getTime()) return `Ayer, ${horaLocal}`;
            return fechaServer.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' }) + ', ' + horaLocal;
        }

        /* ================================================================
           SHARED COMPONENTS
           ================================================================ */

        function ScoreRing({ score, color, size = 80 }) {
            const radius = (size - 8) / 2;
            const half = size / 2;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (score / 100) * circumference;
            const gradientColors = {
                verde: ['#66bb6a', '#2e7d32'],
                amarillo: ['#e0a82b', '#c6972b'],
                rojo: ['#ef5350', '#c62828'],
            };
            const [c1, c2] = gradientColors[color] || ['#bdbdbd', '#9ca3af'];
            const gradId = `grad-${color}-${size}`;
            const fontSize = size > 70 ? '16px' : size > 50 ? '13px' : '11px';
            return (
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
                    <defs>
                        <linearGradient id={gradId} x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor={c1} />
                            <stop offset="100%" stopColor={c2} />
                        </linearGradient>
                    </defs>
                    <circle cx={half} cy={half} r={radius} stroke="#e5e7eb" strokeWidth="6" fill="none" />
                    <circle cx={half} cy={half} r={radius} stroke={`url(#${gradId})`} strokeWidth="6" fill="none"
                        strokeDasharray={circumference} strokeDashoffset={offset}
                        strokeLinecap="round" className="score-ring"
                        transform={`rotate(-90 ${half} ${half})`} />
                    <text x={half} y={half} textAnchor="middle" dominantBaseline="central"
                        style={{fontSize}} fill="#1a365d" fontWeight="bold">
                        {score.toFixed(0)}%
                    </text>
                </svg>
            );
        }

        // ── Búsqueda Full-Text (Cloudflare Worker → Turso FTS5) ──
        const WORKER_URL = 'https://fiat-busqueda.rreubenleon.workers.dev';

        function ResultadoBusqueda({ r, query }) {
            const tipoLabel = { articulo: 'Medio', gaceta: 'Gaceta', sil: 'SIL' };
            const tipoIcon = { articulo: '📰', gaceta: '📜', sil: '📋' };
            const scoreColor = {
                verde: 'text-emerald-600',
                amarillo: 'text-amber-500',
                rojo: 'text-red-500',
            };
            const scoreLabel = {
                verde: 'Alta',
                amarillo: 'Media',
                rojo: 'Baja',
            };
            function hl(text) {
                if (!text || !query) return text;
                const terms = query.split(/\s+/).filter(t => t.length >= 2);
                let html = text;
                terms.forEach(term => {
                    const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                    html = html.replace(re, '<mark class="bg-yellow-100 px-0.5 rounded">$1</mark>');
                });
                return html;
            }
            const Wrapper = r.url ? 'a' : 'div';
            const wrapperProps = r.url ? { href: r.url, target: '_blank', rel: 'noopener noreferrer' } : {};
            return (
                <Wrapper {...wrapperProps}
                    className="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors cursor-pointer border-b border-gray-100 last:border-b-0">
                    <span className="text-lg flex-shrink-0">{tipoIcon[r.fuente_tipo] || '📄'}</span>
                    <div className="min-w-0 flex-1">
                        <div className="text-sm text-gray-900 leading-snug line-clamp-1"
                             dangerouslySetInnerHTML={{ __html: hl(r.titulo) }} />
                        <div className="text-xs text-gray-400 mt-0.5 flex items-center gap-1.5">
                            <span>{tipoLabel[r.fuente_tipo] || r.fuente_tipo}</span>
                            {r.fuente_nombre && <><span className="text-gray-300">·</span><span>{r.fuente_nombre}</span></>}
                            {r.fecha && <><span className="text-gray-300">·</span><span>{r.fecha}</span></>}
                            {r.extra?.partido && <><span className="text-gray-300">·</span><span className="font-medium">{r.extra.partido}</span></>}
                        </div>
                    </div>
                    {r.score_momento != null && (
                        <div className="text-right flex-shrink-0 ml-2">
                            <div className={`text-sm font-semibold font-mono ${scoreColor[r.color_momento] || 'text-gray-500'}`}>
                                {r.score_momento}%
                            </div>
                            <div className="text-[10px] text-gray-400 font-mono">{scoreLabel[r.color_momento] || ''}</div>
                        </div>
                    )}
                </Wrapper>
            );
        }

        function BusquedaAvanzada({ busqueda, onClose }) {
            const [resultados, setResultados] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [total, setTotal] = React.useState(0);
            const [pagina, setPagina] = React.useState(1);
            const [totalPaginas, setTotalPaginas] = React.useState(0);
            const [filtroTipo, setFiltroTipo] = React.useState('');
            const [desde, setDesde] = React.useState('');
            const [hasta, setHasta] = React.useState('');
            const [error, setError] = React.useState('');
            const dropdownRef = React.useRef(null);
            const [dropPos, setDropPos] = React.useState({ top: 0, right: 0 });

            // Posicionar dropdown con fixed para escapar overflow del nav
            React.useEffect(() => {
                const input = document.querySelector('[data-search-input]');
                if (input) {
                    const rect = input.getBoundingClientRect();
                    setDropPos({ top: rect.bottom + 8, right: Math.max(16, window.innerWidth - rect.right) });
                }
            }, [busqueda, resultados]);

            React.useEffect(() => {
                if (busqueda.length < 3) { setResultados(null); setError(''); return; }
                const timeout = setTimeout(() => buscar(busqueda, 1), 350);
                return () => clearTimeout(timeout);
            }, [busqueda, filtroTipo, desde, hasta]);

            // Cerrar al hacer click fuera
            React.useEffect(() => {
                function handleClick(e) {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target) && !e.target.closest('[data-search-input]')) {
                        onClose();
                    }
                }
                document.addEventListener('mousedown', handleClick);
                return () => document.removeEventListener('mousedown', handleClick);
            }, [onClose]);

            // Cerrar con Escape
            React.useEffect(() => {
                function handleKey(e) { if (e.key === 'Escape') onClose(); }
                document.addEventListener('keydown', handleKey);
                return () => document.removeEventListener('keydown', handleKey);
            }, [onClose]);

            async function buscar(q, pag) {
                setLoading(true);
                setError('');
                try {
                    const params = new URLSearchParams({ q, pagina: pag, limite: 20 });
                    if (filtroTipo) params.set('tipo', filtroTipo);
                    if (desde) params.set('desde', desde);
                    if (hasta) params.set('hasta', hasta);
                    const resp = await fetch(`${WORKER_URL}/buscar?${params}`);
                    const data = await resp.json();
                    if (data.error) { setError(data.error); setResultados([]); }
                    else {
                        setResultados(data.resultados || []);
                        setTotal(data.total || 0);
                        setPagina(pag);
                        setTotalPaginas(data.total_paginas || 0);
                    }
                } catch (e) {
                    setError('No se pudo conectar al servicio de búsqueda');
                    setResultados([]);
                }
                setLoading(false);
            }

            if (busqueda.length < 3) return null;
            if (!resultados && !loading) return null;

            return (
                <div ref={dropdownRef} style={{ position: 'fixed', top: dropPos.top, right: dropPos.right }} className="w-[28rem] md:w-[36rem] bg-white rounded-xl shadow-2xl border border-gray-200 z-50 overflow-hidden">
                    {/* Filtros */}
                    <div className="flex gap-1.5 px-4 pt-3 pb-2 text-xs flex-wrap items-center border-b border-gray-100">
                        {[['', 'Todos'], ['articulo', 'Medios'], ['gaceta', 'Gaceta'], ['sil', 'SIL']].map(([val, label]) => (
                            <button key={val} onClick={() => setFiltroTipo(val)}
                                className={`px-2.5 py-1 rounded-full border transition-all ${
                                    filtroTipo === val ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-600 border-gray-200 hover:border-gray-400'
                                }`}>{label}</button>
                        ))}
                        <div className="flex items-center gap-1 ml-auto">

                                </div>
                            )}
                        </>
                    )}
                    {!loading && resultados && resultados.length === 0 && !error && (
                        <div className="text-center py-8 text-gray-400 text-sm">Sin resultados para "{busqueda}"</div>

        }

        /* ── News Ticker (auto-scroll de noticias) ── */
        function NewsTicker({ articulos, max = 5 }) {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [isAnimating, setIsAnimating] = useState(false);
            const items = (articulos || []).slice(0, max);

            useEffect(() => {
                if (items.length <= 1) return;
                const interval = setInterval(() => {
                    setIsAnimating(true);
                    setTimeout(() => {
                        setCurrentIdx(prev => (prev + 1) % items.length);
                        setIsAnimating(false);
                    }, 400);
                }, 3500);
                return () => clearInterval(interval);
            }, [items.length]);

            if (items.length === 0) return null;
            const current = items[currentIdx];
            return (
                <div className="mt-3 overflow-hidden">
                    <div className="flex items-center gap-2 mb-2">
                        <span className="text-[10px] font-semibold uppercase tracking-widest text-white/50">Últimas noticias</span>
                        <div className="flex gap-1 ml-2">
                            {items.map((_, i) => (
                                <div key={i} className={`w-1 h-1 rounded-full transition-all duration-300 ${i === currentIdx ? 'bg-white/80 w-3' : 'bg-white/30'}`}></div>
                            ))}
                        </div>
                    </div>
                    <div className={`transition-all duration-400 ${isAnimating ? 'opacity-0 translate-y-2' : 'opacity-100 translate-y-0'}`}>

                            <a href={current.url} target="_blank" rel="noopener noreferrer" className="block group cursor-pointer">
                                <div className="flex items-start gap-2">
                                    <span className="text-white/40 text-xs mt-0.5 flex-shrink-0 group-hover:text-white/70 transition">📰</span>
                                    <div className="min-w-0">
                                        <div className="text-sm text-white/90 group-hover:text-white leading-snug line-clamp-2 group-hover:underline">{current.titulo}</div>
                                        <div className="text-[11px] text-white/40 group-hover:text-white/60 mt-1">{current.fuente?.replace(/_/g, ' ')} · {current.fecha}</div>
                                    </div>
                                </div>
                            </a>
                        ) : (
                            <div className="flex items-start gap-2">
                                <span className="text-white/40 text-xs mt-0.5 flex-shrink-0">📰</span>
                                <div className="min-w-0">
                                    <div className="text-sm text-white/90 leading-snug line-clamp-2">{current.titulo}</div>
                                    <div className="text-[11px] text-white/40 mt-1">{current.fuente?.replace(/_/g, ' ')} · {current.fecha}</div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const PARTIDO_COLORS = {

        // Normaliza variantes de partido a la clave canónica.
        // 'Morena' → 'MORENA'; 'Sin Partido'/''/null → 'INDEP'.
        function normPartido(p) {
            const s = (p || '').trim().toUpperCase();
            if (!s || s === 'SIN PARTIDO' || s === 'INDEPENDIENTE' || s === 'NINGUNO') return 'INDEP';
            if (PARTIDO_NOMBRE_COMPLETO[s]) return s;

        /* Solo el nombre distintivo de la comisión (sin "Comisión de ").
           Portado de consola-pro.html para el wizard. */
        const _nombreComisionDisplay = (nombre) => (nombre || '').replace(/^Comisi[oó]n\s+de\s+/i, '').trim();

        /* ── Banner de frescura del SIL: avisa si el scraper se quedó atrás ── */
        function SilFreshnessBanner({ metadata }) {
            const fechaPres = metadata?.sil_max_fecha_presentacion;
            if (!fechaPres) return null;
            const hoy = new Date();
            const fp = new Date(fechaPres + 'T00:00:00');
            const diasGap = Math.floor((hoy - fp) / (1000 * 60 * 60 * 24));
            if (diasGap < 5) return null;  // <5 días: silencio
            const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            const labelFecha = `${parseInt(fechaPres.slice(8,10))} ${meses[parseInt(fechaPres.slice(5,7))-1]} ${fechaPres.slice(0,4)}`;
            const nivel = diasGap >= 14 ? 'rojo' : diasGap >= 7 ? 'amarillo' : 'gris';
            const cls = nivel === 'rojo' ? 'bg-red-50 border-red-200 text-red-900'
                      : nivel === 'amarillo' ? 'bg-amber-50 border-amber-200 text-amber-900'
                      : 'bg-gray-50 border-gray-200 text-gray-700';
            return (
                <div className={`border rounded-lg px-3 py-2 text-xs ${cls}`}>
                    <span className="font-semibold">Cobertura SIL:</span> última actividad legislativa registrada el <span className="font-mono">{labelFecha}</span> ({diasGap} días atrás). {nivel === 'rojo' ? 'El scraper puede estar incompleto — los conteos por legislador subestiman la realidad.' : nivel === 'amarillo' ? 'Posible retraso de scraping; los conteos pueden estar abajo.' : ''}
                </div>
            );

        function PartidoBadge({ partido, size = 'sm' }) {

            const dim = size === 'xl' ? 'w-8 h-8' : size === 'lg' ? 'w-6 h-6' : 'w-5 h-5';
            const pillPad = size === 'xl' ? 'px-2 py-0.5 text-xs' : size === 'lg' ? 'px-2 py-0.5 text-[11px]' : 'px-1.5 py-px text-[9px]';

        /* ================================================================
           WIDGET: Partidos Políticos (ranking pro con logos, breakdown, tri-bars)
           ================================================================ */
        // hex (#rrggbb) → rgba(r,g,b,alpha). Tolera null/undefined.
        function hexToRgba(hex, alpha = 1) {
            if (!hex || typeof hex !== 'string') return `rgba(107,114,128,${alpha})`;
            const h = hex.replace('#', '');
            const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
            if (full.length !== 6) return `rgba(107,114,128,${alpha})`;
            const r = parseInt(full.substr(0, 2), 16);
            const g = parseInt(full.substr(2, 2), 16);
            const b = parseInt(full.substr(4, 2), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

            const totSenado = partidosArr.reduce((s, [,p]) => s + ((p.por_camara && p.por_camara.Senado) || 0), 0);
            const totDip = partidosArr.reduce((s, [,p]) => s + ((p.por_camara && p.por_camara.Diputados) || 0), 0);

                            <div className="text-[9px] text-gray-500 font-mono mt-0.5">
                                Sen <span className="text-gray-700">{totSenado.toLocaleString()}</span> · Dip <span className="text-gray-700">{totDip.toLocaleString()}</span>{totPerm > 0 && <> · Perm <span className="text-gray-700">{totPerm.toLocaleString()}</span></>}
                            </div>

                            const topCats = p.por_categoria ? Object.entries(p.por_categoria).sort(([,a],[,b]) => b.count - a.count).slice(0, 5) : [];
                            const isOpen = expanded === key;
                            const color = p.color || PARTIDO_COLORS[key] || '#6B7280';
                            return (
                                <div key={key}
                                    className={`rounded-lg border transition-all ${isOpen ? 'border-gray-300 bg-gray-50' : 'border-transparent hover:border-gray-200 hover:bg-gray-50/60'}`}>
                                    <button onClick={() => setExpanded(isOpen ? null : key)}
                                        className="w-full flex items-center gap-2.5 px-2 py-1.5 text-left">
                                        {/* Rank */}
                                        <div className="w-5 text-[10px] font-bold text-gray-400 flex-shrink-0 text-center">{idx + 1}</div>
                                        {/* Logo */}
                                        <div className="w-7 h-7 flex items-center justify-center flex-shrink-0">
                                            <PartidoBadge partido={key} size="lg" />

                                        {/* Nombre + barra */}

                                            </div>
                                        </div>
                                        {/* Total + chevron */}

                                            <div className="text-sm font-bold text-gray-800 leading-tight tabular-nums font-mono">{p.total.toLocaleString()}</div>
                                            <div className="text-[9px] text-gray-400 leading-tight">instr.</div>
                                        </div>
                                        <svg className={`w-3 h-3 text-gray-400 transition-transform flex-shrink-0 ${isOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>

                                    {isOpen && (

                                            {/* DESGLOSE TÉCNICO */}
                                            {(() => {

                                                const tipos = p.por_tipo || {};
                                                const est = p.por_estado || {};
                                                const ind = p.individuales || 0;
                                                const col = p.colectivas || 0;
                                                const nLegs = p.n_legisladores || 0;
                                                const sum = (...keys) => keys.reduce((s, k) => s + (est[k] || 0), 0);
                                                const conEstado = sum('Aprobado','Pendiente','Desechado','Retirada');
                                                const aproPct = conEstado > 0 ? ((est.Aprobado || 0) / conEstado) * 100 : 0;

                                                return (

                                                        {/* Por cámara */}

                                                            </div>
                                                        )}
                                                    </>
                                                );
                                            })()}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="text-[10px] text-gray-400 mt-3 pt-2 border-t border-gray-100 font-mono">

                    </div>

        /* ================================================================
           WIDGET: Divergencias entre fuentes
           Muestra categorías cuya distribución de las 6 fuentes diverge
           significativamente de su baseline histórico (KL ≥ 0.3),
           etiquetando el patrón narrativo (Presión sin respuesta,
           Movimiento legislativo silencioso, etc.).
           ================================================================ */
        const DIVERGENCIA_THRESHOLD = 0.3;
        // Patrones técnicos que NO son señal periodística — los excluimos del widget
        const PATRONES_OCULTOS = new Set(['rebalanceo_tecnico', 'convergencia']);

        function DivergenciasWidget({ semaforo, onSelect }) {
            // Con histéresis: priorizamos estado_abierto del backend (lleva
            // ≥ 4h activo, mínimo 24h hasta cerrar). Fallback a umbral crudo.
            const lista = (semaforo || [])
                .filter(s => s.divergencia
                    && (s.divergencia.estado_abierto
                        || s.divergencia.indice >= DIVERGENCIA_THRESHOLD)
                    && !PATRONES_OCULTOS.has(s.divergencia.patron_id))
                .sort((a, b) => (b.divergencia.kl_pico || b.divergencia.indice) - (a.divergencia.kl_pico || a.divergencia.indice));

            // Si no hay nada narrativo hoy, mostramos placeholder en vez de ocultar
            const vacio = lista.length === 0;

            // Intensidad cualitativa en lugar de KL crudo.
            // El número técnico se mantiene en el tooltip para lectores avanzados.
            const intensidad = (kl) => {
                if (kl >= 0.6) return { label: 'Muy alta', cls: 'bg-rose-50 text-rose-700 border-rose-200' };
                if (kl >= 0.45) return { label: 'Alta',     cls: 'bg-amber-50 text-amber-700 border-amber-200' };
                return              { label: 'Moderada',  cls: 'bg-violet-50 text-violet-700 border-violet-200' };

                    <div className="flex items-baseline justify-between mb-1">

                            ⓘ señales atípicas
                        </span>
                    </div>
                    <p className="text-[11px] text-gray-500 mb-3 leading-snug">
                        Categorías donde las fuentes del score están desalineadas entre sí: una destaca mientras otras quedan rezagadas.
                    </p>
                    {vacio ? (
                        <div className="py-4 text-center text-[11px] text-gray-400 italic">
                            Sin señales atípicas hoy

                    ) : (
                        <div className="space-y-2">
                            {lista.map((s, i) => {
                                const nivel = intensidad(s.divergencia.indice);
                                return (
                                    <div key={s.categoria}
                                        onClick={() => onSelect && onSelect(s)}
                                        title={`Intensidad ${nivel.label.toLowerCase()} · KL ${s.divergencia.indice.toFixed(2)}`}
                                        className="cursor-pointer border border-gray-200 hover:border-acento/40 hover:bg-acento/5 rounded-lg p-2.5 transition-colors group">
                                        <div className="flex items-baseline justify-between gap-2 mb-1">
                                            <div className="text-sm font-semibold text-gray-800 truncate">
                                                {s.nombre || s.categoria}
                                            </div>
                                            <span className={`text-[9px] font-mono font-bold uppercase tracking-widest px-1.5 py-0.5 rounded border flex-shrink-0 ${nivel.cls}`}>
                                                {nivel.label}
                                            </span>
                                        </div>
                                        <div className="text-[11px] text-gray-700 leading-snug mb-1.5">
                                            {s.divergencia.patron_label}
                                        </div>
                                        <div className="flex items-center gap-2 text-[10px] font-mono text-gray-500 flex-wrap">
                                            <span className="inline-flex items-center gap-0.5">
                                                <span className="text-emerald-600 font-bold">↑</span>
                                                <span>{s.divergencia.sobre_representada}</span>
                                            </span>
                                            <span className="text-gray-300">·</span>
                                            <span className="inline-flex items-center gap-0.5">
                                                <span className="text-rose-600 font-bold">↓</span>
                                                <span>{s.divergencia.sub_representada}</span>
                                            </span>
                                            {s.divergencia.estado_abierto && s.divergencia.horas_activa != null && (
                                                <>
                                                    <span className="text-gray-300">·</span>
                                                    <span className="text-acento" title={`Abierta el ${s.divergencia.abierta_en} · pico KL ${s.divergencia.kl_pico}`}>

        /* ================================================================
           DIVERGENCE INDEX — detecta cuando las 5 señales del score se
           separan entre sí. Un alto spread esconde historias que el score
           promedio oculta (medios gritan pero Congreso ignora, o viceversa).
           ================================================================ */
        function computeDivergence(d) {
            const m = Math.max(d.score_media || 0, 0);
            const t = Math.max(d.score_trends || 0, 0);
            const c = Math.max(d.score_congreso || 0, 0);
            const csp = Math.max(d.score_mananera || 0, 0);
            const u = Math.max(d.score_urgencia || 0, 0);
            const signals = [m, t, c, csp, u];
            const names = ['media', 'trends', 'congreso', 'csp', 'urgencia'];
            const max = Math.max(...signals);
            const min = Math.min(...signals);
            const spread = max - min;
            const avg = signals.reduce((a, b) => a + b, 0) / signals.length;
            const variance = signals.reduce((a, v) => a + (v - avg) ** 2, 0) / signals.length;
            const std = Math.sqrt(variance);

            /* Detectar patrón dominante. Orden importa: los patterns más
               específicos se evalúan primero. */
            let pattern = null;
            let narrative = null;
            let tone = 'info';  // info | alert | warn

            if (m >= 70 && c <= 30) {
                pattern = 'Presión sin respuesta';
                narrative = 'Los medios cubren intensamente el tema pero el Congreso no está moviendo instrumentos. Gap de reacción.';
                tone = 'warn';
            } else if (m <= 30 && c >= 70) {
                pattern = 'Legislación silenciosa';
                narrative = 'El Congreso avanza con instrumentos sin que los medios lo cubran. Tema que se mueve por debajo del radar público.';
                tone = 'alert';
            } else if (csp >= 60 && m <= 40) {
                pattern = 'Agenda presidencial sola';
                narrative = 'La Presidencia habla del tema pero los medios no le dan tracción. Señal de que la conversación no cuajó públicamente.';
                tone = 'warn';
            } else if (u >= 70 && c <= 30) {
                pattern = 'Urgencia sin acción';
                narrative = 'El modelo proyecta alta reactividad legislativa histórica, pero el Congreso no está presentando instrumentos ahora. Tema caliente en cola.';
                tone = 'alert';
            } else if (min >= 60) {
                pattern = 'Consenso alto';
                narrative = 'Las 5 señales apuntan al mismo lado con fuerza. Momento maduro del tema.';
                tone = 'info';
            } else if (max <= 35) {
                pattern = 'Sin señal';
                narrative = 'Ninguna capa marca actividad significativa. Categoría en silencio.';
                tone = 'info';
            } else if (spread >= 60) {
                /* Encontrar qué señal está fuera del grupo */
                const maxIdx = signals.indexOf(max);
                const minIdx = signals.indexOf(min);
                pattern = 'Señal fragmentada';
                narrative = `${names[maxIdx].toUpperCase()} dispara (${max.toFixed(0)}%) mientras ${names[minIdx].toUpperCase()} se mantiene bajo (${min.toFixed(0)}%). Historias contradictorias entre capas.`;
                tone = 'warn';
            }

            return {
                spread, std, max, min, pattern, narrative, tone,
                hasAlert: tone === 'alert' || (tone === 'warn' && spread >= 55),
            };
        }

        function SemaforoCard({ data, onClick }) {
            const colorClasses = {
                verde: 'border-semaforo-verde/40 hover:border-semaforo-verde',

            const momentum = data.momentum || {};
            const trendArrow = momentum.tendencia === 'up' ? '\u2191' : momentum.tendencia === 'down' ? '\u2193' : '';
            const trendColor = momentum.tendencia === 'up' ? 'text-green-600' : momentum.tendencia === 'down' ? 'text-red-500' : 'text-gray-400';
            const topSubs = (data.subcategorias_activas || []).slice(0, 2);
            /* Divergence badge DESACTIVADO en UI hasta que resolvamos el tema
               de fondo: varias categorías reportan score_media=100 perma y
               compararlas contra Trends bajo mete ruido en el pattern. */
            return (
                <div onClick={() => onClick(data)}
                    className={`glass border ${colorClasses[data.color]} rounded-xl p-4 cursor-pointer transition-all duration-300 hover:scale-[1.02] ${pulseClass}`}>
                    <div className="flex items-center justify-between mb-3">
                        <div className="flex items-center gap-2">
                            <div className={`w-3 h-3 rounded-full ${colorDot[data.color]}`}></div>
                            <div>
                                <h3 className="font-semibold text-sm text-gray-800">{data.nombre}</h3>
                                {momentum.etiqueta && (
                                    <div className="flex items-center gap-1">
                                        {trendArrow && <span className={`text-[10px] font-bold ${trendColor}`}>{trendArrow}</span>}
                                        <span className="text-[10px] text-gray-400 font-mono">{momentum.etiqueta}</span>
                                    </div>

                    </div>
                    {(() => {

                        const tieneDiv = data.divergencia
                            && data.divergencia.indice >= 0.3
                            && data.divergencia.patron_id !== 'rebalanceo_tecnico'
                            && data.divergencia.patron_id !== 'convergencia';
                        if (topSubs.length === 0 && !tieneReact && !tieneDiv) return null;
                        return (
                            <div className="flex flex-wrap items-center gap-1 mb-2">

                                        {s.nombre}
                                    </span>
                                ))}
                                {tieneReact && (
                                    <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[9px] font-mono font-semibold ${data.ratio_reactividad >= 2 ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-amber-50 text-amber-700 border border-amber-200'}`} title={`Actividad legislativa ${data.ratio_reactividad}× sobre baseline mensual`}>
                                        ↑ {data.ratio_reactividad}× react

                                {tieneDiv && (

                                        className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[9px] font-mono font-semibold bg-violet-50 text-violet-700 border border-violet-200"
                                        title={`Señal atípica: ${data.divergencia.patron_label}. ${data.divergencia.sobre_representada} destaca mientras ${data.divergencia.sub_representada} queda rezagada.`}>

                    <div className="grid grid-cols-5 gap-2 text-xs text-gray-500">

                                    </div>
                                    <span className={`text-[10px] font-mono font-medium ${m.danger ? 'text-rose-600' : 'text-gray-700'}`}>{m.value.toFixed(0)}%</span>

        /* Aprobaciones legislativas LXVI (últimos 30 días) por categoría.

                       fecha_aprobacion, comision, url_sil}.
           Color por tipo · pill de cámara · link al expediente SIL. */
        function FuentesAprobados({ items }) {
            if (!items || items.length === 0) return <div className="text-gray-400 text-sm py-3 text-center">Sin aprobaciones recientes en este tema</div>;
            const colorTipo = (t) => {
                const tt = (t || '').toLowerCase();
                if (tt.includes('iniciativa')) return { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-700' };
                if (tt.includes('proposici')) return { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700' };
                if (tt.includes('dictamen')) return { bg: 'bg-violet-50', border: 'border-violet-200', text: 'text-violet-700' };
                if (tt.includes('minuta')) return { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700' };
                return { bg: 'bg-gray-50', border: 'border-gray-200', text: 'text-gray-600' };
            };
            return (
                <div className="space-y-2 fuentes-panel max-h-72 overflow-y-auto pr-1">
                    {items.map((it, i) => {

                            </div>

            );
        }

        function FuentesGaceta({ documentos }) {
            if (!documentos || documentos.length === 0) return <div className="text-gray-400 text-sm py-3 text-center">Sin documentos de Gaceta</div>;
            const tipoColor = {
                iniciativa: 'bg-blue-50 text-blue-800 border border-blue-200',
                dictamen: 'bg-amber-50 text-amber-800 border border-amber-200',
                proposicion: 'bg-purple-50 text-purple-800 border border-purple-200',
                punto_de_acuerdo: 'bg-purple-50 text-purple-800 border border-purple-200',
                acuerdo: 'bg-rose-50 text-rose-800 border border-rose-200',
                minuta: 'bg-green-50 text-green-800 border border-green-200',
            };
            // Limpia el campo autor: "Sen. Anaya (PAN)Sen. Bañuelos (PAN)Sen. ..."
            // → primer firmante visible + tooltip con lista completa
            const parsearFirmantes = (autor) => {
                if (!autor) return { primero: '', resto: [], todos: [] };
                const matches = autor.match(/(?:Sen|Dip)\.\s*[^()]+?\([^)]+\)/g);
                if (!matches || matches.length === 0) {
                    return { primero: autor.length > 80 ? autor.slice(0, 80) + '…' : autor, resto: [], todos: [autor] };
                }
                return { primero: matches[0], resto: matches.slice(1), todos: matches };
            };
            // Limpiar título: quitar prefijo numérico ("258. Del Sen..." → "Del Sen...")
            // y "#NN" tipo gaceta. El numero_doc internal nunca se muestra.
            const limpiarTitulo = (t) => {
                if (!t) return '';
                // Quitar números de serie al inicio: "2 ", "19. ", "258."
                let cleaned = t.replace(/^\s*\d+\s*\.?\s+/, '');
                // Capitalizar primera letra para frases que empiezan minúscula
                if (cleaned && /^[a-záéíóú]/.test(cleaned)) {
                    cleaned = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
                }
                return cleaned.replace(/\n\t/g, ' ').slice(0, 200);
            };
            // Cámara: unificar "Cámara de Senadores"/"Cámara de Diputados"/"Comisión Permanente"
            const camaraLabel = (c) => {
                const cl = (c || '').toLowerCase();
                if (cl.includes('permanente')) return 'Comisión Permanente';
                if (cl.includes('senad')) return 'Senado';
                if (cl.includes('diputad')) return 'Diputados';
                return c || 'Diputados';
            };
            return (
                <div className="space-y-2 fuentes-panel max-h-56 overflow-y-auto pr-1">
                    {documentos.map((d, i) => {
                        const titulo = limpiarTitulo(d.titulo);
                        const tieneURL = d.url_pdf || d.url;
                        const cam = camaraLabel(d.camara);
                        return (
                            <div key={i} className="bg-gray-50 rounded-lg p-2.5 border border-gray-100">
                                <div className="flex items-start gap-2">
                                    {tieneURL ? (
                                        <a href={d.url_pdf || d.url} target="_blank" rel="noopener noreferrer" className="text-sm text-blue-700 hover:text-blue-900 hover:underline leading-tight">{titulo}</a>
                                    ) : (
                                        <span className="text-sm text-gray-800 leading-tight">{titulo}</span>
                                    )}
                                </div>
                                <div className="flex items-center gap-2 mt-1.5 text-xs text-gray-400 flex-wrap">
                                    <span className={`px-1.5 py-0.5 rounded text-xs font-mono ${tipoColor[d.tipo] || 'bg-gray-100 text-gray-600'}`}>{d.tipo}</span>
                                    <span className={`px-1.5 py-0.5 rounded text-xs font-medium font-mono ${cam === 'Comisión Permanente' ? 'bg-amber-700 text-white' : cam === 'Senado' ? 'bg-gray-800 text-white' : 'bg-gray-200 text-gray-700'}`}>{cam}</span>
                                    {d.autor && d.autor !== 'No identificado' && (() => {
                                        const f = parsearFirmantes(d.autor);
                                        return (
                                            <span className="text-gray-500">
                                                {f.primero}
                                                {f.resto.length > 0 && (

                                            </span>

        function AlertaItem({ alerta, categorias }) {
            const fecha = new Date(alerta.fecha).toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });

        /* ================================================================
           HISTORICAL SCORES CHART (Polymarket-style)
           ================================================================ */

        const CATEGORY_COLORS = [
            '#2563eb', '#dc2626', '#059669', '#d97706', '#7c3aed',
            '#db2777', '#0891b2', '#65a30d', '#ea580c', '#4f46e5',
            '#0d9488', '#b91c1c', '#1d4ed8', '#9333ea',
        ];

        function HistorialScoresChart({ historial, semaforo, onCategoryClick }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const [hoveredCat, setHoveredCat] = useState(null);
            const [visibleCats, setVisibleCats] = useState(() => {
                /* Start with top 5 by current score */
                const sorted = [...semaforo].sort((a,b) => b.score_total - a.score_total);
                return new Set(sorted.slice(0, 5).map(s => s.categoria));
            });

            const INICIO_PERIODO = '2026-02-01'; // Inicio periodo ordinario de sesiones
            const rawFechas = historial.fechas;
            const rawCategorias = historial.categorias;
            const idxInicio = rawFechas.findIndex(f => f >= INICIO_PERIODO);
            const fechas = idxInicio >= 0 ? rawFechas.slice(idxInicio) : rawFechas;
            const categorias = {};
            for (const cat of Object.keys(rawCategorias)) {
                categorias[cat] = { ...rawCategorias[cat], scores: idxInicio >= 0 ? rawCategorias[cat].scores.slice(idxInicio) : rawCategorias[cat].scores };
            }
            const catKeys = Object.keys(categorias);

            const toggleCat = (cat) => {
                setVisibleCats(prev => {
                    const next = new Set(prev);
                    if (next.has(cat)) { if (next.size > 1) next.delete(cat); }
                    else { next.add(cat); }
                    return next;
                });
            };

            const toggleAll = () => {
                if (visibleCats.size === catKeys.length) {
                    const sorted = [...semaforo].sort((a,b) => b.score_total - a.score_total);
                    setVisibleCats(new Set(sorted.slice(0, 5).map(s => s.categoria)));
                } else {
                    setVisibleCats(new Set(catKeys));
                }
            };

            useEffect(() => {
                if (!chartRef.current || fechas.length < 2) return;
                if (chartInstance.current) chartInstance.current.destroy();

                const labels = fechas.map(f => {
                    const d = new Date(f + 'T12:00:00');
                    return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
                });

                const datasets = catKeys.filter(cat => visibleCats.has(cat)).map((cat, idx) => {
                    const catData = categorias[cat];
                    const colorIdx = catKeys.indexOf(cat);
                    const color = CATEGORY_COLORS[colorIdx % CATEGORY_COLORS.length];
                    const isHovered = hoveredCat === cat;
                    const hasHover = hoveredCat !== null;
                    const scores = catData.scores.map(s => s === null ? undefined : s);
                    const lastIdx = scores.length - 1;

                    return {
                        label: catData.nombre,
                        data: scores,
                        borderColor: hasHover && !isHovered ? color + '25' : color,
                        backgroundColor: 'transparent',
                        borderWidth: isHovered ? 3 : (hasHover ? 1 : 2),
                        fill: false,
                        stepped: 'before',
                        tension: 0,
                        pointRadius: scores.map((_, i) => i === lastIdx ? (isHovered ? 7 : 5) : 0),
                        pointHitRadius: 10,
                        pointHoverRadius: 6,
                        pointBackgroundColor: color,
                        pointBorderColor: '#fff',
                        pointBorderWidth: isHovered ? 3 : 2,
                        spanGaps: true,
                        order: isHovered ? 0 : 1,
                        _catKey: cat,
                    };
                });

                const thresholdPlugin = {
                    id: 'thresholds',
                    beforeDraw(chart) {
                        const { ctx, chartArea, scales } = chart;
                        if (!chartArea) return;
                        const yScale = scales.y;

                        /* Líneas de umbral estilo Polymarket: sutiles y punteadas */
                        const thresholds = [
                            { value: 65, color: 'rgba(46,125,50,0.15)', label: '' },
                            { value: 40, color: 'rgba(198,40,40,0.15)', label: '' },
                        ];

                        ctx.save();
                        ctx.setLineDash([2, 6]);
                        ctx.lineWidth = 0.8;

                        thresholds.forEach(t => {
                            const y = yScale.getPixelForValue(t.value);
                            ctx.beginPath();
                            ctx.strokeStyle = t.color;
                            ctx.moveTo(chartArea.left, y);
                            ctx.lineTo(chartArea.right, y);
                            ctx.stroke();
                        });

                        ctx.restore();
                    }
                };

                /* Plugin: anillo pulsante (sonar) en el último punto del dataset
                   con score más alto. Identifica el "líder" actual y le pone un
                   ping animado para que destaque visualmente. */
                const topPulsePlugin = {
                    id: 'topPulse',
                    afterDatasetsDraw(chart) {
                        let topIdx = -1, topValue = -Infinity;
                        chart.data.datasets.forEach((ds, i) => {
                            const data = ds.data || [];
                            for (let j = data.length - 1; j >= 0; j--) {
                                const v = data[j];
                                if (v != null && v !== undefined) {
                                    if (v > topValue) { topValue = v; topIdx = i; }
                                    break;
                                }
                            }
                        });
                        if (topIdx === -1) return;
                        const meta = chart.getDatasetMeta(topIdx);
                        const points = meta.data || [];
                        if (points.length === 0) return;
                        const lastPoint = points[points.length - 1];
                        if (!lastPoint) return;
                        const x = lastPoint.x, y = lastPoint.y;
                        const color = chart.data.datasets[topIdx].borderColor;
                        const t = ((Date.now() % 1500) / 1500);
                        const radius = 5 + t * 14;
                        const opacity = (1 - t) * 0.65;
                        const ctx = chart.ctx;
                        ctx.save();
                        ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI);
                        ctx.strokeStyle = color; ctx.globalAlpha = opacity; ctx.lineWidth = 2; ctx.stroke();
                        ctx.beginPath(); ctx.arc(x, y, 4, 0, 2 * Math.PI);
                        ctx.globalAlpha = 1; ctx.fillStyle = color; ctx.fill();
                        ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                        ctx.restore();
                    }
                };

                /* Animación progressive line drawing (patrón canónico de Chart.js):
                   cada punto se dibuja después del anterior, de izquierda a derecha,
                   trazando la línea. El y.from toma la Y del punto previo, así nunca
                   se aplasta al eje y deja de verse "flat" al entrar. */
                const isFirstRender = !window._fiatChartRevealed;
                window._fiatChartRevealed = true;
                const totalDuration = 1400;
                const delayBetweenPoints = totalDuration / Math.max(labels.length, 1);
                const previousY = (ctx) => {
                    if (ctx.index === 0) return ctx.chart.scales.y.getPixelForValue(ctx.chart.scales.y.min);
                    const meta = ctx.chart.getDatasetMeta(ctx.datasetIndex);
                    const prev = meta && meta.data && meta.data[ctx.index - 1];
                    if (!prev) return ctx.chart.scales.y.getPixelForValue(ctx.chart.scales.y.min);
                    return prev.getProps(['y'], true).y;
                };

                chartInstance.current = new Chart(chartRef.current, {
                    type: 'line',
                    plugins: [thresholdPlugin, topPulsePlugin],
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: isFirstRender ? {
                            x: {
                                type: 'number', easing: 'linear', duration: delayBetweenPoints, from: NaN,
                                delay(ctx) { if (ctx.type !== 'data' || ctx.xStarted) return 0; ctx.xStarted = true; return ctx.index * delayBetweenPoints; }
                            },
                            y: {
                                type: 'number', easing: 'linear', duration: delayBetweenPoints * 2, from: previousY,
                                delay(ctx) { if (ctx.type !== 'data' || ctx.yStarted) return 0; ctx.yStarted = true; return ctx.index * delayBetweenPoints; }
                            }
                        } : { duration: 400, easing: 'easeOutQuad' },
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(15,23,42,0.92)',
                                titleColor: '#f1f5f9',
                                bodyColor: '#cbd5e1',
                                borderColor: 'rgba(255,255,255,0.08)',
                                borderWidth: 1,
                                padding: { top: 10, bottom: 10, left: 14, right: 14 },
                                cornerRadius: 10,
                                displayColors: true,
                                boxWidth: 8,
                                boxHeight: 8,
                                boxPadding: 6,
                                titleFont: { size: 12, weight: '600', family: 'JetBrains Mono, ui-monospace, monospace' },
                                bodyFont: { size: 11, family: 'JetBrains Mono, ui-monospace, monospace' },
                                callbacks: {
                                    label: (item) => ` ${item.dataset.label}: ${item.raw?.toFixed(1)}%`
                                },
                                itemSort: (a, b) => (b.raw || 0) - (a.raw || 0),
                            }
                        },
                        scales: {
                            y: {
                                min: 0, max: 100,
                                position: 'right',
                                ticks: {
                                    color: '#b0b8c4',
                                    font: { size: 10, family: '-apple-system, BlinkMacSystemFont, sans-serif' },
                                    stepSize: 25,
                                    padding: 12,
                                    callback: v => v + '%',
                                },
                                grid: {
                                    color: (ctx) => ctx.tick.value === 0 ? 'transparent' : 'rgba(0,0,0,0.04)',
                                    lineWidth: 0.5,
                                    drawBorder: false,
                                    drawTicks: false,
                                },
                                border: { display: false, dash: [2, 4] },
                            },
                            x: {
                                ticks: {
                                    color: '#b0b8c4',
                                    font: { size: 10, family: '-apple-system, BlinkMacSystemFont, sans-serif' },
                                    maxRotation: 0,
                                    maxTicksLimit: 8,
                                    padding: 8,
                                },
                                grid: { display: false },
                                border: { display: false },
                            }
                        },
                    }
                });

                /* Animación del top pulse: redraw cada 60ms (~16fps suave) */
                const pulseInterval = setInterval(() => {
                    if (chartInstance.current) {
                        try { chartInstance.current.draw(); } catch(e) {}
                    }
                }, 60);

                return () => {
                    clearInterval(pulseInterval);
                    if (chartInstance.current) {
                        try { chartInstance.current.destroy(); } catch (e) {}
                        chartInstance.current = null;
                    }
                };
            }, [historial, visibleCats, hoveredCat]);

            return (
                <div className="glass border border-borde rounded-xl p-4 space-y-3">
                    <div className="flex items-center justify-between">
                        <div>
                            <div className="text-xs font-semibold text-gray-500">Tendencia de Scores</div>
                            <div className="text-[10px] text-gray-400 mt-0.5">Evolucion del score compuesto por categoria durante el actual periodo de sesiones</div>
                        </div>
                        <button onClick={toggleAll}
                            className="text-[10px] text-acento hover:text-acento/80 font-medium px-2 py-1 rounded border border-acento/20 hover:bg-acento/5 transition-colors">
                            {visibleCats.size === catKeys.length ? 'Top 5' : 'Ver todas'}
                        </button>
                    </div>
                    <div style={{height: '280px'}}><canvas ref={chartRef}></canvas></div>
                    <div className="flex flex-wrap gap-1.5">
                        {catKeys.map((cat, idx) => {
                            const catInfo = categorias[cat];
                            const color = CATEGORY_COLORS[idx % CATEGORY_COLORS.length];
                            const isVisible = visibleCats.has(cat);
                            const lastScore = catInfo.scores.filter(s => s !== null).pop();
                            const catData = semaforo.find(s => s.categoria === cat);
                            return (
                                <button key={cat}
                                    onClick={() => toggleCat(cat)}
                                    onMouseEnter={() => setHoveredCat(cat)}
                                    onMouseLeave={() => setHoveredCat(null)}
                                    className={`flex items-center gap-1 px-2 py-1 rounded-lg text-[10px] font-mono font-medium transition-all border ${isVisible ? 'border-gray-300 bg-white shadow-sm' : 'border-transparent bg-gray-100 text-gray-400'}`}>
                                    <div className="w-2 h-2 rounded-full flex-shrink-0" style={{backgroundColor: isVisible ? color : '#d1d5db'}}></div>
                                    <span className={isVisible ? 'text-gray-700' : ''}>{catInfo.nombre.length > 15 ? catInfo.nombre.substring(0, 13) + '..' : catInfo.nombre}</span>
                                    {lastScore !== undefined && isVisible && <span className="text-gray-700 ml-0.5 font-bold">{lastScore.toFixed(0)}%</span>}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        }

        /* ================================================================
           POPOVER INSTRUMENTOS LEGISLATIVOS
           ================================================================ */

        function PopoverInstrumentos({ leg, pos, onClose, onKeep }) {
            if (!leg) return null;
            const popRef = useRef(null);
            const tipoIcon = { 'Iniciativa': '\ud83d\udccb', 'Proposici\u00f3n con punto de acuerdo': '\ud83d\udccc', 'Dictamen': '\ud83d\udcd1', 'Asunto': '\ud83d\udcc4' };
            const instrumentos = leg.instrumentos || [];

            const [adjPos, setAdjPos] = useState(pos);
            useEffect(() => {
                if (popRef.current) {
                    const rect = popRef.current.getBoundingClientRect();
                    let top = pos.top;
                    let left = pos.left;
                    if (top + rect.height > window.innerHeight - 16) top = Math.max(16, pos.top - rect.height - 8);
                    if (left + rect.width > window.innerWidth - 16) left = Math.max(16, window.innerWidth - rect.width - 16);
                    setAdjPos({ top, left });
                }
            }, [pos]);

            const getEstatusInfo = (estatus) => {
                if (!estatus) return null;
                const e = estatus.toLowerCase();
                if (e.includes('desechado') || e.includes('desechada')) return { lbl: 'Desechado', cls: 'bg-red-100 text-red-600' };
                if (e.includes('aprobado') || e.includes('aprobada') || e.includes('publicado')) return { lbl: 'Aprobado', cls: 'bg-green-100 text-green-700' };
                if (e.includes('pendiente')) return { lbl: 'Pendiente', cls: 'bg-amber-50 text-amber-600' };
                if (e.includes('turnad')) return { lbl: 'Turnado', cls: 'bg-blue-50 text-blue-600' };
                const lbl = estatus.length > 20 ? estatus.substring(0, 18) + '..' : estatus;
                return { lbl, cls: 'bg-gray-100 text-gray-600' };
            };

            return ReactDOM.createPortal(
                <div ref={popRef} style={{ position: 'fixed', top: adjPos.top, left: adjPos.left, zIndex: 9999 }}
                    className="w-80 bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden"
                    onMouseEnter={onKeep} onMouseLeave={onClose}>
                    <div className="px-4 py-3 border-b border-gray-100 bg-gray-50/50">
                        <div className="flex items-center gap-2">
                            <span className="font-semibold text-sm text-gray-800 truncate">{leg.nombre}</span>
                            {leg.partido && <span className="text-white text-[8px] px-1.5 py-0.5 rounded font-medium flex-shrink-0" style={{ backgroundColor: PARTIDO_COLORS[leg.partido] || '#999' }}>{leg.partido}</span>}
                        </div>
                        <div className="text-[10px] text-gray-400 mt-0.5">Instrumentos legislativos recientes</div>
                    </div>
                    <div className="max-h-64 overflow-y-auto">
                        {instrumentos.length === 0
                            ? <div className="px-4 py-6 text-center text-gray-400 text-sm">Sin instrumentos recientes en esta categoria</div>
                            : instrumentos.map((inst, i) => {
                                const ei = getEstatusInfo(inst.estatus);
                                return (
                                    <div key={i} className="px-4 py-2.5 border-b border-gray-50 last:border-0 hover:bg-gray-50/50">
                                        <div className="flex items-start gap-2">
                                            <span className="text-sm flex-shrink-0 mt-0.5">{tipoIcon[inst.tipo] || '\ud83d\udcc4'}</span>
                                            <div className="min-w-0 flex-1">
                                                {inst.url
                                                    ? <a href={inst.url} target="_blank" rel="noopener noreferrer" className="text-xs text-acento hover:underline leading-snug line-clamp-2 block">{inst.titulo}</a>
                                                    : <div className="text-xs text-gray-800 leading-snug line-clamp-2">{inst.titulo}</div>
                                                }
                                                <div className="flex items-center gap-2 mt-1">
                                                    {inst.fecha && <span className="text-[10px] text-gray-400 font-mono">{inst.fecha}</span>}
                                                    {ei && <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium font-mono ${ei.cls}`}>{ei.lbl}</span>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        }
                    </div>
                </div>,
                document.body
            );
        }

        /* ================================================================
           DETAIL MODAL
           ================================================================ */

        function DetalleModal({ data, prediccion, fuentes, seriesTemporales, seriesTemporalesMedios, autoria, generado, onClose }) {
            if (!data) return null;
            const colors = { verde: '#2e7d32', amarillo: '#c6972b', rojo: '#c62828' };
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const [tabActiva, setTabActiva] = useState('media');
            const [popoverLeg, setPopoverLeg] = useState(null);
            const popoverTimer = useRef(null);
            const showPopover = (leg, e) => { clearTimeout(popoverTimer.current); const rect = e.currentTarget.getBoundingClientRect(); const left = rect.right + 8 + 320 > window.innerWidth ? Math.max(16, rect.left - 328) : rect.right + 8; setPopoverLeg({ ...leg, _pos: { top: rect.top, left } }); };
            const hidePopover = () => { popoverTimer.current = setTimeout(() => setPopoverLeg(null), 200); };
            const catFuentes = fuentes?.[data.categoria] || {};
            const serie = seriesTemporales?.[data.categoria] || [];
            const serieMedios = seriesTemporalesMedios?.[data.categoria] || [];

            useEffect(() => {
                if (chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    /* Ventana fija de últimos 14 días: actividad legislativa +
                       cobertura mediática en el mismo eje de tiempo, para ver
                       cómo los legisladores reaccionan a picos en medios. */
                    const DIAS = 14;
                    const serieFiltrada = serie.slice(-DIAS);
                    const MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
                    const lastIdx = serieFiltrada.length - 1;
                    const labels = serieFiltrada.map((s, i) => {
                        if (i === lastIdx) return 'HOY';
                        const d = new Date(s.fecha + 'T12:00:00');
                        return `${String(d.getDate()).padStart(2,'0')}-${MESES[d.getMonth()]}`;
                    });
                    const valores = serieFiltrada.map(s => s.count);

                    /* Cobertura mediática por día: serie temporal completa desde
                       tabla `articulos`, no la lista capada de articulos_medios.
                       Fallback: si la serie aún no existe en data.json (primer
                       deploy), contar desde la lista limitada como antes. */
                    const serieMediosFiltrada = serieMedios.slice(-DIAS);
                    let mediaValores;
                    if (serieMediosFiltrada.length === DIAS) {
                        mediaValores = serieMediosFiltrada.map(s => s.count);
                    } else {
                        const articulos = catFuentes.articulos_medios || [];
                        const mediaPorFecha = {};
                        articulos.forEach(a => { if (a.fecha) mediaPorFecha[a.fecha] = (mediaPorFecha[a.fecha] || 0) + 1; });
                        mediaValores = serieFiltrada.map(s => mediaPorFecha[s.fecha] || 0);
                    }

                    const lineColor = '#2e7d32';
                    const fillColor = 'rgba(46, 125, 50, 0.18)';
                    const peakColor = '#2e7d32';
                    const mediaColor = '#ea580c';  /* naranja para medios */
                    const mediaFill = 'rgba(234, 88, 12, 0.08)';

                    /* Picos legislativos locales */
                    const localMaxIdx = [];
                    valores.forEach((v, i) => {
                        if (v <= 0) return;
                        const left = i > 0 ? valores[i - 1] : -Infinity;
                        const right = i < valores.length - 1 ? valores[i + 1] : -Infinity;
                        if (v >= left && v >= right) localMaxIdx.push({ i, v });
                    });
                    const topPeaksIdx = new Set(localMaxIdx.sort((a, b) => b.v - a.v).slice(0, 3).map(p => p.i));
                    const peakData = valores.map((v, i) => topPeaksIdx.has(i) ? v : null);

                    const peakLinesPlugin = {
                        id: 'peakLines',
                        beforeDatasetsDraw(chart) {
                            const ctx = chart.ctx;
                            const yAxis = chart.scales.y;
                            const xAxis = chart.scales.x;
                            ctx.save();
                            ctx.strokeStyle = 'rgba(46, 125, 50, 0.25)';
                            ctx.lineWidth = 1;
                            ctx.setLineDash([3, 4]);
                            topPeaksIdx.forEach(idx => {
                                const x = xAxis.getPixelForValue(idx);
                                ctx.beginPath();
                                ctx.moveTo(x, yAxis.top);
                                ctx.lineTo(x, yAxis.bottom);
                                ctx.stroke();
                            });
                            ctx.restore();
                        }
                    };

                    chartInstance.current = new Chart(chartRef.current, {
                        type: 'line', plugins: [peakLinesPlugin],
                        data: { labels, datasets: [
                            { label: 'Actividad legislativa', data: valores, borderColor: lineColor, backgroundColor: fillColor, borderWidth: 2, fill: true, tension: 0.3, pointRadius: 0, pointHitRadius: 10, pointHoverRadius: 5, pointBackgroundColor: lineColor, pointBorderColor: '#fff', pointBorderWidth: 2, yAxisID: 'y' },

                        ]},

                            scales: {
                                y: { position: 'left', beginAtZero: true, ticks: { color: '#2e7d32', font: { size: 9 }, padding: 8, maxTicksLimit: 4 }, grid: { color: 'rgba(0,0,0,0.04)', lineWidth: 0.5, drawBorder: false, drawTicks: false }, border: { display: false }, title: { display: true, text: 'Legislativo', color: '#2e7d32', font: { size: 9, weight: '600' } } },

                            }
                        }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };

        function PageActividadLegislativa({ data, setSelected, busqueda }) {
            const [orden, setOrden] = useState('score');
            const semaforo = data.semaforo || [];
            const alertas = data.alertas || [];
            const fuentes = data.fuentes || {};
            const partidos = data.partidos || {};
            const convocatorias = data.convocatorias || { Diputados: [], Senado: [] };
            const [popoverLeg, setPopoverLeg] = useState(null);
            const popoverTimer = useRef(null);
            const showPopover = (leg, e) => { clearTimeout(popoverTimer.current); const rect = e.currentTarget.getBoundingClientRect(); const left = rect.right + 8 + 320 > window.innerWidth ? Math.max(16, rect.left - 328) : rect.right + 8; setPopoverLeg({ ...leg, _pos: { top: rect.top, left } }); };
            const hidePopover = () => { popoverTimer.current = setTimeout(() => setPopoverLeg(null), 200); };

            const semaforoBusqueda = busqueda.trim()
                ? semaforo.filter(s => {
                    const term = busqueda.toLowerCase();
                    if (s.nombre.toLowerCase().includes(term) || s.categoria.toLowerCase().includes(term)) return true;
                    const f = fuentes[s.categoria];
                    if (f) { if (f.articulos_medios?.some(a => a.titulo.toLowerCase().includes(term))) return true; }
                    return false;
                }) : semaforo;

            const sortFn = {
                score: (a, b) => b.score_total - a.score_total,
                urgencia: (a, b) => (b.score_urgencia || 0) - (a.score_urgencia || 0),
                activos: (a, b) => (b.momentum?.dias_consecutivos || 0) - (a.momentum?.dias_consecutivos || 0),
            }[orden];
            const ordenado = [...semaforoBusqueda].sort(sortFn);

            /* Top 5 legisladores global.
               Durante receso filtra a SOLO los integrantes de la Comisión Permanente
               (no tiene sentido mostrar a quienes no van a sesionar). El roster oficial
               viene en data.permanente.nombres_norm (normalizado sin acentos).        */
            const top5Legisladores = (() => {
                if (!data.autoria || semaforo.length === 0) return [];
                const enReceso = data.metadata?.modo_receso === true;
                const norm = (s) => (s || '')
                    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                    .toLowerCase().trim();
                // Canoniza orden de palabras (mismo motivo que en RadarLegisladores):
                // los nombres del roster vienen "Nombre Apellido" pero la BD de
                // Diputados los guarda "Apellido Nombre". Match por multiset.
                const tokenKey = (s) => norm(s).split(/\s+/).filter(Boolean).sort().join(' ');
                const permSet = (enReceso && data.permanente?.nombres_norm)
                    ? new Set(data.permanente.nombres_norm.map(tokenKey))
                    : null;
                // Top categorias por score del semaforo (donde hay mas probabilidad de accion)
                const topCats = [...semaforo].sort((a, b) => b.score_total - a.score_total).slice(0, 5);
                const seen = new Set();
                const result = [];
                for (const catData of topCats) {
                    const preds = data.autoria[catData.categoria];
                    if (!preds || preds.length === 0) continue;
                    for (const p of preds) {
                        if (seen.has(p.nombre)) continue;
                        // Filtro Permanente durante receso
                        if (permSet && !permSet.has(tokenKey(p.nombre))) continue;
                        seen.add(p.nombre);
                        result.push({...p, categoria: catData.nombre, catScore: catData.score_total});
                        break;
                    }
                }
                return result;
            })();

            return (
                <div className="space-y-6">
                    {/* Hero Spotlight (3/5) + Twitter Feed (2/5) */}
                    <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
                    {(() => {

        const CATEGORIA_LABEL = {

            infraestructura: 'Infraestructura', energia: 'Energía',

        const _catLabel = (c) => CATEGORIA_LABEL[c] || (c || '—');

        // PARTIDO_LOGOS y PartidoBadge están definidos arriba (nivel alto) para que
        // widgets de toda la app los usen, no solo el Radar.

        // Flip "Apellido1 Apellido2 Nombre(s)" → "Nombre(s) Apellido1 Apellido2"
        // Solo para Cámara de Diputados (Senado ya viene correcto).
        // Maneja partículas como "de", "la", "del" en apellidos compuestos.
        const _PARTICULAS = new Set(['de','del','la','las','los','van','von','da','di','du','y']);
        function flipNombreDiputado(nombre) {
            if (!nombre) return nombre;
            const tokens = nombre.trim().split(/\s+/);
            if (tokens.length < 3) return nombre;
            let cutIdx = 2;
            let sawParticle = false;
            while (cutIdx < tokens.length) {
                const cur = tokens[cutIdx].toLowerCase().replace(/\./g, '');
                if (_PARTICULAS.has(cur)) {
                    cutIdx++;
                    sawParticle = true;
                } else if (sawParticle) {
                    cutIdx++;
                    sawParticle = false;
                    if (cutIdx >= tokens.length || !_PARTICULAS.has(tokens[cutIdx].toLowerCase().replace(/\./g, ''))) break;
                } else {
                    break;
                }
            }
            if (cutIdx >= tokens.length) return nombre;
            const apellidos = tokens.slice(0, cutIdx).join(' ');
            const nombres = tokens.slice(cutIdx).join(' ');
            return `${nombres} ${apellidos}`;
        }
        function formatNombreLegislador(leg) {
            if (!leg) return '';
            if (leg.camara === 'Cámara de Diputados') return flipNombreDiputado(leg.nombre);
            return leg.nombre;
