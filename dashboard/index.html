                            {tab === 'trayectoria' && <TabTrayectoria leg={leg} />}
                        </div>
                    </div>
                </div>
            );
        }

        function TabOverview({ leg }) {
            const hitPct = leg.hit_rate != null ? Math.round(leg.hit_rate * 100) : null;
            const l3pIni = leg.l3p_iniciativas ?? 0;
            const l3pProp = leg.l3p_proposiciones ?? 0;
            const l3pTotal = l3pIni + l3pProp;
            const l3pIniCol = leg.l3p_iniciativas_col ?? 0;
            const l3pPropCol = leg.l3p_proposiciones_col ?? 0;
            const l3pColTotal = l3pIniCol + l3pPropCol;
            const iniProy = leg.iniciativas_proy_15d;
            const propProy = leg.proposiciones_proy_15d;

            /* "Solo firma con bancada": no presentó ningún instrumento como
               promovente único. Para senadores usa l3p_iniciativas/proposiciones
               (individuales). Para diputados usa n_ini_iniciante/n_prop_proponente. */
            const isDip = (leg.n_ini_iniciante ?? 0) > 0 || (leg.n_prop_proponente ?? 0) > 0
                          || (leg.n_ini_de_grupo ?? 0) > 0 || (leg.n_prop_de_grupo ?? 0) > 0;
            const dipInd = (leg.n_ini_iniciante ?? 0) + (leg.n_prop_proponente ?? 0);
            const dipGrp = (leg.n_ini_de_grupo ?? 0) + (leg.n_ini_adherente ?? 0)
                            + (leg.n_prop_de_grupo ?? 0) + (leg.n_prop_adherente ?? 0);
            const soloBancada = isDip
                ? (dipInd === 0 && dipGrp > 0)
                : (l3pTotal === 0 && l3pColTotal > 0);
            const totalActosBancada = isDip ? dipGrp : l3pColTotal;

            // Narrativa rule-based
            const insights = [];
            if (hitPct != null && hitPct >= 50 && leg.categoria_dominante) {
                insights.push(`Reacciona rápido a picos mediáticos en ${_catLabel(leg.categoria_dominante)}: ${hitPct}% de los últimos ${leg.hit_total} picos relevantes.`);
            } else if (hitPct != null && hitPct === 0 && leg.hit_total > 0) {
                insights.push(`No ha presentado instrumentos dentro de los 7 días de los picos en ${_catLabel(leg.categoria_dominante)}. Bajo oportunismo informativo.`);
            }
            if (iniProy != null && iniProy > 1.5) {
                insights.push(`Proyección agresiva de iniciativas: ${Number(iniProy).toFixed(1)} en los próximos 15 días (acelerando vs baseline LXVI).`);
            }
            if (leg.matchup_grade === 'A' || leg.matchup_grade === 'B') {
                insights.push(`Su comisión ${leg.matchup_comision || 'dominante'} dictamina activamente: ${Math.round((leg.matchup_tasa || 0) * 100)}% de los asuntos salen con decisión formal.`);
            } else if (leg.matchup_grade === 'F') {
                insights.push(`Matchup difícil: en ${leg.matchup_comision || 'su comisión dominante'} solo ${Math.round((leg.matchup_tasa || 0) * 100)}% de los asuntos se dictaminan — la mayoría se queda en pendiente.`);
            }
            if (l3pTotal === 0) {
                insights.push('Sin actividad legislativa registrada en la LXVI. Posible legislador suplente, reciente, o nombre no enlazado todavía.');
            }

            return (
                <div className="space-y-4">
                    {/* Badge "Sólo firma con bancada" — se muestra cuando el legislador
                        no ha presentado NINGÚN instrumento como promovente único en LXVI.
                        Es una señal honesta de que su Efectividad personal no se puede
                        evaluar — todo su trabajo legislativo es acción colectiva del partido. */}
                    {soloBancada && (
                        <div className="bg-amber-50 border border-amber-300 rounded-xl p-3.5 flex items-start gap-2.5">
                            <svg className="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <div className="flex-1">
                                <div className="text-[11px] uppercase tracking-wider text-amber-700 font-bold mb-0.5">Sólo firma con bancada</div>
                                <div className="text-sm text-gray-700 leading-snug">
                                    En la LXVI no ha presentado ningún instrumento como promovente único.
                                    Sus {totalActosBancada} actos son firmas colectivas del grupo parlamentario.
                                    Por eso no recibe Efectividad personal — FIAT solo califica esfuerzo individual,
                                    no acción de bancada.
                                </div>
                            </div>
                        </div>
                    )}
                    {leg.narrativa && (
                        <div className="bg-gradient-to-r from-violet-50 to-indigo-50 border border-violet-200/50 rounded-xl p-3.5">
                            <div className="flex items-center gap-1.5 mb-1.5">
                                <span className="text-[10px] uppercase tracking-wider text-violet-600 font-semibold">Descripción IA</span>
                            </div>
                            <p className="text-sm text-gray-700 leading-relaxed">{leg.narrativa}</p>
                        </div>
                    )}
                    <div>
                        <div className="text-[10px] uppercase tracking-wider text-gray-400 font-semibold mb-2">Key Insights</div>
                        {insights.length > 0 ? (
                            <ul className="space-y-2">
                                {insights.map((it, i) => (
                                    <li key={i} className="flex gap-2 text-sm text-gray-700"><span className="text-acento">▸</span><span>{it}</span></li>
                                ))}
                            </ul>
                        ) : (
                            <div className="text-xs text-gray-500 italic">Sin insights destacados todavía.</div>
                        )}
                    </div>

                    {/* Bloque "Efectividad LXVI desglose" REMOVIDO de TabOverview
                        (mayo 15) — movido a TabEfectividad. Antes había duplicación
                        entre KPI de cabecera y desglose, con contradicciones de
                        números. Ahora la información de estado vive SOLO en la
                        pestaña Efectividad. */}
                    {false && (
                    <div>
                        <div className="flex items-baseline justify-between mb-2">
                            <div className="text-[10px] uppercase tracking-wider text-gray-400 font-semibold">_</div>
                        </div>
                        {(() => {
                            /* Para senadores los conteos vienen de l3p_* + n_*_aprob/pend/desech.
                               Para diputados de n_ini_iniciante etc (todavía sin desglose por estado).
                               El isDip activa la vista alterna por rol. */
                            const isDip = (leg.n_ini_iniciante ?? 0) > 0 || (leg.n_prop_proponente ?? 0) > 0;
                            if (isDip) {
                                const iniInd = leg.n_ini_iniciante ?? 0;
                                const iniAdh = leg.n_ini_adherente ?? 0;
                                const iniGrp = leg.n_ini_de_grupo ?? 0;
                                const propProp = leg.n_prop_proponente ?? 0;
                                const propAdh = leg.n_prop_adherente ?? 0;
                                const propGrp = leg.n_prop_de_grupo ?? 0;
                                return (
                                    <div className="space-y-2">
                                        <div className="bg-gray-50 rounded-lg p-3">
                                            <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1.5">Iniciativas</div>
                                            <div className="grid grid-cols-3 gap-2 text-center">
                                                <div><div className="text-lg font-bold text-gray-800 font-mono">{iniInd}</div><div className="text-[10px] text-gray-500">Iniciante</div></div>
                                                <div><div className="text-lg font-bold text-gray-800 font-mono">{iniAdh}</div><div className="text-[10px] text-gray-500">Adherente</div></div>
                                                <div><div className="text-lg font-bold text-gray-800 font-mono">{iniGrp}</div><div className="text-[10px] text-gray-500">De grupo</div></div>
                                            </div>
                                        </div>
                                        <div className="bg-gray-50 rounded-lg p-3">
                                            <div className="text-[10px] uppercase tracking-wider text-gray-500 mb-1.5">Proposiciones</div>
                                            <div className="grid grid-cols-3 gap-2 text-center">
                                                <div><div className="text-lg font-bold text-gray-800 font-mono">{propProp}</div><div className="text-[10px] text-gray-500">Proponente</div></div>
                                                <div><div className="text-lg font-bold text-gray-800 font-mono">{propAdh}</div><div className="text-[10px] text-gray-500">Adherente</div></div>
                                                <div><div className="text-lg font-bold text-gray-800 font-mono">{propGrp}</div><div className="text-[10px] text-gray-500">De grupo</div></div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            }
                            // Senadores: usar l3p_* + conteos por estado
                            const iniInd = Math.round(leg.l3p_iniciativas ?? 0);
                            const iniGrp = Math.round(leg.l3p_iniciativas_col ?? 0);
                            const propInd = Math.round(leg.l3p_proposiciones ?? 0);
                            const propGrp = Math.round(leg.l3p_proposiciones_col ?? 0);
                            const ia_i = leg.n_ini_aprob_ind ?? 0, ia_c = leg.n_ini_aprob_col ?? 0;
                            const ip_i = leg.n_ini_pend_ind ?? 0, ip_c = leg.n_ini_pend_col ?? 0;
                            const id_i = leg.n_ini_desech_ind ?? 0, id_c = leg.n_ini_desech_col ?? 0;
                            const pa_i = leg.n_prop_aprob_ind ?? 0, pa_c = leg.n_prop_aprob_col ?? 0;
                            const pp_i = leg.n_prop_pend_ind ?? 0, pp_c = leg.n_prop_pend_col ?? 0;
                            const pd_i = leg.n_prop_desech_ind ?? 0, pd_c = leg.n_prop_desech_col ?? 0;
                            const sinEstadoIni = (iniInd + iniGrp) - (ia_i+ia_c+ip_i+ip_c+id_i+id_c);
                            const sinEstadoProp = (propInd + propGrp) - (pa_i+pa_c+pp_i+pp_c+pd_i+pd_c);
                            return (
                                <div className="space-y-3">
                                    {/* INICIATIVAS */}
                                    <div className="bg-gray-50 rounded-lg p-3">
                                        <div className="flex items-baseline justify-between mb-2">
                                            <div className="text-[11px] uppercase tracking-wider text-gray-500 font-semibold">Iniciativas LXVI</div>
                                            <div className="text-base font-bold text-gray-800 font-mono">{iniInd + iniGrp}<span className="text-[10px] text-gray-400 font-normal ml-1">total</span></div>
                                        </div>
                                        <div className="space-y-1.5 text-[12px]">
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-700">Como promovente único</span>
                                                <span className="font-mono font-bold text-gray-800">{iniInd}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-[10px] text-gray-500 pl-3">
                                                <span><span className="text-emerald-600 font-semibold">{ia_i}</span> aprobada{ia_i!==1?'s':''} · <span className="text-amber-600 font-semibold">{ip_i}</span> pendiente{ip_i!==1?'s':''} · <span className="text-red-500 font-semibold">{id_i}</span> desechada{id_i!==1?'s':''}</span>
                                            </div>
                                            <div className="flex justify-between items-center pt-1 border-t border-gray-200">
                                                <span className="text-gray-700">Firmando con bancada</span>
                                                <span className="font-mono font-bold text-gray-800">{iniGrp}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-[10px] text-gray-500 pl-3">
                                                <span><span className="text-emerald-600 font-semibold">{ia_c}</span> aprobada{ia_c!==1?'s':''} · <span className="text-amber-600 font-semibold">{ip_c}</span> pendiente{ip_c!==1?'s':''} · <span className="text-red-500 font-semibold">{id_c}</span> desechada{id_c!==1?'s':''}</span>
                                            </div>
                                            {sinEstadoIni > 0 && (
                                                <div className="text-[10px] text-gray-400 italic pt-1">{sinEstadoIni} sin estado disponible en Senado.gob.mx</div>
                                            )}
                                        </div>
                                    </div>
                                    {/* PROPOSICIONES */}
                                    <div className="bg-gray-50 rounded-lg p-3">
                                        <div className="flex items-baseline justify-between mb-2">
                                            <div className="text-[11px] uppercase tracking-wider text-gray-500 font-semibold">Proposiciones LXVI</div>
                                            <div className="text-base font-bold text-gray-800 font-mono">{propInd + propGrp}<span className="text-[10px] text-gray-400 font-normal ml-1">total</span></div>
                                        </div>
                                        <div className="space-y-1.5 text-[12px]">
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-700">Como promovente único</span>
                                                <span className="font-mono font-bold text-gray-800">{propInd}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-[10px] text-gray-500 pl-3">
                                                <span><span className="text-emerald-600 font-semibold">{pa_i}</span> aprobada{pa_i!==1?'s':''} · <span className="text-amber-600 font-semibold">{pp_i}</span> pendiente{pp_i!==1?'s':''} · <span className="text-red-500 font-semibold">{pd_i}</span> desechada{pd_i!==1?'s':''}</span>
                                            </div>
                                            <div className="flex justify-between items-center pt-1 border-t border-gray-200">
                                                <span className="text-gray-700">Firmando con bancada</span>
                                                <span className="font-mono font-bold text-gray-800">{propGrp}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-[10px] text-gray-500 pl-3">
                                                <span><span className="text-emerald-600 font-semibold">{pa_c}</span> aprobada{pa_c!==1?'s':''} · <span className="text-amber-600 font-semibold">{pp_c}</span> pendiente{pp_c!==1?'s':''} · <span className="text-red-500 font-semibold">{pd_c}</span> desechada{pd_c!==1?'s':''}</span>
                                            </div>
                                            {sinEstadoProp > 0 && (
                                                <div className="text-[10px] text-gray-400 italic pt-1">{sinEstadoProp} sin estado disponible en Senado.gob.mx</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}
                    </div>
                    )}
                </div>
            );
        }

        function TabPredictor({ leg, predictor }) {
            if (!predictor || predictor.length === 0) {
                /* Predictor requiere ≥3 actos individuales por categoría.
                   Chedraui-tipo: presenta mucho pero sus ini van a varias
                   categorías sin concentrar en una. El umbral es por
                   diseño — sin volumen suficiente en una categoría no
                   hay señal estadística confiable. */
                const isDip = (leg.n_ini_iniciante ?? 0) > 0 || (leg.n_prop_proponente ?? 0) > 0;
                const totalActosIndiv = isDip
                    ? (leg.n_ini_iniciante ?? 0) + (leg.n_prop_proponente ?? 0)
                    : Math.round((leg.l3p_iniciativas ?? 0) + (leg.l3p_proposiciones ?? 0));
                return (
                    <div className="text-sm text-gray-700 bg-amber-50 border border-amber-200 rounded-lg p-3">
                        <div className="font-bold mb-1.5 text-amber-900">Sin modelo de predicción</div>
                        <div className="text-xs text-gray-700 leading-relaxed">
                            {totalActosIndiv > 0 ? (
                                <>Ha presentado <strong>{totalActosIndiv}</strong> instrumentos individuales en LXVI, pero el modelo necesita <strong>≥3 actos concentrados en una misma categoría</strong> para emitir predicción confiable. Su actividad probablemente está distribuida en varias categorías.</>
                            ) : (
                                <>Aún no hay actos individuales registrados en LXVI suficientes para predecir patrón temático.</>
                            )}
                        </div>
                    </div>
                );
            }
            return (
                <div className="space-y-4">
                    <div>
                        <div className="text-[10px] uppercase tracking-wider text-gray-400 font-semibold mb-1">Categorías con mayor probabilidad de autoría</div>
                        <p className="text-xs text-gray-500 mb-3">Probabilidad de que este legislador presente instrumentos en cada categoría, basada en historial temático, comisión y actividad reciente.</p>
                    </div>
                    <div className="space-y-3">
                        {predictor.slice(0, 5).map((p, i) => {
                            /* Colores FIAT (slate/azul) — antes morado/rosa/gris
                               desalineado con el resto del dashboard. */
                            const barColor = i === 0 ? 'bg-slate-700' : i === 1 ? 'bg-slate-500' : 'bg-slate-400';
                            return (
                                <div key={p.categoria} className="bg-gray-50 rounded-xl p-3.5">
                                    <div className="flex items-center justify-between mb-1.5">
                                        <div className="flex items-center gap-2">
                                            <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold text-white ${i === 0 ? 'bg-slate-700' : i === 1 ? 'bg-slate-500' : 'bg-slate-400'}`}>{i + 1}</div>
                                            <span className="text-sm font-semibold text-gray-800">{_catLabel(p.categoria)}</span>
                                        </div>
                                        <span className="text-lg font-bold text-gray-800 font-mono">{p.score.toFixed(0)}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-2 mb-2 overflow-hidden">
                                        <div className={`h-full rounded-full ${barColor} transition-all`} style={{ width: `${Math.min(p.score, 100)}%` }} />
                                    </div>
                                    <div className="grid grid-cols-3 gap-2 text-[10px] text-gray-500">
                                        <div className="text-center"><div className="font-bold text-gray-700 font-mono">{p.desglose?.especializacion_tematica?.toFixed(0) || '—'}</div>Historial</div>
                                        <div className="text-center"><div className="font-bold text-gray-700 font-mono">{p.desglose?.comision_agenda?.toFixed(0) || '—'}</div>Comisión</div>
                                        <div className="text-center"><div className="font-bold text-gray-700 font-mono">{p.docs || 0}</div>Docs previos</div>
                                    </div>
                                    {p.comisiones_afines?.length > 0 && (
                                        <div className="text-[10px] text-gray-400 mt-1.5">Comisiones afines: {p.comisiones_afines.join(', ')}</div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function TabEfectividad({ leg }) {
            /* REDISEÑO 15-may v3: tasa éxito + Wilson lower bound (95% CI).
               Imelda 1/1 = 100% crudo era engañoso. Wilson penaliza
               automáticamente muestras chicas:
                 1/1  → Wilson 5%   (era 100% crudo)
                 5/29 → Wilson 7%   (era 17% crudo)
                 20/30 → Wilson 49% (era 67% crudo)
               Estándar de industria (Reddit, IMDB) para ranking con
               sample variable. Cobertura universal preservada. */
            const isDip = (leg.n_ini_iniciante ?? 0) > 0 || (leg.n_prop_proponente ?? 0) > 0
                          || (leg.n_ini_de_grupo ?? 0) > 0 || (leg.n_prop_de_grupo ?? 0) > 0;
            const aprob = (leg.n_ini_aprob_ind ?? 0) + (leg.n_ini_aprob_col ?? 0)
                          + (leg.n_prop_aprob_ind ?? 0) + (leg.n_prop_aprob_col ?? 0);
            const desech = (leg.n_ini_desech_ind ?? 0) + (leg.n_ini_desech_col ?? 0)
                           + (leg.n_prop_desech_ind ?? 0) + (leg.n_prop_desech_col ?? 0);
            const pend = (leg.n_ini_pend_ind ?? 0) + (leg.n_ini_pend_col ?? 0)
                         + (leg.n_prop_pend_ind ?? 0) + (leg.n_prop_pend_col ?? 0);
            const resueltos = aprob + desech;
            const tasaCruda = resueltos >= 1 ? (aprob / resueltos) : null;
            // Wilson 95% lower bound — manejo correcto de samples chicos.
            function wilsonLB(success, n, z = 1.96) {
                if (n <= 0) return null;
                const p = success / n;
                const denom = 1 + (z * z) / n;
                const center = p + (z * z) / (2 * n);
                const margin = z * Math.sqrt((p * (1 - p)) / n + (z * z) / (4 * n * n));
                return Math.max(0, (center - margin) / denom);
            }
            const wilson = resueltos >= 1 ? wilsonLB(aprob, resueltos) : null;
            const indice = wilson != null ? Math.round(wilson * 100) : null;

            // Total presentado LXVI (fuente correcta por cámara)
            const iniSolo = isDip ? (leg.n_ini_iniciante ?? 0) : Math.round(leg.l3p_iniciativas ?? 0);
            const propSolo = isDip ? (leg.n_prop_proponente ?? 0) : Math.round(leg.l3p_proposiciones ?? 0);
            const iniBanc = isDip ? ((leg.n_ini_adherente ?? 0) + (leg.n_ini_de_grupo ?? 0))
                                  : Math.round(leg.l3p_iniciativas_col ?? 0);
            const propBanc = isDip ? ((leg.n_prop_adherente ?? 0) + (leg.n_prop_de_grupo ?? 0))
                                   : Math.round(leg.l3p_proposiciones_col ?? 0);
            const totalLXVI = iniSolo + propSolo + iniBanc + propBanc;

            // Sin resoluciones: copy enfocado en "en revisión" no en "sin índice"
            if (indice == null) {
                return (
                    <div className="space-y-3">
                        <div className="text-sm text-gray-700 bg-blue-50 border border-blue-200 rounded-lg p-3.5">
                            <div className="font-bold mb-1.5 text-blue-900">Trabajo legislativo en revisión</div>
                            <div className="text-xs text-gray-700 leading-relaxed">
                                {totalLXVI > 0 ? <>
                                    Ha presentado <strong>{totalLXVI} instrumentos</strong> en la LXVI
                                    ({iniSolo + iniBanc} iniciativas · {propSolo + propBanc} proposiciones).
                                    Ninguno ha llegado a dictamen aún {pend > 0 && <>· {pend} se encuentran
                                    en revisión activa en las comisiones turnadas</>}.
                                </> : <>Sin instrumentos legislativos registrados en LXVI todavía.</>}
                            </div>
                            <div className="text-[11px] text-gray-600 mt-2 italic">
                                La Efectividad se calcula con aprobados sobre el total resuelto.
                                Mientras todo permanezca en revisión, no hay base para el indicador.
                            </div>
                        </div>
                    </div>
                );
            }

            const pctApr = resueltos ? Math.round(100 * aprob / resueltos) : 0;
            // Thresholds ajustados al Wilson lower bound (más bajos que tasa cruda).
            // Wilson 40+ ≈ tasa cruda 50-60%+ con sample bueno. Wilson <10 ≈ casi
            // nada aprobado o sample muy chico.
            const tier = indice >= 40 ? { label: 'ALTO', desc: 'Sample robusto con alta proporción de aprobaciones (Wilson 40+ ≈ tasa cruda ≥50% con ≥10 resueltos).', color: 'text-emerald-700', bg: 'bg-emerald-50 border-emerald-200', barBg: 'bg-emerald-500' }
                : indice >= 20 ? { label: 'MEDIO', desc: 'Resultados positivos consistentes, ajustado por tamaño de muestra.', color: 'text-lime-700', bg: 'bg-lime-50 border-lime-200', barBg: 'bg-lime-500' }
                : indice >= 10 ? { label: 'LIMITADO', desc: 'Pocas aprobaciones o muestra insuficiente para confiar.', color: 'text-amber-700', bg: 'bg-amber-50 border-amber-200', barBg: 'bg-amber-500' }
                : { label: 'MÍNIMO', desc: 'Casi nada aprobado, o muy poca muestra resuelta a la fecha.', color: 'text-red-700', bg: 'bg-red-50 border-red-200', barBg: 'bg-red-500' };

            // Distribuciones para barra apilada (sobre total presentado LXVI)
            const total = aprob + desech + pend;
            const wPct = total ? 100 * aprob / total : 0;
            const lPctDes = total ? 100 * desech / total : 0;
            const lPctPen = total ? 100 * pend / total : 0;

            return (
                <div className="space-y-4">
                    {/* Headline card — Wilson como número principal, tasa cruda visible */}
                    <div className={`rounded-xl border p-4 ${tier.bg}`}>
                        <div className="flex items-baseline justify-between gap-3">
                            <div>
                                <div className="text-[10px] uppercase tracking-wider font-bold text-gray-500 font-mono">Índice de Efectividad</div>
                                <div className="flex items-baseline gap-1 mt-0.5">
                                    <div className="text-5xl font-black text-gray-900 font-mono leading-none">{indice}</div>
                                    <div className="text-lg text-gray-400 font-mono">/100</div>
                                </div>
                                <div className="text-xs text-gray-700 font-mono mt-1">
                                    {aprob}/{resueltos} resoluciones · tasa cruda {Math.round((tasaCruda || 0) * 100)}%
                                </div>
                                {resueltos < 5 && resueltos > 0 && (
                                    <div className="text-[10px] text-amber-700 font-mono mt-1 italic">
                                        ⚠ Muestra mínima ({resueltos} resoluciones)
                                    </div>
                                )}
                            </div>
                            <div className="text-right">
                                <div className={`text-xs font-black tracking-wider ${tier.color}`}>{tier.label}</div>
                                <div className="text-[10px] text-gray-600 mt-1 max-w-[190px]">{tier.desc}</div>
                            </div>
                        </div>
                        {/* Barra visual 0-100 */}
                        <div className="mt-4">
                            <div className="relative h-2 rounded-full bg-gray-200 overflow-hidden">
                                <div className={`h-full ${tier.barBg} rounded-full`} style={{ width: `${indice}%` }} />
                            </div>
                            <div className="flex justify-between text-[9px] text-gray-500 font-mono mt-1">
                                <span>0 nada aprobado</span><span>50 mitad</span><span>100 todo aprobado</span>
                            </div>
                        </div>
                    </div>

                    {/* Definición formal */}
                    <div className="bg-white border border-gray-200 rounded-xl p-4 text-[13px] text-gray-700 leading-relaxed">
                        <div className="font-bold text-gray-900 mb-1.5 font-mono uppercase text-[10px] tracking-wider">Qué mide</div>
                        <div>
                            Tasa de aprobación de instrumentos legislativos, ajustada por confianza estadística.
                        </div>
                        <div className="mt-2 text-[12px] text-gray-600">
                            <strong>Por qué no la tasa cruda:</strong> alguien con una sola iniciativa aprobada
                            (1 de 1) marcaría 100%, pero esa cifra no significa nada con tan poca muestra.
                            El ajuste por confianza estadística penaliza las muestras pequeñas para que todos
                            los legisladores sean comparables en una misma escala.
                        </div>
                    </div>

                    {/* Desglose por estado */}
                    <div>
                        <div className="flex items-baseline justify-between mb-2">
                            <div className="text-[10px] uppercase tracking-wider font-bold text-gray-500 font-mono">Historial LXVI</div>
                            <div className="text-xs font-mono text-gray-600">{aprob + desech + pend} instrumentos con turno</div>
                        </div>
                        <div className="grid grid-cols-3 gap-2">
                            <div className="bg-emerald-50 border border-emerald-100 rounded-lg p-2 text-center">
                                <div className="text-[9px] uppercase text-emerald-700 font-bold">Aprobados</div>
                                <div className="text-lg font-black text-emerald-700 font-mono leading-none mt-0.5">{aprob}</div>
                                <div className="text-[9px] text-emerald-600 mt-0.5">con dictamen</div>
                            </div>
                            <div className="bg-amber-50 border border-amber-100 rounded-lg p-2 text-center">
                                <div className="text-[9px] uppercase text-amber-700 font-bold">En revisión</div>
                                <div className="text-lg font-black text-amber-700 font-mono leading-none mt-0.5">{pend}</div>
                                <div className="text-[9px] text-amber-600 mt-0.5">en comisión</div>
                            </div>
                            <div className="bg-red-50 border border-red-100 rounded-lg p-2 text-center">
                                <div className="text-[9px] uppercase text-red-700 font-bold">Desechados</div>
                                <div className="text-lg font-black text-red-700 font-mono leading-none mt-0.5">{desech}</div>
                                <div className="text-[9px] text-red-600 mt-0.5">no avanzaron</div>
                            </div>
                        </div>

                        {/* Barra apilada */}
                        <div className="mt-3">
                            <div className="flex h-2.5 rounded-full overflow-hidden bg-gray-100">
                                {wPct > 0 && <div className="bg-emerald-500" style={{ width: `${wPct}%` }} title={`Aprobados: ${aprob}`} />}
                                {lPctPen > 0 && <div className="bg-amber-400" style={{ width: `${lPctPen}%` }} title={`En revisión: ${pend}`} />}
                                {lPctDes > 0 && <div className="bg-red-500" style={{ width: `${lPctDes}%` }} title={`Desechados: ${desech}`} />}
                            </div>
                            <div className="flex justify-between text-[9px] text-gray-500 font-mono mt-1">
                                <span>0%</span><span>50%</span><span>100%</span>
                            </div>
                        </div>
                    </div>

                    {/* Desglose por rol — sustituye el bloque viejo de TabOverview */}
                    {(() => {
                        const ia_i = leg.n_ini_aprob_ind ?? 0, ia_c = leg.n_ini_aprob_col ?? 0;
                        const ip_i = leg.n_ini_pend_ind ?? 0, ip_c = leg.n_ini_pend_col ?? 0;
                        const id_i = leg.n_ini_desech_ind ?? 0, id_c = leg.n_ini_desech_col ?? 0;
                        const pa_i = leg.n_prop_aprob_ind ?? 0, pa_c = leg.n_prop_aprob_col ?? 0;
                        const pp_i = leg.n_prop_pend_ind ?? 0, pp_c = leg.n_prop_pend_col ?? 0;
                        const pd_i = leg.n_prop_desech_ind ?? 0, pd_c = leg.n_prop_desech_col ?? 0;
                        return (
                            <div className="space-y-2">
                                <div className="text-[10px] uppercase tracking-wider font-bold text-gray-500 font-mono">Por tipo de instrumento</div>
                                <div className="bg-gray-50 rounded-lg p-3">
                                    <div className="flex items-baseline justify-between mb-2">
                                        <div className="text-[11px] uppercase tracking-wider text-gray-500 font-semibold">Iniciativas</div>
                                        <div className="text-base font-bold text-gray-800 font-mono">{iniSolo + iniBanc}<span className="text-[10px] text-gray-400 font-normal ml-1">total</span></div>
                                    </div>
                                    <div className="space-y-1 text-[12px]">
                                        <div className="flex justify-between"><span className="text-gray-700">Como promovente único</span><span className="font-mono font-bold">{iniSolo}</span></div>
                                        <div className="text-[10px] text-gray-500 pl-3"><span className="text-emerald-600 font-semibold">{ia_i}</span> aprob · <span className="text-amber-600 font-semibold">{ip_i}</span> revis · <span className="text-red-500 font-semibold">{id_i}</span> desech</div>
                                        <div className="flex justify-between pt-1 border-t border-gray-200"><span className="text-gray-700">Firmando con bancada</span><span className="font-mono font-bold">{iniBanc}</span></div>
                                        <div className="text-[10px] text-gray-500 pl-3"><span className="text-emerald-600 font-semibold">{ia_c}</span> aprob · <span className="text-amber-600 font-semibold">{ip_c}</span> revis · <span className="text-red-500 font-semibold">{id_c}</span> desech</div>
                                    </div>
                                </div>
                                <div className="bg-gray-50 rounded-lg p-3">
                                    <div className="flex items-baseline justify-between mb-2">
                                        <div className="text-[11px] uppercase tracking-wider text-gray-500 font-semibold">Proposiciones</div>
                                        <div className="text-base font-bold text-gray-800 font-mono">{propSolo + propBanc}<span className="text-[10px] text-gray-400 font-normal ml-1">total</span></div>
                                    </div>
                                    <div className="space-y-1 text-[12px]">
                                        <div className="flex justify-between"><span className="text-gray-700">Como proponente único</span><span className="font-mono font-bold">{propSolo}</span></div>
                                        <div className="text-[10px] text-gray-500 pl-3"><span className="text-emerald-600 font-semibold">{pa_i}</span> aprob · <span className="text-amber-600 font-semibold">{pp_i}</span> revis · <span className="text-red-500 font-semibold">{pd_i}</span> desech</div>
                                        <div className="flex justify-between pt-1 border-t border-gray-200"><span className="text-gray-700">Firmando con bancada</span><span className="font-mono font-bold">{propBanc}</span></div>
                                        <div className="text-[10px] text-gray-500 pl-3"><span className="text-emerald-600 font-semibold">{pa_c}</span> aprob · <span className="text-amber-600 font-semibold">{pp_c}</span> revis · <span className="text-red-500 font-semibold">{pd_c}</span> desech</div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* LECTURA PREMIUM: índice ajustado por dificultad de comisión.
                        Decisión 15-may con luz verde explícita: mantener tasa éxito
                        como headline (intuitivo) + ELO ajustado como capa premium
                        para quien busca matiz analítico. */}
                    {leg.elo_indice != null && (() => {
                        const eloIdx = Math.round(leg.elo_indice);
                        const pctCam = leg.elo_percentil_camara;
                        const camaraShort = (leg.camara || '').replace('Cámara de ', '');
                        const posicionTexto = pctCam == null ? null
                            : pctCam >= 50
                                ? `Mejor que ${Math.round(pctCam)}% de ${camaraShort}`
                                : `Por debajo de ${Math.round(100 - pctCam)}% de ${camaraShort}`;
                        const eloTier = eloIdx >= 80 ? { label: 'ÉLITE', color: 'text-emerald-700', bg: 'bg-emerald-50' }
                            : eloIdx >= 60 ? { label: 'ALTO', color: 'text-lime-700', bg: 'bg-lime-50' }
                            : eloIdx >= 40 ? { label: 'PROMEDIO', color: 'text-gray-700', bg: 'bg-gray-100' }
                            : eloIdx >= 20 ? { label: 'LIMITADO', color: 'text-amber-700', bg: 'bg-amber-50' }
                            : { label: 'MÍNIMO', color: 'text-red-700', bg: 'bg-red-50' };
                        const eloPartidas = leg.elo_partidas || 0;
                        const eloApr = leg.elo_aprobados || 0;
                        const eloDes = leg.elo_desechados || 0;
                        const eloPen = leg.elo_pendientes || 0;
                        const eloDra = leg.elo_draws || 0;
                        return (
                            <div className="bg-gradient-to-br from-slate-50 to-gray-50 border border-slate-200 rounded-xl p-4">
                                <div className="flex items-baseline gap-2 mb-2">
                                    <span className="text-[9px] uppercase tracking-widest font-bold text-slate-600 font-mono">Lectura analítica</span>
                                    <span className="text-[9px] text-slate-400 font-mono">· ajustada por dificultad de comisión</span>
                                </div>
                                <div className="flex items-baseline gap-4">
                                    <div>
                                        <div className="flex items-baseline gap-1">
                                            <span className="text-3xl font-black text-gray-900 font-mono leading-none">{eloIdx}</span>
                                            <span className="text-sm text-gray-400 font-mono">/100</span>
                                        </div>
                                        <div className={`text-[10px] font-black tracking-wider mt-1 ${eloTier.color}`}>{eloTier.label}</div>
                                    </div>
                                    <div className="flex-1 text-[11px] text-gray-700 leading-snug">
                                        {posicionTexto && <div className="font-mono mb-0.5">{posicionTexto}</div>}
                                        <div className="text-gray-600">
                                            Esta lectura SÍ ajusta por qué tan rápido dictamina cada comisión a la que se turnan
                                            sus instrumentos. Premia presentar en comisiones lentas (mayor mérito esperar).
                                        </div>
                                    </div>
                                </div>
                                {eloPartidas > 0 && (
                                    <div className="mt-3 pt-2.5 border-t border-slate-200 grid grid-cols-4 gap-1.5 text-[10px] text-center font-mono">
                                        <div><div className="font-bold text-emerald-700">{eloApr}</div><div className="text-gray-500">aprob</div></div>
                                        <div><div className="font-bold text-red-700">{eloDes}</div><div className="text-gray-500">desec</div></div>
                                        <div><div className="font-bold text-orange-700">{eloPen}</div><div className="text-gray-500">+180d</div></div>
                                        <div><div className="font-bold text-gray-700">{eloDra}</div><div className="text-gray-500">90-180d</div></div>
                                    </div>
                                )}
                                <details className="mt-2 text-[10px] text-gray-500">
                                    <summary className="cursor-pointer hover:text-gray-700">Cómo se calcula</summary>
                                    <div className="mt-1.5 leading-relaxed">
                                        Sistema tipo ELO (K=24, base 1500). Cada instrumento es una "partida" contra la
                                        tasa histórica de dictamen de su comisión turnada. Resultado: 1.0 aprobado, 0.0
                                        desechado o congelado &gt;180d, 0.3 en ventana 90-180d. El rating final se remapea
                                        a percentil dentro de legisladores con ≥3 instrumentos resueltos. Esto premia a
                                        quienes logran avances en comisiones difíciles y penaliza alto volumen sin progresión.
                                    </div>
                                </details>
                            </div>
                        );
                    })()}

                    {/* Metodología tasa éxito + Wilson */}
                    <details className="text-[11px] text-gray-600 bg-white border border-gray-200 rounded-lg">
                        <summary className="px-3 py-2 cursor-pointer font-bold text-gray-700 font-mono uppercase text-[10px] tracking-wider hover:bg-gray-50">Cómo se calcula la Efectividad</summary>
                        <div className="px-3 pb-3 leading-relaxed space-y-2">
                            <div>
                                <strong>Fórmula:</strong> intervalo de confianza estadística al 95% sobre la proporción
                                de aprobados entre aprobados + desechados. Las iniciativas en revisión (sin dictamen aún)
                                no entran al cálculo.
                            </div>
                            <div>
                                <strong>Ejemplos comparativos:</strong>
                                <ul className="list-disc list-inside text-[11px] mt-1 space-y-0.5">
                                    <li>1 aprobada / 1 resuelta · tasa cruda 100% · índice <strong>5</strong></li>
                                    <li>5 aprobadas / 10 resueltas · tasa cruda 50% · índice <strong>22</strong></li>
                                    <li>20 aprobadas / 30 resueltas · tasa cruda 67% · índice <strong>49</strong></li>
                                </ul>
                            </div>
                            <div>
                                <strong>Por qué se ajusta:</strong> penaliza automáticamente las muestras pequeñas
                                sin excluirlas — todos los legisladores quedan medibles y comparables en una misma escala,
                                sin que una sola iniciativa aprobada infle el resultado.
                            </div>
                            <div>
                                <strong>Diferencia con Lectura analítica:</strong> la Efectividad de arriba responde
                                "¿cuántas de tus cosas pasaron, ajustado por cuánta muestra hay?". La Lectura analítica
                                de abajo ajusta también por dificultad de comisión (premia presentar en comisiones que
                                casi nunca dictaminan).
                            </div>
                        </div>
                    </details>
                </div>
            );
        }

        function EstatusPill({ estatus }) {
            const cfg = {
                Aprobado:  { cls: 'bg-emerald-100 text-emerald-700 border-emerald-200', icon: '✓' },
                Desechado: { cls: 'bg-rose-100 text-rose-700 border-rose-200',          icon: '✗' },
                Rechazado: { cls: 'bg-rose-100 text-rose-700 border-rose-200',          icon: '✗' },
                Retirada:  { cls: 'bg-gray-100 text-gray-600 border-gray-200',          icon: '⊘' },
                Pendiente: { cls: 'bg-amber-50 text-amber-700 border-amber-200',        icon: '◯' },
            }[estatus] || { cls: 'bg-gray-50 text-gray-500 border-gray-200', icon: '·' };
            return (
                <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 text-[9px] font-mono font-bold rounded border ${cfg.cls}`}>
                    <span>{cfg.icon}</span><span>{estatus}</span>
                </span>
            );
        }

        function MatchupCard({ m, expandido, onToggle, principal }) {
            const tasa = m.tasa_aprobacion != null ? Math.round(m.tasa_aprobacion * 100) : null;
            const base = m.tasa_comision_lxvi != null ? Math.round(m.tasa_comision_lxvi * 100) : null;
            const dif = m.diferencial_pp;
            const difCls = dif == null ? 'text-gray-400'
                : dif >= 10 ? 'text-emerald-600'
                : dif >= 0 ? 'text-lime-600'
                : dif >= -10 ? 'text-amber-600'
                : 'text-rose-600';
            const arrow = dif == null ? '·' : dif > 0 ? '↑' : dif < 0 ? '↓' : '→';

            return (
                <div className={`bg-white border rounded-xl overflow-hidden ${principal ? 'border-gray-300 shadow-sm' : 'border-gray-200'}`}>
                    {/* Header */}
                    <div
                        className={`px-4 py-3 ${onToggle ? 'cursor-pointer hover:bg-gray-50' : ''} ${principal ? 'bg-gradient-to-br from-gray-900 to-gray-950 text-white' : ''}`}
                        onClick={onToggle}
                    >
                        <div className="flex items-baseline justify-between gap-2">
                            <div className="min-w-0 flex-1">
                                <div className={`text-[10px] uppercase tracking-widest font-mono font-bold ${principal ? 'text-white/60' : 'text-gray-500'}`}>
                                    {principal ? 'Matchup principal' : 'comisión'}
                                </div>
                                <div className={`text-sm font-semibold mt-0.5 truncate ${principal ? 'text-white' : 'text-gray-800'}`} title={m.comision}>
                                    {m.comision}
                                </div>
                            </div>
                            <div className="text-right flex-shrink-0">
                                <div className={`text-[9px] uppercase tracking-widest font-mono ${principal ? 'text-white/50' : 'text-gray-400'}`}>n / Δ</div>
                                <div className={`text-sm font-mono ${principal ? 'text-white' : 'text-gray-700'}`}>
                                    {m.n_instrumentos} <span className={`font-bold ${principal ? difCls.replace('600', '300') : difCls}`}>{arrow}{dif != null ? Math.abs(dif).toFixed(1) + 'pp' : '—'}</span>
                                </div>
                            </div>
                        </div>

                        {/* Mini stats inline */}
                        <div className={`grid grid-cols-4 gap-2 mt-3 text-[10px] font-mono ${principal ? 'text-white/70' : 'text-gray-600'}`}>
                            <div>
                                <div className={principal ? 'text-white/40' : 'text-gray-400'}>aprobados</div>
                                <div className={`text-base font-bold ${principal ? 'text-emerald-300' : 'text-emerald-700'}`}>{m.aprobados}</div>
                            </div>
                            <div>
                                <div className={principal ? 'text-white/40' : 'text-gray-400'}>tasa</div>
                                <div className={`text-base font-bold ${principal ? 'text-white' : 'text-gray-800'}`}>{tasa != null ? `${tasa}%` : '—'}</div>
                            </div>
                            <div>
                                <div className={principal ? 'text-white/40' : 'text-gray-400'}>baseline</div>
                                <div className={`text-base ${principal ? 'text-white/80' : 'text-gray-600'}`}>{base != null ? `${base}%` : '—'}</div>
                            </div>
                            <div>
                                <div className={principal ? 'text-white/40' : 'text-gray-400'}>tiempo</div>
                                <div className={`text-base ${principal ? 'text-white/80' : 'text-gray-600'}`}>{m.dias_promedio_dictamen != null ? `${Math.round(m.dias_promedio_dictamen)}d` : '—'}</div>
                            </div>
                        </div>
                    </div>

                    {/* Detalle expandible: instrumentos recientes */}
                    {expandido && m.instrumentos_recientes && m.instrumentos_recientes.length > 0 && (
                        <div className="border-t border-gray-100 px-4 py-3">
                            <div className="text-[10px] uppercase tracking-widest font-mono font-bold text-gray-500 mb-2">
                                Últimos {m.instrumentos_recientes.length} instrumentos
                            </div>
                            <div className="space-y-1.5">
                                {m.instrumentos_recientes.map((inst, i) => (
                                    <div key={i} className="flex items-start gap-2 text-[11px] py-1 border-b border-gray-50 last:border-0">
                                        <div className="flex-shrink-0 mt-0.5">
                                            <EstatusPill estatus={inst.estatus} />
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="text-gray-700 leading-snug truncate" title={inst.titulo}>
                                                {inst.titulo || <span className="text-gray-400 italic">sin título</span>}
                                            </div>
                                            <div className="text-[9px] font-mono text-gray-400 mt-0.5">
                                                {inst.fecha_pres}
                                                {inst.dias_a_dictamen != null && <> · {inst.dias_a_dictamen}d a dictamen</>}
                                                {inst.dias_a_dictamen == null && inst.estatus === 'Pendiente' && <> · {inst.dias_desde_pres}d sin resolver</>}
                                                {inst.tipo && <> · {inst.tipo}</>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function TabMatchup({ leg }) {
            const [matchups, setMatchups] = useState(null);
            const [loading, setLoading] = useState(true);
            const [expandidoIdx, setExpandidoIdx] = useState(0);

            useEffect(() => {
                if (!leg.id) { setLoading(false); return; }
                fetch(`${WORKER_URL}/h2h?legislador_id=${leg.id}`)
                    .then(r => r.ok ? r.json() : Promise.reject(r.status))
                    .then(d => { setMatchups(d.matchups || []); setLoading(false); })
                    .catch(() => { setMatchups([]); setLoading(false); });
            }, [leg.id]);

            if (loading) return <div className="text-xs text-gray-400 italic font-mono">Cargando matchups…</div>;

            if (!matchups || matchups.length === 0) {
                /* Explicación clara de qué es Matchup (la gente lo olvida fácil)
                   y por qué este legislador no tiene data H2H aún. Si existe
                   un Matchup global (grade A/B/F vs comisión más turnada),
                   lo mostramos en un panel separado claramente etiquetado. */
                return (
                    <div className="space-y-3">
                        <div className="bg-gray-50 border border-gray-200 rounded-lg p-3.5 text-[12px] text-gray-700 leading-relaxed">
                            <div className="font-bold text-gray-900 mb-1 font-mono uppercase text-[10px] tracking-wider">Qué es Matchup</div>
                            Evalúa qué tan favorable es la comisión a la que más se turnan sus instrumentos.
                            <strong className="text-emerald-700"> A</strong> = comisión que dictamina rápido ·
                            <strong className="text-lime-700"> B</strong> = buen ritmo ·
                            <strong className="text-gray-700"> C</strong> = promedio ·
                            <strong className="text-amber-700"> D</strong> = lenta ·
                            <strong className="text-red-700"> F</strong> = casi nunca dictamina.
                        </div>
                        <div className="text-xs text-gray-500 italic">
                            Sin matchups detallados aún (requiere ≥3 instrumentos en una misma comisión
                            y ≥10 en la comisión para baseline). El Matchup global se calcula con un umbral
                            menor y se muestra abajo cuando aplica.
                        </div>
                        {leg.matchup_comision && leg.matchup_grade && (
                            <div className="bg-white border border-gray-200 rounded-lg p-3 text-[12px]">
                                <div className="text-[10px] uppercase tracking-wider text-gray-400 font-bold mb-1.5 font-mono">Matchup global vs comisión más turnada</div>
                                <div className="flex items-baseline gap-3">
                                    <span className={`text-2xl font-black font-mono ${
                                        leg.matchup_grade === 'A' ? 'text-emerald-600' :
                                        leg.matchup_grade === 'B' ? 'text-lime-600' :
                                        leg.matchup_grade === 'C' ? 'text-gray-700' :
                                        leg.matchup_grade === 'D' ? 'text-amber-600' :
                                        leg.matchup_grade === 'F' ? 'text-red-600' : 'text-gray-400'
                                    }`}>{leg.matchup_grade}</span>
                                    <div className="flex-1">
                                        <div className="font-semibold text-gray-800">{leg.matchup_comision}</div>
                                        <div className="text-[11px] text-gray-500">{leg.matchup_tasa != null ? `Tasa de dictamen ${Math.round(leg.matchup_tasa * 100)}%` : 'tasa sin datos'}</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            const principal = matchups[0];
            const otros = matchups.slice(1);

            return (
                <div className="space-y-4">
                    <MatchupCard m={principal} expandido={true} principal />

                    {otros.length > 0 && (
                        <div>
                            <div className="text-[10px] uppercase tracking-widest font-mono font-bold text-gray-500 mb-2">
                                Otras comisiones · {otros.length}
                            </div>
                            <div className="space-y-1.5">
                                {otros.map((m, i) => (
                                    <MatchupCard
                                        key={i}
                                        m={m}
                                        expandido={expandidoIdx === i + 1}
                                        onToggle={() => setExpandidoIdx(expandidoIdx === i + 1 ? -1 : i + 1)}
                                    />
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Guía de lectura */}
                    <div className="bg-gray-50 border border-gray-200 rounded-lg p-3 text-[11px] font-mono text-gray-600 leading-relaxed">
                        <div className="font-bold text-gray-700 mb-1 uppercase text-[10px] tracking-widest">cómo leer</div>
                        <div>· <strong>tasa</strong>: % de instrumentos del legislador en esa comisión que obtuvieron dictamen (excluye pendientes &lt;90d)</div>
                        <div>· <strong>baseline</strong>: tasa de dictaminación de la comisión en LXVI con todos los presentadores</div>
                        <div>· <strong>Δ</strong>: diferencial en puntos porcentuales · ↑ por encima del baseline · ↓ por debajo</div>
                        <div>· <strong>tiempo</strong>: mediana de días entre presentación y dictamen (solo aprobados)</div>
                    </div>
                </div>
            );
        }

        // Umbrales oficiales del semáforo legislativo: verde ≥70, ámbar ≥40, rojo <40.
        // El arco entero se pinta del color correspondiente (en degradado claro→oscuro del MISMO tono).
        // Colores alineados a CATEGORY_COLORS[semaforo]: verde #66bb6a→#2e7d32, ámbar #e0a82b→#c6972b, rojo #ef5350→#c62828.
        const SEMAFORO_COLOR_HEX = { verde: '#2e7d32', amarillo: '#c6972b', rojo: '#c62828' };
        const SEMAFORO_GRADIENT = {
            verde:     { light: '#66bb6a', dark: '#2e7d32' },
            amarillo:  { light: '#e0a82b', dark: '#c6972b' },
            rojo:      { light: '#ef5350', dark: '#c62828' },
        };
        const semaforoNivelForPct = (pct) => pct >= 0.70 ? 'verde' : pct >= 0.40 ? 'amarillo' : 'rojo';
        const semaforoColorForPct = (pct) => SEMAFORO_COLOR_HEX[semaforoNivelForPct(pct)];
        const semaforoLabelForPct = (pct) => pct >= 0.70 ? 'ALTA' : pct >= 0.40 ? 'MEDIA' : 'BAJA';

        function HitRateGaugeMini({ value }) {
            // Gauge de tabla: % grande arriba + arco limpio debajo (estilo card).
            // Arco con UN solo color según umbral del semáforo (degradado claro→oscuro del mismo tono).
            const pct = value == null ? 0 : Math.max(0, Math.min(1, value));
            const R = 34;
            const STROKE = 8;
            const angleFor = (t) => Math.PI - Math.PI * t;
            const point = (t) => {
                const a = angleFor(t);
                return [Math.cos(a) * R, -Math.sin(a) * R];
            };
            const [x1, y1] = point(0);
            const [x2, y2] = point(1);
            const trackD = `M ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2}`;
            const gradId = `hrMini-${Math.random().toString(36).slice(2, 8)}`;
            const displayPct = value == null ? '—' : (Math.round(pct * 1000) / 10).toFixed(1) + '%';
            const nivel = value != null ? semaforoNivelForPct(pct) : 'rojo';
            const grad = SEMAFORO_GRADIENT[nivel];
            return (
                <div className="flex flex-col items-center gap-0.5">
                    <div className="text-base font-bold leading-none tabular-nums font-mono" style={{ color: value != null ? '#1F2937' : '#9CA3AF' }}>
                        {displayPct}
                    </div>
                    <svg viewBox="-40 -38 80 42" className="w-16 h-8 block">
                        <defs>
                            <linearGradient id={gradId} x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%" stopColor={grad.light} />
                                <stop offset="100%" stopColor={grad.dark} />
                            </linearGradient>
                        </defs>
                        <path d={trackD} fill="none" stroke="#E5E7EB" strokeWidth={STROKE} strokeLinecap="round" />
                        {value != null && (
                            <path d={trackD} fill="none" stroke={`url(#${gradId})`} strokeWidth={STROKE} strokeLinecap="round"
                                style={{ strokeDasharray: Math.PI * R, strokeDashoffset: Math.PI * R * (1 - pct) }} />
                        )}
                    </svg>
                </div>
            );
        }

        function HitRateGauge({ value }) {
            /* REDISEÑO 15-may: viewBox ampliado para que los labels 40/70 no se
               corten. Tipografía alineada con el resto del card (font-mono,
               sizes consistentes). Sin números fuera del frame. */
            const pct = value == null ? 0 : Math.max(0, Math.min(1, value));
            const R = 85;
            const STROKE = 16;
            const angleFor = (t) => Math.PI - Math.PI * t;
            const pointOnArc = (t) => {
                const a = angleFor(t);
                return [Math.cos(a) * R, -Math.sin(a) * R];
            };
            const [x1, y1] = pointOnArc(0);
            const [x2, y2] = pointOnArc(1);
            const trackD = `M ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2}`;
            const [nx, ny] = pointOnArc(pct);
            const displayPct = value == null ? '—' : Math.round(pct * 100) + '%';
            const nivel = value != null ? semaforoNivelForPct(pct) : 'rojo';
            const grad = SEMAFORO_GRADIENT[nivel];

            // ViewBox amplio: -120..120 horizontal, -120..30 vertical
            // Labels en *1.18 (más cerca, no se cortan)
            return (

        /* ── Mini chart para Actividad mensual de una comisión (área + picos) ── */
        function HistoricoComisionChart({ historico }) {
            const ref = useRef(null);
            const inst = useRef(null);
            useEffect(() => {
                if (!ref.current || !historico || historico.length === 0) return;
                if (inst.current) inst.current.destroy();

                const MESES_ABBR = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
                const labels = historico.map(h => {
                    const [y, m] = h.mes.split('-');
                    return `${MESES_ABBR[parseInt(m,10)-1] || m}'${y.slice(-2)}`;
                });
                const valores = historico.map(h => h.count);

                const lineColor = '#2e7d32';
                const fillColor = 'rgba(46, 125, 50, 0.18)';
                const peakColor = '#8b5cf6';

                // Detectar picos locales
                const localMax = [];
                valores.forEach((v, i) => {
                    if (v <= 0) return;
                    const left = i > 0 ? valores[i-1] : -Infinity;
                    const right = i < valores.length - 1 ? valores[i+1] : -Infinity;
                    if (v >= left && v >= right) localMax.push({ i, v });
                });
                const topPeaksIdx = new Set(localMax.sort((a,b) => b.v - a.v).slice(0, 5).map(p => p.i));
                const peakData = valores.map((v, i) => topPeaksIdx.has(i) ? v : null);

                const peakLinesPlugin = {
                    id: 'peakLinesComision',
                    beforeDatasetsDraw(chart) {
                        const ctx = chart.ctx;
                        const yAxis = chart.scales.y;
                        const xAxis = chart.scales.x;
                        ctx.save();
                        ctx.strokeStyle = 'rgba(139, 92, 246, 0.45)';
                        ctx.lineWidth = 1;
                        ctx.setLineDash([3, 4]);
                        topPeaksIdx.forEach(idx => {
                            const x = xAxis.getPixelForValue(idx);
                            ctx.beginPath();
                            ctx.moveTo(x, yAxis.top);
                            ctx.lineTo(x, yAxis.bottom);
                            ctx.stroke();
                        });
                        ctx.restore();
                    }
                };

                inst.current = new Chart(ref.current, {
                    type: 'line',
                    plugins: [peakLinesPlugin],
                    data: {
                        labels,
                        datasets: [
                            { label: 'Docs', data: valores, borderColor: lineColor, backgroundColor: fillColor, borderWidth: 2, fill: true, tension: 0.35, pointRadius: 0, pointHitRadius: 10, pointHoverRadius: 4, pointBackgroundColor: lineColor, pointBorderColor: '#fff', pointBorderWidth: 2 },
                            { label: 'Picos', data: peakData, borderColor: 'transparent', backgroundColor: peakColor, pointRadius: 4, pointBackgroundColor: peakColor, pointBorderColor: '#fff', pointBorderWidth: 1.5, pointHoverRadius: 6, pointStyle: 'circle', fill: false, showLine: false, spanGaps: false }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(15,23,42,0.92)', titleColor: '#f1f5f9', bodyColor: '#cbd5e1',
                                borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1, cornerRadius: 10,
                                padding: { top: 6, bottom: 6, left: 10, right: 10 },
                                displayColors: false,
                                titleFont: { size: 10, weight: '600' }, bodyFont: { size: 10 },
                                filter: item => item.datasetIndex === 0,
                                callbacks: {
                                    title: items => items[0]?.label || '',
                                    label: item => ` ${item.raw} docs${topPeaksIdx.has(item.dataIndex) ? ' (pico)' : ''}`
                                }
                            }
                        },
                        scales: {
                            y: { display: false, beginAtZero: true, grid: { display: false } },
                            x: {
                                ticks: { color: '#b0b8c4', font: { size: 8 }, maxRotation: 0, autoSkip: true, maxTicksLimit: Math.min(6, labels.length) },
                                grid: { display: false },
                                border: { display: false }
                            }
                        }
                    }
                });
                return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
            }, [historico]);

            return <div style={{height: '90px'}}><canvas ref={ref}></canvas></div>;
        }

        /* ── Panel de detalle expandible por comisión ── */
        function ComisionDetalle({ comision }) {

            /* Color del dictamen según antigüedad */

            const maxHist = Math.max(...historico.map(h => h.count), 1);

            /* Tasa de aprobación color */
            const tasaColor = !sitl ? 'bg-gray-200' :
                sitl.tasa_aprobacion >= 20 ? 'bg-emerald-500' :

            return (
                <div className="px-4 pb-4 pt-2 bg-gradient-to-b from-gray-50/80 to-white border-b border-gray-200 animate-fadeIn">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                        {/* ── Composición ── */}
                        <div className="space-y-2">
                            <div className="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Composicion ({c.total_integrantes || composicion.length} integrantes)</div>

                                <div className="space-y-1">
                                    {presidente.map((m, i) => (

                                            <span className="text-gray-900 font-mono font-bold text-[10px] w-16">PRES.</span>
                                            <PartidoBadge partido={m.partido} size="sm" />

                                        </div>

                                    {secretarios.map((m, i) => (
                                        <div key={`s${i}`} className="flex items-center gap-2 text-xs">
                                            <span className="text-gray-900 font-mono font-bold text-[10px] w-16">SEC.</span>
                                            <PartidoBadge partido={m.partido} size="sm" />
                                            <span className="font-medium text-gray-700 truncate">{m.nombre}</span>
                                        </div>
                                    ))}
                                    {visibleIntegrantes.map((m, i) => (
                                        <div key={`i${i}`} className="flex items-center gap-2 text-xs">
                                            <span className="text-gray-400 font-mono text-[10px] w-16">INT.</span>
                                            <PartidoBadge partido={m.partido} size="sm" />
                                            <span className="text-gray-600 truncate">{m.nombre}</span>
                                        </div>

                                    {integrantes.length > 6 && (

                                            {showAllMembers ? 'Ver menos' : `+${integrantes.length - 6} integrantes mas`}

                                <div className="text-xs text-gray-400">Composicion no disponible</div>
                            )}
                        </div>

                        {/* ── Stats: dictamen + tasa + histórico ── */}
                        <div className="space-y-3">

                            {/* Último dictamen */}
                            <div>
                                <div className="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1">Ultimo dictamen</div>
                                {c.ultimo_dictamen ? (
                                    c.ultimo_dictamen_url ? (
                                        <a href={c.ultimo_dictamen_url} target="_blank" rel="noopener noreferrer"
                                            onClick={(e) => e.stopPropagation()}
                                            className={`inline-flex items-baseline gap-1.5 text-sm font-semibold font-mono ${dictColor} hover:underline`}>
                                            <span>Hace {c.dias_sin_dictamen} dias</span>
                                            <span className="text-xs text-gray-400 font-normal">({c.ultimo_dictamen})</span>
                                            <svg className="w-3 h-3 opacity-60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                        </a>
                                    ) : (
                                        <div className={`text-sm font-semibold font-mono ${dictColor}`}>
                                            Hace {c.dias_sin_dictamen} dias
                                            <span className="text-xs text-gray-400 font-normal ml-1.5">({c.ultimo_dictamen})</span>
                                        </div>
                                    )
                                ) : (
                                    <div className="text-xs text-gray-400 font-mono">Sin dictamenes registrados en Gaceta</div>
                                )}
                            </div>

                            {/* Tasa de aprobación SITL */}
                            {sitl && (() => {
                                const desg = sitl.desglose || {};
                                const hasDesglose = desg.unica || desg.unidas || desg.opinion;
                                return (
                                <div>
                                    <div className="text-[10px] font-semibold text-gray-500 uppercase tracking-wider mb-1">Asuntos turnados (SITL)</div>
                                    <div className="flex items-center gap-3">
                                        <div className="flex-1">
                                            <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                                                <div className={`h-full rounded-full ${tasaColor}`}
                                                    style={{width: `${Math.min(sitl.tasa_aprobacion, 100)}%`}}></div>
                                            </div>
                                        </div>
                                        <span className="text-sm font-bold text-gray-800 w-12 text-right">{sitl.tasa_aprobacion}%</span>
                                    </div>
                                    <div className="text-[11px] text-gray-500 mt-0.5">
                                        {sitl.aprobadas} aprobadas de {sitl.turnadas} turnadas — {sitl.pendientes} pendientes
                                    </div>
                                    {/* Desglose única / unidas / opinión */}
                                    {hasDesglose && (
                                        <div className="mt-2 space-y-1">
                                            {desg.unica && (
                                                <div className="flex items-center gap-2 text-[11px]">
                                                    <span className="font-mono text-[10px] px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700 font-semibold w-[72px] text-center">Unica</span>
                                                    <span className="text-gray-600">{desg.unica.pendientes}P</span>
                                                    <span className="text-gray-400">de {desg.unica.turnadas}T</span>
                                                    {desg.unica.iniciativas_pendientes > 0 && <span className="text-gray-400 font-mono text-[10px]">({desg.unica.iniciativas_pendientes} ini, {desg.unica.proposiciones_pendientes || 0} ppa)</span>}
                                                </div>
                                            )}
                                            {desg.unidas && (

                                                    <span className="font-mono text-[10px] px-1.5 py-0.5 rounded bg-blue-50 text-blue-700 font-semibold w-[72px] text-center">Unidas</span>
                                                    <span className="text-gray-600">{desg.unidas.pendientes}P</span>
                                                    <span className="text-gray-400">de {desg.unidas.turnadas}T</span>

                                                </div>

                                                    <span className="text-gray-400">de {desg.opinion.turnadas}T</span>
                                                </div>
                                            )}
                                        </div>
                                    )}
