                    {/* Modal Preguntas Frecuentes */}
                    {showFAQ && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setShowFAQ(false)}>
                            <div className="bg-white rounded-2xl max-w-lg w-full max-h-[80vh] overflow-y-auto p-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg font-bold text-gray-800">Preguntas frecuentes</h2>
                                    <button onClick={() => setShowFAQ(false)} className="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">&times;</button>
                                </div>
                                <div>
                                    {[
                                        ["¿Que es Fiat?", "FIAT es un sistema de inteligencia legislativa que monitorea en tiempo real la actividad del Congreso de Mexico. Analiza iniciativas, dictamenes, puntos de acuerdo y medios de comunicacion para generar alertas y predicciones sobre temas legislativos clave."],
                                        ["¿De donde provienen los datos?", "Los datos se obtienen de fuentes publicas oficiales y medios de comunicacion. El sistema se actualiza automaticamente seis veces al dia."],
                                        ["¿Que significa el score de cada categoria?", "El score (0-100) es un indicador compuesto que combina volumen de noticias, actividad legislativa actual y pasada y tendencia de busquedas en internet. Un score alto indica mayor probabilidad de actividad legislativa en ese tema."],
                                        ["¿Por que probabilidades y no posibilidades?", "En 1951, un analista de la CIA llamado Sherman Kent reporto que una invasion a Yugoslavia era una \"posibilidad seria\". El pensaba que eso significaba 65% o mas. Su jefe lo interpreto como 20%. La consecuencia fue un error masivo de politica exterior. Cuando preguntas que significa \"posible\", las respuestas van desde 5% hasta 80%. Por eso en FIAT usamos numeros. Cuando decimos que un tema tiene un score de 73, no hay ambiguedad. No es algo probable ni bastante posible, es 73 de 100. Esto te permite comparar temas entre si, seguir su evolucion en el tiempo y tomar decisiones informadas sin depender de interpretaciones subjetivas."],
                                        ["¿Que tan precisas son las predicciones?", "Las predicciones son estimaciones, no certezas. Un score de 70% no significa que algo va a pasar, significa que hay senales fuertes de actividad. Asi como un pronostico de 30% de lluvia no quiere decir que no va a llover, solo que es menos probable, nuestros scores reflejan la intensidad de las senales legislativas en un momento dado. La seccion de Resoluciones muestra el historial de precision semanal para que puedas evaluar que tan bien calibrado esta el sistema."],
                                        ["¿Que son las comisiones y como se mide su actividad?", "Las comisiones son organos del Congreso donde se analizan y dictaminan las iniciativas y proposiciones con punto de acuerdo. Fiat mide su actividad contando los documentos procesados en los ultimos 60 dias y asignando un score de actividad relativo."],
                                        ["¿Como puedo contactar al equipo?", "Puedes escribirnos a contacto@fiatmx.com o seguirnos en X (Twitter) como @Fiat_MX para recibir alertas automaticas sobre actividad legislativa relevante."],
                                    ].map(([q, a], i, arr) => (
                                        <details key={i} className="group">
                                            <summary className="flex items-center justify-between py-3 cursor-pointer">
                                                <span className="text-[13px] font-medium text-gray-800">{q}</span>
                                                <svg className="w-3.5 h-3.5 text-gray-300 transition-transform group-open:rotate-180 flex-shrink-0 ml-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>
                                            </summary>
                                            <div className="pb-3 text-[12px] text-gray-500 leading-relaxed">{a}</div>
                                            {i < arr.length - 1 && <div className="border-b border-gray-100"></div>}
                                        </details>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal detalle */}
                    {selected && (
                        <DetalleModal data={selected} prediccion={predicciones[selected.categoria]} fuentes={fuentes} seriesTemporales={data.series_temporales} seriesTemporalesMedios={data.series_temporales_medios} autoria={data.autoria?.[selected.categoria]} generado={data.metadata.generado} onClose={() => setSelected(null)} />
                    )}

                    {/* Modal Registro */}
                    {showRegistro && <RegistroModal onClose={() => setShowRegistro(false)} />}
                    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}

                    {/* Info Bubble - abre FAQ, desaparece al cerrar */}
                    {!infoBubbleDismissed && (
                        <div className="fixed bottom-6 right-6 z-50">
                            <button onClick={() => { setShowFAQ(true); setInfoBubbleDismissed(true); }}
                                className="w-12 h-12 rounded-full shadow-lg hover:shadow-xl hover:scale-105 transition-all flex items-center justify-center group" style={{background: '#307f34'}}>
                                <span className="text-white text-xl font-serif italic group-hover:scale-110 transition-transform">i</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
