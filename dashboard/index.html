                                    <HistoricoComisionChart historico={historico} />
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        /* ── Sub-componente: vista de Comisión Permanente y extraordinarios LXVI ── */
        function PermanenteSection({ permanente_stats, extraordinarios }) {
            const recesos = permanente_stats || [];
            const recesoActivo = recesos.find(r => r.activo);
            const recesoActual = recesoActivo || recesos[0];  // si ninguno activo, mostrar el más reciente
            const previos = recesos.filter(r => r !== recesoActual);
            const events = extraordinarios || [];

            const fmt = (iso) => {
                if (!iso) return '—';
                const [y, m, d] = iso.split('-');
                const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
                return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
            };

            const ComisionRow = ({ c }) => (
                <div className="grid items-center px-3 py-2.5 border-b border-gray-200 last:border-b-0"
                     style={{gridTemplateColumns: 'minmax(0, 1fr) 64px 64px 64px 70px'}}>
                    <div className="min-w-0 pr-3">
                        <div className="font-medium text-sm text-gray-800">{c.nombre_corto}</div>
                        <div className="text-[11px] text-gray-500 truncate">{c.alcance}</div>
                    </div>
                    <div className="text-center text-sm font-mono text-gray-700">{c.turnadas}</div>
                    <div className="text-center text-sm font-mono text-gray-700">{c.iniciativas + c.proposiciones}</div>
                    <div className="text-center text-sm font-mono text-emerald-700 font-semibold">{c.aprobadas}</div>
                    <div className="text-center text-xs font-mono text-gray-500">{c.tasa_aprobacion}%</div>
                </div>
            );

            const RecesoCard = ({ r, destacado = false }) => (
                <div className={`bg-white border ${destacado ? 'border-acento/40 shadow-sm' : 'border-gray-200'} rounded-xl overflow-hidden`}>
                    <div className={`px-4 py-3 ${destacado ? 'bg-acento/5' : 'bg-gray-50/50'} border-b border-gray-200 flex items-center justify-between`}>
                        <div>
                            <div className="text-sm font-semibold text-gray-800">{r.label}</div>
                            <div className="text-[11px] text-gray-500 mt-0.5">{fmt(r.fecha_inicio)} → {fmt(r.fecha_fin)}</div>
                        </div>
                        <div className="text-right">
                            <div className="text-xs text-gray-500">Total turnadas</div>
                            <div className="font-mono text-sm font-bold text-gray-800">{r.total_turnadas}</div>
                        </div>
                        {destacado && r.activo && <span className="ml-3 text-[9px] uppercase tracking-wider px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200 font-mono">Activo</span>}
                    </div>
                    <div className="hidden md:grid items-center px-3 py-1.5 border-b border-gray-200 text-[10px] uppercase tracking-wider text-gray-400 font-bold font-mono"
                         style={{gridTemplateColumns: 'minmax(0, 1fr) 64px 64px 64px 70px'}}>
                        <div>Comisión de Trabajo</div>
                        <div className="text-center">Turn.</div>
                        <div className="text-center">Ini.+Prop.</div>
                        <div className="text-center">Aprob.</div>
                        <div className="text-center">Tasa</div>
                    </div>
                    {r.comisiones.length > 0 ? (
                        r.comisiones.map((c, i) => <ComisionRow key={i} c={c} />)
                    ) : (
                        <div className="px-4 py-6 text-center text-xs text-gray-400">Aún sin actividad turnada en este receso.</div>
                    )}
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="bg-amber-50/50 border border-amber-200/60 rounded-lg p-3 text-xs text-amber-900">
                        <span className="font-semibold">Comisión Permanente y periodos extraordinarios.</span> Durante los recesos del Congreso (16 dic – 31 ene · 1 may – 31 ago) sólo sesiona la Permanente con sus 3 Comisiones de Trabajo. Los datos de aprobaciones aquí <strong>no se mezclan</strong> con las comisiones ordinarias del tab anterior.
                    </div>

                    {recesoActual && (
                        <div>
                            <div className="text-[11px] uppercase tracking-wider text-gray-500 font-bold font-mono mb-2">{recesoActual.activo ? 'Receso vigente' : 'Receso más reciente'}</div>
                            <RecesoCard r={recesoActual} destacado={true} />
                        </div>
                    )}

                    {previos.length > 0 && (
                        <div>
                            <div className="text-[11px] uppercase tracking-wider text-gray-500 font-bold font-mono mb-2">Recesos previos LXVI</div>
                            <div className="space-y-3">
                                {previos.map((r, i) => <RecesoCard key={i} r={r} destacado={false} />)}
                            </div>
                        </div>
                    )}

                    {events.length > 0 && (
                        <div>
                            <div className="text-[11px] uppercase tracking-wider text-gray-500 font-bold font-mono mb-2">Periodos extraordinarios LXVI</div>
                            <div className="space-y-3">
                                {events.map((ev, i) => (
                                    <div key={i} className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                                        <div className="px-4 py-3 bg-gray-50/50 border-b border-gray-200 flex items-center justify-between">
                                            <div>
                                                <div className="text-sm font-semibold text-gray-800">{ev.label}</div>
                                                <div className="text-[11px] text-gray-500 mt-0.5">{fmt(ev.fecha_inicio)} → {fmt(ev.fecha_fin)} · {ev.items.length} actos legislativos</div>
                                            </div>
                                        </div>
                                        <div className="divide-y divide-gray-100">
                                            {ev.items.map((it, j) => (
                                                <div key={j} className="grid items-start px-4 py-2"
                                                     style={{gridTemplateColumns: '90px 130px 1fr'}}>
                                                    <div className="text-[11px] font-mono text-gray-500">{fmt(it.fecha)}</div>
                                                    <div className={`text-[10px] font-mono uppercase tracking-wide px-1.5 py-0.5 rounded inline-block w-fit ${it.camara.includes('Permanente') ? 'bg-amber-50 text-amber-700' : it.camara.includes('Senad') ? 'bg-blue-50 text-blue-700' : it.camara.includes('Diputad') ? 'bg-purple-50 text-purple-700' : 'bg-gray-50 text-gray-600'}`}>{it.camara.replace('Cámara de ','').replace('Comisión ','Com. ').replace('H. Congreso General','Congreso')}</div>

                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {recesos.length === 0 && events.length === 0 && (
                        <div className="text-center py-12 text-sm text-gray-400">Sin datos de Permanente todavía.</div>
                    )}
                </div>
            );
        }

        function PageComisiones({ data }) {
            const [subTabCom, setSubTabCom] = useState('ordinarias');
            const [filtroCamara, setFiltroCamara] = useState('');
            const [filtroCategoria, setFiltroCategoria] = useState('');
            const [qCom, setQCom] = useState('');
            const [sortCom, setSortCom] = useState('score');
            const [comExpanded, setComExpanded] = useState(false);
            const [selectedCom, setSelectedCom] = useState(null);
            const [comisiones, setComisiones] = useState([]);
            const [comLoading, setComLoading] = useState(true);
            const semaforo = data.semaforo || [];
            const convocatorias = data.convocatorias || { Diputados: [], Senado: [] };

            /* Fetch comisiones desde Worker D1 */
            useEffect(() => {
                fetch(`${WORKER_URL}/comisiones`)
                    .then(r => r.ok ? r.json() : Promise.reject())
                    .then(d => { setComisiones(d.comisiones || []); setComLoading(false); })
                    .catch(() => { setComLoading(false); });
            }, []);

            /* Filtrar comisiones */
            const comisionesFiltradas = comisiones.filter(c => {
                if (filtroCamara && c.camara !== filtroCamara) return false;
                if (filtroCategoria && c.categoria !== filtroCategoria) return false;
                if (qCom.trim()) {
                    const term = qCom.trim().toLowerCase();
                    if (!c.nombre.toLowerCase().includes(term)) return false;
                }
                return true;
            }).sort((a, b) => {
                if (sortCom === 'nombre') return a.nombre.localeCompare(b.nombre);
                if (sortCom === 'total') return (b.sitl?.turnadas || b.total_docs || 0) - (a.sitl?.turnadas || a.total_docs || 0);
                return (b.score_actividad || 0) - (a.score_actividad || 0);
            });

            /* Categorías presentes en comisiones */
            const categoriasComisiones = [...new Set(comisiones.map(c => c.categoria).filter(Boolean))].sort();

            const recesosCount = (data.permanente_stats || []).length;
            const extraCount = (data.extraordinarios_lxvi || []).length;

            return (
                <div className="space-y-5">
                    <div>
                        <h2 className="text-lg font-bold text-gray-800 mb-1">Actividad de comisiones</h2>
                        <p className="text-sm text-gray-500">Ranking de comisiones por actividad legislativa en la LXVI Legislatura (sep 2024 — presente). Haz clic en una comision para ver detalle.</p>
                    </div>

                    {/* Sub-pestañas: Ordinarias vs Permanente */}
                    <div className="flex items-end gap-1 border-b border-gray-200">
                        <button onClick={() => setSubTabCom('ordinarias')}
                                className={`px-4 py-2 text-sm font-medium transition-colors border-b-2 -mb-px ${subTabCom === 'ordinarias' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                            Ordinarias <span className="text-[10px] font-mono text-gray-400 ml-1">{comisiones.length || ''}</span>
                        </button>
                        <button onClick={() => setSubTabCom('permanente')}
                                className={`px-4 py-2 text-sm font-medium transition-colors border-b-2 -mb-px ${subTabCom === 'permanente' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                            Permanente <span className="text-[10px] font-mono text-gray-400 ml-1">{recesosCount} recesos{extraCount ? ` · ${extraCount} extraord.` : ''}</span>
                        </button>
                    </div>

                    {subTabCom === 'permanente' && (
                        <PermanenteSection permanente_stats={data.permanente_stats || []} extraordinarios={data.extraordinarios_lxvi || []} />
                    )}

                    {subTabCom === 'ordinarias' && <React.Fragment>

                    {comLoading && (
                        <div className="text-center py-8 text-sm text-gray-400">Cargando comisiones...</div>
                    )}

                    {/* Filter bar: search + selects (sin card blanca) */}
                    {!comLoading && <React.Fragment>
                    <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                            <div className="relative flex-1 min-w-[180px]">
                                <svg className="w-3.5 h-3.5 text-gray-400 absolute left-2.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                <input type="text" value={qCom} onChange={e => { setQCom(e.target.value); setComExpanded(false); setSelectedCom(null); }} placeholder="Buscar comisión…"
                                    className="w-full pl-8 pr-2.5 py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-acento/20 focus:border-acento focus:bg-white transition-all" />
                            </div>
                            <select value={filtroCamara} onChange={e => { setFiltroCamara(e.target.value); setComExpanded(false); setSelectedCom(null); }}
                                className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 hover:bg-white focus:outline-none focus:ring-2 focus:ring-acento/20">
                                <option value="">Cámara · todas</option>
                                <option value="Diputados">Diputados</option>
                                <option value="Senado">Senado</option>
                            </select>
                            <select value={filtroCategoria} onChange={e => { setFiltroCategoria(e.target.value); setComExpanded(false); setSelectedCom(null); }}
                                className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 hover:bg-white focus:outline-none focus:ring-2 focus:ring-acento/20">
                                <option value="">Tema · todos</option>
                                {categoriasComisiones.map(cat => {
                                    const catData = semaforo.find(s => s.categoria === cat);
                                    const nombre = catData?.nombre || cat;
                                    return <option key={cat} value={cat}>{nombre}</option>;
                                })}
                            </select>
                            <div className="ml-auto flex items-center gap-1.5">
                                <span className="text-[10px] uppercase text-gray-400 font-semibold tracking-wide">Ordenar</span>
                                <select value={sortCom} onChange={e => setSortCom(e.target.value)}
                                    className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 hover:bg-white focus:outline-none focus:ring-2 focus:ring-acento/20">
                                    <option value="score">Score actividad</option>
                                    <option value="total">Total instrumentos</option>
                                    <option value="nombre">Nombre</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    {/* Layout de dos columnas: tabla principal + side panel con próximas sesiones */}
                    <div className="grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_300px] gap-5">
                    <div>
                    {/* Tabla abierta estilo Radar */}
                    {comisionesFiltradas.length > 0 ? (
                    <div>
                        {/* Header */}
                        <div className="hidden md:grid items-center px-3 py-2 border-b-2 border-gray-300 text-[10px] uppercase tracking-wider text-gray-500 font-bold font-mono"
                            style={{gridTemplateColumns: 'minmax(0, 1fr) 56px 56px 56px 56px 64px 24px'}}>
                            <div>Comisión</div>
                            <div className="text-center">Dict.</div>
                            <div className="text-center">Inic.</div>
                            <div className="text-center">Prop.</div>
                            <div className="text-center">Total</div>
                            <div className="text-center">Score</div>
                            <div></div>

                        {/* Rows */}
                        {(comExpanded ? comisionesFiltradas : comisionesFiltradas.slice(0, 10)).map((c, i) => {
                            const scoreColor = c.score_actividad >= 65 ? '#16a34a' : c.score_actividad >= 40 ? '#ca8a04' : '#dc2626';
                            const scoreBg = c.score_actividad >= 65 ? 'bg-green-50' : c.score_actividad >= 40 ? 'bg-yellow-50' : 'bg-red-50';
                            const isSelected = selectedCom === i;
                            const comKey = `${c.nombre}|${c.camara}`;
                            return (
                            <React.Fragment key={comKey}>
                            <div onClick={() => setSelectedCom(isSelected ? null : i)}
                                className={`grid items-center px-3 py-3 border-b border-gray-200 cursor-pointer transition-colors ${isSelected ? 'bg-acento/5 border-l-2 border-l-acento' : 'hover:bg-gray-50/50'}`}
                                style={{gridTemplateColumns: 'minmax(0, 1fr) 56px 56px 56px 56px 64px 24px'}}>
                                {/* Comisión nombre + categoría + cámara inline.
                                    Quitamos prefijo "Comisión de " porque ya estamos
                                    en pestaña de Comisiones — redundante. */}
                                <div className="min-w-0 pr-3">
                                    <div className="font-medium text-sm text-gray-800 truncate">
                                        {(c.nombre || '').replace(/^Comisi[oó]n\s+(de|del|de\s+la|de\s+los|de\s+las)\s+/i, '').replace(/^Comisi[oó]n\s+/i, '')}
                                    </div>
                                    <div className="flex items-center gap-2 mt-0.5">
                                        <span className={`text-[9px] font-mono ${c.camara === 'Senado' ? 'text-blue-600' : 'text-purple-600'}`}>{c.camara === 'Senado' ? 'Sen.' : 'Dip.'}</span>
                                        {c.categoria_nombre && (
                                            <span className="text-[10px] text-gray-400 truncate font-mono">· {c.categoria_nombre}</span>
                                        )}
                                        {c.sitl && (
                                            <span className="text-[9px] text-gray-400 font-mono hidden md:inline">· {c.sitl.tasa_aprobacion}% aprob.</span>
                                        )}
                                    </div>
                                </div>
                                {/* Dict / Inic / Prop / Total: SITL para Diputados, Gaceta para Senado */}
                                {(() => {
                                    const useSitl = c.camara === 'Diputados' && c.sitl;
                                    const dict = useSitl ? (c.sitl.aprobadas || 0) : (c.tipos?.dictamen || 0);
                                    const inic = useSitl ? (c.sitl.iniciativas?.turnadas || 0) : (c.tipos?.iniciativa || 0);
                                    const prop = useSitl ? (c.sitl.proposiciones?.turnadas || 0) : (c.tipos?.proposicion || 0);
                                    const total = useSitl ? (c.sitl.turnadas || 0) : (c.total_docs || 0);
                                    return (
                                        <>
                                            <div className="text-center text-sm font-semibold text-gray-700 hidden md:block font-mono">{dict || <span className="text-gray-300">-</span>}</div>
                                            <div className="text-center text-sm font-semibold text-gray-700 hidden md:block font-mono">{inic || <span className="text-gray-300">-</span>}</div>
                                            <div className="text-center text-sm font-semibold text-gray-700 hidden md:block font-mono">{prop || <span className="text-gray-300">-</span>}</div>
                                            <div className="text-center text-sm font-bold text-gray-800 hidden md:block font-mono">{total}</div>
                                        </>
                                    );
                                })()}
                                {/* Score pill */}
                                <div className="text-center">
                                    <span className={`inline-block w-10 py-0.5 rounded-md text-xs font-bold ${scoreBg}`}
                                        style={{color: scoreColor}}>
                                        {c.score_actividad.toFixed(0)}
                                    </span>
                                </div>
                                {/* Chevron */}
                                <div className="text-center text-gray-400 text-xs hidden md:block">
                                    <span style={{transform: isSelected ? 'rotate(90deg)' : 'none', display: 'inline-block', transition: 'transform 0.2s'}}>&#9656;</span>
                                </div>
                            </div>
                            {/* Panel expandible */}
                            {isSelected && <ComisionDetalle comision={c} />}
                            </React.Fragment>
                            );
                        })}

                        {/* Ver más / Ver menos */}
                        {comisionesFiltradas.length > 10 && (
                            <button onClick={() => setComExpanded(!comExpanded)}
                                className="w-full py-2.5 text-xs font-medium text-acento hover:bg-gray-50 transition-colors border-t border-gray-100">
                                {comExpanded ? 'Ver menos' : `Ver todas (${comisionesFiltradas.length})`}
                            </button>
                        )}
                    </div>
                    ) : (
                        <div className="text-center text-gray-400 py-12">
                            <div className="text-4xl mb-3">&#128203;</div>
                            <div>No se encontraron comisiones con los filtros seleccionados</div>
                        </div>
                    )}
                    </div>
                    {/* Side panel: próximas sesiones — mismo widget que en Inicio */}
                    <div className="space-y-4">
                        <ProximasSesionesPanel convocatorias={convocatorias} defaultTab="Diputados" />
                    </div>
                    </div>
                    </React.Fragment>}
                    </React.Fragment>}
                </div>
            );
        }

        /* ================================================================
           PAGE: MAPA
           ================================================================ */

        /* ── Coordenadas centro de cada estado de México ── */
        const ESTADO_COORDS = {
            aguascalientes: [21.88, -102.29], baja_california: [32.62, -115.45],
            baja_california_sur: [24.14, -110.31], campeche: [19.83, -90.53],
            chiapas: [16.75, -93.12], chihuahua: [28.63, -106.09],
            ciudad_de_mexico: [19.43, -99.13], coahuila: [25.42, -100.99],
            colima: [19.24, -103.73], durango: [24.02, -104.66],
            estado_de_mexico: [19.29, -99.66], guanajuato: [21.02, -101.26],
            guerrero: [17.55, -99.51], hidalgo: [20.12, -98.73],
            jalisco: [20.66, -103.35], michoacan: [19.70, -101.18],
            morelos: [18.68, -99.10], nayarit: [21.75, -104.85],
            nuevo_leon: [25.67, -100.32], oaxaca: [17.07, -96.73],
            puebla: [19.04, -98.20], queretaro: [20.59, -100.39],
            quintana_roo: [20.51, -87.38], san_luis_potosi: [22.15, -100.98],
            sinaloa: [24.81, -107.39], sonora: [29.07, -110.96],
            tabasco: [17.99, -92.93], tamaulipas: [24.27, -98.84],
            tlaxcala: [19.32, -98.24], veracruz: [19.53, -96.92],
            yucatan: [20.97, -89.62], zacatecas: [22.77, -102.58]
        };

        /* ── Mapa de selección de estados (wizard ConsolaProConfigModal).
           Portado de consola-pro.html. Reusa ESTADO_COORDS y el global L
           (Leaflet ya cargado en el <head> de index.html). ── */
        function MapaSeleccionEstados({ seleccionados, mapa, onToggle }) {
            const mapRef = React.useRef(null);
            const mapInstanceRef = React.useRef(null);
            const markersRef = React.useRef([]);
            const onToggleRef = React.useRef(onToggle);
            React.useEffect(() => { onToggleRef.current = onToggle; }, [onToggle]);

            React.useEffect(() => {
                if (!mapRef.current || mapInstanceRef.current) return;
                const map = L.map(mapRef.current, {
                    center: [23.6, -102.0], zoom: 4,
                    scrollWheelZoom: false, zoomControl: false,
                    attributionControl: false, dragging: true, doubleClickZoom: false,
                });
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                    maxZoom: 7, minZoom: 4,
                }).addTo(map);
                mapInstanceRef.current = map;
                setTimeout(() => map.invalidateSize(), 250);
                return () => { map.remove(); mapInstanceRef.current = null; };
            }, []);

            React.useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                markersRef.current.forEach(m => map.removeLayer(m));
                markersRef.current = [];
                const sel = new Set(seleccionados || []);
                Object.entries(ESTADO_COORDS).forEach(([key, coords]) => {
                    const on = sel.has(key);
                    const size = on ? 16 : 9;
                    const html = on
                        ? `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#16a34a;border:2px solid #fff;box-shadow:0 0 0 3px rgba(22,163,74,0.30),0 1px 4px rgba(0,0,0,0.25);"></div>`
                        : `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#cbd5e1;border:1px solid #94a3b8;"></div>`;
                    const icon = L.divIcon({ html, className: '', iconSize: [size, size], iconAnchor: [size/2, size/2] });
                    const mk = L.marker(coords, { icon });
                    const nombre = (mapa[key]?.nombre) || key;
                    mk.bindTooltip(
                        `<div style="font-family:Inter,sans-serif;font-size:11px;font-weight:600">${nombre}</div><div style="font-family:Inter,sans-serif;font-size:10px;color:#666">${on ? 'Seleccionado · clic para quitar' : 'Clic para agregar'}</div>`,
                        { direction: 'top', className: 'leaflet-tooltip-fiat' }
                    );
                    mk.on('click', () => onToggleRef.current && onToggleRef.current(key));
                    mk.addTo(map);
                    markersRef.current.push(mk);
                });
            }, [seleccionados, mapa]);

            return <div ref={mapRef} style={{height: '100%', minHeight: '320px', width: '100%', borderRadius: '0.5rem'}}></div>;
        }

        /* ── Componente MapaMexico con Leaflet ── */
        function MapaMexico({ estados, maxArts, onSelectEstado, estadoSeleccionado }) {
            const mapRef = React.useRef(null);
            const mapInstanceRef = React.useRef(null);
            const markersRef = React.useRef([]);

            const getMarkerColor = (count) => {
                const intensity = count / Math.max(maxArts, 1);
                if (intensity > 0.5) return { fill: '#ef4444', border: '#dc2626', label: 'Alto' };
                if (intensity > 0.2) return { fill: '#f59e0b', border: '#d97706', label: 'Elevado' };
                return { fill: '#22c55e', border: '#16a34a', label: 'Bajo' };
            };

            React.useEffect(() => {
                if (!mapRef.current || mapInstanceRef.current) return;
                const map = L.map(mapRef.current, {
                    center: [23.6, -102.5],
                    zoom: 5,
                    scrollWheelZoom: true,
                    zoomControl: true,
                    attributionControl: false
                });
                /* Tile sin labels para controlar idioma; CartoDB light_all trae
                   los nombres de países en inglés (Mexico, Cuba, Belize…). */
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                    maxZoom: 8, minZoom: 4
                }).addTo(map);
                L.control.attribution({position: 'bottomright', prefix: false}).addTo(map);

                /* Labels en español para países/regiones vecinas visibles */
                const paisesLabels = [
                    { name: 'MÉXICO', coords: [26.5, -103.0], size: 16, weight: 700, color: '#9ca3af' },
                    { name: 'ESTADOS UNIDOS', coords: [32.2, -106.0], size: 11, weight: 600, color: '#b0b8c4' },
                    { name: 'GUATEMALA', coords: [15.5, -90.3], size: 10, weight: 600, color: '#b0b8c4' },
                    { name: 'BELICE', coords: [17.2, -88.5], size: 10, weight: 600, color: '#b0b8c4' },
                    { name: 'HONDURAS', coords: [14.6, -87.0], size: 10, weight: 600, color: '#b0b8c4' },
                    { name: 'EL SALVADOR', coords: [13.7, -88.9], size: 9, weight: 600, color: '#b0b8c4' },
                    { name: 'CUBA', coords: [21.9, -79.5], size: 10, weight: 600, color: '#b0b8c4' },
                    { name: 'GOLFO DE MÉXICO', coords: [24.5, -90.5], size: 10, weight: 500, color: '#93a3b8' },
                    { name: 'OCÉANO PACÍFICO', coords: [17.5, -107.0], size: 10, weight: 500, color: '#93a3b8' },
                ];
                paisesLabels.forEach(l => {
                    L.marker(l.coords, {
                        interactive: false,
                        icon: L.divIcon({
                            className: '',
                            html: `<div style="font-family:Inter,sans-serif;font-size:${l.size}px;font-weight:${l.weight};color:${l.color};letter-spacing:0.08em;white-space:nowrap;opacity:0.7;">${l.name}</div>`,
                            iconSize: [0, 0], iconAnchor: [0, 0]
                        })
                    }).addTo(map);
                });

                mapInstanceRef.current = map;
                return () => { map.remove(); mapInstanceRef.current = null; };
            }, []);

            React.useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                /* Clear old markers */
                markersRef.current.forEach(m => map.removeLayer(m));
                markersRef.current = [];

                estados.forEach(([key, info]) => {
                    const coords = ESTADO_COORDS[key];
                    if (!coords) return;
                    const { fill, border } = getMarkerColor(info.total_articulos);
                    const isSelected = estadoSeleccionado === key;
                    const intensity = info.total_articulos / Math.max(maxArts, 1);
                    const coreSize = Math.max(7, Math.min(16, 7 + intensity * 11));
                    /* Anillos expansivos (ping-style CIA): más anillos = más intensidad */
                    const numRings = intensity > 0.5 ? 4 : intensity > 0.2 ? 3 : 2;
                    /* Tamaño máximo que alcanza el ring al expandirse (scale=1) */
                    const ringMax = coreSize + 24 + intensity * 18;
                    const boxSize = ringMax + 6;

                    /* Anillos que se expanden desde el centro (efecto sonar). Se escalonan con delay. */
                    let ringsHtml = '';
                    for (let r = 0; r < numRings; r++) {
                        const delay = (r * 2) / numRings; // reparte en el ciclo de 2s
                        ringsHtml += `<div class="map-ring" style="width:${ringMax}px;height:${ringMax}px;border-color:${fill};animation-delay:${delay.toFixed(2)}s;"></div>`;
                    }

                    /* Sweep rotatorio sólo en estados con intensidad alta (evita saturar el mapa) */
                    let sweepHtml = '';
                    if (intensity > 0.35) {
                        const sweepSize = ringMax + 2;
                        sweepHtml = `<div class="map-sweep" style="width:${sweepSize}px;height:${sweepSize}px;color:${fill};margin-left:-${sweepSize/2}px;margin-top:-${sweepSize/2}px;"></div>`;
                    }

                    const dotHtml = `<div style="position:relative;width:${boxSize}px;height:${boxSize}px">` +
                        sweepHtml +
                        ringsHtml +
                        `<div class="map-dot-core" style="width:${coreSize}px;height:${coreSize}px;background:${fill};color:${fill};` +
                        `border:${isSelected ? '2px solid #1a365d' : '1px solid ' + border};"></div></div>`;

                    const icon = L.divIcon({
                        html: dotHtml,
                        className: '',
                        iconSize: [boxSize, boxSize],
                        iconAnchor: [boxSize / 2, boxSize / 2],
                    });

                    const marker = L.marker(coords, { icon });
                    marker.bindTooltip(
                        `<div style="font-family:Inter,sans-serif;font-size:12px;font-weight:600">${info.abreviatura}</div><div style="font-family:Inter,sans-serif;font-size:11px;color:#666">${info.total_articulos} noticias</div>`,
                        { direction: 'top', offset: [0, -boxSize / 2], className: 'leaflet-tooltip-fiat' }
                    );
                    marker.on('click', () => onSelectEstado(key));
                    marker.addTo(map);
                    markersRef.current.push(marker);
                });
            }, [estados, estadoSeleccionado, maxArts]);

            return (
                <div>
                    <div className="flex items-center justify-between mb-3 px-1">
                        <h3 className="font-semibold text-gray-800 text-sm">Cobertura por estado</h3>
                        <div className="flex items-center gap-3 text-[11px] text-gray-500">
                            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-red-500 inline-block"></span> Alto</span>
                            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block"></span> Elevado</span>
                            <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span> Bajo</span>
                        </div>
                    </div>
                    <div ref={mapRef} className="rounded-2xl overflow-hidden"
                        style={{height: '440px', width: '100%', boxShadow: 'inset 0 2px 14px rgba(15,23,42,0.16)', border: '1px solid #e5e7eb'}}></div>
                </div>
            );
        }

        function PageMapa({ data }) {
            const [estadoSeleccionado, setEstadoSeleccionado] = useState(null);
            const [filtroCategoria, setFiltroCategoria] = useState(null);
            const mapa = data.mapa || {};
            const semaforo = data.semaforo || [];
            const estados = Object.entries(mapa).sort((a, b) => b[1].total_articulos - a[1].total_articulos);
            const totalArticulos = estados.reduce((sum, [, v]) => sum + v.total_articulos, 0);
            const maxArts = estados.length > 0 ? estados[0][1].total_articulos : 1;
            const selectedData = estadoSeleccionado ? mapa[estadoSeleccionado] : null;

            /* Category name map */
            const catNombres = {};
            semaforo.forEach(s => { catNombres[s.categoria] = s.nombre; });

            /* All categories present in mapa */
            const todasCategorias = [...new Set(estados.flatMap(([, v]) => (v.categorias || []).filter(c => !c.includes(':'))))].sort();

            /* Filter states by category */
            const estadosFiltrados = filtroCategoria
                ? estados.filter(([, v]) => (v.categorias || []).some(c => c === filtroCategoria))
                : estados;

            const getHeatColor = (count) => {
                const intensity = Math.min(count / maxArts, 1);
                if (intensity > 0.6) return '#2e7d32';
                if (intensity > 0.3) return '#66bb6a';
                if (intensity > 0.15) return '#a5d6a7';
                if (intensity > 0) return '#c8e6c9';
                return '#e8f5e9';
            };

            /* Top 5 summary stats */
            const top5 = estados.slice(0, 5);
            const concentracion = totalArticulos > 0 ? ((top5.reduce((s, [,v]) => s + v.total_articulos, 0) / totalArticulos) * 100).toFixed(0) : 0;

            return (
                <div className="space-y-6">
                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-3">
                        <div>
                            <h2 className="text-lg font-bold text-gray-800 mb-1">Mapa de cobertura mediatica</h2>
                            <p className="text-sm text-gray-500">Distribucion geografica de {totalArticulos} noticias rastreadas en {estados.length} estados durante esta semana.</p>
                        </div>
                        <div className="flex items-center gap-4 text-xs text-gray-500">
                            <div className="text-center"><div className="text-lg font-bold text-acento">{estados.length}</div>estados</div>
                            <div className="text-center"><div className="text-lg font-bold text-acento">{totalArticulos}</div>noticias</div>
                            <div className="text-center"><div className="text-lg font-bold text-acento">{concentracion}%</div>en top 5</div>
                        </div>
                    </div>

                    {/* Category filter pills — click en una activa la filtra;
                        click otra vez la desactiva (no hace falta "Todos los temas") */}
                    <div className="flex flex-wrap gap-1.5">
                        {todasCategorias.map(cat => (
                            <button key={cat} onClick={() => setFiltroCategoria(filtroCategoria === cat ? null : cat)}
                                className={`px-2.5 py-1 rounded-lg text-[11px] font-medium transition-all border ${filtroCategoria === cat ? 'bg-acento text-white border-acento' : 'bg-white text-gray-600 border-gray-200 hover:border-acento/40'}`}>
                                {catNombres[cat] || cat}
                            </button>
                        ))}
                    </div>

                    {/* Mapa interactivo de México */}
                    <MapaMexico estados={estadosFiltrados} maxArts={maxArts} onSelectEstado={(key) => setEstadoSeleccionado(estadoSeleccionado === key ? null : key)} estadoSeleccionado={estadoSeleccionado} />

                    <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
                        {/* Left: Heat grid */}
                        <div className="lg:col-span-3 space-y-4">
                            {/* Heat grid */}
                            <div className="glass border border-borde rounded-xl p-4">
                                <div className="flex items-center justify-between mb-3">
                                    <div className="flex items-center gap-2 text-[10px] text-gray-500 font-mono">
                                        <span>Menos</span>
                                        <div className="flex gap-0.5">{['#e8f5e9','#c8e6c9','#a5d6a7','#66bb6a','#2e7d32'].map((c, i) => <div key={i} className="w-5 h-2.5 rounded-sm" style={{backgroundColor: c}}></div>)}</div>
                                        <span>Más cobertura</span>
                                    </div>
                                    {filtroCategoria && <span className="text-[10px] text-acento font-medium font-mono">Filtro: {catNombres[filtroCategoria] || filtroCategoria}</span>}
                                </div>
                                <div className="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-10 gap-1.5">
                                    {estadosFiltrados.map(([key, info]) => {
                                        const isSelected = estadoSeleccionado === key;
                                        return (
                                            <button key={key} onClick={() => setEstadoSeleccionado(isSelected ? null : key)}
                                                className={`estado-hover rounded-lg p-1.5 text-center transition-all font-mono ${isSelected ? 'ring-2 ring-acento ring-offset-1' : ''}`}
                                                style={{backgroundColor: getHeatColor(info.total_articulos)}}
                                                title={`${info.nombre}: ${info.total_articulos} noticias`}>
                                                <div className={`text-[10px] font-bold ${info.total_articulos > maxArts * 0.6 ? 'text-white' : 'text-gray-700'}`}>{info.abreviatura}</div>
                                                <div className={`text-[8px] ${info.total_articulos > maxArts * 0.6 ? 'text-white/70' : 'text-gray-500'}`}>{info.total_articulos}</div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Temas más relevantes — debajo del heatgrid, misma columna */}
                            <TemasSemanales data={data} />

                        </div>

                        {/* Right: Detail panel + Hotspots */}

        /* ================================================================
           WALK-FORWARD BACKTEST — Calibración del modelo FIAT.
           Para cada punto histórico, comparar score FIAT vs actividad real
           en los 7 días siguientes. Binariza la actividad en "normal/alta"
           usando la mediana histórica de la categoría, y calcula el hit
           rate por bucket de score.
           ================================================================ */
        function computeBacktest(data, ventanaDias = 7) {
            const hist = data.historial_scores || {};
            const fechas = hist.fechas || [];
            const categorias = hist.categorias || {};
            const series = data.series_temporales || {};
            if (fechas.length < 5) return null;

            const observaciones = [];

            /* Por cada categoría, construir mapa fecha→count desde series_temporales */
            const countsPorCatFecha = {};
            for (const cat of Object.keys(categorias)) {
                const serie = series[cat] || [];
                const m = {};
                for (const s of serie) m[s.fecha] = s.count;
                countsPorCatFecha[cat] = m;
            }

            /* Para cada categoría, calcular mediana histórica (ventana 7d) como umbral */
            const umbralPorCat = {};
            for (const cat of Object.keys(categorias)) {
                const serie = series[cat] || [];
                const rollingSums = [];
                for (let i = 0; i + ventanaDias < serie.length; i++) {
                    let s = 0;
                    for (let j = i; j < i + ventanaDias; j++) s += serie[j].count;
                    if (s > 0) rollingSums.push(s);
                }
                if (rollingSums.length === 0) { umbralPorCat[cat] = 1; continue; }
                rollingSums.sort((a, b) => a - b);
                umbralPorCat[cat] = rollingSums[Math.floor(rollingSums.length / 2)];
            }

            /* Iterar cada (fecha_histórica, categoría) */
            for (let i = 0; i < fechas.length; i++) {
                const fecha = fechas[i];
                const fechaDate = new Date(fecha + 'T12:00:00');
                /* Saltar últimos puntos donde no hay 7 días de observación futura */
                const hoy = new Date(data.metadata?.generado || new Date().toISOString());
                const diasRestantes = (hoy - fechaDate) / (1000 * 60 * 60 * 24);
                if (diasRestantes < ventanaDias) continue;

                for (const cat of Object.keys(categorias)) {
                    const score = categorias[cat].scores[i];
                    if (score === null || score === undefined) continue;

                    /* Sumar actividad en los ventanaDias siguientes */
                    let actividad = 0;
                    for (let d = 1; d <= ventanaDias; d++) {
                        const futuro = new Date(fechaDate);
                        futuro.setDate(futuro.getDate() + d);
                        const keyFuturo = futuro.toISOString().slice(0, 10);
                        actividad += (countsPorCatFecha[cat] || {})[keyFuturo] || 0;
                    }

                    const hit = actividad >= umbralPorCat[cat];
                    observaciones.push({ fecha, cat, score, actividad, hit, umbral: umbralPorCat[cat] });
                }
            }

            /* Buckets: 0-30, 30-50, 50-65, 65-80, 80-100 */
            const bucketDefs = [
                { label: '0-30',   min: 0,  max: 30 },
                { label: '30-50',  min: 30, max: 50 },
                { label: '50-65',  min: 50, max: 65 },
                { label: '65-80',  min: 65, max: 80 },
                { label: '80-100', min: 80, max: 101 },
            ];
            const buckets = bucketDefs.map(b => {
                const obs = observaciones.filter(o => o.score >= b.min && o.score < b.max);
                const hits = obs.filter(o => o.hit).length;
                const mean = obs.length ? obs.reduce((a, o) => a + o.score, 0) / obs.length : 0;
                return {
                    label: b.label,
                    min: b.min, max: b.max,
                    n: obs.length,
                    hits,
                    hit_rate: obs.length ? hits / obs.length : null,
                    mean_score: mean,
                };
            });

            const total = observaciones.length;
            const hits = observaciones.filter(o => o.hit).length;
            const accuracyGlobal = total ? hits / total : 0;

            /* Brier score: mean((score/100 - actual)^2) */
            const brier = total ? observaciones.reduce((a, o) => a + ((o.score / 100) - (o.hit ? 1 : 0)) ** 2, 0) / total : null;

            return {
                observaciones: total,
                hits,
                accuracy_global: accuracyGlobal,
                brier,
                buckets,
                ventana_dias: ventanaDias,
            };
        }

        function CalibrationChart({ buckets }) {
            const ref = useRef(null);
            const inst = useRef(null);
            useEffect(() => {
                if (!ref.current) return;
                if (inst.current) inst.current.destroy();
                const points = buckets.filter(b => b.n > 0).map(b => ({ x: b.mean_score, y: (b.hit_rate || 0) * 100, n: b.n }));
                inst.current = new Chart(ref.current, {
                    type: 'scatter',
                    data: {
                        datasets: [
                            {
                                label: 'Calibración ideal',
                                data: [{ x: 0, y: 0 }, { x: 100, y: 100 }],
                                type: 'line',

                                borderColor: '#fff',
                                borderWidth: 2,
                                pointRadius: points.map(p => Math.max(6, Math.min(20, Math.sqrt(p.n) * 2.2))),
                                pointHoverRadius: 10,
                                showLine: true,
                                borderColor: '#2e7d32',
                                borderWidth: 2,
                                tension: 0,
                            },
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                titleFont: { family: 'JetBrains Mono, ui-monospace, monospace', size: 11 },

                                        return ` Hit rate real: ${p.y.toFixed(0)}% · n=${p.n}`;
                                    }

                            }

                        scales: {

                            y: { min: 0, max: 100, title: { display: true, text: 'Hit rate observado (%)', font: { size: 10, family: 'JetBrains Mono, ui-monospace, monospace' } }, ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.04)' } }
                        }
                    }
                });
                return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
            }, [buckets]);
            return <div style={{height: '300px'}}><canvas ref={ref}></canvas></div>;
        }

        /* ================================================================
           CALIBRACIÓN FIAT — score_total vs realidad
           Carga dashboard/calibracion.json (generado semanalmente por
           scripts/calibracion_score.py) y muestra:
             - Headline: una sola frase con número grande
             - Stats: Brier, ECE, log-loss, n
             - Curva (A) hit binario y curva (B) hit vs baseline
             - Breakdown por categoría top-5

        function CurvaCalibracion({ bins, color, label }) {

                    type: 'scatter',
                    data: {
                        datasets: [
                            { label: 'Calibración ideal', type: 'line',

                              pointHoverRadius: 9, showLine: true, borderWidth: 2, tension: 0 },
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                titleFont: { family: 'JetBrains Mono, ui-monospace, monospace', size: 11 },
                                bodyFont: { family: 'JetBrains Mono, ui-monospace, monospace', size: 11 },
                                callbacks: {
                                    title: (items) => `Score ${items[0].parsed.x.toFixed(0)}%`,
                                    label: (item) => {
                                        const p = item.raw;
                                        if (!p.n) return '';
                                        return ` Hit observado ${p.y.toFixed(0)}% · n=${p.n}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { min: 0, max: 100, title: { display: true, text: 'Score FIAT predicho', font: { size: 10, family: 'JetBrains Mono, ui-monospace, monospace' } }, ticks: { font: { size: 10 }, callback: v => v + '%' }, grid: { color: 'rgba(0,0,0,0.04)' } },
                            y: { min: 0, max: 100, title: { display: true, text: 'Hit observado', font: { size: 10, family: 'JetBrains Mono, ui-monospace, monospace' } }, ticks: { font: { size: 10 }, callback: v => v + '%' }, grid: { color: 'rgba(0,0,0,0.04)' } }
                        }
                    }
                });
                return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
            }, [bins, color, label]);
            return <div style={{ height: '260px' }}><canvas ref={ref}></canvas></div>;
        }
