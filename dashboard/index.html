            const [glosarioAbierto, setGlosarioAbierto] = useState(false);
            const [fCamara, setFCamara] = useState('');
            const [fPartido, setFPartido] = useState('');
            const [fCategoria, setFCategoria] = useState('');
            const [fQ, setFQ] = useState('');
            const [qInput, setQInput] = useState('');
            const [fSort, setFSort] = useState('hit_rate');

            // Sub-pestaña: 'todos' (default LXVI completa) | 'permanente' (solo
            // integrantes oficiales de la Comisión Permanente del periodo activo)
            const enReceso = data.metadata?.modo_receso === true;
            const [vista, setVista] = useState(enReceso ? 'permanente' : 'todos');
            const normNombre = (s) => (s || '')
                .normalize('NFD').replace(/[̀-ͯ]/g, '')
                .toLowerCase().trim();
            // Filtramos por legislador_id (no por nombre) para evitar mismatch
            // entre formatos "Nombre Apellido" del roster y "Apellido Nombre"
            // de la BD de Diputados, además de versiones cortas/largas
            // ("Lilly Téllez" vs "Lilly Téllez García"). Los IDs son la única
            // fuente de verdad confiable.
            const permanenteIdSet = useMemo(() => {
                const ints = data.permanente?.integrantes;
                if (!Array.isArray(ints)) return null;
                return new Set(ints.map(i => i.legislador_id).filter(x => x != null));
            }, [data]);
            const permanenteCount = data.permanente?.integrantes?.length || 0;

            // Permanente son 74 integrantes pero el filtro es client-side
            // contra data.permanente.nombres_norm. Si pedimos solo los top 250
            // del worker, casi ninguno de Permanente cae ahí (especialmente
            // Diputados, que rankean bajo en hit_rate). Necesitamos traer
            // TODO el universo LXVI (~628 leg.) para que el filtro funcione.
            const LIMITE = vista === 'permanente' ? 1500 : 50;

            useEffect(() => {
                const t = setTimeout(() => { setFQ(qInput.trim()); setPaginaRadar(1); }, 350);
                return () => clearTimeout(t);
            }, [qInput]);

            useEffect(() => {
                let cancelado = false;
                setCargando(true);
                setError(null);
                const params = new URLSearchParams({
                    pagina: String(vista === 'permanente' ? 1 : pagina),
                    limite: String(LIMITE),
                    sort: fSort,
                });
                if (fCamara) params.set('camara', fCamara);
                if (fPartido) params.set('partido', fPartido);
                if (fCategoria) params.set('categoria', fCategoria);
                if (fQ) params.set('q', fQ);

                fetch(`${WORKER_URL}/radar?${params.toString()}`)
                    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
                    .then(json => {
                        if (cancelado) return;
                        let legs = json.legisladores || [];
                        let totalReal = json.total || 0;
                        let pagsReal = json.total_paginas || 1;
                        // Filtro client-side cuando sub-pestaña = permanente.
                        // El worker no conoce el roster Permanente; lo filtramos aquí
                        // contra data.permanente.nombres_norm. Por eso pedimos limite=250.
                        if (vista === 'permanente' && permanenteIdSet) {
                            legs = legs.filter(l => permanenteIdSet.has(l.id));
                            totalReal = legs.length;
                            pagsReal = 1;
                        }
                        setLegisladores(legs);
                        setTotal(totalReal);
                        setTotalPaginas(pagsReal);
                        if (json.meta) setMeta(json.meta);
                    })
                    .catch(e => { if (!cancelado) setError(e.message); })
                    .finally(() => { if (!cancelado) setCargando(false); });
                return () => { cancelado = true; };
            }, [pagina, fCamara, fPartido, fCategoria, fQ, fSort, vista]);

            const limpiarFiltros = () => {
                setFCamara(''); setFPartido(''); setFCategoria('');
                setQInput(''); setFQ(''); setFSort('hit_rate'); setPaginaRadar(1);
            };

            const hayFiltros = fCamara || fPartido || fCategoria || fQ || fSort !== 'hit_rate';

            const chips = [];
            if (fCamara) chips.push({ k: 'camara', label: fCamara, clear: () => setFCamara('') });
            if (fPartido) chips.push({ k: 'partido', label: fPartido, clear: () => setFPartido('') });

            if (fQ) chips.push({ k: 'q', label: `"${fQ}"`, clear: () => { setQInput(''); setFQ(''); } });

            return (
                <div className="space-y-4">
                    {/* Header */}
                    <div className="flex items-end justify-between gap-3 flex-wrap">
                        <div>
                            <div className="flex items-center gap-2 mb-1">
                                <h2 className="text-lg font-bold text-gray-800">Radar de Legisladores</h2>
                                <span className="px-2 py-0.5 text-[10px] font-semibold rounded-full bg-gradient-to-r from-purple-500 to-indigo-500 text-white tracking-wide">BETA</span>
                            </div>
                            <p className="text-xs text-gray-500">
                                {vista === 'permanente'
                                    ? 'Solo integrantes de la Comisión Permanente · sesiones miércoles · 2do receso LXVI'
                                    : 'Player props legislativos · LXVI completa · hit rate, proyecciones 15d y matchup vs comisión dictaminadora'}

                        </div>
                        <div className="flex items-center gap-3 text-[11px] text-gray-500">
                            {cargando ? (
                                <span className="inline-flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-acento animate-pulse"></span>Cargando…</span>

                            <div><span className="font-semibold">Matchup</span> — Calificación (A–F) que mide qué tan activamente dictamina la comisión principal del legislador. A = la comisión resuelve rápido, F = la mayoría de asuntos se quedan en pendiente. Basada en tasa de dictamen relativa entre comisiones.</div>
                        </div>

                    {/* Filter bar: search + selects (sin card blanca) */}
                    <div className="space-y-2">
                        <div className="flex items-center gap-2 flex-wrap">
                            <div className="relative flex-1 min-w-[180px]">
                                <svg className="w-3.5 h-3.5 text-gray-400 absolute left-2.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                <input type="text" value={qInput} onChange={e => setQInput(e.target.value)} placeholder="Buscar legislador…"

                                return (
                                    <div className="hidden md:grid grid-cols-[minmax(0,2.1fr)_0.85fr_0.85fr_0.85fr_0.85fr_0.8fr_0.75fr_0.85fr] gap-2 px-3 py-2 border-b-2 border-gray-300 text-[10px] uppercase tracking-wider text-gray-500 font-bold font-mono">

                                        <SortableHeader sortKey="hit_rate" label="Hit rate" tip="% de los últimos picos mediáticos en su categoría donde respondió presentando un instrumento dentro de 7 días." />
                                        <SortableHeader sortKey="iniciativas" label="Ini 15d" tip="Iniciativas proyectadas en los próximos 15 días según ritmo LXVI." />
                                        <SortableHeader sortKey="proposiciones" label="Prop 15d" tip="Proposiciones proyectadas en los próximos 15 días." />
                                        <SortableHeader sortKey="iniciativas_indiv" label="Iniciativas" tip="Iniciativas LXVI como promovente único. Sin firmas con bancada." />
                                        <SortableHeader sortKey="matchup" label="Matchup" tip="Grado vs. comisión dictaminadora (A rápida, F lenta). Ordenar A→F." />
                                        <SortableHeader sortKey="efectividad" label="Efectividad" tip="Tasa de éxito: aprobados / (aprobados + desechados). Universal, refleja resultados reales." />

                            <span className="text-xs text-gray-500">Página {pagina} de {totalPaginas}</span>

                                className="px-3 py-1.5 text-xs rounded-lg border border-gray-200 bg-white hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">Siguiente →</button>

                    {/* Player modal */}

                        <RadarPlayerModal leg={legSeleccionado} autoria={data.autoria || {}} onClose={() => setLegSeleccionado(null)} />
                    )}
                </div>
            );
        }

        /* Helper compartido con consola-pro: rol institucional MÁS ALTO de un legislador.
           Usa organos_gobierno (mesa_directiva, jucopo) + comisiones_cargo (Pres. Comisión X). */
        function _rolInstitucional(leg) {
          const organos = Array.isArray(leg.organos_gobierno) ? leg.organos_gobierno : [];
          const camCorta = (leg.camara || '').replace('Cámara de ', '').toLowerCase();
          const camLabel = camCorta.includes('senad') ? 'Senado' : 'Diputados';
          const norm = (org) => (org || '').replace(/_senado$/, '');
          const find = (orgBase, rol) =>
            organos.find(o => norm(o.organo) === orgBase && o.rol === rol);
          if (find('mesa_directiva', 'Presidencia'))
            return { label: `Presidencia de la ${camLabel}`,
                     tooltip: `Preside la ${camLabel}. Su rol institucional sesga la agenda.` };
          if (find('jucopo', 'Presidencia'))
            return { label: `Presidencia JUCOPO ${camLabel}`,
                     tooltip: `Preside la Junta de Coordinación Política del ${camLabel}.` };
          if (find('mesa_directiva', 'Vicepresidencia'))
            return { label: `Vicepresidencia ${camLabel}`,
                     tooltip: `Vicepresidencia de la Mesa Directiva del ${camLabel}.` };
          if (find('jucopo', 'Coordinador'))
            return { label: `Coordinador ${leg.partido || 'Bancada'} en JUCOPO ${camLabel}`,
                     tooltip: `Coordinador del Grupo Parlamentario en JUCOPO ${camLabel}.` };
          if (find('jucopo', 'Vicecoordinador'))
            return { label: `Vicecoord. ${leg.partido || 'Bancada'} en JUCOPO ${camLabel}`,
                     tooltip: `Vicecoordinador del Grupo Parlamentario en JUCOPO ${camLabel}.` };
          if (find('jucopo', 'Subcoordinador'))
            return { label: `Subcoord. ${leg.partido || 'Bancada'} en JUCOPO ${camLabel}`,
                     tooltip: `Subcoordinador del Grupo Parlamentario en JUCOPO ${camLabel}.` };
          if (find('mesa_directiva', 'Secretaría'))
            return { label: `Secretaría Mesa ${camLabel}`,
                     tooltip: `Secretaría de la Mesa Directiva del ${camLabel}.` };
          const cc = leg.comisiones_cargo || '';
          if (cc) {
            for (const p of cc.split('|')) {
              const [com, cargo] = p.split(':');
              if (cargo && /presiden/i.test(cargo)) {
                const nombreCom = (com || '').trim();
                if (nombreCom && nombreCom.toUpperCase() !== 'A LAS QUE PERTENECE')
                  return { label: `Preside ${nombreCom}`,
                           tooltip: `Preside la Comisión de ${nombreCom}.` };
              }
            }
          }
          return null;
        }

        function RolBadge({ leg }) {
          const r = _rolInstitucional(leg);
          if (!r) return null;
          const tot = leg.aprobados_total;
          const propia = leg.aprobados_en_propia;
          const muestraAsoc = (
            r.label.startsWith('Preside ')
            && tot != null && tot > 0 && propia != null
          );
          const pct = muestraAsoc ? Math.round((propia / tot) * 100) : null;
          return (
            <div className="mt-0.5">
              <div className="text-[10px] font-bold text-gray-700 inline-flex items-center gap-1"
                title={r.tooltip}>
                <span className="text-amber-500">★</span>
                <span>{r.label}</span>
              </div>
              {muestraAsoc && (
                <div className="text-[9px] text-gray-500 mt-0.5"
                  title={`${propia} de ${tot} aprobados pasaron por la comisión que preside (${pct}%). Asociación alta puede indicar sesgo.`}>
                  · {propia} de {tot} aprobados pasaron por su comisión
                </div>
              )}
            </div>
          );
        }

        function RadarRow({ leg, onClick }) {
            const nombreFmt = formatNombreLegislador(leg);
            const foto = leg.foto_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(nombreFmt || '?')}&background=e5e7eb&color=374151&size=96`;
            const hitPct = leg.hit_rate != null ? Math.round(leg.hit_rate * 100) : null;
            const hitColor = hitPct == null ? 'text-gray-400' : hitPct >= 50 ? 'text-emerald-600' : hitPct >= 25 ? 'text-amber-600' : 'text-gray-500';
            const iniProy = leg.iniciativas_proy_15d != null ? Number(leg.iniciativas_proy_15d).toFixed(1) : '—';
            const propProy = leg.proposiciones_proy_15d != null ? Number(leg.proposiciones_proy_15d).toFixed(1) : '—';
            const l3pTotal = (leg.l3p_iniciativas ?? 0) + (leg.l3p_proposiciones ?? 0);
            const grade = leg.matchup_grade;
            const gradeStyle = grade === 'A' ? 'text-emerald-600' : grade === 'B' ? 'text-lime-600' : grade === 'C' ? 'text-amber-600' : grade === 'D' ? 'text-orange-600' : grade === 'F' ? 'text-red-600' : 'text-gray-400';
            /* Efectividad — Wilson 95% LB (mayo 15). Antes era tasa cruda
               (aprob/resueltos) que daba 100% a 1/1 (Imelda) y mentía sobre
               productividad. Wilson penaliza automáticamente muestras chicas:
               1/1 → 5%, 5/29 → 7%, 20/30 → 49%. */
            const aprob = (leg.n_ini_aprob_ind ?? 0) + (leg.n_ini_aprob_col ?? 0)
                          + (leg.n_prop_aprob_ind ?? 0) + (leg.n_prop_aprob_col ?? 0);
            const desech = (leg.n_ini_desech_ind ?? 0) + (leg.n_ini_desech_col ?? 0)
                           + (leg.n_prop_desech_ind ?? 0) + (leg.n_prop_desech_col ?? 0);
            const resueltos = aprob + desech;
            let efInd = null;
            if (resueltos >= 1) {
                const p = aprob / resueltos, n = resueltos, z = 1.96;
                const denom = 1 + (z * z) / n;
                const center = p + (z * z) / (2 * n);
                const margin = z * Math.sqrt((p * (1 - p)) / n + (z * z) / (4 * n * n));
                efInd = Math.round(Math.max(0, (center - margin) / denom) * 100);
            }
            const efColor = efInd == null ? 'text-gray-400' : efInd >= 40 ? 'text-emerald-600' : efInd >= 20 ? 'text-lime-600' : efInd >= 10 ? 'text-amber-600' : 'text-red-600';

            return (
                <div onClick={onClick}
                    className="grid grid-cols-[minmax(0,1fr)] md:grid-cols-[minmax(0,2.1fr)_0.85fr_0.85fr_0.85fr_0.85fr_0.8fr_0.75fr_0.85fr] gap-2 px-3 py-3 hover:bg-acento/5 cursor-pointer transition-colors items-center">
                    {/* Player */}
                    <div className="flex items-center gap-2.5 min-w-0">
                        <img src={foto} alt={nombreFmt}
                            onError={(e) => { e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nombreFmt || '?')}&background=e5e7eb&color=374151&size=96`; }}
                            className="w-10 h-10 rounded-full object-cover bg-gray-100 flex-shrink-0 border border-gray-200" />
                        <div className="min-w-0 flex-1">
                            <div className="text-sm font-semibold text-gray-800 truncate" title={nombreFmt}>{nombreFmt}</div>
                            <div className="flex items-center gap-1.5 mt-0.5">
                                <PartidoBadge partido={leg.partido} size="sm" />
                                <span className="text-[10px] text-gray-500 truncate font-mono">
                                    {(leg.camara || '').replace('Cámara de ', '')}
                                    {leg.estado ? ` · ${leg.estado}` : ''}
                                </span>
                            </div>
                            <RolBadge leg={leg} />
                        </div>
                    </div>

                    {/* Mobile: stats row under player */}
                    <div className="md:hidden grid grid-cols-5 gap-1 mt-1 text-center">
                        <div><div className="text-[8px] uppercase text-gray-400">Efect.</div><div className={`text-sm font-black font-mono ${efColor}`}>{efInd != null ? efInd : '—'}</div></div>
                        <div><div className="text-[8px] uppercase text-gray-400">Hit</div><div className={`text-sm font-bold font-mono ${hitColor}`}>{hitPct != null ? `${hitPct}%` : '—'}</div></div>
                        <div><div className="text-[8px] uppercase text-gray-400">Ini</div><div className="text-sm font-bold text-gray-800 font-mono">{iniProy}</div></div>
                        <div><div className="text-[8px] uppercase text-gray-400">Prop</div><div className="text-sm font-bold text-gray-800 font-mono">{propProy}</div></div>
                        <div><div className="text-[8px] uppercase text-gray-400">Match</div><div className={`text-sm font-black font-mono ${gradeStyle}`}>{grade || '—'}</div></div>
                    </div>

                    {/* Desktop columns */}
                    <div className="hidden md:block text-center">
                        {leg.categoria_dominante ? (
                            <span className="text-[11px] text-gray-500 truncate block font-mono" title={leg.categoria_dominante}>
                                {_catLabel(leg.categoria_dominante)}
                            </span>
                        ) : <span className="text-xs text-gray-400">—</span>}
                    </div>
                    <div className="hidden md:block text-center">
                        <HitRateGaugeMini value={leg.hit_rate} />
                    </div>
                    <div className="hidden md:block text-center">
                        <div className="text-base font-bold text-gray-800 leading-tight font-mono">{iniProy}</div>
                    </div>
                    <div className="hidden md:block text-center">
                        <div className="text-base font-bold text-gray-800 leading-tight font-mono">{propProy}</div>
                    </div>
                    <div className="hidden md:block text-center" title={(() => {
                        /* Columna "Iniciativas" — número total presentadas como
                           promovente único en la LXVI. Diputados usan n_ini_iniciante,
                           senadores l3p_iniciativas. El tooltip muestra contexto:
                           proposiciones y desglose por estado. */
                        const isDip = (leg.n_ini_iniciante ?? 0) > 0 || (leg.n_prop_proponente ?? 0) > 0;
                        const ini_ind = isDip ? (leg.n_ini_iniciante ?? 0) : Math.round(leg.l3p_iniciativas ?? 0);
                        const prop_ind = isDip ? (leg.n_prop_proponente ?? 0) : Math.round(leg.l3p_proposiciones ?? 0);
                        const ia_i = leg.n_ini_aprob_ind ?? 0;
                        const ip_i = leg.n_ini_pend_ind ?? 0;
                        const id_i = leg.n_ini_desech_ind ?? 0;
                        return `LXVI — Como promovente único\n` +

                            `  Pendientes: ${ip_i}\n` +
                            `  Desechadas: ${id_i}\n` +
                            `Proposiciones: ${prop_ind}`;
                    })()}>
                        {(() => {

                            const ini_ind = isDip ? (leg.n_ini_iniciante ?? 0) : Math.round(leg.l3p_iniciativas ?? 0);

        function ComisionesLegislador({ raw, dark = false }) {
            // Parsea el string "Cambio Climático y Sostenibilidad:Presidente|Radio y Televisión:Integrante|Turismo:Integrante"
            // y lo pinta con iconografía diferenciada por cargo.
            // Orden: Presidencias primero, luego Secretarías, luego Integrante. Máx 6.
            if (!raw || typeof raw !== 'string') return null;
            const partes = raw.split('|').map(p => {
                const [comision, cargoRaw] = p.split(':').map(x => (x || '').trim());
                if (!comision) return null;
                const cargo = (cargoRaw || 'Integrante').toLowerCase();
                let tier = 2; // integrante
                if (cargo.includes('presid')) tier = 0;
                else if (cargo.includes('secretar')) tier = 1;
                return { comision, cargo: cargoRaw || 'Integrante', tier };
            }).filter(Boolean);
            if (!partes.length) return null;
            partes.sort((a, b) => a.tier - b.tier);
            const visible = partes.slice(0, 6);
            const extra = partes.length - visible.length;

            const cargoIcon = {
                0: '★', // Presidente
                1: '◆', // Secretario
                2: '·', // Integrante
            };
            const cargoLabel = {
                0: 'Preside',
                1: 'Secretaría',
                2: 'Integrante',
            };
            // Colores: dark = sobre fondo oscuro del header modal; light = sobre fondo claro.
            const baseClass = dark
                ? 'bg-white/10 text-white/90 border-white/10'
                : 'bg-gray-100 text-gray-800 border-gray-200';
            const presideClass = dark
                ? 'bg-amber-400/20 text-amber-200 border-amber-400/30'
                : 'bg-amber-100 text-amber-800 border-amber-200';
            const secretariaClass = dark
                ? 'bg-sky-400/20 text-sky-200 border-sky-400/30'
                : 'bg-sky-100 text-sky-800 border-sky-200';
            const labelClass = dark ? 'text-white/50' : 'text-gray-500';

            return (
                <div className="mt-2">
                    <div className={`text-[9px] uppercase tracking-wider font-bold ${labelClass} mb-1`}>Comisiones</div>
                    <div className="flex flex-wrap gap-1">
                        {visible.map((c, i) => {
                            const cls = c.tier === 0 ? presideClass : c.tier === 1 ? secretariaClass : baseClass;
                            return (
                                <span key={i}
                                    className={`inline-flex items-center gap-1 px-1.5 py-0.5 text-[10px] rounded border ${cls}`}
                                    title={`${cargoLabel[c.tier]} — ${c.comision}`}>
                                    <span className="font-bold">{cargoIcon[c.tier]}</span>
                                    <span className="truncate max-w-[200px]">{c.comision}</span>
                                </span>
                            );
                        })}
                        {extra > 0 && (
                            <span className={`inline-flex items-center px-1.5 py-0.5 text-[10px] rounded ${baseClass}`}>
                                +{extra}
                            </span>
                        )}
                    </div>
                </div>
            );
        }

        function RadarPlayerModal({ leg, autoria, onClose }) {
            const [tab, setTab] = useState('overview');
            const partidoColor = PARTIDO_COLORS[leg.partido] || '#6B7280';
            const foto = leg.foto_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(leg.nombre || '?')}&background=e5e7eb&color=374151&size=256`;
            const hitPct = leg.hit_rate != null ? Math.round(leg.hit_rate * 100) : null;
            const iniProy = leg.iniciativas_proy_15d != null ? Number(leg.iniciativas_proy_15d).toFixed(1) : '—';
            const propProy = leg.proposiciones_proy_15d != null ? Number(leg.proposiciones_proy_15d).toFixed(1) : '—';
            const l3pIni = leg.l3p_iniciativas ?? 0;
            const l3pProp = leg.l3p_proposiciones ?? 0;
            const grade = leg.matchup_grade;
            const gradeColor = grade === 'A' ? 'text-emerald-500' : grade === 'B' ? 'text-lime-600' : grade === 'C' ? 'text-amber-500' : grade === 'D' ? 'text-orange-500' : grade === 'F' ? 'text-red-500' : 'text-gray-400';
            const gradeLabel = { A: 'EXCELENTE', B: 'BUENO', C: 'REGULAR', D: 'BAJO', F: 'DIFÍCIL' }[grade] || '';

            // Close on escape
            useEffect(() => {
                const h = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', h);
                return () => window.removeEventListener('keydown', h);
            }, [onClose]);

            // Build predictor data: in which categories does this legislator appear?
            const legPredictor = useMemo(() => {
                if (!autoria) return [];
                const nombreLeg = (leg.nombre || '').toLowerCase().trim();
                const hits = [];
                for (const [cat, legs] of Object.entries(autoria)) {
                    const found = legs.find(l => (l.nombre || '').toLowerCase().trim() === nombreLeg);
                    if (found) {
                        hits.push({ categoria: cat, score: found.score, docs: found.docs_categoria, comisiones_afines: found.comisiones_afines, desglose: found.desglose });
                    }
                }
                hits.sort((a, b) => b.score - a.score);
                return hits;
            }, [leg.nombre, autoria]);

            const tabs = [
                { k: 'overview', label: 'Overview' },
                { k: 'efectividad', label: 'Efectividad' },
                { k: 'matchup', label: 'Matchup' },
                { k: 'hit_rate', label: 'Hit Rate' },
                { k: 'predictor', label: 'Predictor' },
                { k: 'perfil', label: 'Perfil' },
                // Tab Trayectoria solo aparece si el legislador es reelecto LXIV/LXV
                ...(leg.marcador_continuidad ? [{ k: 'trayectoria', label: 'Trayectoria' }] : []),

            return (
                <div className="fixed inset-0 z-50 flex items-start md:items-center justify-center bg-black/50 backdrop-blur-sm p-0 md:p-4" onClick={onClose}>

                        {/* Header */}
                        <div className="relative bg-gradient-to-br from-black to-gray-900 text-white p-4 md:p-5">
                            <button onClick={onClose} className="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white/80 hover:text-white transition-colors">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                            <div className="flex items-start gap-4">
                                <img src={foto} alt={formatNombreLegislador(leg)}
                                    onError={(e) => { e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(formatNombreLegislador(leg) || '?')}&background=374151&color=ffffff&size=256`; }}
                                    className="w-16 h-16 md:w-20 md:h-20 rounded-full object-cover bg-gray-700 border-2 border-white/20 flex-shrink-0" />
                                <div className="flex-1 min-w-0 pr-8">
                                    <div className="text-xl md:text-2xl font-bold leading-tight truncate" title={formatNombreLegislador(leg)}>{formatNombreLegislador(leg)}</div>
                                    <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                                        <PartidoBadge partido={leg.partido} size="lg" />
                                        <span className="text-xs text-white/80">{(leg.camara || '').replace('Cámara de ', '')}</span>
                                        {leg.estado && <span className="text-xs text-white/60">· {leg.estado}</span>}
                                        {leg.distrito && <span className="text-xs text-white/60">· {leg.distrito}</span>}
                                    </div>
                                    {leg.categoria_dominante && (
                                        <div className="mt-2 inline-block px-2 py-0.5 text-[11px] rounded bg-white/10 text-white/90 font-medium">
                                            Tema dominante: {_catLabel(leg.categoria_dominante)}
                                        </div>
                                    )}
                                    <ComisionesLegislador raw={leg.comisiones_cargo} dark />
                                </div>
                                {grade && (
                                    <div className="flex flex-col items-center justify-center flex-shrink-0">
                                        <div className={`text-3xl font-black leading-none ${gradeColor}`}>{grade}</div>
                                        <div className={`text-[9px] font-bold tracking-wider mt-0.5 ${gradeColor}`}>{gradeLabel}</div>
                                    </div>
                                )}
                            </div>

                            {/* Headline stats */}
                            <div className="grid grid-cols-4 gap-2 mt-4">
                                {(() => {
                                    /* Efectividad con nueva fórmula: tasa éxito = aprob / (aprob+desech) × 100 */
                                    const aprob = (leg.n_ini_aprob_ind ?? 0) + (leg.n_ini_aprob_col ?? 0)
                                                  + (leg.n_prop_aprob_ind ?? 0) + (leg.n_prop_aprob_col ?? 0);
                                    const desech = (leg.n_ini_desech_ind ?? 0) + (leg.n_ini_desech_col ?? 0)
                                                   + (leg.n_prop_desech_ind ?? 0) + (leg.n_prop_desech_col ?? 0);
                                    const resueltos = aprob + desech;
                                    const ef = resueltos >= 1 ? Math.round((aprob / resueltos) * 100) : null;
                                    return (
                                        <div className="bg-white/10 rounded-lg p-2.5 text-center" title={ef != null ? `${aprob} aprobado(s) de ${resueltos} resueltos` : 'Sin resoluciones aún en LXVI'}>
                                            <div className="text-[9px] uppercase tracking-wider text-white/60 font-bold">Efectividad</div>
                                            <div className="text-xl font-bold mt-0.5 font-mono">{ef != null ? ef : '—'}{ef != null && <span className="text-xs text-white/50">/100</span>}</div>
                                            <div className="text-[10px] text-white/60 font-mono">{ef != null ? `${aprob} aprob / ${resueltos} resueltos` : 'sin resoluciones'}</div>
                                        </div>
                                    );
                                })()}
                                <div className="bg-white/10 rounded-lg p-2.5 text-center">
                                    <div className="text-[9px] uppercase tracking-wider text-white/60 font-bold">Hit rate</div>
                                    <div className="text-xl font-bold mt-0.5 font-mono">{hitPct != null ? `${hitPct}%` : '—'}</div>
                                    <div className="text-[10px] text-white/60 font-mono">{leg.hit_respondio ?? 0}/{leg.hit_total ?? 0} picos</div>
                                </div>
                                {/* Para diputados usa diputado_instrumento (fuente
                                    oficial SITL). Para senadores usa l3p_* del scrape
                                    senado.gob.mx. NO MEZCLAR — antes había contradicción
                                    KPI 23 vs Desglose 24 porque ambos usaban fuentes distintas. */}
                                {(() => {
                                    const isDip = (leg.n_ini_iniciante ?? 0) > 0 || (leg.n_prop_proponente ?? 0) > 0
                                                  || (leg.n_ini_de_grupo ?? 0) > 0 || (leg.n_prop_de_grupo ?? 0) > 0;
                                    const iniSolo = isDip ? (leg.n_ini_iniciante ?? 0) : Math.round(leg.l3p_iniciativas ?? 0);
                                    const iniBanc = isDip
                                        ? (leg.n_ini_adherente ?? 0) + (leg.n_ini_de_grupo ?? 0)
                                        : Math.round(leg.l3p_iniciativas_col ?? 0);
                                    const propSolo = isDip ? (leg.n_prop_proponente ?? 0) : Math.round(leg.l3p_proposiciones ?? 0);
                                    const propBanc = isDip
                                        ? (leg.n_prop_adherente ?? 0) + (leg.n_prop_de_grupo ?? 0)
                                        : Math.round(leg.l3p_proposiciones_col ?? 0);
                                    return (
                                        <>
                                            <div className="bg-white/10 rounded-lg p-2.5 text-center" title="Iniciativas presentadas como promovente único. El '+N bancada' suma adherente y de grupo cuando aplica.">
                                                <div className="text-[9px] uppercase tracking-wider text-white/60 font-bold">Ini · solo</div>
                                                <div className="text-xl font-bold mt-0.5 font-mono">{iniSolo}</div>
                                                <div className="text-[10px] text-white/60 font-mono">+{iniBanc} bancada</div>

                        {/* Tabs */}

                        {/* Tab body */}
