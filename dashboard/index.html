                    <div className="flex items-center gap-2">
                        <span className="text-[9px] font-mono text-gray-400">[{String(idx).padStart(2, "0")}]</span>
                        <span className="text-[10px] font-mono uppercase tracking-widest font-bold text-gray-700">{label}</span>
                    </div>
                    {badge ? badge : sub && <span className="text-[9px] font-mono text-gray-400">{sub}</span>}
                </div>
            );
        }

        function PageResolucionesInner({ data }) {
            const [semanaIdx, setSemanaIdx] = useState(null);
            const [calib, setCalib] = useState(null);
            const [calibError, setCalibError] = useState(false);
            const [backtest, setBacktest] = useState(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const brierChartRef = useRef(null);
            const brierChartInst = useRef(null);
            const resoluciones = data.resoluciones || { accuracy_global: 0, semanas: [] };
            const semanas = resoluciones.semanas || [];

            // Cargar calibracion.json + backtest.json
            useEffect(() => {
                fetch("calibracion.json?t=" + Date.now())
                    .then(r => r.ok ? r.json() : Promise.reject(r.status))
                    .then(setCalib)
                    .catch(() => setCalibError(true));
                fetch("backtest.json?t=" + Date.now())
                    .then(r => r.ok ? r.json() : Promise.reject(r.status))
                    .then(setBacktest)
                    .catch(() => {});
            }, []);

            // Sparkline Brier rodante
            useEffect(() => {
                if (!backtest || !brierChartRef.current) return;
                if (brierChartInst.current) brierChartInst.current.destroy();
                const rolling = backtest.rolling_30d || [];
                if (!rolling.length) return;
                brierChartInst.current = new Chart(brierChartRef.current, {
                    type: "line",
                    data: {
                        labels: rolling.map(r => r.fecha.slice(5)),
                        datasets: [{
                            data: rolling.map(r => r.brier),
                            borderColor: "#2e7d32",
                            backgroundColor: "rgba(46,125,50,0.08)",
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.3,
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                titleFont: { family: "JetBrains Mono, ui-monospace, monospace", size: 10 },
                                bodyFont: { family: "JetBrains Mono, ui-monospace, monospace", size: 10 },
                                callbacks: {
                                    title: (items) => rolling[items[0].dataIndex].fecha,
                                    label: (item) => `Brier ${item.parsed.y.toFixed(3)} · n=${rolling[item.dataIndex].n}`,
                                }
                            }
                        },
                        scales: {
                            y: { min: 0, max: 1, ticks: { font: { size: 9, family: "JetBrains Mono, ui-monospace, monospace" }, stepSize: 0.25 }, grid: { color: "rgba(0,0,0,0.04)" } },
                            x: { ticks: { font: { size: 8, family: "JetBrains Mono, ui-monospace, monospace" }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { display: false } },
                        }
                    }
                });
                return () => { if (brierChartInst.current) brierChartInst.current.destroy(); };
            }, [backtest]);

            // Auto-select última semana
            useEffect(() => {
                if (semanas.length > 0 && semanaIdx === null) setSemanaIdx(semanas.length - 1);
            }, [semanas.length]);
            const semanaActual = semanaIdx !== null ? semanas[semanaIdx] : null;

            // Chart de precisión semanal (estilo terminal monospace)
            useEffect(() => {
                if (!chartRef.current || semanas.length === 0) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const labels = semanas.map(s => "W" + s.semana.split("-W")[1]);
                const colors = semanas.map((s, i) => {
                    if (i === semanaIdx) return "#111827";
                    return s.accuracy >= 70 ? "#2e7d32" : s.accuracy >= 50 ? "#c6972b" : "#dc2626";
                });
                chartInstance.current = new Chart(chartRef.current, {
                    type: "bar",
                    data: { labels, datasets: [{ data: semanas.map(s => s.accuracy), backgroundColor: colors, borderRadius: 2, barPercentage: 0.7 }] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            y: { min: 0, max: 100, ticks: { callback: v => v + "%", font: { size: 10, family: "JetBrains Mono, ui-monospace, monospace" } }, grid: { color: "rgba(0,0,0,0.04)" } },
                            x: { grid: { display: false }, ticks: { font: { size: 10, family: "JetBrains Mono, ui-monospace, monospace" } } },
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                titleFont: { family: "JetBrains Mono, ui-monospace, monospace", size: 11 },
                                bodyFont: { family: "JetBrains Mono, ui-monospace, monospace", size: 11 },
                                callbacks: { label: ctx => `${ctx.parsed.y.toFixed(1)}% acierto` }
                            }
                        },
                        onClick: (evt, elements) => {
                            if (elements.length > 0) setSemanaIdx(elements[0].index);
                        }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [semanas, semanaIdx]);

            const v14 = calib?.ventana_14d;
            const ga = v14?.global_a;
            const gb = v14?.global_b;
            const hl = calib?.headline;
            const fechaCalc = calib?.fecha_calculo ? new Date(calib.fecha_calculo) : null;
            const fechaCalcStr = fechaCalc ? fechaCalc.toLocaleDateString("es-MX", { day: "2-digit", month: "short", year: "numeric" }) : "—";

            const totalAciertos = semanas.reduce((s, w) => s + w.aciertos, 0);
            const totalEvaluados = semanas.reduce((s, w) => s + w.total, 0);

            return (
                <div className="space-y-3">
                    {/* STATUS BAR */}
                    <div className="flex items-center justify-between text-[10px] font-mono text-gray-500 px-1">
                        <div className="flex items-center gap-2">
                            <span className={`inline-block w-1.5 h-1.5 rounded-full ${calib ? "bg-emerald-500" : calibError ? "bg-rose-500" : "bg-gray-300"} ${calib ? "" : "animate-pulse"}`}></span>
                            <span className="uppercase tracking-widest font-bold">{calib ? "modelo calibrado" : calibError ? "calibración no disponible" : "cargando…"}</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <span>últ · {fechaCalcStr}</span>
                            <span className="text-gray-300">·</span>
                            <span>próx · dom 10:00 cdmx</span>
                        </div>
                    </div>

                    {/* HERO HEADLINE — mismo lenguaje que "Predicción temporal" */}
                    <div className="relative overflow-hidden bg-gradient-to-br from-gray-900 to-gray-950 text-white rounded-xl shadow-xl" style={{padding: "1rem 1.5rem"}}>
                        <svg className="absolute pointer-events-none" style={{right: "-50px", top: "50%", transform: "translateY(-50%)", width: "260px", height: "260px", opacity: 0.06}} viewBox="0 0 260 260">
                            <circle cx="130" cy="130" r="48" stroke="white" strokeWidth="1" fill="none"/>
                            <circle cx="130" cy="130" r="84" stroke="white" strokeWidth="0.8" fill="none"/>
                            <circle cx="130" cy="130" r="120" stroke="white" strokeWidth="0.6" fill="none"/>
                        </svg>
                        <div className="relative font-mono">
                            <div className="text-[10px] font-bold uppercase tracking-widest text-white/60 mb-1.5">Calibración primaria</div>
                            <div className="text-white/90 text-[13px] leading-snug font-semibold">
                                {hl ? hl.principal : "Calibrando modelo…"}
                            </div>
                            {hl && (
                                <div className="mt-1.5 text-[10px] text-white/50 leading-relaxed">{hl.sub}</div>
                            )}
                        </div>
                    </div>

                    {/* VITAL SIGNS */}
                    {calib && (
                        <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                            <MetricasSectionHeader idx={1} label="vital signs" sub="método (b) hit sobre baseline · ventana 14d" />
                            <div className="grid grid-cols-2 md:grid-cols-6 divide-y md:divide-y-0 md:divide-x divide-gray-100">
                                <VitalCell label="N" value={ga.n.toLocaleString()} hint="predicciones" />
                                <VitalCell label="brier" value={gb.brier.toFixed(3)} hint="↓ mejor" />
                                <VitalCell label="ece" value={gb.ece.toFixed(1)} suffix="pts" hint="error cal." />
                                <VitalCell label="log-loss" value={gb.log_loss.toFixed(3)} hint="↓ mejor" />
                                <VitalCell label="acc · sem" value={resoluciones.accuracy_global.toFixed(1)} suffix="%" hint={`${semanas.length} semanas`} colorful={resoluciones.accuracy_global} />
                                <VitalCell label="hits" value={`${totalAciertos}/${totalEvaluados}`} hint="aciertos sem." />
                            </div>
                        </div>
                    )}

                    {/* GRÁFICAS PRINCIPALES (2 columnas) */}
                    {calib && (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
                            <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                                <MetricasSectionHeader idx={2} label="curva de calibración" sub="hit (b) sobre baseline" />
                                <div className="p-4">
                                    <CurvaCalibracion bins={v14.bins_b} color="#2e7d32" label="Hit B" />
                                    <div className="flex items-center justify-between text-[10px] font-mono text-gray-500 mt-2 px-1">
                                        <span>score promedio · {gb.score_promedio.toFixed(1)}%</span>
                                        <span>hit observado · {gb.hit_rate_observado.toFixed(1)}%</span>
                                    </div>
                                </div>
                            </div>
                            {semanas.length > 0 ? (
                                <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                                    <MetricasSectionHeader idx={3} label="precisión semanal" sub={`últimas ${semanas.length} semanas`} />
                                    <div className="p-4">
                                        <div style={{ height: "240px" }}>
                                            <canvas ref={chartRef}></canvas>
                                        </div>
                                        <div className="text-[10px] font-mono text-gray-400 mt-2 text-center">click una barra para drill-down semanal</div>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white border border-gray-200 rounded-xl p-8 text-center text-[11px] font-mono text-gray-400">
                                    sin data semanal acumulada
                                </div>
                            )}
                        </div>
                    )}

                    {/* DESGLOSE POR CATEGORÍA */}
                    {calib && (
                        <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                            <MetricasSectionHeader idx={4} label="desglose por categoría · top 5 por volumen" sub="método (b) · ventana 14d" />
                            <div className="grid grid-cols-[1.4fr_0.5fr_0.7fr_0.7fr_0.6fr_0.7fr_0.9fr] bg-gray-50/60 px-4 py-2 text-[9px] font-mono font-bold uppercase tracking-widest text-gray-500 border-b border-gray-100">
                                <div>categoría</div>
                                <div className="text-right">n</div>
                                <div className="text-right">scorē</div>
                                <div className="text-right">hit b</div>
                                <div className="text-right">Δ</div>
                                <div className="text-right">brier</div>
                                <div className="text-right">cal · tier</div>
                            </div>
                            {v14.por_categoria.map(c => {
                                const delta = c.metricas_b.hit_rate_observado - c.metricas_b.score_promedio;
                                const dCls = Math.abs(delta) <= 8 ? "text-emerald-600" : Math.abs(delta) <= 18 ? "text-amber-600" : "text-rose-600";
                                const score = Math.max(0, 100 - Math.abs(delta) * 2.5);
                                const filled = Math.round(score / 10);
                                const blockColor = Math.abs(delta) <= 8 ? "bg-emerald-500" : Math.abs(delta) <= 18 ? "bg-amber-500" : "bg-rose-500";
                                return (
                                    <div key={c.categoria} className="grid grid-cols-[1.4fr_0.5fr_0.7fr_0.7fr_0.6fr_0.7fr_0.9fr] px-4 py-2.5 text-xs font-mono border-b border-gray-100 last:border-0 items-center hover:bg-gray-50/40">
                                        <div className="flex items-center gap-1.5 min-w-0">
                                            <span className="text-gray-800 truncate">{c.categoria.replace(/_/g, " ")}</span>
                                            {c.siempre_activa && <span title="categoría con baseline alto" className="flex-shrink-0 text-[8px] px-1 py-px rounded bg-amber-100 text-amber-700 font-bold uppercase tracking-wider">⚑ alta</span>}
                                        </div>
                                        <div className="text-right text-gray-700">{c.n}</div>
                                        <div className="text-right text-gray-700">{c.metricas_b.score_promedio.toFixed(1)}%</div>
                                        <div className="text-right text-gray-700">{c.metricas_b.hit_rate_observado.toFixed(1)}%</div>
                                        <div className={`text-right font-bold ${dCls}`}>{delta > 0 ? "+" : ""}{delta.toFixed(1)}</div>
                                        <div className="text-right text-gray-700">{c.metricas_b.brier.toFixed(3)}</div>
                                        <div className="flex items-center justify-end gap-px">
                                            {Array.from({length: 10}, (_, i) => (
                                                <div key={i} className={`w-1 h-2.5 rounded-sm ${i < filled ? blockColor : "bg-gray-200"}`} />
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* [05] VALIDACIÓN TEMPORAL — walk-forward */}
                    {backtest && (
                        <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                            <MetricasSectionHeader
                                idx={5}
                                label="validación temporal · walk-forward"
                                sub={`rolling ${backtest.ventana_rodante_dias}d · ${backtest.rango.n_pares.toLocaleString()} pares · ${backtest.rango.n_semanas} semanas`}
                            />
                            <div className="p-4 space-y-4">
                                {/* Verdict textual */}
                                <div className={`px-3 py-2 rounded-lg border text-[12px] font-mono leading-relaxed ${
                                    backtest.verdict.tipo === "mejorando" ? "bg-emerald-50 border-emerald-200 text-emerald-900"
                                    : backtest.verdict.tipo === "empeorando" ? "bg-rose-50 border-rose-200 text-rose-900"
                                    : backtest.verdict.tipo === "estable" ? "bg-gray-50 border-gray-200 text-gray-800"
                                    : "bg-amber-50 border-amber-200 text-amber-900"
                                }`}>
                                    <span className="text-[9px] uppercase tracking-widest font-bold mr-2">verdict:</span>
                                    {backtest.verdict.texto}
                                </div>

                                {/* Sparkline Brier rodante */}
                                {backtest.rolling_30d && backtest.rolling_30d.length > 0 && (
                                    <div>
                                        <div className="flex items-baseline justify-between mb-1">
                                            <div className="text-[10px] font-mono uppercase tracking-widest font-bold text-gray-500">brier score rodante 30d</div>
                                            <div className="text-[9px] font-mono text-gray-400">↓ mejor · 0 = perfecto</div>
                                        </div>
                                        <div style={{ height: "120px" }}>
                                            <canvas ref={brierChartRef}></canvas>
                                        </div>
                                    </div>
                                )}

                                {/* Stats comparativos primer cuarto vs último cuarto */}
                                {backtest.rolling_30d && backtest.rolling_30d.length >= 4 && (() => {
                                    const r = backtest.rolling_30d;
                                    const k = Math.max(1, Math.floor(r.length / 4));
                                    const avg = (arr, key) => {
                                        const vals = arr.map(x => x[key]).filter(v => v != null);
                                        return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
                                    };
                                    const brierIni = avg(r.slice(0, k), "brier");
                                    const brierFin = avg(r.slice(-k), "brier");
                                    const llIni = avg(r.slice(0, k), "log_loss");
                                    const llFin = avg(r.slice(-k), "log_loss");
                                    const accIni = avg(r.slice(0, k), "acc_alta_confianza");
                                    const accFin = avg(r.slice(-k), "acc_alta_confianza");
                                    const deltaIni = avg(r.slice(0, k), "delta_calibracion");
                                    const deltaFin = avg(r.slice(-k), "delta_calibracion");

                                    const Row = ({ label, ini, fin, invert, unit }) => {
                                        if (ini == null || fin == null) return null;
                                        const delta = fin - ini;
                                        const mejor = invert ? delta < 0 : delta > 0;
                                        const cls = Math.abs(delta) < (unit === "%" ? 3 : 0.01) ? "text-gray-500" : mejor ? "text-emerald-600" : "text-rose-600";
                                        const signo = delta > 0 ? "+" : "";
                                        const fmt = v => unit === "%" ? `${v.toFixed(1)}%` : v.toFixed(3);
                                        return (
                                            <div className="grid grid-cols-[1.2fr_0.7fr_0.7fr_0.6fr] py-1.5 text-[11px] font-mono border-b border-gray-50 last:border-0 items-center">
                                                <div className="text-gray-700">{label}</div>
                                                <div className="text-right text-gray-700">{fmt(ini)}</div>
                                                <div className="text-right text-gray-700">{fmt(fin)}</div>
                                                <div className={`text-right font-bold ${cls}`}>{signo}{unit === "%" ? delta.toFixed(1) + "pp" : delta.toFixed(3)}</div>
                                            </div>
                                        );
                                    };
                                    return (
                                        <div className="border border-gray-200 rounded-lg overflow-hidden">
                                            <div className="grid grid-cols-[1.2fr_0.7fr_0.7fr_0.6fr] bg-gray-50/60 px-3 py-1.5 text-[9px] font-mono font-bold uppercase tracking-widest text-gray-500 border-b border-gray-100">
                                                <div>métrica</div>
                                                <div className="text-right">primer 25%</div>
                                                <div className="text-right">último 25%</div>
                                                <div className="text-right">Δ</div>
                                            </div>
                                            <div className="px-3">
                                                <Row label="brier score" ini={brierIni} fin={brierFin} invert={true} />
                                                <Row label="log-loss" ini={llIni} fin={llFin} invert={true} />
                                                <Row label="accuracy score ≥70" ini={accIni} fin={accFin} invert={false} unit="%" />
                                                <Row label="delta calibración" ini={deltaIni} fin={deltaFin} invert={true} unit="%" />
                                            </div>
                                        </div>
                                    );
                                })()}

                                {/* Drift por categoría */}
                                {backtest.drift_por_categoria && backtest.drift_por_categoria.length > 0 && (
                                    <div>
                                        <div className="text-[10px] font-mono uppercase tracking-widest font-bold text-gray-500 mb-2">
                                            drift por categoría · primer mes vs último mes
                                        </div>
                                        <div className="border border-gray-200 rounded-lg overflow-hidden">
                                            <div className="grid grid-cols-[1.4fr_0.7fr_0.7fr_0.6fr_0.7fr] bg-gray-50/60 px-3 py-1.5 text-[9px] font-mono font-bold uppercase tracking-widest text-gray-500 border-b border-gray-100">
                                                <div>categoría</div>
                                                <div className="text-right">acc · primer</div>
                                                <div className="text-right">acc · último</div>
                                                <div className="text-right">Δ</div>
                                                <div className="text-right">dirección</div>
                                            </div>
                                            {backtest.drift_por_categoria.slice(0, 8).map(d => {
                                                const cls = d.direccion === "mejora" ? "text-emerald-600" : d.direccion === "empeora" ? "text-rose-600" : "text-gray-500";
                                                const arrow = d.direccion === "mejora" ? "↑" : d.direccion === "empeora" ? "↓" : "→";
                                                return (
                                                    <div key={d.categoria} className="grid grid-cols-[1.4fr_0.7fr_0.7fr_0.6fr_0.7fr] px-3 py-1.5 text-[11px] font-mono border-b border-gray-50 last:border-0 items-center hover:bg-gray-50/40">
                                                        <div className="text-gray-800 truncate">{d.categoria.replace(/_/g, " ")}</div>
                                                        <div className="text-right text-gray-700">{d.hit_primer_mes.toFixed(1)}%</div>
                                                        <div className="text-right text-gray-700">{d.hit_ultimo_mes.toFixed(1)}%</div>
                                                        <div className={`text-right font-bold ${cls}`}>{d.delta > 0 ? "+" : ""}{d.delta.toFixed(1)}pp</div>
                                                        <div className={`text-right font-bold ${cls}`}>{arrow} {d.direccion}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* DRILL-DOWN SEMANAL */}
                    {semanas.length > 0 && (
                        <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                            <MetricasSectionHeader
                                idx={6}
                                label="drill-down semanal"
                                badge={semanaActual && (
                                    <span className="text-[9px] font-mono text-gray-500">
                                        {semanaActual.semana} · {semanaActual.fecha_inicio} ·{" "}
                                        <span className={semanaActual.accuracy >= 70 ? "text-emerald-600 font-bold" : semanaActual.accuracy >= 50 ? "text-amber-600 font-bold" : "text-rose-600 font-bold"}>
                                            {semanaActual.aciertos}/{semanaActual.total} · {semanaActual.accuracy.toFixed(1)}%
                                        </span>
                                    </span>
                                )}
                            />
                            <div className="p-4 space-y-3">
                                <div className="flex gap-1 flex-wrap">
                                    {semanas.map((s, i) => {
                                        const sel = i === semanaIdx;
                                        const c = s.accuracy >= 70 ? "border-emerald-300 text-emerald-700" : s.accuracy >= 50 ? "border-amber-300 text-amber-700" : "border-rose-300 text-rose-700";
                                        return (
                                            <button key={s.semana} onClick={() => setSemanaIdx(i)}
                                                className={`px-2 py-1 text-[10px] font-mono border rounded transition-all ${sel ? "bg-gray-900 text-white border-gray-900" : `bg-white ${c} hover:bg-gray-50`}`}>
                                                W{s.semana.split("-W")[1]} · {s.accuracy.toFixed(0)}%
                                            </button>
                                        );
                                    })}
                                </div>
                                {semanaActual && semanaActual.detalle && (
                                    <div className="border border-gray-200 rounded-lg overflow-hidden">
                                        <div className="grid grid-cols-[1.5fr_0.7fr_0.9fr_0.7fr] bg-gray-50/60 px-3 py-1.5 text-[9px] font-mono font-bold uppercase tracking-widest text-gray-500 border-b border-gray-100">
                                            <div>categoría</div>
                                            <div className="text-right">scorē</div>
                                            <div className="text-right">docs · μ hist</div>
                                            <div className="text-right">veredicto</div>
                                        </div>
                                        {semanaActual.detalle.map((d, i) => {
                                            const cls = d.acierto ? "text-emerald-600" : "text-rose-600";
                                            const tipo = d.tipo === "sobreestimacion" ? "sobreest" : d.tipo === "subestimacion" ? "subest" : (d.tipo || "miss");
                                            return (
                                                <div key={i} className="grid grid-cols-[1.5fr_0.7fr_0.9fr_0.7fr] px-3 py-1.5 text-[11px] font-mono border-b border-gray-50 last:border-0 items-center hover:bg-gray-50/40">
                                                    <div className="text-gray-800 truncate" title={d.nombre}>{d.nombre || d.categoria}</div>
                                                    <div className="text-right text-gray-700">{(d.score_promedio ?? 0).toFixed(1)}%</div>

            const [error, setError] = useState('');
            const [okMsg, setOkMsg] = useState('');
            const esSignup = modo === 'signup';

            const traducir = (m) => {
                m = (m || '').toLowerCase();
                if (m.includes('invalid login')) return 'Correo o contraseña incorrectos.';
                if (m.includes('already registered')) return 'Ese correo ya tiene cuenta. Inicia sesión.';
                if (m.includes('password should be at least')) return 'La contraseña debe tener al menos 6 caracteres.';
                if (m.includes('email not confirmed')) return 'Confirma tu correo antes de entrar (revisa tu bandeja).';
                if (m.includes('unable to validate email')) return 'Correo inválido.';
                return m ? m.charAt(0).toUpperCase() + m.slice(1) : 'Ocurrió un error. Intenta de nuevo.';
            };

            const submit = async (e) => {
                e.preventDefault();
                setError(''); setOkMsg('');
                if (!sb) { setError('Servicio de cuentas no disponible. Recarga la página.'); return; }
                if (!email || !pass) { setError('Escribe tu correo y contraseña.'); return; }
                if (esSignup && !nombre.trim()) { setError('Escribe tu nombre.'); return; }
                setCargando(true);
                try {
                    if (esSignup) {
                        const { data, error } = await sb.auth.signUp({
                            email, password: pass,
                            options: {
                                emailRedirectTo: window.location.origin + '/dashboard',
                                data: { full_name: nombre.trim(), organizacion: org.trim() },
                            },
                        });
                        if (error) { setError(traducir(error.message)); }
                        else if (data.session) { onClose(); }
                        else { setOkMsg('Cuenta creada. Te enviamos un correo para confirmar tu cuenta.'); }
                    } else {
                        const { error } = await sb.auth.signInWithPassword({ email, password: pass });
                        if (error) setError(traducir(error.message));
                        else onClose();
                    }
                } catch (err) { setError('No se pudo conectar. Intenta de nuevo.'); }
                setCargando(false);
            };

            const googleLogin = async () => {
                setError('');
                if (!sb) { setError('Servicio de cuentas no disponible.'); return; }
                const { error } = await sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.origin + '/dashboard' },

                if (error) setError('Google aún no está configurado. Usa tu correo por ahora.');
            };

                                        <svg className="w-5 h-5" viewBox="0 0 24 24">
                                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>

        /* ConsolaProConfigModal — Wizard de 4 pasos.
           Portado de consola-pro.html (Fase 1 de unificación). Reusa los
           helpers ya presentes en index.html (PARTIDO_*, normPartido,
           PartidoBadge, SEMAFORO_COLOR_HEX, formatNombreLegislador,
           _nombreComisionDisplay, MapaSeleccionEstados).
           Cada paso requiere ≥1 selección para avanzar. Botón "Siguiente"
           se vuelve "Listo" en el último paso. */
        function ConsolaProConfigModal({ data, allLegisladores, allComisiones, config, setConfig, onClose }) {
          const PASOS = ['legisladores', 'temas', 'estados', 'comisiones'];
          const PASOS_LABEL = {
            legisladores: 'Legisladores',
            temas:        'Temas',
            estados:      'Estados',
            comisiones:   'Comisiones',
          };
          const [paso, setPaso] = useState(PASOS[0]);
          const [search, setSearch] = useState('');
          const [searchCom, setSearchCom] = useState('');
          const [ordenCom, setOrdenCom] = useState('nombre'); // 'nombre' | 'asuntos'
          const idx = PASOS.indexOf(paso);

          const toggleLeg = (id) => {
            const set = new Set(config.legisladores);
            if (set.has(id)) set.delete(id); else if (set.size < 20) set.add(id);
            setConfig({ ...config, legisladores: Array.from(set) });
          };
          const toggleTema = (cat) => {
            const set = new Set(config.temas);
            if (set.has(cat)) set.delete(cat); else if (set.size < 8) set.add(cat);
            setConfig({ ...config, temas: Array.from(set) });
          };
          const toggleEstado = (key) => {
            const set = new Set(config.estados);
            if (set.has(key)) set.delete(key); else if (set.size < 12) set.add(key);
            setConfig({ ...config, estados: Array.from(set) });
          };
          const toggleComision = (key) => {
            const set = new Set(config.comisiones || []);
            if (set.has(key)) set.delete(key); else if (set.size < 10) set.add(key);
            setConfig({ ...config, comisiones: Array.from(set) });
          };

          /* Validación de avance: cada paso requiere ≥1 selección */
          const counts = {
            legisladores: config.legisladores.length,
            temas:        config.temas.length,
            estados:      config.estados.length,
            comisiones:   (config.comisiones || []).length,
          };
          const limites = { legisladores: 20, temas: 8, estados: 12, comisiones: 10 };
          const puedeAvanzar = counts[paso] >= 1;

          const semaforo = data?.semaforo || [];
          const mapa = data?.mapa || {};

          /* Datos pre-procesados: alfabéticos + divididos por cámara */
          const legPorCamara = useMemo(() => {
            const dip = [], sen = [];
            (allLegisladores || []).forEach(l => {
              const cam = (l.camara || '').toLowerCase();
              if (cam.includes('senad')) sen.push(l); else dip.push(l);
            });
            const sortByName = (a, b) => formatNombreLegislador(a).localeCompare(formatNombreLegislador(b));
            dip.sort(sortByName); sen.sort(sortByName);
            return { dip, sen };
          }, [allLegisladores]);

          /* Agrupado por partido dentro de cada cámara. Devuelve, por
             cámara, un array ordenado (PARTIDO_ORDEN) de grupos
             { key, nombre, legs[] }. Solo grupos con ≥1 legislador. */
          const agruparPorPartido = (lista) => {
            const mapa = {};
            lista.forEach(l => {
              const k = normPartido(l.partido);
              (mapa[k] = mapa[k] || []).push(l);
            });
            return PARTIDO_ORDEN
              .filter(k => mapa[k] && mapa[k].length)
              .map(k => ({ key: k, nombre: PARTIDO_NOMBRE_COMPLETO[k], legs: mapa[k] }));
          };
          const legAgrupados = useMemo(() => ({
            dip: agruparPorPartido(legPorCamara.dip),
            sen: agruparPorPartido(legPorCamara.sen),
          }), [legPorCamara]);

          /* Acordeón: qué grupos de partido están expandidos.
             Default colapsado para que el panel respire ("muy pro"). */
          const [partidosAbiertos, setPartidosAbiertos] = useState({});
          const togglePartido = (camKey, pKey) => {
            const id = camKey + ':' + pKey;
            setPartidosAbiertos(prev => ({ ...prev, [id]: !prev[id] }));
          };

          const temasOrdenados = useMemo(
            () => [...semaforo].sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '')),
            [semaforo]
          );

          /* Temas ordenados por cómo han escalado (Δ ~7d desc), con su
             serie histórica para la mini-gráfica estilo Polymarket. */
          const temasEscalando = useMemo(() => {
            const cats = data?.historial_scores?.categorias || {};
            return [...semaforo].map(s => {
              const serie = (cats[s.categoria]?.scores || []).filter(v => v != null);
              const n = serie.length;
              const prev = n >= 8 ? serie[n - 8] : (n >= 2 ? serie[0] : null);
              const last = n >= 1 ? serie[n - 1] : (s.score_total ?? null);
              const delta = (prev != null && last != null) ? (last - prev) : null;
              return { s, serie, delta };
            }).sort((a, b) => (b.delta ?? -1e9) - (a.delta ?? -1e9));
          }, [semaforo, data]);

          const estadosOrdenados = useMemo(() => {
            return Object.entries(mapa)
              .sort(([, a], [, b]) => (a.nombre || '').localeCompare(b.nombre || ''));
          }, [mapa]);

          const comisionesPorCamara = useMemo(() => {
            const dip = [], sen = [];
            (allComisiones || []).forEach(c => {
              const cam = (c.camara || '').toLowerCase();
              if (cam.includes('senad')) sen.push(c); else dip.push(c);
            });
            const cmp = (a, b) => _nombreComisionDisplay(a.nombre).localeCompare(_nombreComisionDisplay(b.nombre));
            dip.sort(cmp); sen.sort(cmp);
            return { dip, sen };
          }, [allComisiones]);

          /* Filtro por búsqueda dentro de la lista alfabética por cámara */
          const filtrarLegs = (lista) => {
            if (search.length < 2) return lista;
            const q = search.toLowerCase();
            return lista.filter(l => formatNombreLegislador(l).toLowerCase().includes(q));
          };
          const filtrarComs = (lista) => {
            if (searchCom.length < 2) return lista;
            const q = searchCom.toLowerCase();
            return lista.filter(c => (c.nombre || '').toLowerCase().includes(q));
          };

          /* === SUBCOMPONENTES === */

          /* Card de legislador con foto. Click toggle. */
          const LegCard = ({ l }) => {
            const sel = config.legisladores.includes(l.id);
            const nombreFmt = formatNombreLegislador(l);
            const foto = l.foto_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(nombreFmt)}&background=e5e7eb&color=374151&size=64`;
            return (
              <button onClick={() => toggleLeg(l.id)}
                className={`w-full flex items-center gap-2 px-2 py-2 text-left transition rounded-md ${sel ? 'bg-emerald-50 border border-emerald-200' : 'hover:bg-gray-50 border border-transparent'}`}>
                <img src={foto} alt={nombreFmt}
                  onError={e => { e.target.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nombreFmt)}&background=e5e7eb&color=374151&size=64`; }}
                  className="w-9 h-9 rounded-full object-cover bg-gray-100 flex-shrink-0 border border-gray-200" />
                <div className="flex-1 min-w-0">
                  <div className="text-[12px] font-semibold text-gray-800 truncate">{nombreFmt}</div>
                  <div className="flex items-center gap-1 mt-0.5">
                    <PartidoBadge partido={l.partido} size="sm" />
                    {l.estado && <span className="text-[10px] text-gray-500 truncate">{l.estado}</span>}
                  </div>
                </div>

        function ShareButton({ getText, title = 'Fiat Console', shareUrl = 'https://fiatmx.com/consola', size = 16 }) {
          const [done, setDone] = useState(false);
          const handler = (e) => {
            e.stopPropagation();
            const texto = getText ? getText() : title;
            if (navigator.share) {
              navigator.share({ title, text: texto, url: shareUrl }).catch(() => {});
            } else {
              try {
                navigator.clipboard.writeText(`${texto}\n${shareUrl}`);
                setDone(true);
                setTimeout(() => setDone(false), 1500);
              } catch (_) { /* ignore */ }
            }
          };
          return (
            <button onClick={handler} title={title}
              className="text-gray-400 hover:text-acento p-1.5 rounded-lg hover:bg-gray-100 transition-colors flex-shrink-0">
              {done ? (

              ) : (

        /* TickerBar — scroll continuo de los 18 temas con delta + color */
        function TickerBar({ semaforo, historial }) {
          if (!semaforo || semaforo.length === 0) return null;
          /* Calcular delta vs hace 7 días */
          const items = semaforo.map(s => {
            let delta = 0;
            try {
              const ser = historial?.categorias?.[s.categoria]?.scores || [];
              const last = ser[ser.length - 1];
              const prev = ser[Math.max(0, ser.length - 8)];
              if (last != null && prev != null) delta = last - prev;
            } catch(e) {}
            return { ...s, delta };
          });
          const colorTxt = c => c === 'verde' ? '#2e7d32' : c === 'amarillo' ? '#c6972b' : '#c62828';
          const arrow = d => d > 0.5 ? '▲' : d < -0.5 ? '▼' : '→';
          const renderItem = (s, key) => (
            <span key={key} className="inline-flex items-center gap-1.5 mx-3 whitespace-nowrap">
              <span className="w-1.5 h-1.5 rounded-full" style={{background: colorTxt(s.color)}}></span>
              <span className="text-[11px] text-gray-700 font-mono uppercase tracking-wider">{s.nombre}</span>
              <span className="text-[11px] font-bold font-mono" style={{color: colorTxt(s.color)}}>{Math.round(s.score_total)}</span>
              <span className="text-[10px] font-mono" style={{color: s.delta > 0.5 ? '#2e7d32' : s.delta < -0.5 ? '#c62828' : '#9ca3af'}}>{arrow(s.delta)}{Math.abs(s.delta) > 0.1 ? Math.abs(s.delta).toFixed(1) : ''}</span>
              <span className="text-gray-300 ml-2">┃</span>
            </span>
          );
          return (
            <div className="border-y border-gray-200 overflow-hidden py-0.5 relative">
              {/* Dot fijo a la izquierda; sin bg propio (hereda el del page) */}
              <div className="absolute left-0 top-0 bottom-0 z-10 flex items-center pl-3 pr-3">
                <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
              </div>
              {/* Track con scroll · mask con black (no importa el color, solo opacidad) */}
              <div className="overflow-hidden" style={{maskImage: 'linear-gradient(to right, transparent 0%, black 6%, black 94%, transparent 100%)', WebkitMaskImage: 'linear-gradient(to right, transparent 0%, black 6%, black 94%, transparent 100%)'}}>
                <div className="ticker-track flex items-center" style={{paddingLeft: '32px'}}>
                  {[...items, ...items].map((s, i) => renderItem(s, i))}
                </div>
              </div>
            </div>
          );
        }

        /* Fila de tema estilo Polymarket: score grande a la izquierda,
           nombre + momentum al centro, sparkline + Δ7d a la derecha.
           serie = array de scores históricos diarios de la categoría. */
        function TemaRowPM({ t, serie, onClick, rank }) {
          const hex = SEMAFORO_COLOR_HEX[t.color] || '#6B7280';
          const s = Array.isArray(serie) ? serie.filter(v => v != null) : [];
          // Δ de los últimos ~7 días (serie es diaria)
          const n = s.length;
          const prev = n >= 8 ? s[n - 8] : (n >= 2 ? s[0] : null);
          const last = n >= 1 ? s[n - 1] : (t.score_total ?? null);
          const delta = (prev != null && last != null) ? (last - prev) : null;
          const subiendo = delta != null && delta > 0.5;
          const bajando = delta != null && delta < -0.5;
          const arrowCol = subiendo ? '#16a34a' : bajando ? '#dc2626' : '#9ca3af';
          const arrow = subiendo ? '↗' : bajando ? '↘' : '→';
          // Sparkline (últimos 30 puntos)
          const sl = s.slice(-30);
          const W = 112, H = 34;
          let path = '';
          if (sl.length >= 2) {
            const mx = Math.max(...sl), mn = Math.min(...sl), rg = (mx - mn) || 1;
            const stepX = W / (sl.length - 1);
            path = sl.map((v, i) => `${(i * stepX).toFixed(1)},${(H - ((v - mn) / rg) * H).toFixed(1)}`).join(' ');
          }
          return (
            <button onClick={() => onClick(t)}
              className="group w-full flex items-center gap-3 px-2.5 py-3 bg-white hover:bg-gray-50 border-b border-gray-100 last:border-b-0 transition text-left">
              {/* Número de fila (como Polymarket) */}
              <span className="flex-shrink-0 w-5 text-center text-sm text-gray-300 font-medium tabular-nums">{rank}</span>
              {/* Score en el lugar de la imagen (cuadro izquierdo) */}
              <div className="flex-shrink-0 w-12 h-12 rounded-lg flex flex-col items-center justify-center"
                style={{ background: hex + '14', border: `1px solid ${hex}33` }}>
                <span className="text-[17px] font-black leading-none" style={{ color: hex }}>{Math.round(t.score_total ?? 0)}</span>
                <span className="text-[7px] uppercase tracking-wider font-bold mt-0.5" style={{ color: hex }}>score</span>
              </div>
              {/* Título + (número grande implícito = score) flecha y cambio debajo */}
              <div className="flex-1 min-w-0">
                <div className="text-[15px] font-bold text-gray-900 truncate leading-tight">{t.nombre}</div>
                <div className="flex items-baseline gap-1.5 mt-1">
                  <span className="text-[19px] font-black text-gray-900 leading-none tabular-nums">{Math.round(t.score_total ?? 0)}</span>
                  <span className="text-[13px] font-bold leading-none" style={{ color: arrowCol }}>
                    {arrow} {delta != null ? (delta > 0 ? '+' : '') + delta.toFixed(1) : '—'}
                  </span>
                </div>
              </div>
              {/* Sparkline */}
              <div className="flex-shrink-0">
                {path ? (
                  <svg width={W} height={H} className="block">
                    <polyline points={`0,${H} ${path} ${W},${H}`} fill={arrowCol} fillOpacity="0.08" stroke="none" />
                    <polyline points={path} fill="none" stroke={arrowCol} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" />
                  </svg>
                ) : <span className="text-[10px] text-gray-300 font-mono">—</span>}
              </div>
              {/* Chevron (afordance de click, como Polymarket) */}
              <span className="flex-shrink-0 text-gray-300 group-hover:text-gray-500 text-lg leading-none transition-colors pr-1">›</span>
            </button>
          );
        }

              <TickerBar semaforo={semaforo} historial={data.historial_scores} />
                <div className="glass border border-borde rounded-2xl overflow-hidden">

                    </div>
                    <p className="text-[15px] text-gray-600 mt-3 max-w-xl mx-auto leading-relaxed">
                      Tu consola es tu sala de control del Congreso: vigila a los legisladores,
                      temas, estados y comisiones que te importan, y FIAT te avisa cuando algo se mueve.
                      Configúrala una vez — toma 2 minutos.
                    </p>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 px-8 md:px-12 py-6 max-w-3xl mx-auto">
                    {[
                      ['Legisladores', 'Sigue a quienes te interesan, agrupados por partido.'],
                      ['Temas y estados', 'Monitorea los temas que escalan y las entidades clave.'],
                      ['Alertas', 'Te avisamos por correo cuando se cumple lo que definiste.'],
                    ].map(([t, d]) => (
                      <div key={t} className="bg-white border border-gray-200 rounded-xl p-4 text-left">
                        <div className="text-[13px] font-semibold text-gray-900">{t}</div>
                        <div className="text-[12px] text-gray-500 mt-1 leading-snug">{d}</div>
                      </div>
                    ))}
                  </div>
                  <div className="text-center pb-10">
                    <button onClick={onConfigClick}
                      className="text-white font-semibold px-8 py-3.5 rounded-full text-sm bg-gray-900 hover:bg-semaforo-verde transition-colors duration-200">
                      Configurar mi consola →
                    </button>
                    <div className="text-[11px] text-gray-400 mt-3">Tus selecciones se guardan en tu cuenta.</div>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="space-y-4">
              {/* Última actualización sutil */}
              <div className="text-[10px] text-gray-400 font-mono ml-1">Última actualización: {new Date(data.metadata?.generado || '').toLocaleString('es-MX', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})}</div>

              <TickerBar semaforo={semaforo} historial={data.historial_scores} />

              {/* ROW 1: Tendencia 50% + Terminal IA 50% */}
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
                {temasSelectos.size > 0 && historialFiltrado ? (
                  <ConsolaProTendencia historial={historialFiltrado} temasSelectos={temasSelectos} />
                ) : (
                  <div className="glass border border-borde rounded-xl p-8 text-center h-full flex flex-col items-center justify-center" style={{minHeight: 320}}>
                    <div className="text-xs text-gray-500 font-bold">TENDENCIA DE MIS TEMAS</div>
                    <div className="text-sm text-gray-500 mt-2">Selecciona temas en Configurar</div>
                  </div>
                )}
                <TerminalIAMockup />
              </div>

              {/* Mis temas con filtros + agregar */}
              {temasEnConfig.length > 0 && (() => {
                const ordenado = [...temasEnConfig];
                if (ordenTemas === 'score') ordenado.sort((a,b) => b.score_total - a.score_total);
                else if (ordenTemas === 'urgencia') ordenado.sort((a,b) => (b.score_urgencia || 0) - (a.score_urgencia || 0));
                return (
                  <div>
                    <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                      <div className="text-xs font-semibold text-gray-500">Mis temas · {temasEnConfig.length}/8</div>
                      <div className="flex items-center gap-2 text-xs">
                        <span className="text-gray-500 uppercase tracking-wider">Ordenar por</span>
                        <div className="inline-flex rounded-lg border border-borde bg-white overflow-hidden">
                          {[['todos','Todos'],['score','Score'],['urgencia','Urgencia']].map(([k,label], i) => (
                            <button key={k} onClick={() => setOrdenTemas(k)}
                              className={`px-3 py-1.5 font-medium transition-colors ${ordenTemas === k ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-50'} ${i > 0 ? 'border-l border-borde' : ''}`}>
                              {label}
                            </button>
                          ))}
                        </div>
                        <button onClick={onConfigClick}
                          className="text-[11px] font-semibold px-3 py-1.5 rounded-full transition border bg-white border-gray-300 text-gray-700 hover:border-gray-500 ml-1">
                          + Agregar
                        </button>
                      </div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                      {ordenado.map(t => <SemaforoCard key={t.categoria} data={t} onClick={setSelected} />)}
                    </div>
                  </div>
                );
              })()}

              {/* ROW: Mapa (intel) | Menciones CSP — sin items-start para que estiren ambos al mismo alto */}
              {(estadosSelectos.size > 0 || temasSelectos.size > 0) && (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
                  {estadosSelectos.size > 0 ? (
                    <div className="glass border border-borde rounded-xl overflow-hidden flex flex-col">
                      {/* Header consistente con el resto */}
                      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200">
                        <div>
                          <div className="text-xs font-semibold text-gray-500">Mis estados</div>
                          <div className="text-[10px] text-gray-400 mt-0.5">{estadosFiltradosArr.length} de 32 entidades vigiladas{estadosFiltradosArr[0] && ` · hotspot ${estadosFiltradosArr[0][1].nombre || estadosFiltradosArr[0][0]}`}</div>
                        </div>
                        <div className="flex items-center gap-2">
                          <ShareButton getText={() => `Mis estados FIAT — ${estadosFiltradosArr.length} entidades vigiladas\n${estadosFiltradosArr.slice(0,5).map(([,v])=>`${v.nombre}: ${v.total_articulos||0} notas`).join('\n')}\nhttps://fiatmx.com`} title="Compartir Mis estados" />
                          <a href="/mapa" target="_blank" rel="noopener" className="text-[11px] font-semibold text-acento hover:underline whitespace-nowrap">Ver mapa completo →</a>
                        </div>
                      </div>
                      {/* Mapa real Leaflet con capa de calor radar — solo estados configurados */}
                      <div className="px-3 py-3">
                        <MapaMexico estados={estadosFiltradosArr} maxArts={maxArtsConfig}
                          onSelectEstado={(key) => setEstadoSeleccionado(estadoSeleccionado === key ? null : key)}
                          estadoSeleccionado={estadoSeleccionado} />
                      </div>
                      {selectedEstadoData && (() => {
                        /* Filtrar artículos del estado por periodo */
                        const ahora = Date.now();
                        const dias = { '1w': 7, '2w': 14, '1m': 30 }[periodoEstado] || 7;
                        const desde = ahora - dias * 24 * 60 * 60 * 1000;
                        const todosArts = (selectedEstadoData.articulos || []);
                        const filtrados = todosArts.filter(a => {
                          if (!a.fecha) return false;
                          const t = new Date(a.fecha).getTime();
                          return !isNaN(t) && t >= desde;
                        }).sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));
                        const PER_PAGE = 10;
                        const totalPag = Math.max(1, Math.ceil(filtrados.length / PER_PAGE));
                        const pag = Math.min(paginaEstado, totalPag);
                        const slice = filtrados.slice((pag - 1) * PER_PAGE, pag * PER_PAGE);
                        return (
                          <div className="border-t border-gray-200 px-4 py-3 bg-gray-50">
                            <div className="flex items-center justify-between mb-2">
                              <div className="flex items-center gap-2">
                                <span className="text-[10px] uppercase tracking-widest text-gray-500 font-mono font-bold">DETALLE</span>
                                <span className="text-xs text-gray-800 font-semibold">{selectedEstadoData.nombre}</span>
                                <span className="text-[10px] text-gray-400 font-mono">{selectedEstadoData.total_articulos} total · {filtrados.length} en filtro</span>
                              </div>
                              <button onClick={() => setEstadoSeleccionado(null)} className="text-gray-400 hover:text-gray-700 text-base leading-none w-5 h-5">×</button>
                            </div>
                            {/* Filtros de periodo compactos */}
                            <div className="flex items-center gap-1 mb-2">
                              {[['1w', '1 sem'], ['2w', '2 sem'], ['1m', '1 mes']].map(([k, label]) => (
                                <button key={k} onClick={() => setPeriodoEstado(k)}
                                  className={`text-[10px] font-semibold px-2 py-0.5 rounded-full transition border ${periodoEstado === k ? 'border-acento text-white' : 'border-gray-200 text-gray-600 hover:border-gray-400 bg-white'}`}
                                  style={periodoEstado === k ? {background: '#1a365d'} : {}}>
                                  {label}
                                </button>
                              ))}
                            </div>
                            {slice.length === 0 ? (
                              <div className="text-[11px] text-gray-500 italic text-center py-3">Sin notas en este periodo</div>
                            ) : (
                              <div className="space-y-1 max-h-72 overflow-y-auto pr-1" style={{scrollbarWidth: 'thin'}}>
                                {slice.map((art, i) => (
                                  <div key={i} className="bg-white rounded p-1.5 border border-gray-100">
                                    <a href={art.url} target="_blank" rel="noopener" className="text-[11px] text-blue-700 hover:underline block leading-snug">{art.titulo}</a>
                                    <div className="text-[9px] text-gray-400 font-mono mt-0.5">{art.fuente} · {art.fecha}</div>
                                  </div>
                                ))}
                              </div>
                            )}
                            {/* Paginación compacta */}
                            {totalPag > 1 && (
                              <div className="flex items-center justify-between mt-2 pt-2 border-t border-gray-200">
                                <button onClick={() => setPaginaEstado(p => Math.max(1, p - 1))} disabled={pag === 1}
                                  className="text-[10px] font-semibold px-2 py-1 rounded-full border border-gray-200 text-gray-600 hover:border-gray-400 disabled:opacity-40">← Ant.</button>
                                <div className="text-[10px] text-gray-500 font-mono">Pág. {pag}/{totalPag}</div>
                                <button onClick={() => setPaginaEstado(p => Math.min(totalPag, p + 1))} disabled={pag === totalPag}
                                  className="text-[10px] font-semibold px-2 py-1 rounded-full border border-gray-200 text-gray-600 hover:border-gray-400 disabled:opacity-40">Sig. →</button>
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>
                  ) : (
                    <div className="glass border border-borde rounded-xl p-8 text-center h-full flex flex-col items-center justify-center">
                      <div className="text-xs text-gray-500 font-bold">MIS ESTADOS</div>
                      <div className="text-sm text-gray-500 mt-2">Selecciona estados en Configurar</div>
                    </div>
                  )}

                  {/* Columna derecha: Menciones CSP (estira al mismo alto que el mapa con flex-col + flex-1) */}
                  <div className="glass border border-borde rounded-xl p-4 flex flex-col h-full">
                    <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                      <div>
                        <div className="text-xs font-semibold text-gray-500">Menciones de la presidenta</div>
                        <div className="text-[10px] text-gray-400 mt-0.5">
                          {cspQuery.length >= 2
                            ? `Búsqueda en declaraciones de Claudia Sheinbaum · ${cspMenciones.length} resultado${cspMenciones.length === 1 ? '' : 's'}`
                            : <>Mañaneras de Claudia Sheinbaum {cspTema && `· ${_catLabel(cspTema)}`}</>}
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        {temasSelectos.size > 0 && cspQuery.length < 2 && (
                          <select value={cspTema || ''} onChange={e => setFiltroCSP(e.target.value)}
                            className="text-xs px-2 py-1 border border-gray-200 rounded-lg bg-white">
                            {Array.from(temasSelectos).map(t => <option key={t} value={t}>{_catLabel(t)}</option>)}
                          </select>
                        )}
                        <ShareButton title={`Menciones CSP — ${cspQuery.length >= 2 ? `"${cspQuery}"` : (cspTema ? _catLabel(cspTema) : 'temas vigilados')}`}
                          getText={() => `Declaraciones de la Presidenta ${cspQuery.length >= 2 ? `sobre "${cspQuery}"` : `· ${cspTema ? _catLabel(cspTema) : 'mis temas'}`} (Fiat Console)\n${(cspMenciones||[]).slice(0,3).map(m => `· ${m.fecha}: «${(m.fragmento||'').slice(0,140)}…»`).join('\n')}`} />
                      </div>
                    </div>
                    {/* Búsqueda por keyword en todo el corpus de declaraciones de Sheinbaum */}
                    <div className="relative mb-3">
                      <svg className="w-3.5 h-3.5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                      <input type="text" value={cspBusqueda} onChange={e => setCspBusqueda(e.target.value)}
                        placeholder="Busca una palabra en las declaraciones de Sheinbaum…"
                        className="w-full pl-9 pr-8 py-2 text-[13px] bg-gray-50 border border-gray-200 rounded-full text-gray-800 placeholder-gray-400 focus:outline-none focus:border-gray-400 focus:bg-white transition-colors" />
                      {cspBusqueda && (
                        <button onClick={() => setCspBusqueda('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 text-base leading-none">×</button>
                      )}
                    </div>
                    {/* Reusa FuentesMananera; en modo búsqueda con 0 resultados muestra mensaje propio */}
                    <div className="csp-compact csp-stretch flex-1 overflow-y-auto pr-1" style={{scrollbarWidth: 'thin'}}>
                      {cspQuery.length >= 2 && cspMenciones.length === 0 ? (
                        <div className="text-gray-400 text-sm py-6 text-center">Sin declaraciones que contengan «{cspQuery}»</div>
                      ) : (
                        <FuentesMananera menciones={cspMenciones} />
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* Comisiones · tabla terminal full-width, debajo de Mapa+CSP, antes de Mis Legisladores */}
              <ComiteWatch
                comisionesIds={comisionesSelectos}
                allComisiones={allComisiones}
                convocatorias={data.convocatorias}
                onConfigClick={onConfigClick}
                onRemove={(key) => setConfig({ ...config, comisiones: (config.comisiones || []).filter(c => c !== key) })}
              />

              {/* Mis legisladores con orden + agregar + export CSV */}
              {legisladoresEnConfig.length > 0 && (() => {
                /* Sort accessor por columna */
                const accessors = {
                  nombre: l => formatNombreLegislador(l).toLowerCase(),
                  tema: l => (l.categoria_dominante || 'zzz').toLowerCase(),
                  hit_rate: l => (l.hit_rate != null ? l.hit_rate : -1),
                  ini: l => (l.iniciativas_proy_15d ?? -1),
                  prop: l => (l.proposiciones_proy_15d ?? -1),
                  l3p: l => ((l.l3p_iniciativas ?? 0) + (l.l3p_proposiciones ?? 0)),
                  match: l => ({A:5, B:4, C:3, D:2, F:1}[l.matchup_grade] || 0),
                  efectividad: l => (l.elo_indice ?? -1),
                };
                const ordenado = [...legisladoresEnConfig].sort((a, b) => {
                  const av = accessors[ordenLeg.col](a);
                  const bv = accessors[ordenLeg.col](b);
                  if (av < bv) return ordenLeg.dir === 'asc' ? -1 : 1;
                  if (av > bv) return ordenLeg.dir === 'asc' ? 1 : -1;
                  return 0;
                });

                const toggleSort = (col) => {
                  setOrdenLeg(prev => prev.col === col
                    ? { col, dir: prev.dir === 'asc' ? 'desc' : 'asc' }
                    : { col, dir: col === 'nombre' || col === 'tema' ? 'asc' : 'desc' });
                };
                const arrow = (col) => ordenLeg.col === col ? (ordenLeg.dir === 'asc' ? '↑' : '↓') : '';
                const HeaderBtn = ({col, label, align='center', tip}) => (
                  <button onClick={() => toggleSort(col)} title={tip}
                    className={`text-[10px] uppercase tracking-wider font-bold font-mono transition hover:text-acento ${ordenLeg.col === col ? 'text-acento' : 'text-gray-500'} ${tip ? 'cursor-help underline decoration-dotted decoration-gray-300 underline-offset-2' : ''} text-${align} flex items-center gap-0.5 ${align === 'center' ? 'justify-center' : ''}`}>
                    {label}{arrow(col) && <span className="text-[10px]">{arrow(col)}</span>}
                  </button>
                );

                const exportCSV = () => {
                  const headers = ['Nombre', 'Cámara', 'Partido', 'Estado', 'Tema dominante', 'Hit rate', 'Iniciativas 15d', 'Proposiciones 15d', 'L3P total', 'Matchup grade', 'Efectividad ELO', 'Marcador continuidad'];
                  const rows = ordenado.map(l => [
                    formatNombreLegislador(l),
                    (l.camara || '').replace('Cámara de ', ''),
                    l.partido || '',
                    l.estado || '',
                    l.categoria_dominante ? _catLabel(l.categoria_dominante) : '',
                    l.hit_rate != null ? Math.round(l.hit_rate * 100) + '%' : '',
                    l.iniciativas_proy_15d != null ? Number(l.iniciativas_proy_15d).toFixed(1) : '',
                    l.proposiciones_proy_15d != null ? Number(l.proposiciones_proy_15d).toFixed(1) : '',
                    (l.l3p_iniciativas ?? 0) + (l.l3p_proposiciones ?? 0),
                    l.matchup_grade || '',
                    l.elo_indice != null ? Math.round(l.elo_indice) : '',
                    l.marcador_continuidad || '',
                  ]);
                  const escape = v => {
                    const s = String(v ?? '');
                    return s.includes(',') || s.includes('"') || s.includes('\n')
                      ? '"' + s.replace(/"/g, '""') + '"' : s;
                  };
                  const csv = [headers, ...rows].map(r => r.map(escape).join(',')).join('\n');
                  const bom = '﻿'; /* Para acentos en Excel */
                  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url;
                  a.download = `fiat-mis-legisladores-${new Date().toISOString().slice(0,10)}.csv`;
                  document.body.appendChild(a);
                  a.click();
                  document.body.removeChild(a);
                  URL.revokeObjectURL(url);
                };

                return (
                  <div>
                    <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                      <div className="text-xs font-semibold text-gray-500">Mis legisladores · {legisladoresEnConfig.length}/20</div>
                      <div className="flex items-center gap-2">
                        <button onClick={exportCSV}
                          className="text-[11px] font-semibold px-3 py-1.5 rounded-full transition border bg-white border-gray-200 text-gray-700 hover:border-gray-400 inline-flex items-center gap-1.5">
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                          Exportar CSV
                        </button>
                        <button onClick={onConfigClick}
                          className="text-[11px] font-semibold px-3 py-1.5 rounded-full transition border bg-white border-gray-300 text-gray-700 hover:border-gray-500">
                          + Agregar
                        </button>
                        <ShareButton title="Mis legisladores — Fiat Console"
                          getText={() => `Vigilando a ${legisladoresEnConfig.length} legisladores en Fiat Console:\n${ordenado.slice(0,5).map(l => `· ${formatNombreLegislador(l)} (${l.partido || '—'})`).join('\n')}`} />
                      </div>
                    </div>
                    <div className="glass border border-borde rounded-xl divide-y divide-gray-100 overflow-hidden">
                      {/* Header de columnas clickables (sort) */}
                      <div className="hidden md:grid md:grid-cols-[minmax(0,2.1fr)_0.85fr_0.85fr_0.85fr_0.85fr_0.8fr_0.75fr_0.85fr] gap-2 px-3 py-2 border-b-2 border-gray-300 bg-gray-50">
                        <HeaderBtn col="nombre" label="Legislador" align="left" />
                        <HeaderBtn col="tema" label="Categoría"
                          tip="Categoría dominante del legislador (medio_ambiente, educación, etc.). Se calcula con ≥3 actos legislativos desde inicio LXVI, ponderando iniciativas 2x sobre proposiciones." />
                        <HeaderBtn col="hit_rate" label="Hit rate"
                          tip="Hit rate — % de los últimos 20 picos mediáticos en su categoría dominante donde el legislador presentó un instrumento dentro de los 7 días posteriores. Verde ≥70%, ámbar ≥40%, rojo <40%." />
                        <HeaderBtn col="ini" label="Ini 15d"
                          tip="Iniciativas proyectadas en los próximos 15 días, basadas en la tasa LXVI ajustada por actividad reciente (30d)." />
                        <HeaderBtn col="prop" label="Prop 15d"
                          tip="Proposiciones con punto de acuerdo proyectadas en los próximos 15 días. Misma fórmula que Ini 15d." />
                        <HeaderBtn col="l3p" label="L3P total"
                          tip="Total de instrumentos (iniciativas + proposiciones) presentados durante la LXVI Legislatura (sep 2024 – hoy)." />
                        <HeaderBtn col="match" label="Matchup"
                          tip="Matchup grade vs. la comisión a la que más turnan sus instrumentos. A = comisión que dictamina rápido; F = comisión donde los asuntos se quedan en pendiente. Grading relativo entre comisiones." />
                        <HeaderBtn col="efectividad" label="Efectividad"
                          tip="Índice de Efectividad (0–100) — capacidad del legislador para convertir instrumentos en avances dentro del proceso parlamentario, ajustada por la dificultad estructural de sus comisiones. 50 = mediana LXVI · 80+ = desempeño alto · 20- = bajo. Requiere ≥3 instrumentos dictaminables." />
                      </div>
                      {ordenado.map(l => <RadarRowCP key={l.id} leg={l} onClick={() => onLegSelect(l)} />)}
                    </div>
                  </div>
                );
              })()}

              {/* ROW: Actividad reciente | Mis alertas */}
              {configCount > 0 && (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
                  {/* Actividad */}
                  <div className="glass border border-borde rounded-xl p-4">
                    <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
                      <div>
                        <div className="text-xs font-semibold text-gray-500">Actividad reciente</div>
                        <div className="text-[10px] text-gray-400 mt-0.5">Tus legisladores y temas · última semana</div>
                      </div>
                      <div className="flex items-center gap-2">
                        <input type="text" placeholder="Buscar..." value={actividadSearch} onChange={e => setActividadSearch(e.target.value)}
                          className="text-xs px-3 py-1.5 border border-gray-200 rounded-full bg-gray-50 w-32 focus:outline-none focus:border-acento focus:bg-white" />
                        <ShareButton title="Actividad reciente — Fiat Console"
                          getText={() => `Actividad reciente de mis legisladores y temas vigilados (Fiat Console):\n${(actividad.todo||[]).slice(0,5).map(it => `· ${it.titulo || ''}`).join('\n')}`} />
                      </div>
                    </div>
                    <div className="flex gap-1 mb-3 border-b border-gray-100">
                      <button onClick={() => setActividadTab('legisladores')} className={`px-3 py-2 text-xs font-semibold border-b-2 -mb-px transition ${actividadTab === 'legisladores' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-800'}`}>Legisladores · {actividad.porLeg.length}</button>
                      <button onClick={() => setActividadTab('medios')} className={`px-3 py-2 text-xs font-semibold border-b-2 -mb-px transition ${actividadTab === 'medios' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-800'}`}>Medios · {actividad.porTema.length}</button>
                      <button onClick={() => setActividadTab('todo')} className={`px-3 py-2 text-xs font-semibold border-b-2 -mb-px transition ${actividadTab === 'todo' ? 'border-acento text-acento' : 'border-transparent text-gray-500 hover:text-gray-800'}`}>Todo · {actividad.todo.length}</button>
                    </div>
                    {actividadFiltrada.length === 0 ? (
                      <div className="text-xs text-gray-500 italic text-center py-8">Sin actividad reciente en este filtro</div>
                    ) : (
                      <div className="max-h-96 overflow-y-auto pr-1 space-y-1.5" style={{scrollbarWidth: 'thin'}}>
                        {actividadFiltrada.map((it, i) => (
                          <div key={i} className="flex items-start gap-3 p-2 hover:bg-gray-50 rounded -mx-1 transition">
                            <div className="text-[10px] text-gray-400 font-mono w-16 flex-shrink-0 mt-0.5">{(it.ts || '').slice(5, 10) || '—'}</div>
                            <div className="w-1 self-stretch rounded-full mt-1 flex-shrink-0" style={{background: it.tipo === 'legislador' ? '#2e7d32' : '#1a365d'}}></div>
                            <div className="flex-1 min-w-0">
                              {it.url ? (
                                <a href={it.url} target="_blank" rel="noopener" className="text-xs text-gray-800 hover:underline block leading-snug">{it.titulo}</a>
                              ) : (
                                <div className="text-xs text-gray-800 leading-snug">{it.titulo}</div>
                              )}
                              <div className="text-[10px] text-gray-500 mt-0.5">{it.sub}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Trigger Desk: alertas con reglas combinables */}
                  <TriggerDesk alertas={alertas} semaforo={semaforo} allLegisladores={allLegisladores}
                    setConfig={setConfig} config={config} />
                </div>
              )}
            </div>
          );
        }

        // Wrapper para Tendencia que reusa la lógica de HistorialScoresChart
        function ConsolaProTendencia({ historial, temasSelectos }) {
          const chartRef = useRef(null);
          const chartInstance = useRef(null);

          useEffect(() => {
            if (!chartRef.current || !historial) return;
            if (chartInstance.current) chartInstance.current.destroy();

            const labels = historial.fechas.map(f => {
              const d = new Date(f + 'T12:00:00');
              return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
            });
            const allKeys = Object.keys(historial.categorias);
            const datasets = allKeys.map((cat) => {
              const catData = historial.categorias[cat];
              const colorIdx = allKeys.indexOf(cat);
              const color = CATEGORY_COLORS[colorIdx % CATEGORY_COLORS.length];
              const scores = catData.scores.map(s => s === null ? undefined : s);
              const lastIdx = scores.length - 1;
              return {
                label: catData.nombre, data: scores, borderColor: color, backgroundColor: 'transparent',
                borderWidth: 2, fill: false, stepped: 'before', tension: 0,
                pointRadius: scores.map((_, i) => i === lastIdx ? 5 : 0),
