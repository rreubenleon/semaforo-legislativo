                pointHitRadius: 10, pointHoverRadius: 6,
                pointBackgroundColor: color, pointBorderColor: '#fff', pointBorderWidth: 2,
                spanGaps: true,
              };
            });
            const thresholdPlugin = {
              id: 'thresholds',
              beforeDraw(chart) {
                const { ctx, chartArea, scales } = chart;
                if (!chartArea) return;
                const yScale = scales.y;
                ctx.save(); ctx.setLineDash([2, 6]); ctx.lineWidth = 0.8;
                [{value: 65, color: 'rgba(46,125,50,0.15)'}, {value: 40, color: 'rgba(198,40,40,0.15)'}].forEach(t => {
                  const y = yScale.getPixelForValue(t.value);
                  ctx.beginPath(); ctx.strokeStyle = t.color;
                  ctx.moveTo(chartArea.left, y); ctx.lineTo(chartArea.right, y); ctx.stroke();
                });
                ctx.restore();
              }
            };
            /* Anillo pulsante en el último punto del top score (líder actual) */
            const topPulsePlugin = {
              id: 'topPulse',
              afterDatasetsDraw(chart) {
                let topIdx = -1, topValue = -Infinity;
                chart.data.datasets.forEach((ds, i) => {
                  const data = ds.data || [];
                  for (let j = data.length - 1; j >= 0; j--) {
                    const v = data[j];
                    if (v != null && v !== undefined) {
                      if (v > topValue) { topValue = v; topIdx = i; }
                      break;
                    }
                  }
                });
                if (topIdx === -1) return;
                const meta = chart.getDatasetMeta(topIdx);
                const points = meta.data || [];
                if (points.length === 0) return;
                const lastPoint = points[points.length - 1];
                if (!lastPoint) return;
                const x = lastPoint.x, y = lastPoint.y;
                const color = chart.data.datasets[topIdx].borderColor;
                const t = ((Date.now() % 1500) / 1500);
                const radius = 5 + t * 14;
                const opacity = (1 - t) * 0.65;
                const ctx = chart.ctx;
                ctx.save();
                ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = color; ctx.globalAlpha = opacity; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.arc(x, y, 4, 0, 2 * Math.PI);
                ctx.globalAlpha = 1; ctx.fillStyle = color; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                ctx.restore();
              }
            };
            chartInstance.current = new Chart(chartRef.current, {
              type: 'line', plugins: [thresholdPlugin, topPulsePlugin], data: { labels, datasets },
              options: {
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 600, easing: 'easeOutQuad' },
                interaction: { mode: 'index', intersect: false },
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    backgroundColor: 'rgba(15,23,42,0.92)', titleColor: '#f1f5f9', bodyColor: '#cbd5e1',
                    borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1,
                    padding: { top: 10, bottom: 10, left: 14, right: 14 }, cornerRadius: 10,
                    displayColors: true, boxWidth: 8, boxHeight: 8, boxPadding: 6,
                    titleFont: { size: 12, weight: '600', family: 'JetBrains Mono, monospace' },
                    bodyFont: { size: 11, family: 'JetBrains Mono, monospace' },
                    callbacks: { label: (item) => ` ${item.dataset.label}: ${item.raw?.toFixed(1)}%` },
                    itemSort: (a, b) => (b.raw || 0) - (a.raw || 0),
                  }
                },
                scales: {
                  y: { min: 0, max: 100, position: 'right',
                    ticks: { color: '#b0b8c4', font: { size: 10 }, stepSize: 25, padding: 12, callback: v => v + '%' },
                    grid: { color: (ctx) => ctx.tick.value === 0 ? 'transparent' : 'rgba(0,0,0,0.04)', lineWidth: 0.5, drawBorder: false, drawTicks: false },
                    border: { display: false }
                  },
                  x: { ticks: { color: '#b0b8c4', font: { size: 10 }, maxRotation: 0, maxTicksLimit: 8, padding: 8 },
                    grid: { display: false }, border: { display: false } }
                }
              }
            });
            const pulseInterval = setInterval(() => {
              if (chartInstance.current) try { chartInstance.current.draw(); } catch(e) {}
            }, 60);
            return () => {
              clearInterval(pulseInterval);
              if (chartInstance.current) try { chartInstance.current.destroy(); } catch(e) {}
            };
          }, [historial]);

          return (
            <div className="glass border border-borde rounded-xl p-4 h-full flex flex-col">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <div className="text-xs font-semibold text-gray-500">Tendencia de mis temas</div>
                  <div className="text-[10px] text-gray-400 mt-0.5">Evolución del score compuesto durante el actual periodo de sesiones</div>
                </div>
                <div className="flex items-center gap-1">
                  <div className="text-[10px] text-gray-400 font-mono">{temasSelectos.size}/8</div>
                  <ShareButton title="Tendencia de mis temas — Fiat Console"
                    getText={() => {
                      const cats = Object.values(historial?.categorias || {});
                      const top = cats.map(c => ({nombre: c.nombre, ult: c.scores?.[c.scores.length-1]||0}))
                                      .sort((a,b)=>b.ult-a.ult).slice(0,3);
                      return `Tendencia de mis temas vigilados (Fiat Console):\n${top.map(t=>`· ${t.nombre}: ${t.ult.toFixed(0)}`).join('\n')}`;
                    }} />
                </div>
              </div>
              <div className="flex-1" style={{minHeight: 260}}><canvas ref={chartRef}></canvas></div>
            </div>
          );
        }

        /* ComiteWatch — Tabla terminal full-width con sparkline de actividad 6m, próxima sesión y Δ30d.
           Reusa endpoint /comisiones del Worker (mismos datos que la tab general).
           Filtros: Mis · Diputados · Senado · Ver todas (modal). */
        function ComiteWatch({ comisionesIds, allComisiones, convocatorias, onConfigClick, onRemove }) {
          const [filtro, setFiltro] = useState('mis'); // mis | Diputados | Senado | todas
          const [verTodas, setVerTodas] = useState(false);
          const [comDetalle, setComDetalle] = useState(null); // comisión abierta en detalle

          const total = (allComisiones || []).length;
          const seleccionadas = (allComisiones || []).filter(c => comisionesIds.has(`${c.nombre}|${c.camara}`));

          let visibles = [];
          if (filtro === 'mis') visibles = seleccionadas;
          else if (filtro === 'Diputados' || filtro === 'Senado') {
            visibles = (allComisiones || []).filter(c => c.camara === filtro && comisionesIds.has(`${c.nombre}|${c.camara}`));
            if (visibles.length === 0) visibles = (allComisiones || []).filter(c => c.camara === filtro).slice(0, 12);
          } else visibles = (allComisiones || []).slice(0, 12);

          /* Estado vacío */
          if (seleccionadas.length === 0 && filtro === 'mis') {
            return (
              <div className="glass border border-borde rounded-xl">
                <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200">
                  <div>
                    <div className="text-xs font-semibold text-gray-500">Comisiones</div>
                    <div className="text-[10px] text-gray-400 mt-0.5">Sin comisiones seleccionadas</div>
                  </div>
                  <button onClick={onConfigClick}
                    className="text-[11px] font-semibold px-3 py-1.5 rounded-full transition border bg-white border-gray-300 text-gray-700 hover:border-gray-500">
                    + Agregar comisión
                  </button>
                </div>
                <div className="p-8 text-center">
                  <div className="text-sm text-gray-500">Configura hasta 10 comisiones para vigilar productividad y próximas sesiones</div>
                </div>
              </div>
            );
          }

          /* Indexar convocatorias por nombre normalizado, max fecha futura.
             El matcher anterior era demasiado laxo: hacia split(' ')[0] del key
             y matcheaba "hacienda" con cualquier comision que su norm incluyera
             "hacienda". Ahora exigimos overlap de >=2 palabras significativas
             (ignorando stopwords) entre la convocatoria y la comision. */
          const STOPWORDS_COM = new Set(['de','la','el','los','las','y','del','en','para','sen','dip','comision','comisiones']);
          const tokensRelevantes = (s) => (s || '')
            .toLowerCase()
            .normalize('NFD').replace(/[̀-ͯ]/g,'')   // sin acentos
            .replace(/[^a-z0-9 ]/g, ' ')
            .split(/\s+/)
            .filter(t => t.length >= 4 && !STOPWORDS_COM.has(t));

          const proximasMap = {};
          ['Diputados', 'Senado'].forEach(cam => {
            (convocatorias?.[cam] || []).forEach(c => {
              const tokens = tokensRelevantes(c.comision || c.titulo || '');
              if (tokens.length === 0) return;
              const key = tokens.join('|');
              if (!proximasMap[key] || (c.fecha && c.fecha > (proximasMap[key].fecha || ''))) {
                proximasMap[key] = { ...c, _tokens: tokens, _camara: cam };
              }
            });
          });

          const buscarProxima = (com) => {
            const tokensCom = tokensRelevantes(com.nombre || '');
            if (tokensCom.length === 0) return null;
            let best = null, bestOverlap = 0;
            for (const conv of Object.values(proximasMap)) {
              // Match estricto: misma cámara + overlap de tokens significativos
              if (conv._camara !== com.camara) continue;
              const overlap = conv._tokens.filter(t => tokensCom.includes(t)).length;
              // Necesitamos al menos 2 palabras en común, o 1 si es palabra distintiva
              // (la comision tiene pocas palabras, ej. "Marina")
              const minRequerido = tokensCom.length === 1 ? 1 : 2;
              if (overlap >= minRequerido && overlap > bestOverlap) {
                best = conv;
                bestOverlap = overlap;
              }
            }
            return best;
          };

          /* Δ30d aproximado: último mes vs promedio meses anteriores en historico_mensual */
          const delta30 = (c) => {
            const h = c.historico_mensual || [];
            if (h.length < 2) return null;
            const ult = h[h.length - 1].count || 0;
            const ant = h.slice(-4, -1);
            if (ant.length === 0) return null;
            const prom = ant.reduce((s, x) => s + (x.count || 0), 0) / ant.length;
            return ult - prom;
          };

          /* Sparkline SVG simple, sin librerías */
          const Sparkline = ({ data, color = '#2e7d32', width = 110, height = 24 }) => {
            if (!data || data.length < 2) return <span className="text-[10px] text-gray-300 font-mono">—</span>;
            const max = Math.max(...data, 1);
            const min = Math.min(...data, 0);
            const range = max - min || 1;
            const stepX = width / (data.length - 1);
            const pts = data.map((v, i) => `${(i * stepX).toFixed(1)},${(height - ((v - min) / range) * height).toFixed(1)}`).join(' ');
            const last = data[data.length - 1];
            const lastY = height - ((last - min) / range) * height;
            return (
              <svg width={width} height={height} className="inline-block align-middle">
                <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
                <polyline points={`0,${height} ${pts} ${width},${height}`} fill={color} fillOpacity="0.06" stroke="none" />
                <circle cx={width} cy={lastY} r="2" fill={color} />
              </svg>
            );
          };

          /* Score actividad: tomar score_actividad y derivar serie 6m del histórico */
          const serie6m = (c) => {
            const h = c.historico_mensual || [];
            const last6 = h.slice(-6);
            return last6.map(x => x.count || 0);
          };

          /* Footer stats: sesiones hoy, dictámenes mes actual, hotspot */
          const sesionesHoy = (() => {
            const hoyDDMM = new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'}).split('/').join('-');
            const todas = [...(convocatorias?.Diputados || []), ...(convocatorias?.Senado || [])];
            return todas.filter(c => c.fecha === hoyDDMM).length;
          })();
          const dictMesActual = visibles.reduce((acc, c) => {
            const h = c.historico_mensual || [];
            const ult = h[h.length - 1];
            return acc + (ult?.dictamen || 0);
          }, 0);
          const hotspot = visibles.reduce((best, c) => (!best || (c.score_actividad || 0) > (best.score_actividad || 0)) ? c : best, null);

          /* Helpers */
          const camaraLabel = cam => cam === 'Senado' ? 'Sen.' : 'Dip.';
          const camaraTag = cam => cam === 'Senado' ? 'bg-gray-900 text-white' : 'bg-gray-700 text-white';
          const fmtFecha = f => f ? f.replace(/-/g, '·') : '—';
          const colorScore = s => s >= 80 ? '#2e7d32' : s >= 50 ? '#c6972b' : '#c62828';

          const FilterBtn = ({ k, label, first }) => (
            <button onClick={() => setFiltro(k)}
              className={`px-3 py-1.5 text-[11px] font-medium transition-colors ${filtro === k ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-50'} ${!first ? 'border-l border-borde' : ''}`}>
              {label}
            </button>
          );

          return (
            <div className="glass border border-borde rounded-xl overflow-hidden">
              {/* Header consistente con otros widgets — tipografía Inter, sin font-mono */}
              <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200 flex-wrap gap-2">
                <div>
                  <div className="text-xs font-semibold text-gray-500">Comisiones</div>
                  <div className="text-[10px] text-gray-400 mt-0.5">{seleccionadas.length} de {total} comisiones LXVI vigiladas</div>
                </div>
                <div className="flex items-center gap-1.5 flex-wrap">
                  <div className="inline-flex rounded-lg border border-borde bg-white overflow-hidden">
                    <FilterBtn k="mis" label={`Mis · ${seleccionadas.length}`} first />
                    <FilterBtn k="Diputados" label="Diputados" />
                    <FilterBtn k="Senado" label="Senado" />
                  </div>
                  <button onClick={onConfigClick}
                    className="text-[11px] font-semibold px-3 py-1.5 rounded-full transition border bg-white border-gray-300 text-gray-700 hover:border-gray-500">
                    + Agregar
                  </button>
                  <button onClick={() => setVerTodas(true)}
                    className="text-[11px] font-semibold px-3 py-1.5 rounded-full transition border bg-white border-gray-300 text-gray-700 hover:border-gray-500">
                    Ver todas · {total}
                  </button>
                  <ShareButton title="Comisiones vigiladas — Fiat Console"
                    getText={() => `Comisiones vigiladas (${seleccionadas.length}/10):\n${seleccionadas.slice(0,5).map(c => `· ${c.nombre} (${c.camara}): ${(c.sitl?.turnadas ?? c.total_docs ?? 0)} turnados`).join('\n')}`} />
                </div>
              </div>

              {/* Tabla principal */}
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="text-[9px] text-gray-500 font-bold border-b border-gray-200">
                      <th className="text-left py-2 pl-4 pr-2 font-bold w-10">#</th>
                      <th className="text-left py-2 px-2 font-bold">Comisión</th>
                      <th className="text-center py-2 px-2 font-bold w-16">Dict</th>
                      <th className="text-center py-2 px-2 font-bold w-16">Inic</th>
                      <th className="text-center py-2 px-2 font-bold w-16">Prop</th>
                      <th className="text-center py-2 px-2 font-bold w-16">Total</th>
                      <th className="text-left py-2 px-3 font-bold w-44">Score·Actividad·6m</th>
                      <th className="text-left py-2 px-2 font-bold w-56">Próx·Sesión</th>
                      <th className="text-right py-2 px-3 pr-4 font-bold w-16">Δ30d</th>
                      <th className="w-8"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {visibles.map((c, i) => {
                      const key = `${c.nombre}|${c.camara}`;
                      const proxima = buscarProxima(c);
                      const d30 = delta30(c);
                      const serie = serie6m(c);
                      const scoreAct = c.score_actividad || 0;
                      const colorAct = colorScore(scoreAct);
                      /* Priorizar SITL cuando existe (Diputados): la clasificación
                         por comisión de la Gaceta es incompleta (Medio Ambiente solo
                         atrapa 1 doc cuando SITL reporta 314). SITL = fuente de verdad. */
                      const sitl = c.sitl;
                      const dictN = c.tipos?.dictamen || 0;  // dictámenes solo Gaceta los reporta
                      const iniN = sitl?.iniciativas?.turnadas ?? c.tipos?.iniciativa ?? 0;
                      const propN = sitl?.proposiciones?.turnadas ?? c.tipos?.proposicion ?? 0;
                      const totalN = sitl?.turnadas ?? c.total_docs ?? 0;
                      return (
                        <tr key={key} className="border-b border-gray-100 hover:bg-gray-50 transition group">
                          <td className="py-3 pl-4 pr-2 text-[10px] font-mono text-gray-400">{String(i + 1).padStart(2, '0')}</td>
                          <td className="py-3 px-2">
                            <button onClick={() => setComDetalle(c)}
                              className="text-sm font-bold text-gray-900 leading-tight text-left hover:text-acento hover:underline decoration-dotted underline-offset-2 transition-colors"
                              title={`Ver detalle de ${c.nombre}`}>{_nombreComisionDisplay(c.nombre)}</button>
                            <div className="flex items-center gap-1.5 mt-1">
                              <span className={`text-[9px] font-mono font-bold px-1.5 py-0.5 rounded ${camaraTag(c.camara)}`}>{camaraLabel(c.camara)}</span>
                              {c.categoria_nombre && <span className="text-[10px] text-gray-500">{c.categoria_nombre}</span>}
                            </div>
                          </td>
                          <td className="text-center py-3 px-2 font-mono font-bold text-gray-800">{dictN}</td>
                          <td className="text-center py-3 px-2 font-mono text-gray-700">{iniN}</td>
                          <td className="text-center py-3 px-2 font-mono text-gray-700">{propN}</td>
                          <td className="text-center py-3 px-2 font-mono font-bold text-gray-900">{totalN}</td>
                          <td className="py-3 px-3">
                            <div className="flex items-center gap-2">
                              <span className="text-sm font-bold font-mono" style={{color: colorAct}}>{Math.round(scoreAct)}</span>
                              <Sparkline data={serie} color={colorAct} />
                            </div>
                            <div className="text-[9px] text-gray-400 font-mono mt-0.5">OCT — ABR</div>
                          </td>
                          <td className="py-3 px-2">
                            {proxima ? (
                              <a href={proxima.url} target="_blank" rel="noopener" className="block text-acento hover:underline">
                                <div className="text-[11px] font-mono font-bold">▸ {fmtFecha(proxima.fecha)}</div>
                                <div className="text-[10px] text-gray-500 truncate" style={{maxWidth: '180px'}} title={proxima.titulo}>
                                  {(proxima.comision || '').slice(0, 30)}
                                </div>
                              </a>
                            ) : (
                              <div>
                                <div className="text-[11px] text-gray-400 italic">— sin convocatoria —</div>
                                {c.ultimo_dictamen_url && (
                                  <a href={c.ultimo_dictamen_url} target="_blank" rel="noopener" className="text-[10px] text-acento hover:underline">▸ Último dictamen</a>
                                )}
                              </div>
                            )}
                          </td>
                          <td className="text-right py-3 px-3 pr-4 font-mono">
                            {d30 == null ? <span className="text-gray-300">—</span> : (
                              <span className="text-sm font-bold" style={{color: d30 > 0 ? '#2e7d32' : d30 < 0 ? '#c62828' : '#9ca3af'}}>
                                {d30 > 0 ? '▲' : d30 < 0 ? '▼' : '·'} {Math.abs(d30).toFixed(0)}
                              </span>
                            )}
                          </td>
                          <td className="py-3 pr-3">
                            {filtro === 'mis' && (
                              <button onClick={() => onRemove(key)}
                                className="text-gray-300 hover:text-rose-600 w-6 h-6 text-base leading-none opacity-0 group-hover:opacity-100 transition">×</button>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                    {visibles.length === 0 && (
                      <tr>
                        <td colSpan="10" className="text-center py-6 text-[11px] text-gray-400 italic">Sin comisiones que mostrar con este filtro</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>

              {/* Footer terminal stats */}
              <div className="px-4 py-2 border-t border-gray-200 bg-gray-50 flex items-center justify-between flex-wrap gap-2 text-[10px] font-mono">
                <div className="flex items-center gap-4 text-gray-500">
                  <span>SESIONES·HOY <span className="text-gray-800 font-bold">{sesionesHoy}</span></span>
                  <span>DICT·MES·ACTUAL <span className="text-emerald-700 font-bold">+{dictMesActual}</span></span>
                  {hotspot && (
                    <span>HOTSPOT <span className="text-gray-800 font-bold">{(hotspot.nombre || '').slice(0, 24)}</span> · <span className="text-acento font-bold">{Math.round(hotspot.score_actividad || 0)}</span></span>
                  )}
                </div>
                <a href="/comisiones" target="_blank" rel="noopener" className="text-acento font-semibold hover:underline">Abrir pestaña Comisiones →</a>
              </div>

              {/* Modal Ver todas */}
              {verTodas && (
                <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4" onClick={() => setVerTodas(false)}>
                  <div onClick={e => e.stopPropagation()} className="bg-white rounded-2xl max-w-5xl w-full max-h-[85vh] flex flex-col" style={{boxShadow: '0 20px 60px rgba(0,0,0,0.15)'}}>
                    <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                      <div>
                        <div className="text-[10px] uppercase tracking-widest text-gray-500 font-bold">VER TODAS · COMISIONES LXVI</div>
                        <h2 className="text-lg font-black text-gray-900 mt-0.5">{total} comisiones registradas</h2>
                      </div>
                      <button onClick={() => setVerTodas(false)} className="text-gray-400 hover:text-gray-700 text-2xl leading-none w-8 h-8 hover:bg-gray-100 rounded-full">×</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-5">
                      <table className="w-full text-xs">
                        <thead>
                          <tr className="text-[9px] text-gray-500 font-bold border-b border-gray-200">
                            <th className="text-left py-2 pl-2 pr-2">Comisión</th>
                            <th className="text-center py-2 px-2 w-16">Cám.</th>
                            <th className="text-center py-2 px-2 w-16">Dict</th>
                            <th className="text-center py-2 px-2 w-16">Inic</th>
                            <th className="text-center py-2 px-2 w-16">Prop</th>
                            <th className="text-center py-2 px-2 w-16">Total</th>
                            <th className="text-center py-2 px-2 w-16">Score</th>
                            <th className="text-center py-2 px-2 w-20">Acción</th>
                          </tr>
                        </thead>
                        <tbody>
                          {(allComisiones || []).map((c) => {
                            const key = `${c.nombre}|${c.camara}`;
                            const sel = comisionesIds.has(key);
                            const sitl = c.sitl;
                            const dictN = c.tipos?.dictamen || 0;
                            const iniN = sitl?.iniciativas?.turnadas ?? c.tipos?.iniciativa ?? 0;
                            const propN = sitl?.proposiciones?.turnadas ?? c.tipos?.proposicion ?? 0;
                            const totalN = sitl?.turnadas ?? c.total_docs ?? 0;
                            return (
                              <tr key={key} className={`border-b border-gray-100 ${sel ? 'bg-emerald-50' : 'hover:bg-gray-50'}`}>
                                <td className="py-2 pl-2 pr-2 text-sm truncate" style={{maxWidth: '320px'}}>
                                  <button onClick={() => { setComDetalle(c); setVerTodas(false); }}
                                    className="text-gray-800 hover:text-acento hover:underline decoration-dotted underline-offset-2 transition-colors text-left truncate max-w-full"
                                    title={`Ver detalle de ${c.nombre}`}>{_nombreComisionDisplay(c.nombre)}</button>
                                </td>
                                <td className="text-center py-2 px-2 text-[10px] font-mono text-gray-600">{camaraLabel(c.camara)}</td>
                                <td className="text-center py-2 px-2 font-mono text-gray-800">{dictN}</td>
                                <td className="text-center py-2 px-2 font-mono text-gray-700">{iniN}</td>
                                <td className="text-center py-2 px-2 font-mono text-gray-700">{propN}</td>
                                <td className="text-center py-2 px-2 font-mono font-bold text-gray-900">{totalN}</td>
                                <td className="text-center py-2 px-2 font-mono font-bold" style={{color: colorScore(c.score_actividad || 0)}}>{Math.round(c.score_actividad || 0)}</td>
                                <td className="text-center py-2 px-2">
                                  <button onClick={() => sel ? onRemove(key) : (comisionesIds.size < 10 && onConfigClick())}
                                    className={`text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded border ${sel ? 'border-rose-300 text-rose-600 hover:bg-rose-50' : 'border-emerald-300 text-emerald-600 hover:bg-emerald-50'}`}>
                                    {sel ? '× Quitar' : '+ Sumar'}
                                  </button>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal detalle de comisión (click en el título) */}
              {comDetalle && (
                <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4" onClick={() => setComDetalle(null)}>
                  <div onClick={e => e.stopPropagation()} className="bg-white rounded-2xl max-w-3xl w-full max-h-[88vh] overflow-y-auto" style={{boxShadow: '0 20px 60px rgba(0,0,0,0.15)'}}>
                    <div className="sticky top-0 bg-white px-5 py-3 border-b border-gray-100 flex items-center justify-between z-10">
                      <div className="text-sm font-bold text-gray-900 truncate pr-3">{_nombreComisionDisplay(comDetalle.nombre)}</div>
                      <button onClick={() => setComDetalle(null)} className="text-gray-400 hover:text-gray-700 text-2xl leading-none w-8 h-8 hover:bg-gray-100 rounded-full flex-shrink-0">×</button>
                    </div>
                    <div className="p-5">
                      <ComisionDetalle comision={comDetalle} />
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        /* TriggerDesk — Alertas con reglas combinables AND/OR estilo terminal
           Ahora con probabilidad real calculada desde Worker /probabilidad (Nivel 1):
           - tema_score: frecuencia empírica de cruces en últimas 365d
           - legislador_actividad: Poisson sobre iniciativas_proy_15d
           - compuesta AND: producto · OR: 1-(1-p1)(1-p2) (asume independencia) */
        function TriggerDesk({ alertas, semaforo, allLegisladores, setConfig, config }) {
          const [showForm, setShowForm] = useState(false);
          const [logica, setLogica] = useState('AND');
          const [condiciones, setCondiciones] = useState([
            { tipo: 'tema_score', tema: '', operador: '>=', valor: 75 }
          ]);
          const [canales, setCanales] = useState({ email: true, push: false });
          /* Cache de probabilidades por alerta.id → { prob, confianza, descripcion, loading } */
          const [probs, setProbs] = useState({});

          /* Pide la probabilidad de UNA condición al endpoint /probabilidad */
          const fetchProbCondicion = async (c, ventanaDias = 30) => {
            const params = new URLSearchParams();
            params.set('ventana_dias', String(ventanaDias));
            if (c.tipo === 'tema_score') {
              if (!c.tema || c.valor == null) return null;
              params.set('tipo', 'tema_score');
              params.set('categoria', c.tema);
              params.set('operador', c.operador || '>=');
              params.set('umbral', String(c.valor));
            } else if (c.tipo === 'legislador_actividad') {
              if (!c.legislador_id) return null;
              params.set('tipo', 'legislador_actividad');
              params.set('legislador_id', String(c.legislador_id));
            } else if (c.tipo === 'evento_respuesta') {
              if (!c.tema) return null;
              params.set('tipo', 'evento_respuesta');
              params.set('categoria', c.tema);
            } else {
              return null;
            }
            try {
              const r = await fetch(`${WORKER_URL}/probabilidad?${params.toString()}`);
              const j = await r.json();
              return j;
            } catch (e) {
              return null;
            }
          };

          /* Para cada alerta esperando, calcular probabilidad combinando condiciones */
          useEffect(() => {
            let cancelled = false;
            const calcular = async () => {
              for (const a of alertas) {
                if (a.estado !== 'esperando' && a.estado !== 'disparado') continue;
                if (probs[a.id] && !probs[a.id].loading) continue;
                setProbs(prev => ({ ...prev, [a.id]: { loading: true } }));
                const conds = a.condiciones || [];
                const results = await Promise.all(conds.map(c => fetchProbCondicion(c, 30)));
                if (cancelled) return;
                const valid = results.filter(r => r && r.prob != null);
                if (valid.length === 0) {
                  setProbs(prev => ({ ...prev, [a.id]: { prob: null, descripcion: 'datos insuficientes' } }));
                  continue;
                }
                let probComb;
                if (a.logica === 'OR') {
                  probComb = 1 - valid.reduce((acc, r) => acc * (1 - r.prob), 1);
                } else {
                  probComb = valid.reduce((acc, r) => acc * r.prob, 1);
                }
                const confianzas = valid.map(r => r.confianza);
                const conf = confianzas.includes('baja') ? 'baja' : confianzas.includes('media') ? 'media' : 'alta';
                const desc = valid.length === 1 ? valid[0].descripcion : `${valid.length} condiciones combinadas (${a.logica || 'AND'}, asume independencia)`;
                setProbs(prev => ({ ...prev, [a.id]: { prob: probComb, confianza: conf, descripcion: desc, base: valid[0].base } }));
              }
            };
            calcular();
            return () => { cancelled = true; };
          }, [alertas]);

          const addCondicion = () => {
            setCondiciones([...condiciones, { tipo: 'tema_score', tema: '', operador: '>=', valor: 75 }]);
          };
          const removeCondicion = (i) => {
            setCondiciones(condiciones.filter((_, idx) => idx !== i));
          };
          const updateCondicion = (i, patch) => {
            setCondiciones(condiciones.map((c, idx) => idx === i ? { ...c, ...patch } : c));
          };

          const generarNombre = () => {
            const partes = condiciones.map(c => {
              if (c.tipo === 'tema_score') {
                const cat = semaforo.find(s => s.categoria === c.tema);
                return `${cat ? cat.nombre : 'tema'} ${c.operador} ${c.valor}`;
              } else if (c.tipo === 'legislador_actividad') {
                const leg = allLegisladores.find(l => l.id === Number(c.legislador_id));
                return `${leg ? formatNombreLegislador(leg) : 'legislador'} presenta`;
              } else if (c.tipo === 'evento_respuesta') {
                const cat = semaforo.find(s => s.categoria === c.tema);
                return `respuesta en ${cat ? cat.nombre : 'tema'}`;
              }
              return '?';
            });
            return partes.join(` ${logica} `);
          };

          /* ── Helpers de lenguaje natural (friendly) ── */
          const [modoAvanzado, setModoAvanzado] = useState(false);

          // Niveles amigables → {operador, valor}. "personalizado" deja editar.
          const NIVELES = [
            { k: 'alto',  label: 'llegue a nivel ALTO (75+)',   operador: '>=', valor: 75 },
            { k: 'max',   label: 'llegue al MÁXIMO (90+)',       operador: '>=', valor: 90 },
            { k: 'bajo',  label: 'baje a nivel BAJO (40 o menos)', operador: '<=', valor: 40 },
          ];
          const nivelDeCondicion = (c) => {
            const m = NIVELES.find(n => n.operador === c.operador && n.valor === c.valor);
            return m ? m.k : 'personalizado';
          };
          const aplicarNivel = (i, k) => {
            if (k === 'personalizado') { updateCondicion(i, { operador: '>=', valor: 75 }); return; }
            const n = NIVELES.find(x => x.k === k);
            if (n) updateCondicion(i, { operador: n.operador, valor: n.valor });
          };

          // Frase en español de una condición
          const fraseCondicion = (c) => {
            if (c.tipo === 'tema_score') {
              const cat = semaforo.find(s => s.categoria === c.tema);
              const nom = cat ? cat.nombre : '(elige un tema)';
              const op = c.operador === '<=' || c.operador === '<' ? 'baje a' : 'llegue a';
              return `el tema ${nom} ${op} ${c.valor}`;
            }
            if (c.tipo === 'legislador_actividad') {
              const leg = allLegisladores.find(l => l.id === Number(c.legislador_id));
              return `${leg ? formatNombreLegislador(leg) : '(elige un legislador)'} presente un instrumento (iniciativa o proposición)`;
            }
            if (c.tipo === 'evento_respuesta') {
              const cat = semaforo.find(s => s.categoria === c.tema);
              const nom = cat ? cat.nombre : '(elige un tema)';
              return `tras un evento en ${nom}, el Congreso responda con un instrumento`;
            }
            return '…';
          };
          // Preview completo: "Te avisaremos por correo cuando …"
          const fraseAlerta = () => {
            const partes = condiciones.map(fraseCondicion);
            const union = logica === 'OR' ? ' o cuando ' : ' y además ';
            const canal = canales.email ? 'por correo' : 'en la consola';
            return `Te avisaremos ${canal} cuando ${partes.join(union)}.`;
          };

          // Plantillas de 1 clic — preconfiguran condiciones; el usuario solo
          // elige el tema/legislador y guarda.
          const plantillas = [
            { id: 't_alto', icon: '📈', titulo: 'Un tema sube a nivel alto',
              desc: 'Te avisamos cuando un tema que sigues llega a 75+',
              setup: () => { setLogica('AND'); setModoAvanzado(false);
                setCondiciones([{ tipo: 'tema_score', tema: '', operador: '>=', valor: 75 }]); } },
            { id: 't_max', icon: '🚨', titulo: 'Un tema llega al máximo',
              desc: 'Alerta fuerte: el tema alcanza 90+',
              setup: () => { setLogica('AND'); setModoAvanzado(false);
                setCondiciones([{ tipo: 'tema_score', tema: '', operador: '>=', valor: 90 }]); } },
            { id: 't_leg', icon: '🧑‍⚖️', titulo: 'Un legislador presenta algo',
              desc: 'Cuando alguien que vigilas presenta iniciativa o punto de acuerdo',
              setup: () => { setLogica('AND'); setModoAvanzado(false);
                setCondiciones([{ tipo: 'legislador_actividad', legislador_id: '' }]); } },
            { id: 't_evento', icon: '⚡', titulo: 'Evento → respuesta del Congreso',
              desc: 'Probabilidad de que el Congreso reaccione a un evento mediático en un tema',
              setup: () => { setLogica('AND'); setModoAvanzado(false);
                setCondiciones([{ tipo: 'evento_respuesta', tema: '' }]); } },
          ];

          const submit = () => {
            /* Validar */
            const validas = condiciones.every(c => {
              if (c.tipo === 'tema_score') return c.tema && c.valor != null;
              if (c.tipo === 'legislador_actividad') return c.legislador_id;
              if (c.tipo === 'evento_respuesta') return c.tema;
              return false;
            });
            if (!validas) return;
            const nueva = {
              id: Date.now(),
              nombre: generarNombre(),
              condiciones: [...condiciones],
              logica,
              canales: Object.entries(canales).filter(([,v]) => v).map(([k]) => k),
              estado: 'esperando',
              fecha_creada: new Date().toISOString(),
              disparos_total: 0,
              ultima_disparada: null,
            };
            setConfig({ ...config, alertas: [...alertas, nueva] });
            setShowForm(false);
            setCondiciones([{ tipo: 'tema_score', tema: '', operador: '>=', valor: 75 }]);
            setLogica('AND');
            setModoAvanzado(false);
          };

          const togglePausar = (id) => {
            setConfig({ ...config, alertas: alertas.map(a => a.id === id ? { ...a, estado: a.estado === 'pausada' ? 'esperando' : 'pausada' } : a) });
          };
          const eliminar = (id) => {
            setConfig({ ...config, alertas: alertas.filter(a => a.id !== id) });
          };

          /* Renderizado de una condición individual en card */
          const renderCondicion = (c, i, leyenda) => {
            if (c.tipo === 'tema_score') {
              const cat = semaforo.find(s => s.categoria === c.tema);
              return (
                <span key={i} className="font-mono">
                  {leyenda && <span className="text-gray-400 mr-1.5">{leyenda}</span>}
                  <span className="text-gray-800">{cat ? cat.nombre : '—'}</span>
                  <span className="text-gray-500 mx-1.5">{c.operador}</span>
                  <span className="text-gray-800 font-bold">{c.valor}</span>
                </span>
              );
            } else if (c.tipo === 'legislador_actividad') {
              const leg = allLegisladores.find(l => l.id === Number(c.legislador_id));
              return (
                <span key={i} className="font-mono">
                  {leyenda && <span className="text-gray-400 mr-1.5">{leyenda}</span>}
                  <span className="text-gray-800">{leg ? formatNombreLegislador(leg) : '—'}</span>
                  <span className="text-gray-500 mx-1.5">presenta instrumento</span>
                </span>
              );
            } else if (c.tipo === 'evento_respuesta') {
              const cat = semaforo.find(s => s.categoria === c.tema);
              return (
                <span key={i} className="font-mono">
                  {leyenda && <span className="text-gray-400 mr-1.5">{leyenda}</span>}
                  <span className="text-gray-500 mr-1.5">evento→respuesta</span>
                  <span className="text-gray-800">{cat ? cat.nombre : '—'}</span>
                </span>
              );
            }
            return null;
          };

          return (
            <div className="glass border border-borde rounded-xl">
              {/* Header consistente con el resto: tipografía Inter, sin font-mono */}
              <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200">
                <div>
                  <div className="text-xs font-semibold text-gray-500">Trigger Desk</div>
                  <div className="text-[10px] text-gray-400 mt-0.5">{alertas.length} alerta{alertas.length === 1 ? '' : 's'} configurada{alertas.length === 1 ? '' : 's'}</div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => setShowForm(!showForm)}
                    className="text-[11px] font-semibold px-3 py-1.5 rounded-full transition border"
                    style={showForm ? {background:'#f3f4f6', color:'#6b7280', borderColor:'#d1d5db'} : {background:'#1a365d', color:'white', borderColor:'#1a365d'}}>
                    {showForm ? 'Cancelar' : '+ Nueva alerta'}
                  </button>
                  <ShareButton title="Trigger Desk — Fiat Console"
                    getText={() => `Trigger Desk · ${alertas.length} alerta(s) configurada(s):\n${alertas.slice(0,5).map(a => `· ${a.nombre}`).join('\n')}`} /></div>
              </div>

              <div className="p-4 space-y-3">
                {/* Form de nueva regla */}
                {showForm && (
                  <div className="border border-gray-200 bg-white rounded-xl p-4 space-y-4">
                    <div className="text-sm font-bold text-gray-900">Crear una alerta</div>

                    {/* Plantillas de 1 clic */}
                    <div>
                      <div className="text-[11px] font-semibold text-gray-500 mb-1.5">Empieza con una plantilla</div>
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                        {plantillas.map(p => (
                          <button key={p.id} onClick={p.setup}
                            className="text-left p-3 rounded-lg border border-gray-200 hover:border-acento hover:bg-gray-50 transition">
                            <div className="text-lg leading-none mb-1.5">{p.icon}</div>
                            <div className="text-[12px] font-bold text-gray-800 leading-tight">{p.titulo}</div>
                            <div className="text-[11px] text-gray-500 mt-0.5 leading-snug">{p.desc}</div>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Builder guiado en lenguaje natural */}
                    <div className="border-t border-gray-100 pt-3">
                      <div className="text-[11px] font-semibold text-gray-500 mb-2">…o ajústala a tu medida</div>
                      <div className="space-y-2">
                        {condiciones.map((c, i) => (
                          <div key={i} className="bg-gray-50 rounded-lg border border-gray-200 p-3">
                            <div className="flex items-center justify-between mb-2">
                              <span className="text-[11px] font-semibold text-gray-500">
                                {i === 0 ? 'Avísame cuando' : (logica === 'OR' ? 'o cuando' : 'y además cuando')}
                              </span>
                              {condiciones.length > 1 && (
                                <button onClick={() => removeCondicion(i)} className="text-[11px] text-gray-400 hover:text-rose-600 font-medium">Quitar</button>
                              )}
                            </div>
                            <div className="flex flex-wrap items-center gap-2 text-sm text-gray-700">
                              <select value={c.tipo}
                                onChange={e => updateCondicion(i, { tipo: e.target.value, tema: '', legislador_id: '' })}
                                className="px-2.5 py-1.5 border border-gray-200 rounded-lg bg-white text-sm">
                                <option value="tema_score">un tema</option>
                                <option value="legislador_actividad">un legislador</option>
                                <option value="evento_respuesta">un evento → respuesta del Congreso</option>
                              </select>
                              {c.tipo === 'tema_score' && (
                                <React.Fragment>
                                  <select value={c.tema} onChange={e => updateCondicion(i, { tema: e.target.value })}
                                    className="px-2.5 py-1.5 border border-gray-200 rounded-lg bg-white text-sm">
                                    <option value="">elige tema…</option>
                                    {semaforo.map(s => <option key={s.categoria} value={s.categoria}>{s.nombre}</option>)}
                                  </select>
                                  <select value={nivelDeCondicion(c)} onChange={e => aplicarNivel(i, e.target.value)}
                                    className="px-2.5 py-1.5 border border-gray-200 rounded-lg bg-white text-sm">
                                    {NIVELES.map(n => <option key={n.k} value={n.k}>{n.label}</option>)}
                                    <option value="personalizado">personalizado…</option>
                                  </select>
                                  {nivelDeCondicion(c) === 'personalizado' && (
                                    <span className="flex items-center gap-1">
                                      <select value={c.operador} onChange={e => updateCondicion(i, { operador: e.target.value })}
                                        className="px-2 py-1.5 border border-gray-200 rounded-lg bg-white text-sm">
                                        <option value=">=">≥</option><option value=">">&gt;</option>
                                        <option value="<=">≤</option><option value="<">&lt;</option>
                                      </select>
                                      <input type="number" min="0" max="100" value={c.valor}
                                        onChange={e => updateCondicion(i, { valor: Number(e.target.value) })}
                                        className="w-16 px-2 py-1.5 border border-gray-200 rounded-lg bg-white text-sm" />
                                    </span>
                                  )}
                                </React.Fragment>
                              )}
                              {c.tipo === 'legislador_actividad' && (
                                <React.Fragment>
                                  <select value={c.legislador_id || ''} onChange={e => updateCondicion(i, { legislador_id: e.target.value })}
                                    className="px-2.5 py-1.5 border border-gray-200 rounded-lg bg-white text-sm flex-1 min-w-[180px]">
                                    <option value="">elige legislador…</option>
                                    {allLegisladores.map(l => <option key={l.id} value={l.id}>{formatNombreLegislador(l)}</option>)}
                                  </select>
                                  <span className="text-sm text-gray-500">presente un instrumento</span>
                                </React.Fragment>
                              )}
                              {c.tipo === 'evento_respuesta' && (
                                <React.Fragment>
                                  <span className="text-sm text-gray-500">en</span>
                                  <select value={c.tema} onChange={e => updateCondicion(i, { tema: e.target.value })}
                                    className="px-2.5 py-1.5 border border-gray-200 rounded-lg bg-white text-sm">
                                    <option value="">elige tema…</option>
                                    {semaforo.map(s => <option key={s.categoria} value={s.categoria}>{s.nombre}</option>)}
                                  </select>

                    <div className="bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2.5 text-[13px] text-emerald-900 leading-snug">

                    </div>

                    <div className="flex items-center justify-end gap-2">
                      <button onClick={() => setShowForm(false)}
                        className="text-sm font-semibold px-4 py-2 rounded-full border border-gray-300 text-gray-600 hover:bg-gray-50 transition">Cancelar</button>

                {/* Lista de alertas */}
                {alertas.length === 0 && !showForm ? (

                    </button>
                  </div>

                  <div className="space-y-2">
                    {alertas.map((a, idx) => {
                      const isDisparada = a.estado === 'disparado';
                      const isPausada = a.estado === 'pausada';
                      const borderColor = isDisparada ? '#16a34a' : isPausada ? '#9ca3af' : '#d97706';
                      const bgColor = isDisparada ? '#f0fdf4' : isPausada ? '#f9fafb' : '#fffbeb';
                      const estadoTxt = isDisparada ? 'Activa' : isPausada ? 'Pausada' : 'En espera';
                      const estadoCls = isDisparada ? 'bg-emerald-100 text-emerald-700'
                        : isPausada ? 'bg-gray-200 text-gray-600' : 'bg-amber-100 text-amber-700';
                      const diasCreada = Math.floor((Date.now() - new Date(a.fecha_creada).getTime()) / (1000*60*60*24));
                      const union = a.logica === 'OR' ? ' o cuando ' : ' y además ';
                      const desc = (a.condiciones || []).map(fraseCondicion).join(union);
                      const p = probs[a.id];
                      return (
                        <div key={a.id} className="rounded-xl border border-gray-200 border-l-4 p-3.5" style={{borderLeftColor: borderColor, background: bgColor}}>
                          <div className="flex items-center justify-between mb-1.5">
                            <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full ${estadoCls}`}>{estadoTxt}</span>
                            <span className="text-[11px] text-gray-400">creada hace {diasCreada === 0 ? 'hoy' : diasCreada + 'd'}</span>
                          </div>
                          <div className="text-[14px] text-gray-900 mb-2 leading-snug">
                            <span className="text-gray-500">Avísame cuando </span>{desc}.
                          </div>
                          <div className="flex items-center gap-x-5 gap-y-1 flex-wrap text-[12px] mb-2.5">
                            {!isPausada && !isDisparada && (
                              <span className="text-gray-600" title={p?.descripcion || 'Calculando…'}>
                                Probabilidad:{' '}
                                {(() => {
                                  if (!p || p.loading) return <span className="text-gray-400">calculando…</span>;
                                  if (p.prob == null) return <span className="text-gray-400 italic">sin datos suficientes</span>;
                                  const pct = Math.round(p.prob * 100);
                                  const color = pct >= 67 ? '#16a34a' : pct >= 33 ? '#d97706' : '#dc2626';
                                  const conf = p.confianza ? ` · confianza ${p.confianza}` : '';
                                  return <span className="font-bold" style={{color}}>{pct}%<span className="font-normal text-gray-400">{conf}</span></span>;
                                })()}
                              </span>
                            )}
                            {isDisparada && <span className="text-emerald-700 font-semibold">Se cumplió la condición</span>}
                            <span className="text-gray-500">Aviso por {(a.canales || ['email']).map(c => c === 'email' ? 'correo' : c).join(' y ')}</span>
                            <span className="text-gray-400">{a.disparos_total || 0} aviso{(a.disparos_total||0) === 1 ? '' : 's'} enviado{(a.disparos_total||0) === 1 ? '' : 's'}</span>
                          </div>
                          <div className="flex items-center gap-4 pt-2 border-t border-gray-200/70 text-[12px]">
                            <button onClick={() => togglePausar(a.id)} className="text-acento hover:underline font-medium">{isPausada ? 'Activar' : 'Pausar'}</button>
                            <button onClick={() => eliminar(a.id)} className="text-gray-400 hover:text-rose-600 font-medium ml-auto">Eliminar</button>
                          </div>
                        </div>
                      );
                    })}
                    {/* CTA crear nueva al final */}
                    {!showForm && (
                      <button onClick={() => setShowForm(true)}
                        className="w-full border-2 border-dashed border-gray-300 hover:border-acento hover:bg-gray-50 transition py-3 rounded-xl text-[13px] text-gray-500 hover:text-acento font-semibold">
                        + Crear otra alerta
                      </button>
                    )}
                  </div>
                )}

                <div className="text-[11px] text-gray-400 mt-2 leading-snug">
                  Tus alertas se guardan en tu cuenta. El aviso por correo se activa en la siguiente versión.
                </div>
              </div>
            </div>
          );
        }

        /* ================================================================
           MAIN APP
           ================================================================ */

        function App() {
            const [data, setData] = useState(null);
            const [selected, setSelected] = useState(null);
            /* Ruteo por URL limpia: /dashboard=Actividad, /radar, /mapa,
               /comisiones. Métricas (resoluciones) sin URL por ahora.
               Compat: sigue aceptando ?tab= (links viejos de consola-pro). */
            const PATH_TO_TAB = { '': 'actividad', '/': 'actividad', '/dashboard': 'actividad',
                '/radar': 'radar', '/mapa': 'mapa', '/comisiones': 'comisiones', '/consola': 'consola' };
            const TAB_TO_PATH = { actividad: '/dashboard', radar: '/radar', mapa: '/mapa', comisiones: '/comisiones', consola: '/consola' };
            const tabFromURL = (() => {
                try {
                    const p = (window.location.pathname || '/').replace(/\/+$/, '') || '/';
                    // Ruta limpia explícita (no raíz) manda.
                    if (p !== '/' && PATH_TO_TAB[p]) return PATH_TO_TAB[p];
                    // Compat: ?tab= (links viejos / compartidos).
                    const t = new URLSearchParams(window.location.search).get('tab');
                    if (['actividad','radar','mapa','comisiones','resoluciones','legisladores','metodologia','consola'].includes(t)) return t;
                    return PATH_TO_TAB[p] || 'actividad';
                } catch { return 'actividad'; }
            })();
            const [pagina, setPagina] = useState(tabFromURL);
            const [loading, setLoading] = useState(true);
            const [busquedaGlobal, setBusquedaGlobal] = useState('');
            const [showRegistro, setShowRegistro] = useState(false);
            const [showPoliticas, setShowPoliticas] = useState(false);
            const [showFAQ, setShowFAQ] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [authUser, setAuthUser] = useState(null);
            const [authReady, setAuthReady] = useState(false);
            const [showCuenta, setShowCuenta] = useState(false);
            const [bienvenidaCerrada, setBienvenidaCerrada] = useState(false);
            const [infoBubbleDismissed, setInfoBubbleDismissed] = useState(false);
            /* Wizard de configuración de consola (Fase 1 de unificación).
               Config POR USUARIO en localStorage. allLegisladores/allComisiones
               se cargan del Worker solo cuando hay sesión (no cargar costo en
               visitantes anónimos). */
            const [showConfigWizard, setShowConfigWizard] = useState(false);
            /* Legislador abierto desde la consola personalizada (Fase 2).
               Estado propio para no interferir con `selected`/DetalleModal
               (que espera objetos de categoría, no legisladores). */
            const [legConsola, setLegConsola] = useState(null);
            const [consolaConfig, setConsolaConfigState] = useState(() => loadConsolaConfig(null));
            const [allLegisladores, setAllLegisladores] = useState([]);
            const [allComisiones, setAllComisiones] = useState([]);
            /* Recargar config al cambiar de usuario (clave per-user). */
            useEffect(() => {
                setConsolaConfigState(loadConsolaConfig(authUser));
            }, [authUser ? authUser.id : null]);
            const setConsolaConfig = (next) => {
                setConsolaConfigState(next);
                try { localStorage.setItem(consolaConfigKey(authUser), JSON.stringify(next)); } catch {}
            };

            useEffect(() => {
                fetch('./data.json?v=' + Date.now()).then(r => r.ok ? r.json() : Promise.reject()).then(d => { setData(d); setLoading(false); }).catch(() => { setLoading(false); });
            }, []);

            /* Sesión Supabase: estado global + escucha cambios (login/logout). */
            useEffect(() => {
                if (!sb) { setAuthReady(true); return; }
                sb.auth.getSession().then(({ data }) => {
                    setAuthUser(data.session ? data.session.user : null);
                    setAuthReady(true);
                });
                const { data: sub } = sb.auth.onAuthStateChange((_evt, session) => {
                    setAuthUser(session ? session.user : null);
                });
                return () => { try { sub.subscription.unsubscribe(); } catch {} };
            }, []);

            /* Carga legisladores + comisiones para el wizard de consola.
               Solo cuando hay sesión y data.json ya cargó → no genera costo
               de red para visitantes anónimos. Paginado vía /radar?limite=100. */
            useEffect(() => {
                if (!authUser || !data) return;
                const WORKER_URL = 'https://fiat-busqueda.rreubenleon.workers.dev';
                fetch(`${WORKER_URL}/radar?limite=100`).then(r => r.ok ? r.json() : { legisladores: [] }).then(radar => {
                    setAllLegisladores(radar.legisladores || []);
                    const total = radar.total || 0;
                    if (total > 100) {
                        const pages = Math.ceil(total / 100);
                        const ps = [];
                        for (let p = 2; p <= pages; p++) ps.push(fetch(`${WORKER_URL}/radar?limite=100&pagina=${p}`).then(r => r.ok ? r.json() : { legisladores: [] }));
                        Promise.all(ps).then(results => {
                            const todos = [...(radar.legisladores || [])];
                            results.forEach(r => todos.push(...(r.legisladores || [])));
                            setAllLegisladores(todos);
                        });
                    }
                }).catch(() => {});
                fetch(`${WORKER_URL}/comisiones`).then(r => r.ok ? r.json() : { comisiones: [] })
                    .then(d => setAllComisiones(d.comisiones || [])).catch(() => {});
            }, [authUser ? authUser.id : null, !!data]);

            /* Sincroniza la URL con la pestaña activa (URLs limpias). */
            const _rutaInicial = useRef(true);
            useEffect(() => {
                const path = TAB_TO_PATH[pagina];
                if (!path) { _rutaInicial.current = false; return; } // Métricas/ocultas: sin URL
                const actual = (window.location.pathname || '/').replace(/\/+$/, '') || '/';
                if (actual === path) { _rutaInicial.current = false; return; }
                try {
                    if (_rutaInicial.current) window.history.replaceState(null, '', path);
                    else window.history.pushState(null, '', path);
                } catch {}
                _rutaInicial.current = false;
            }, [pagina]);

            useEffect(() => {
                const onPop = () => {
                    const p = (window.location.pathname || '/').replace(/\/+$/, '') || '/';
                    if (PATH_TO_TAB[p]) { setSelected(null); setPagina(PATH_TO_TAB[p]); }
                };
                window.addEventListener('popstate', onPop);
                return () => window.removeEventListener('popstate', onPop);
            }, []);

            if (loading) return (

                                stroke="#10b981"

                    </div>
                </div>
            );
            if (!data) return (<div className="min-h-screen flex items-center justify-center"><div className="text-center space-y-4 text-gray-500"><div className="text-4xl">&#128202;</div><div>No se encontro data.json. Ejecuta el pipeline primero.</div><code className="text-xs bg-gray-100 border border-gray-200 px-3 py-1 rounded text-gray-700">python main.py</code></div></div>);

                                    <span>FIAT &copy; 2026</span>
                                    <span className="text-gray-300">&middot;</span>
                                    <button onClick={() => setShowPoliticas(true)} className="hover:text-acento transition-colors">Politicas de uso</button>
                                    <span className="text-gray-300">&middot;</span>
                                    <button onClick={() => setShowFAQ(true)} className="hover:text-acento transition-colors">Preguntas frecuentes</button>
                                    <span className="text-gray-300">&middot;</span>
                                    <a href="https://sil.gobernacion.gob.mx/portal" target="_blank" rel="noopener noreferrer" className="hover:text-acento transition-colors">SIL</a>
                                    <span className="text-gray-300">&middot;</span>
                                    <a href="https://gaceta.diputados.gob.mx" target="_blank" rel="noopener noreferrer" className="hover:text-acento transition-colors">Gaceta Diputados</a>
                                    <span className="text-gray-300">&middot;</span>
                                    <a href="https://www.senado.gob.mx/66/gaceta_del_senado" target="_blank" rel="noopener noreferrer" className="hover:text-acento transition-colors">Gaceta Senado</a>
                                </div>
                                <span>Actualizado: {formatearActualizacion(data.metadata.generado)}</span>
                            </div>
                        </div>
                    </footer>

                    {/* Modal Políticas de uso */}
                    {showPoliticas && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setShowPoliticas(false)}>
                            <div className="bg-white rounded-2xl max-w-lg w-full max-h-[80vh] overflow-y-auto p-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg font-bold text-gray-800">Politicas de uso</h2>
                                    <button onClick={() => setShowPoliticas(false)} className="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">&times;</button>
                                </div>
                                <div className="space-y-3 text-sm text-gray-600 leading-relaxed">
                                    <p>FIAT es una herramienta de inteligencia legislativa de uso informativo. Los datos presentados son recopilados de fuentes publicas oficiales del Congreso de la Union de Mexico.</p>
                                    <p><strong>Uso permitido:</strong> Consulta, analisis e investigacion sobre actividad legislativa. Los scores y predicciones son estimaciones basadas en algoritmos y no constituyen asesoria legal o politica.</p>
                                    <p><strong>Propiedad intelectual:</strong> El contenido, diseno, algoritmos y marca FIAT son propiedad de sus creadores. Queda prohibida la reproduccion total o parcial sin autorizacion.</p>
                                    <p><strong>Datos:</strong> La informacion legislativa proviene de la Gaceta Parlamentaria, el Sistema de Informacion Legislativa (SIL) y medios de comunicacion publicos. FIAT no genera ni altera documentos oficiales.</p>
                                    <p><strong>Contacto:</strong> Para dudas, sugerencias o reportar errores: <a href="mailto:contacto@fiatmx.com" className="text-acento hover:underline">contacto@fiatmx.com</a></p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Preguntas Frecuentes */}
                    {showFAQ && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setShowFAQ(false)}>
                            <div className="bg-white rounded-2xl max-w-lg w-full max-h-[80vh] overflow-y-auto p-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg font-bold text-gray-800">Preguntas frecuentes</h2>
                                    <button onClick={() => setShowFAQ(false)} className="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">&times;</button>
                                </div>
                                <div>
                                    {[
                                        ["¿Que es Fiat?", "FIAT es un sistema de inteligencia legislativa que monitorea en tiempo real la actividad del Congreso de Mexico. Analiza iniciativas, dictamenes, puntos de acuerdo y medios de comunicacion para generar alertas y predicciones sobre temas legislativos clave."],
                                        ["¿De donde provienen los datos?", "Los datos se obtienen de fuentes publicas oficiales y medios de comunicacion. El sistema se actualiza automaticamente seis veces al dia."],
                                        ["¿Que significa el score de cada categoria?", "El score (0-100) es un indicador compuesto que combina volumen de noticias, actividad legislativa actual y pasada y tendencia de busquedas en internet. Un score alto indica mayor probabilidad de actividad legislativa en ese tema."],
                                        ["¿Por que probabilidades y no posibilidades?", "En 1951, un analista de la CIA llamado Sherman Kent reporto que una invasion a Yugoslavia era una \"posibilidad seria\". El pensaba que eso significaba 65% o mas. Su jefe lo interpreto como 20%. La consecuencia fue un error masivo de politica exterior. Cuando preguntas que significa \"posible\", las respuestas van desde 5% hasta 80%. Por eso en FIAT usamos numeros. Cuando decimos que un tema tiene un score de 73, no hay ambiguedad. No es algo probable ni bastante posible, es 73 de 100. Esto te permite comparar temas entre si, seguir su evolucion en el tiempo y tomar decisiones informadas sin depender de interpretaciones subjetivas."],
                                        ["¿Que tan precisas son las predicciones?", "Las predicciones son estimaciones, no certezas. Un score de 70% no significa que algo va a pasar, significa que hay senales fuertes de actividad. Asi como un pronostico de 30% de lluvia no quiere decir que no va a llover, solo que es menos probable, nuestros scores reflejan la intensidad de las senales legislativas en un momento dado. La seccion de Resoluciones muestra el historial de precision semanal para que puedas evaluar que tan bien calibrado esta el sistema."],
                                        ["¿Que son las comisiones y como se mide su actividad?", "Las comisiones son organos del Congreso donde se analizan y dictaminan las iniciativas y proposiciones con punto de acuerdo. Fiat mide su actividad contando los documentos procesados en los ultimos 60 dias y asignando un score de actividad relativo."],
                                        ["¿Como puedo contactar al equipo?", "Puedes escribirnos a contacto@fiatmx.com o seguirnos en X (Twitter) como @Fiat_MX para recibir alertas automaticas sobre actividad legislativa relevante."],
                                    ].map(([q, a], i, arr) => (
                                        <details key={i} className="group">
                                            <summary className="flex items-center justify-between py-3 cursor-pointer">
                                                <span className="text-[13px] font-medium text-gray-800">{q}</span>
                                                <svg className="w-3.5 h-3.5 text-gray-300 transition-transform group-open:rotate-180 flex-shrink-0 ml-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>
                                            </summary>
                                            <div className="pb-3 text-[12px] text-gray-500 leading-relaxed">{a}</div>
                                            {i < arr.length - 1 && <div className="border-b border-gray-100"></div>}
                                        </details>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal detalle */}
                    {selected && (
                        <DetalleModal data={selected} prediccion={predicciones[selected.categoria]} fuentes={fuentes} seriesTemporales={data.series_temporales} seriesTemporalesMedios={data.series_temporales_medios} autoria={data.autoria?.[selected.categoria]} generado={data.metadata.generado} onClose={() => setSelected(null)} />
                    )}

                    {/* Modal legislador desde la consola personalizada (Fase 2) */}
                    {legConsola && (
                        <RadarPlayerModal leg={legConsola} autoria={data.autoria || {}} onClose={() => setLegConsola(null)} />
                    )}

                    {/* Modal Registro */}
                    {showRegistro && <LoginModal initialMode="signup" onClose={() => setShowRegistro(false)} />}
                    {showLogin && <LoginModal initialMode="login" onClose={() => setShowLogin(false)} />}
                    {authReady && authUser && !consolaConfigurada(authUser) && !bienvenidaCerrada && (
                        <BienvenidaModal user={authUser} onClose={() => setBienvenidaCerrada(true)} onConfigurar={() => setShowConfigWizard(true)} />
                    )}
                    {showCuenta && authUser && <MiCuentaModal user={authUser} onClose={() => setShowCuenta(false)} />}

                    {/* Wizard de configuración de consola (Fase 1 unificación).
                        Solo para usuarios con sesión. Al cerrar: persiste, cierra
                        y — si quedó ≥1 selección — lleva al usuario a su consola
                        personalizada (Fase 2). */}
                    {showConfigWizard && authUser && (
                        <ConsolaProConfigModal
                            data={data}
                            allLegisladores={allLegisladores}
                            allComisiones={allComisiones}
                            config={consolaConfig}
                            setConfig={setConsolaConfig}
                            onClose={() => {
                                setShowConfigWizard(false);
                                try {
                                    const c = loadConsolaConfig(authUser);
                                    const total = (c.legisladores || []).length + (c.temas || []).length + (c.estados || []).length;
                                    if (total > 0) { setSelected(null); setPagina('consola'); }
                                } catch {}
                            }}
                        />
                    )}

                    {/* Info Bubble - abre FAQ, desaparece al cerrar */}
                    {!infoBubbleDismissed && (
                        <div className="fixed bottom-6 right-6 z-50">
                            <button onClick={() => { setShowFAQ(true); setInfoBubbleDismissed(true); }}
                                className="w-12 h-12 rounded-full shadow-lg hover:shadow-xl hover:scale-105 transition-all flex items-center justify-center group" style={{background: '#307f34'}}>
                                <span className="text-white text-xl font-serif italic group-hover:scale-110 transition-transform">i</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
