name: Publicar Dashboard en GitHub Pages

on:
  # Se ejecuta cuando el pipeline actualiza data.json
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Podar JSON grandes que solo usan los scrapers, no el frontend (ver
      # pipeline.yml). Evita subir ~100MB de peso muerto a Pages.
      - name: Podar archivos no usados por el frontend
        run: |
          rm -f dashboard/diputados_lxvi_oficial.json \
                dashboard/senadores_lxvi_oficial.json \
                dashboard/diputados_urls_oficial.json
          echo "Tamaño del dashboard a desplegar:"; du -sh dashboard

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
