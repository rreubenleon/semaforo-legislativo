name: Popular Estatus Faltantes (one-off)

# Workflow one-off para llenar el campo `estatus` en sil_documentos
# que vienen del scraper de senado.gob.mx pero quedaron con estatus NULL.
# Después de correr, re-ejecuta radar_pipeline (skip-scraper) para que
# los conteos por estado en D1 se actualicen.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limitar docs (vacío = todos)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: "popular-estatus"
  cancel-in-progress: false

jobs:
  popular:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Restaurar SQLite DB
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-estatus-${{ github.run_id }}
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      # 1. Popular estatus
      - name: Popular estatus desde SIL Gobernación
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            python scripts/popular_estatus_faltantes.py --limit ${{ inputs.limit }}
          else
            python scripts/popular_estatus_faltantes.py
          fi

      # 2. Re-correr radar (solo paso_conteos_estado en realidad,
      #    pero radar_pipeline --skip-scraper hace todo lo demás también)
      - name: Recalcular conteos y sync D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/radar_pipeline.py --skip-scraper

      # 3. Verificación
      - name: Verificación Camarillo
        run: |
          sleep 5
          curl -s "https://fiat-busqueda.rreubenleon.workers.dev/radar?camara=Senado&limite=2000" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          rows = d.get('legisladores') or []
          for tn in ['Camarillo', 'Viggiano', 'Angulo']:
              for c in [r for r in rows if tn in (r.get('nombre','') or '')][:1]:
                  ini_ap = c.get('n_ini_aprob_ind',0) + c.get('n_ini_aprob_col',0)
                  ini_pe = c.get('n_ini_pend_ind',0) + c.get('n_ini_pend_col',0)
                  ini_de = c.get('n_ini_desech_ind',0) + c.get('n_ini_desech_col',0)
                  print(f\"{c['nombre']}: ini A={ini_ap} P={ini_pe} D={ini_de}\")
          "

      # 4. Guardar BD
      - name: Guardar SQLite DB en cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-estatus-${{ github.run_id }}
