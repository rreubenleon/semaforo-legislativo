name: Refresh Mensual (JUCOPO + Roster + Limpieza)

# Datos legislativos institucionales que cambian con baja frecuencia
# (1-2 veces al año típicamente). Se ejecuta una vez al mes.
#
# Incluye:
#   - JUCOPO + Mesa Directiva del Senado (scrape senado.gob.mx)
#   - Sync legisladores comisiones a D1 (post-limpieza)
#   - Limpieza de comisiones falsas (idempotente, barato)
#
# NO incluye scrapes de iniciativas/dictámenes (eso es semanal).

on:
  schedule:
    # 1er día de cada mes a las 14:00 UTC (8am CDMX en CDT, 9am CST)
    - cron: '0 14 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "monthly-refresh"
  cancel-in-progress: false

jobs:
  refresh-mensual:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      # Restaurar BD del cache. Si no hay (raro), usar seed.
      - name: Restaurar SQLite DB
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-monthly-${{ github.run_id }}
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      # 1. Limpieza de comisiones falsas (idempotente)
      - name: Limpiar comisiones falsas senadores
        run: python scripts/limpiar_cargos_senadores.py
        continue-on-error: true

      - name: Limpiar comisiones falsas diputados
        run: python scripts/limpiar_cargos_diputados.py
        continue-on-error: true

      # 2. Refresh JUCOPO + Mesa Directiva Senado (scrape + sync D1)
      - name: Refresh JUCOPO Senado (sync a D1 al final)
        run: python scripts/scrape_organos_senado.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 3. Sync comisiones limpias a D1
      - name: Sync legisladores comisiones a D1
        run: python scripts/sync_legisladores_cargo_d1.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 4. Re-scrape perfiles SIL — bio, año nacimiento, estudios, etc.
      #    El enriquecimiento biográfico es estático, mensual es suficiente.
      #    ~30 min para los 686 legisladores.
      - name: Re-scrape perfiles SIL (bio + estudios)
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u -m scrapers.perfil_sil --modo incremental
        continue-on-error: true

      # 4b. Scraper de RESPALDO Diputados: rellena los huecos que el
      #     SIL Gobernación no logró (partido vacío + perfil faltante)
      #     desde las fuentes oficiales estáticas de la Cámara
      #     (listado_diputados_gpnp.php + curricula.php). Datos
      #     biográficos estáticos → mensual es suficiente. --d1 propaga
      #     el partido; el perfil lo sincroniza el paso 5.
      - name: Scrape respaldo Diputados (partido + perfil)
        env:
          PYTHONUNBUFFERED: "1"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python -u scripts/scrape_respaldo_diputados.py --d1
        continue-on-error: true

      # 4c. Scraper de RESPALDO Senado: mantiene limpia en D1 la
      #     fila-basura "Vargas" (nombre = fragmento de iniciativa) que
      #     limpiar_legisladores_fantasma.py no atrapa (deriva IDs de la
      #     BD local, que está limpia, y sale temprano). --d1 consulta D1
      #     directamente y borra por patrón de nombre; el senador real
      #     id=543 (nombre limpio) no matchea y queda intacto. El relleno
      #     de bios de senadores queda DESACTIVADO a propósito (sin
      #     fuente estática fiable; ver el script). Datos estáticos →
      #     mensual es suficiente.
      - name: Scrape respaldo Senado (limpieza Vargas D1)
        env:
          PYTHONUNBUFFERED: "1"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python -u scripts/scrape_respaldo_senado.py --d1
        continue-on-error: true

      # 5. Sync legisladores_perfil → D1. CRÍTICO: sin esto el scrape
      #    de arriba queda solo en BD local y D1 no se actualiza
      #    (bug 15-may: 662 scrapeados local, D1 en 70%).
      - name: Sync perfiles a D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/sync_perfil_d1.py
        continue-on-error: true

      # Guardar BD actualizada en cache
      - name: Guardar SQLite DB en cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-monthly-${{ github.run_id }}
