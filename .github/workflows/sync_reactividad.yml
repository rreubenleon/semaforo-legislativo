name: Sync Reactividad → D1

# Crea las columnas reactividad/ppa_reactivas/ppa_total en legisladores_stats
# (idempotente) y las llena desde eval/reactividad.json. Sin Haiku, $0.
# Correr DESPUÉS de commitear eval/reactividad.json y ANTES de desplegar el
# worker (que ya hace SELECT de esas columnas).

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "sync-reactividad"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3
      - name: Sync reactividad a D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/sync_reactividad_d1.py
