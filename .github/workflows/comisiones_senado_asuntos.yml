name: Comisiones Senado - Asuntos turnados (semanal)

# POR QUÉ EXISTE
#   El conteo de asuntos turnados por comisión del Senado (columnas sitl_* de
#   comisiones_stats en D1) lo produce scrapers/comisiones_senado_asuntos.py y
#   lo sube scripts/update_d1_comisiones_senado.py. Ambos EXISTEN, pero se
#   corrieron UNA sola vez (27-abr-2026) y nunca se programaron → el dato del
#   Senado en la sección Comisiones lleva ~3 meses viejo (verificado 23-jul:
#   Justicia FIAT 326 ini vs 394 oficial hoy). Este workflow los encadena y los
#   pone en cron para que el dato del Senado quede al día, igual que el de
#   Diputados vía comisiones.yml.
#
#   NO scrapea la BD local ni la toca: el scraper lee senado.gob.mx → JSON, y el
#   updater sube el JSON a D1 con wrangler. Fuente oficial:
#   comisiones.senado.gob.mx / asuntosComisiones.php

on:
  schedule:
    - cron: '0 15 * * 3'   # Miércoles 15:00 UTC (fuera de horas pico del sitio)
  workflow_dispatch:
    inputs:
      solo_id:
        description: 'Solo una comisión (id senado, debug). Vacío = todas.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: "comisiones-senado-asuntos"
  cancel-in-progress: false

jobs:
  refrescar:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # ~77 comisiones × 4 tipos × 8s ≈ 40-60 min + reintentos
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      - name: Scrape asuntos por comisión (senado.gob.mx → JSON)
        run: |
          if [ -n "${{ github.event.inputs.solo_id }}" ]; then
            python -m scrapers.comisiones_senado_asuntos \
              --solo-id ${{ github.event.inputs.solo_id }} \
              --output senado_asuntos.json --checkpoint senado_asuntos_ckpt.json
          else
            python -m scrapers.comisiones_senado_asuntos \
              --output senado_asuntos.json --checkpoint senado_asuntos_ckpt.json
          fi

      - name: Subir conteos a D1 (comisiones_stats.sitl_*)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/update_d1_comisiones_senado.py --input senado_asuntos.json

      - name: Verificación (Justicia debe cuadrar con senado.gob.mx)
        run: |
          sleep 5
          curl -s "https://fiat-busqueda.rreubenleon.workers.dev/comisiones?camara=Senado" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          rows = d.get('comisiones') or []
          j = [c for c in rows if c.get('nombre') == 'Justicia']
          for c in j:
              s = c.get('sitl') or {}
              print('Justicia sitl.turnadas =', s.get('turnadas'),
                    '· ini =', (s.get('iniciativas') or {}).get('turnadas'),
                    '· ts =', (s.get('desglose') or {}).get('scrape_ts'))
          "
