name: Comisiones - Pipeline D1

# Pipeline SEPARADO del principal (pipeline.yml). Lee semaforo.db en modo
# read-only y escribe resultados a Cloudflare D1 (tabla comisiones_stats).
#
# Cadencia:
#   - Lunes  14:00 UTC: SITL batch 1 (IDs 5-29) + Gaceta refresh
#   - Martes 14:00 UTC: SITL batch 2 (IDs 30-57)
#
# Durante RECESO (mayo-agosto, dic-enero), el script verifica si es la
# primera semana del mes y skipea si no lo es. Así ahorramos ~75% del
# scrape sin tocar el cron al regresar al periodo ordinario en septiembre.
#
# No toca el cache de semaforo.db — solo lectura.

on:
  schedule:
    - cron: '0 14 * * 1'   # Lunes 14:00 UTC → SITL batch 1 + Gaceta
    - cron: '0 14 * * 2'   # Martes 14:00 UTC → SITL batch 2
  # Encadenado: cuando termina el scrape oficial de senadores (que
  # actualiza legisladores.comisiones_cargo), dispara automáticamente
  # comisiones.yml para que la composición en D1 use los datos frescos.
  # Resuelve el bug de caches desincronizados entre workflows.
  workflow_run:
    workflows: ["Scrape Senadores LXVI desde senado.gob.mx"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      paso:
        description: 'Paso a ejecutar'
        required: true
        type: choice
        options:
          - todo
          - gaceta
          - sitl-lunes
          - sitl-martes

permissions:
  contents: read

concurrency:
  group: "comisiones-pipeline"
  cancel-in-progress: false

jobs:
  comisiones:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Obtener semaforo.db (read-only)
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-readonly
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            echo "No se encontró DB en cache, descargando seed..."
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          else
            echo "DB restaurada del cache ($(du -h semaforo.db | cut -f1))"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      # Pre-scrape dictámenes Diputados ANTES del chmod read-only.
      # Inserta dictámenes aprobados en tabla `gaceta` para que
      # refresh_comisiones_sitl.py los pueda leer en el siguiente paso.
      # Sin esto el tab Comisiones de Diputados muestra "Sin dictámenes
      # registrados en Gaceta" porque el scraper original no captura
      # dictámenes individuales.
      - name: Pre-scrape dictámenes Diputados (escribe a BD)
        run: python scripts/scrape_urls_diputados.py
        continue-on-error: true

      - name: Forzar DB en modo solo lectura
        run: chmod 0444 semaforo.db

      - name: Decidir paso
        id: paso
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PASO="${{ github.event.inputs.paso }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Disparado por término de scrape_senadores_oficial.yml.
            # Solo recalcular gaceta (composición + último dictamen),
            # no re-scrapear SITL diputados que es la parte costosa.
            PASO="gaceta"
          elif [ "${{ github.event.schedule }}" = "0 14 * * 1" ]; then
            PASO="lunes"
          else
            PASO="martes"
          fi
          echo "paso=$PASO" >> $GITHUB_OUTPUT
          echo "Paso resuelto: $PASO"

      # Lunes: primero gaceta, luego SITL batch 1
      - name: Paso Gaceta (datos SQLite → D1)
        if: steps.paso.outputs.paso == 'lunes' || steps.paso.outputs.paso == 'gaceta' || steps.paso.outputs.paso == 'todo'
        run: python scripts/refresh_comisiones_sitl.py --paso gaceta --ignorar-modo-receso
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Paso SITL batch lunes (IDs 5-29)
        if: steps.paso.outputs.paso == 'lunes' || steps.paso.outputs.paso == 'sitl-lunes' || steps.paso.outputs.paso == 'todo'
        run: python scripts/refresh_comisiones_sitl.py --paso sitl --batch lunes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Paso SITL batch martes (IDs 30-57)
        if: steps.paso.outputs.paso == 'martes' || steps.paso.outputs.paso == 'sitl-martes' || steps.paso.outputs.paso == 'todo'
        run: python scripts/refresh_comisiones_sitl.py --paso sitl --batch martes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
