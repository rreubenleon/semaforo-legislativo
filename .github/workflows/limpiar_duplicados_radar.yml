name: Limpiar Duplicados Radar (one-off)

# Workflow one-off para arreglar dos bugs reportados:
#   1. Mismos legisladores aparecen 2× en /radar con ELO distintos
#      (Viggiano, Vargas Del Villar, ~49 casos) — causa: filas
#      residuales en legisladores_elo con mismo legislador_id pero
#      nombre distinto.
#   2. Legislador fantasma id=685 con "nombre" = texto de iniciativa.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "limpiar-duplicados-radar"
  cancel-in-progress: false

jobs:
  limpiar:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Restaurar SQLite DB
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-limpieza-${{ github.run_id }}
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      # 1. Borrar legisladores fantasma (id=685 y similares)
      - name: Borrar legisladores fantasma (local + D1)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/limpiar_legisladores_fantasma.py

      # 2. Recalcular ELO local (ahora con DELETE upfront → no duplicados)
      - name: Recalcular ELO
        run: python scripts/calcular_elo_legisladores.py --guardar

      # 3. Sync limpio a D1
      - name: Sync ELO a D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/sync_elo_d1.py

      # 4. Verificación: Viggiano y Vargas ya no deben duplicarse
      - name: Verificación duplicados
        run: |
          sleep 5
          curl -s "https://fiat-busqueda.rreubenleon.workers.dev/radar?limite=2000" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          rows = d.get('legisladores') or []
          ids_count = {}
          for r in rows:
              i = r.get('id')
              ids_count[i] = ids_count.get(i, 0) + 1
          dups = [(i, n) for i,n in ids_count.items() if n > 1]
          print(f'Total filas: {len(rows)}, IDs únicos: {len(ids_count)}')
          print(f'Duplicados: {len(dups)}')
          for i,n in dups[:10]:
              names = set(r['nombre'] for r in rows if r.get('id')==i)
              print(f'  id={i} aparece {n}× — nombres: {list(names)[:2]}')
          # Phantoms
          fantasmas = [r for r in rows if len((r.get('nombre','') or '')) > 80]
          print(f'Fantasmas (nombre > 80 chars): {len(fantasmas)}')
          for f in fantasmas[:3]:
              print(f'  id={f[\"id\"]} {f[\"nombre\"][:80]}')
          "

      - name: Guardar BD en cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-limpieza-${{ github.run_id }}
