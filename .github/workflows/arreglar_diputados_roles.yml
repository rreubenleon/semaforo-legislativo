name: Arreglar Diputados Roles (one-off)

# Workflow URGENTE: scrape_diputados_sitl_lxvi.py + integrar +
# calcular_conteos + sync D1. Captura TODOS los roles para diputados
# (Iniciante, Adherente, De Grupo, Proponente, Suscriptor) que estaba
# desactualizado en BD (caso Margarita García 6 prop vs 26 reales).
#
# Después del run, permanente_weekly.yml lo hace automático cada miércoles.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "arreglar-diputados-roles"

jobs:
  arreglar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-arreglar-dip-${{ github.run_id }}
          restore-keys: |
            semaforo-db-

      - run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      - name: 1. Scrape SITL completo Diputados (todos los roles)
        run: python scripts/scrape_diputados_sitl_lxvi.py

      - name: 2. Integrar a diputado_instrumento
        run: python scripts/integrar_diputados_oficial.py

      - name: 3. Calcular conteos por rol
        run: python scripts/calcular_conteos_roles_diputados.py

      - name: 4. Sync legisladores a D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/sync_legisladores_cargo_d1.py

      - name: 5. Verificación Margarita García
        run: |
          sleep 5
          curl -s "https://fiat-busqueda.rreubenleon.workers.dev/radar?camara=C%C3%A1mara%20de%20Diputados&limite=2000" \
            | python3 -c "
          import sys, json
          rows = json.load(sys.stdin).get('legisladores') or []
          for r in rows:
              if 'Margarita' in (r.get('nombre','') or '') and 'García García' in (r.get('nombre','') or ''):
                  print(f\"{r['nombre']}: ini={r.get('n_ini_iniciante')}/{r.get('n_ini_adherente')}/{r.get('n_ini_de_grupo')} prop={r.get('n_prop_proponente')}/{r.get('n_prop_adherente')}/{r.get('n_prop_de_grupo')}\")"

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: semaforo.db
          key: semaforo-db-arreglar-dip-${{ github.run_id }}
