name: Rebuild Actividad Senadores (one-off)

# Workflow de uso único para arreglar el inflado de conteos l3p_*
# en senadores (Camarillo y todos los del bloque colectivo PRI).
# Re-popula actividad_legislador desde senador_instrumento (fuente
# correcta, scraper directo senado.gob.mx).
#
# Después de correr exitosamente, este archivo y el script asociado
# pueden eliminarse.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Solo reportar, no escribir'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

concurrency:
  group: "rebuild-actividad-senadores"
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Restaurar SQLite DB
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-rebuild-${{ github.run_id }}
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      # 1. Rebuild actividad_legislador para senadores
      - name: Rebuild (dry-run)
        if: ${{ inputs.dry_run == 'true' }}
        run: python scripts/rebuild_actividad_senadores.py --dry-run

      - name: Rebuild
        if: ${{ inputs.dry_run != 'true' }}
        run: python scripts/rebuild_actividad_senadores.py

      # 2. Recalcular l3p_* y syncear a D1 (radar_pipeline con --skip-scraper
      #    para no re-fetchear SIL; solo hace hit_rate, matchup, proyecciones)
      - name: Recalcular l3p_* y sync D1
        if: ${{ inputs.dry_run != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/radar_pipeline.py --skip-scraper

      # 3. Snapshot Camarillo para verificar
      - name: Verificación Camarillo
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          sleep 5
          curl -s "https://fiat-busqueda.rreubenleon.workers.dev/radar?camara=Senado&limit=2000" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          rows = d.get('legisladores') or []
          target = [r for r in rows if 'Camarillo' in (r.get('nombre','') or '')]
          for c in target:
              print('Camarillo:')
              print(f\"  l3p_iniciativas:  {c.get('l3p_iniciativas')}\")
              print(f\"  l3p_proposiciones: {c.get('l3p_proposiciones')}\")
              print(f\"  l3p_iniciativas_col: {c.get('l3p_iniciativas_col')}\")
              print(f\"  l3p_proposiciones_col: {c.get('l3p_proposiciones_col')}\")
          "

      # 4. Guardar BD actualizada en cache
      - name: Guardar SQLite DB en cache
        if: ${{ inputs.dry_run != 'true' && always() }}
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-rebuild-${{ github.run_id }}
