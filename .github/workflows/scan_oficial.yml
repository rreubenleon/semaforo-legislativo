name: Scan Contraste Oficial (one-off)

# Workflow para validar precisión vs senado.gob.mx:
#   - 20 senadores: nuestros conteos de iniciativas/proposiciones vs su perfil oficial
#   - 15 comisiones: nuestros integrantes vs página oficial de comisión
# Reporta accuracy global.

on:
  workflow_dispatch:
    inputs:
      muestra:
        description: 'Tamaño de muestra'
        required: false
        default: '20'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Restaurar SQLite DB
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-scan-${{ github.run_id }}
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Scan
        run: python scripts/scan_contraste_oficial.py --muestra ${{ inputs.muestra || 20 }}
