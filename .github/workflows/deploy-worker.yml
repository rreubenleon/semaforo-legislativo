name: Deploy Cloudflare Worker

# Auto-deploy del worker fiat-busqueda cuando cambia search-worker.js o wrangler.toml.
# Usa el secret CLOUDFLARE_API_TOKEN que ya existe en GitHub para sync_d1.py.

on:
  push:
    branches: [ main ]
    paths:
      - 'worker/search-worker.js'
      - 'worker/wrangler.toml'
      - 'worker/package.json'
  workflow_dispatch:  # permite trigger manual desde la UI de GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install --silent
          npx wrangler deploy

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://fiat-busqueda.rreubenleon.workers.dev/ \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', f'health failed: {d}'; print('OK', d.get('endpoints', []))"
