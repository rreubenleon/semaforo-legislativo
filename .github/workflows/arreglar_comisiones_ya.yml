name: Arreglar Comisiones YA (one-off)

# Workflow URGENTE para arreglar la composición desactualizada de
# comisiones del Senado. Ejecuta:
#   1. rescrape_senadores_comisiones.py - re-scrapea legisladores.comisiones_cargo
#      desde senado.gob.mx (~5 min para 128 senadores)
#   2. sync_legisladores_cargo_d1.py - sync a D1
#   3. refresh_comisiones_sitl.py --paso gaceta - actualiza comisiones_stats
#      en D1 con composición fresca
#   4. Verificación: Medio Ambiente Senado debe tener 7+ miembros
#
# Después de este run, el permanente_weekly.yml (modificado) hará
# automáticamente lo mismo cada miércoles.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "arreglar-comisiones-ya"
  cancel-in-progress: false

jobs:
  arreglar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Restaurar SQLite DB
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-arreglar-${{ github.run_id }}
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      - name: 1. Re-scrape comisiones senadores
        run: python scripts/rescrape_senadores_comisiones.py

      - name: 2. Sync legisladores a D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/sync_legisladores_cargo_d1.py

      - name: 3. Refresh comisiones gaceta a D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/refresh_comisiones_sitl.py --paso gaceta --ignorar-modo-receso

      - name: 4. Verificación Medio Ambiente
        run: |
          sleep 5
          curl -s "https://fiat-busqueda.rreubenleon.workers.dev/comisiones?camara=Senado" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          rows = d.get('comisiones') or []
          target = [c for c in rows if 'Medio Ambiente' in (c.get('nombre','') or '')]
          for c in target:
              comp = c.get('composicion') or []
              print(f'{c.get(\"nombre\")}: {len(comp)} miembros')
              for m in comp:
                  print(f'  - {m.get(\"nombre\")} | {m.get(\"cargo\")} | {m.get(\"partido\")}')
          "

      - name: Guardar BD en cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-arreglar-${{ github.run_id }}
