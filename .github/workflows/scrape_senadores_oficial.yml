name: Scrape Senadores LXVI desde senado.gob.mx

# Workflow ad-hoc para scrapear el universo completo de instrumentos
# (iniciativas + proposiciones) de los 128 senadores LXVI desde la
# fuente OFICIAL del Senado. Usa la IP del runner GitHub para evitar
# bloqueo de Imperva que ataca IPs residenciales tras varios requests.
#
# Output: dashboard/senadores_lxvi_oficial.json (artifact + commit).

on:
  workflow_dispatch:
    inputs:
      limite:
        description: 'Limitar a primeros N senadores (vacío = todos los 128)'
        required: false
        default: ''
        type: string
      solo:
        description: 'Solo este senador_id (debug, ej. 1698)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: "scrape-senadores-oficial"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Correr scrape oficial
        run: |
          ARGS=""
          if [ -n "${{ inputs.solo }}" ]; then
            ARGS="--solo ${{ inputs.solo }}"
          elif [ -n "${{ inputs.limite }}" ]; then
            ARGS="--limite ${{ inputs.limite }}"
          fi
          echo "Argumentos: $ARGS"
          python scripts/scrape_senadores_senado_gob.py $ARGS

      - name: Subir como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: senadores-lxvi-oficial
          path: dashboard/senadores_lxvi_oficial.json
          retention-days: 30
          if-no-files-found: warn

      - name: Mostrar resultados
        if: always()
        run: |
          test -f dashboard/senadores_lxvi_oficial.json || { echo "no JSON"; exit 1; }
          python scripts/reporte_senadores_oficial.py

      - name: Commit JSON al repo
        if: ${{ inputs.solo == '' && inputs.limite == '' }}
        run: |
          git config user.name "FIAT Bot"
          git config user.email "fiat-bot@users.noreply.github.com"
          git add dashboard/senadores_lxvi_oficial.json
          git diff --staged --quiet || git commit -m "data: scrape oficial Senado LXVI ($(date -u +%Y-%m-%d)) - $(jq '.instrumentos | length' dashboard/senadores_lxvi_oficial.json) instrumentos"
          git push origin main || true
