name: Scrape Respaldo Diputados (one-off)

# Rellena los huecos que el scraper primario (perfil_sil.py, SIL
# Gobernación) no cubrió, usando las fuentes OFICIALES estáticas de la
# Cámara (sitl.diputados.gob.mx):
#   · partido (grupo parlamentario) ← listado_diputados_gpnp.php
#   · año nacimiento / escolaridad / biografía ← curricula.php
#
# Escribe partido a D1 (--d1) y luego sincroniza legisladores_perfil con
# scripts/sync_perfil_d1.py. Verifica el radar al final.
#
# Después de este run, monthly.yml lo mantiene fresco (datos estáticos).

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "scrape-respaldo-diputados"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-respaldo-${{ github.run_id }}
          restore-keys: |
            semaforo-db-perfiles-
            semaforo-db-monthly-
            semaforo-db-

      - run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      - name: Scrape respaldo Diputados (partido + perfil, --d1)
        env:
          PYTHONUNBUFFERED: "1"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python -u scripts/scrape_respaldo_diputados.py --d1

      - name: Sync legisladores_perfil → D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/sync_perfil_d1.py
        continue-on-error: true

      - name: Verificación radar (partido + perfil)
        run: |
          sleep 5
          curl -s "https://fiat-busqueda.rreubenleon.workers.dev/radar?limite=2000" \
            | python3 -c "
          import sys, json
          rows = json.load(sys.stdin).get('legisladores') or []
          t = len(rows)
          dip = [r for r in rows if 'iputad' in (r.get('camara') or '')]
          sin_part = sum(1 for r in dip if not (r.get('partido') or '').strip())
          b = sum(1 for r in rows if r.get('biografia'))
          a = sum(1 for r in rows if r.get('anio_nacimiento'))
          print(f'Total radar: {t}  Diputados: {len(dip)}')
          print(f'Diputados sin partido: {sin_part}')
          print(f'Con bio: {b} ({b*100//t}%)  Con año nacim: {a} ({a*100//t}%)')"

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: semaforo.db
          key: semaforo-db-respaldo-${{ github.run_id }}
