name: Semáforo Legislativo - Pipeline Automático

on:
  schedule:
    - cron: '0 */4 * * *'  # Cada 4 horas: 00, 04, 08, 12, 16, 20 UTC
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub
    inputs:
      force_nlp_reset_days:
        description: 'Forzar re-clasificación NLP de últimos N días (0 = no resetear)'
        required: false
        default: '0'
        type: string
      nlp_max_por_run:
        description: 'Cap de artículos a clasificar por corrida (5000 default, 20000 para limpiar backlog)'
        required: false
        default: '5000'
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pipeline"
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # bajado de 90 → 60 tras incidente abr 25 2026.
                         # Pipeline normal tarda 25-35 min; deja 25 min de margen.
                         # Si Haiku se cuelga, el cap por run de 40 calls + sleep
                         # 0.5s = max +20s. Si excede 60min, cancelar es lo correcto.

    steps:
      # 1. Descargar el código
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Instalar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache de pip para no reinstalar cada vez
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      # 3b. Restaurar SQLite DB del cache más reciente.
      # Prioridad: post-NLP del run actual > final del run actual > cualquier
      # post-NLP previo > cualquier cache previo. Esto asegura que el counter
      # mensual de Haiku (haiku_uso_mensual) se acumule entre runs.
      - name: Restaurar SQLite DB
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-${{ github.run_id }}-postnlp
          restore-keys: |
            semaforo-db-${{ github.run_id }}
            semaforo-db-
            semaforo-db-

      # 3c. Si no se restauró ninguna DB del cache, descargar seed
      - name: Descargar DB seed si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            echo "No se encontró DB en cache, descargando seed..."
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          else
            echo "DB restaurada del cache ($(du -h semaforo.db | cut -f1))"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Instalar dependencias
      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # 4a. Cargar roster oficial de la Comisión Permanente.
      #     Idempotente (UPSERT). Solo escribe en SQLite local — sin red.
      #     Necesario para que main.py lo exporte en data.json.permanente
      #     y el frontend pueda filtrar widgets durante receso.
      - name: Cargar Comisión Permanente (idempotente)
        run: python scripts/cargar_permanente_lxvi.py
        continue-on-error: true   # No bloquear pipeline si el roster falla

      # 4b. Integrar SITL Diputados oficial al sil_documentos.
      #     Idempotente (UPSERT por seg_id determinístico). Lee
      #     dashboard/diputados_lxvi_oficial.json (committeado en repo)
      #     y completa los ~2,000 docs de Diputados que SIL Gobernación
      #     no exponía pero SITL Diputados sí (gap de ~30% en proposiciones).
      #     No re-scrape: el JSON se actualiza manualmente cuando hay
      #     nuevos periodos (2-3 veces por año). Sin red.
      - name: Integrar SITL Diputados oficial (idempotente)
        run: python scripts/integrar_diputados_oficial.py
        continue-on-error: true

      # 4c. Limpiar comisiones falsas de senadores. El scraper original
      #     parseó mal el HTML del Senado y metió items del menú lateral
      #     ('Diario de los Debates', 'Documentos de Apoyo Parlamentario',
      #     'Expedientes Legislativos Digitales', 'Iniciativas, Minutas,
      #     Instrumentos', etc.) como falsas comisiones. Eso inflaba el
      #     índice de efectividad por comisión. El script filtra contra
      #     CATALOGO_LXVI (las 68 comisiones reales del Senado) y descarta
      #     todo lo demás. Idempotente.
      - name: Limpiar comisiones falsas senadores (idempotente)
        run: python scripts/limpiar_cargos_senadores.py
        continue-on-error: true

      # 4c-2. Limpiar comisiones falsas de diputados. Bug equivalente al
      #     del Senado: el scraper SITL Diputados metía 'A LAS QUE
      #     PERTENECE', 'COMITÉ', 'ESCOLARIDAD', 'TRAYECTORIA POLÍTICA'
      #     y partidos como MORENA/PVEM como falsas comisiones (500 de
      #     532 diputados afectados). El script filtra contra blacklist
      #     explícita + heurísticas de fechas. Idempotente.
      - name: Limpiar comisiones falsas diputados (idempotente)
        run: python scripts/limpiar_cargos_diputados.py
        continue-on-error: true

      # 4c-bis. Sync de comisiones limpias a Cloudflare D1. Sin esto, el
      #     Worker /radar (que el frontend consume) sigue sirviendo las
      #     falsas comisiones aunque la BD local del CI ya esté limpia.
      - name: Sync comisiones a D1 (post-limpieza)
        run: python scripts/sync_legisladores_cargo_d1.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      # 4c-ter. Re-scrape Mesa Directiva + JUCOPO Senado para que
      #     organos_gobierno tenga roles correctos (Coordinador vs
      #     Vicecoordinador). Bug fixed: el HTML del Senado pone H3
      #     "GRUPO PARLAMENTARIO X" para vicecoordinadores y "COORDINADOR
      #     DEL GRUPO PARLAMENTARIO X" para coordinadores titulares; el
      #     scraper colapsaba ambos a 'Coordinador'. Sincroniza a D1 al
      #     final automáticamente.
      - name: Refresh JUCOPO Senado (idempotente, syncs a D1)
        run: python scripts/scrape_organos_senado.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      # 4c-quad. Resolver URLs faltantes de docs SEN_ presentados durante
      #     Permanente. Cruza con
      #     senado.gob.mx/66/gaceta_comision_permanente/ (sesión actual
      #     con 112 docs) por (fecha + apellido firmante + tipo + tokens
      #     título). Match 1:1.
      - name: Resolver URLs Permanente (idempotente)
        run: python scripts/fix_urls_permanente.py
        continue-on-error: true

      # 4c-quint. Resolver URLs Diputados desde SITL (60 comisiones).
      #     Scrapea iniciativaslxvi.php?comt=N y extrae URLs canónicas
      #     de gaceta.diputados.gob.mx para los dictámenes. Match con
      #     sil_documentos por core_titulo. Cubre ~742 docs (las
      #     iniciativas dictaminadas; las pendientes no aparecen aquí).
      - name: Resolver URLs Diputados (idempotente)
        run: python scripts/scrape_urls_diputados.py
        continue-on-error: true

      # 4c-sext. Dedupe SEN/PERM: marca docs SEN_ como duplicados de
      #     PERM_ cuando son el mismo instrumento (firmante + ≥1
      #     artículo común + ≥1 ley/materia común + fecha ±30 días).
      #     Sin esto, Paloma Sánchez (y otros) aparece 2 veces: SEN
      #     con fecha 4-28 y PERM con fecha 5-06.
      - name: Dedupe SEN/PERM (idempotente)
        run: python scripts/dedupe_sen_perm.py
        continue-on-error: true

      # 4d. Reparar campo `partido` en sil_documentos. Bug: el scraper
      #     oficial del Senado asignaba 'PAN' a todos los opositores y
      #     'MORENA' a todos los oficialistas, sin distinguir PT, PRI,
      #     PVEM, MC. El script cruza presentador con tabla legisladores
      #     (que sí tiene partidos correctos) usando utils.matcher central.
      #     Solo aplica cuando hay match único. Idempotente.
      - name: Fix partido en sil_documentos (idempotente)
        run: python scripts/fix_partido_sil.py
        continue-on-error: true

      # 4e. Re-integrar Senado para asegurar URLs y partidos correctos.
      #     El paso 4d arregla partido en sil_documentos, pero los
      #     SEN_* existentes pueden quedarse sin URL si el seed de la BD
      #     fue creado antes del fix. Esto re-integra desde el JSON que
      #     YA tiene partidos+URLs correctas. Idempotente (UPSERT).
      - name: Re-integrar Senado oficial (URLs + partidos)
        run: python scripts/integrar_senadores_oficial.py
        continue-on-error: true

      # 5. Ejecutar el pipeline completo
      #    Modo local: SQLite puro, sin dependencia de Turso
      - name: Ejecutar pipeline
        run: python main.py
        env:
          NLP_MAX_POR_RUN: ${{ inputs.nlp_max_por_run || '5000' }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          # Haiku 4.5 como segunda pasada del clasificador (ambiguos).
          # Reactivado 25-abr-2026 con safeguards triples:
          #   1. HAIKU_MAX_CALLS_PER_RUN=40 (cap por corrida)
          #   2. HAIKU_MONTHLY_CAP_USD=7.50 (cap mensual SQLite)
          #   3. Cache save `if: always()` post-NLP para persistir counter
          # Ver nlp/reclasificador_claude.py y MEMORY.md.
          ANTHROPIC_API_KEY: ${{ secrets.FIAT_CLAUDE_API_KEY }}
          HAIKU_MAX_CALLS_PER_RUN: '40'
          HAIKU_MONTHLY_CAP_USD: '7.50'
          SEMAFORO_DB_MODE: local
          # Solo setea reset cuando el workflow_dispatch lo pide; el
          # cron programado pasa '' y main.py lo interpreta como 0.
          FIAT_FORCE_NLP_RESET_DAYS: ${{ inputs.force_nlp_reset_days || '0' }}
        continue-on-error: false

      # 5a-pre. Save intermedio del DB tras pipeline — captura counter de
      # haiku_uso_mensual y reclasificacion_cache aunque pasos siguientes fallen.
      # `if: always()` ejecuta el step incluso si el pipeline falla (no si el
      # job es cancelado por timeout, eso es otro caso).
      - name: Persistir SQLite post-pipeline (counter Haiku, cache reclasif)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-${{ github.run_id }}-postnlp

      # 5a-bis. Reportar status del presupuesto Haiku (privado: log de Actions
      # + warning annotation que dispara email a propietario del repo).
      # NO se expone en data.json para no leakearlo al dashboard público.
      - name: Reportar status Haiku
        if: always()
        run: |
          python -c "
          import json, sys
          sys.path.insert(0, '.')
          try:
              from db import get_connection
              from nlp.reclasificador_claude import obtener_uso_mensual
              s = obtener_uso_mensual(get_connection())
              line = f\"Haiku {s['year_month']}: \${s['costo_usd']:.2f} / \${s['cap_usd']:.2f} ({s['porcentaje_usado']}% — {s['calls']} calls, ~{s['dias_restantes_estimado']}d restantes)\"
              print(f'::notice::{line}')
              if s['agotado']:
                  print(f'::warning::Haiku CAP MENSUAL AGOTADO. Reclasificación pausada hasta {s[\"year_month\"]}-01 del mes siguiente.')
              elif s['alerta']:
                  print(f'::warning::Haiku al {s[\"porcentaje_usado\"]}% del cap mensual. Quedan ~{s[\"dias_restantes_estimado\"]} días al ritmo actual.')
              # Guardar para commit message
              with open('haiku_status.txt', 'w') as f:
                  f.write(line)
          except Exception as e:
              print(f'::notice::Haiku status no disponible: {e}')
          "

      # 5a. Health check — advierte si algún scraper no produjo datos en 24h
      #      No bloquea el pipeline; solo genera warning en GitHub Actions
      - name: Health check de scrapers
        run: |
          if [ -f health_alert.txt ]; then
            echo "::warning::Alerta de salud del pipeline — algunas fuentes sin datos"
            cat health_alert.txt
          else
            echo "Todas las fuentes de datos saludables"
          fi

      # 5b. Sync búsqueda FTS + scores a Cloudflare D1
      - name: Sync búsqueda a D1
        run: |
          npm install -g wrangler@3
          python sync_d1.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true  # No bloquear pipeline si D1 sync falla

      # 5b.2. Sync ELO + H2H legisladores a D1 (depende de paso 5d/5e local)
      - name: Sync ELO + H2H a D1
        run: |
          python scripts/sync_elo_d1.py || true
          python scripts/sync_h2h_d1.py || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      # 5c. Guardar DB actualizada en cache (key única por run)
      - name: Guardar SQLite DB en cache
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-${{ github.run_id }}

      # 6. Commit y push de datos actualizados (solo JSON — DB persiste en cache)
      - name: Commit datos actualizados
        run: |
          git config user.name "FIAT Bot"
          git config user.email "fiat-bot@users.noreply.github.com"
          git add dashboard/data.json
          # Construir mensaje con status de Haiku al final (visible en git log)
          HAIKU_STATUS=""
          if [ -f haiku_status.txt ]; then
            HAIKU_STATUS=" · $(cat haiku_status.txt)"
          fi
          git diff --staged --quiet || git commit -m "🔄 Actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')${HAIKU_STATUS}"
          # Pull con rebase para resolver si alguien pusheó durante el pipeline
          git pull --rebase origin main || {
            # Si rebase falla, abortar y usar merge strategy
            git rebase --abort 2>/dev/null
            git pull --no-rebase -X theirs origin main
            git add dashboard/data.json 2>/dev/null
            git diff --staged --quiet || git commit -m "🔄 Merge automático con cambios remotos"
          }
          git push

  # Deploy a GitHub Pages después del pipeline
  deploy-pages:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo actualizado
        uses: actions/checkout@v4
        with:
          ref: main  # Obtener la versión más reciente (post-pipeline)

      # Hacer pull para obtener el commit del pipeline
      - name: Pull últimos cambios
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
