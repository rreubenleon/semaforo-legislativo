name: Semáforo Legislativo - Pipeline Automático

on:
  schedule:
    - cron: '0 */2 * * *'  # Cada 2 horas: 00, 02, 04, 06, 08, 10, 12, 14, 16, 18, 20, 22 UTC
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pipeline"
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # 1. Descargar el código
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Instalar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache de pip para no reinstalar cada vez
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      # 3b. Turso embedded replica (sin cache — se recrea cada run para evitar WAL corrupto)

      # 4. Instalar dependencias
      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # 5. Ejecutar el pipeline completo (sin Trends para evitar rate limits)
      - name: Ejecutar pipeline
        run: python main.py --skip-trends
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SEMAFORO_DB_MODE: turso
        continue-on-error: false

      # 6. Commit y push de datos actualizados (solo JSON — DB está en Turso)
      - name: Commit datos actualizados
        run: |
          git config user.name "FIAT Bot"
          git config user.email "fiat-bot@users.noreply.github.com"
          git add dashboard/data.json
          git diff --staged --quiet || git commit -m "🔄 Actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Pull con rebase para resolver si alguien pusheó durante el pipeline
          git pull --rebase origin main || {
            # Si rebase falla por conflictos en archivos generados, aceptar los nuestros
            git checkout --theirs dashboard/data.json 2>/dev/null
            git add dashboard/data.json 2>/dev/null
            git rebase --continue 2>/dev/null || git rebase --abort
            git pull --no-rebase origin main
            git checkout --ours dashboard/data.json 2>/dev/null
            git add dashboard/data.json 2>/dev/null
            git commit -m "🔄 Merge automático con cambios remotos" --allow-empty
          }
          git push

  # Deploy a GitHub Pages después del pipeline
  deploy-pages:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo actualizado
        uses: actions/checkout@v4
        with:
          ref: main  # Obtener la versión más reciente (post-pipeline)

      # Hacer pull para obtener el commit del pipeline
      - name: Pull últimos cambios
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
