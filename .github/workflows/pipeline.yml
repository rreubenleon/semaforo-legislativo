name: Semáforo Legislativo - Pipeline Automático

on:
  schedule:
    - cron: '0 */4 * * *'  # Cada 4 horas: 00, 04, 08, 12, 16, 20 UTC
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub
    inputs:
      force_nlp_reset_days:
        description: 'Forzar re-clasificación NLP de últimos N días (0 = no resetear)'
        required: false
        default: '0'
        type: string
      nlp_max_por_run:
        description: 'Cap de artículos a clasificar por corrida (5000 default, 20000 para limpiar backlog)'
        required: false
        default: '5000'
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pipeline"
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 75  # subido de 60 → 75 (8-may-2026) tras agregar
                         # scrape_urls_diputados.py (960 reqs SITL) + scripts
                         # de conteos por rol. Pipeline normal ahora 30-50 min;
                         # deja 25 min de margen. Si excede 75 min, cancelar.

    steps:
      # 1. Descargar el código
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Instalar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache de pip para no reinstalar cada vez
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      # 3b. Restaurar SQLite DB del cache más reciente.
      # Prioridad: post-NLP del run actual > final del run actual > cualquier
      # post-NLP previo > cualquier cache previo. Esto asegura que el counter
      # mensual de Haiku (haiku_uso_mensual) se acumule entre runs.
      - name: Restaurar SQLite DB
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-${{ github.run_id }}-postnlp
          restore-keys: |
            semaforo-db-${{ github.run_id }}
            semaforo-db-
            semaforo-db-

      # 3c. Si no se restauró ninguna DB del cache, descargar seed
      - name: Descargar DB seed si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            echo "No se encontró DB en cache, descargando seed..."
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          else
            echo "DB restaurada del cache ($(du -h semaforo.db | cut -f1))"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Instalar dependencias
      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # 4a. Cargar roster oficial de la Comisión Permanente.
      #     Idempotente (UPSERT). Datos hardcoded en el script — sin red.
      #     Necesario para que main.py lo exporte en data.json.permanente
      #     y el frontend pueda filtrar widgets durante receso.
      #     Es BARATO (~2s) así que se mantiene en el pipeline.
      - name: Cargar Comisión Permanente (idempotente)
        run: python scripts/cargar_permanente_lxvi.py
        continue-on-error: true

      # ─────────────────────────────────────────────────────────────────
      # NOTA DE DISEÑO (rediseño 9-may-2026):
      # El pipeline cada 4h debe ser LIGERO — solo datos dinámicos:
      # medios, tweets, mañanera, gaceta del día, NLP, scoring.
      #
      # Movidos a workflows específicos por frecuencia natural de cambio:
      #   · monthly.yml (1er día del mes 14:00 UTC):
      #       scrape_organos_senado.py (JUCOPO/Mesa Dir cambia 1-2x/año)
      #       limpiar_cargos_senadores.py + limpiar_cargos_diputados.py
      #       sync_legisladores_cargo_d1.py
      #
      #   · permanente_weekly.yml (miércoles 19:00 UTC = 1pm CDMX):
      #       fix_urls_permanente.py (Permanente sesiona miércoles)
      #       scrape_urls_diputados.py --solo-mes-actual (datos nuevos)
      #
      #   · comisiones.yml (lunes/martes 14:00 UTC) — ya existía:
      #       refresh_comisiones_sitl.py (gaceta/SITL → D1)
      #
      # Datos históricos (dictámenes pasados, iniciativas archivadas)
      # viven en BD/D1 y NO se re-scrapean. Solo migración inicial
      # (one-shot) y datos del mes actual cada miércoles.
      #
      # Scripts ELIMINADOS del pipeline cada-4h porque son idempotentes
      # sobre datos estáticos (no hay nada que actualizar entre runs):
      #   · integrar_diputados_oficial.py (sólo cuando JSON cambia)
      #   · integrar_senadores_oficial.py (sólo cuando JSON cambia)
      #   · dedupe_sen_perm.py (sólo después de scrape Senado)
      #   · fix_partido_sil.py (sólo después de scrape Senado)
      #   · calcular_conteos_roles_diputados.py (sólo después de scrape)
      #   · migrar_d1_conteos_roles.py (one-shot, ya corrió)
      # ─────────────────────────────────────────────────────────────────

      # 4b. Auto-sanado: re-atribuir actividad huérfana (legislador_id NULL)
      #     con matcher.py antes de calcular ELO. Idempotente y barato (solo
      #     toca NULLs). Cubre el caso de reseed con NULLs viejos; las docs
      #     nuevas ya se atribuyen bien en poblar_actividad_desde_sil.
      - name: Re-atribuir actividad huérfana (matcher.py)
        run: python scripts/reatribuir_actividad.py || true

      # 5. Ejecutar el pipeline completo
      #    Modo local: SQLite puro, sin dependencia de Turso
      - name: Ejecutar pipeline
        run: python main.py
        env:
          NLP_MAX_POR_RUN: ${{ inputs.nlp_max_por_run || '5000' }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          # Haiku 4.5 como segunda pasada del clasificador (ambiguos).
          # Reactivado 25-abr-2026 con safeguards triples:
          #   1. HAIKU_MAX_CALLS_PER_RUN=40 (cap por corrida)
          #   2. HAIKU_MONTHLY_CAP_USD=7.50 (cap mensual SQLite)
          #   3. Cache save `if: always()` post-NLP para persistir counter
          # Ver nlp/reclasificador_claude.py y MEMORY.md.
          ANTHROPIC_API_KEY: ${{ secrets.FIAT_CLAUDE_API_KEY }}
          HAIKU_MAX_CALLS_PER_RUN: '40'
          HAIKU_MONTHLY_CAP_USD: '7.50'
          SEMAFORO_DB_MODE: local
          # Solo setea reset cuando el workflow_dispatch lo pide; el
          # cron programado pasa '' y main.py lo interpreta como 0.
          FIAT_FORCE_NLP_RESET_DAYS: ${{ inputs.force_nlp_reset_days || '0' }}
        continue-on-error: false

      # 5a-pre. Save intermedio del DB tras pipeline — captura counter de
      # haiku_uso_mensual y reclasificacion_cache aunque pasos siguientes fallen.
      # `if: always()` ejecuta el step incluso si el pipeline falla (no si el
      # job es cancelado por timeout, eso es otro caso).
      - name: Persistir SQLite post-pipeline (counter Haiku, cache reclasif)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-${{ github.run_id }}-postnlp

      # 5a-bis. Reportar status del presupuesto Haiku (privado: log de Actions
      # + warning annotation que dispara email a propietario del repo).
      # NO se expone en data.json para no leakearlo al dashboard público.
      - name: Reportar status Haiku
        if: always()
        run: |
          python -c "
          import json, sys
          sys.path.insert(0, '.')
          try:
              from db import get_connection
              from nlp.reclasificador_claude import obtener_uso_mensual
              s = obtener_uso_mensual(get_connection())
              line = f\"Haiku {s['year_month']}: \${s['costo_usd']:.2f} / \${s['cap_usd']:.2f} ({s['porcentaje_usado']}% — {s['calls']} calls, ~{s['dias_restantes_estimado']}d restantes)\"
              print(f'::notice::{line}')
              if s['agotado']:
                  print(f'::warning::Haiku CAP MENSUAL AGOTADO. Reclasificación pausada hasta {s[\"year_month\"]}-01 del mes siguiente.')
              elif s['alerta']:
                  print(f'::warning::Haiku al {s[\"porcentaje_usado\"]}% del cap mensual. Quedan ~{s[\"dias_restantes_estimado\"]} días al ritmo actual.')
              # Guardar para commit message
              with open('haiku_status.txt', 'w') as f:
                  f.write(line)
          except Exception as e:
              print(f'::notice::Haiku status no disponible: {e}')
          "

      # 5a. Health check — advierte si algún scraper no produjo datos en 24h
      #      No bloquea el pipeline; solo genera warning en GitHub Actions
      - name: Health check de scrapers
        run: |
          if [ -f health_alert.txt ]; then
            echo "::warning::Alerta de salud del pipeline — algunas fuentes sin datos"
            cat health_alert.txt
          else
            echo "Todas las fuentes de datos saludables"
          fi

      # 5b. Sync búsqueda FTS + scores a Cloudflare D1
      - name: Sync búsqueda a D1
        run: |
          npm install -g wrangler@3
          python sync_d1.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true  # No bloquear pipeline si D1 sync falla

      # 5b.2. Sync ELO + H2H legisladores a D1 (depende de paso 5d/5e local)
      - name: Sync ELO + H2H a D1
        run: |
          python scripts/sync_elo_d1.py || true
          python scripts/sync_h2h_d1.py || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      # 5c. Guardar DB actualizada en cache (key única por run)
      - name: Guardar SQLite DB en cache
        uses: actions/cache/save@v4
        with:
          path: semaforo.db
          key: semaforo-db-${{ github.run_id }}

      # 5d. Generar catálogo de leyes (pestaña "Búsqueda por ley") → leyes.json
      - name: Generar catálogo de leyes
        run: python scripts/generar_leyes_json.py
        continue-on-error: true

      # 6. Commit y push de datos actualizados (solo JSON — DB persiste en cache)
      #
      # IMPORTANTE: stash de cambios NO-data.json antes de pull --rebase.
      # Los scripts del paso 4c (scrape_urls_diputados, etc) modifican
      # otros JSONs que NO queremos commitear (regenerados cada run desde
      # SITL — no son fuente de verdad). Sin stash, `git pull --rebase`
      # falla con exit 128 "cannot pull with rebase: unstaged changes".
      - name: Commit datos actualizados
        run: |
          git config user.name "FIAT Bot"
          git config user.email "fiat-bot@users.noreply.github.com"
          git add dashboard/data.json dashboard/leyes.json dashboard/ultimas_instrumentos.json
          # Construir mensaje con status de Haiku al final (visible en git log)
          HAIKU_STATUS=""
          if [ -f haiku_status.txt ]; then
            HAIKU_STATUS=" · $(cat haiku_status.txt)"
          fi
          git diff --staged --quiet || git commit -m "🔄 Actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')${HAIKU_STATUS}"
          # Stash cualquier cambio sin staged (regenerados por scripts de scrape)
          # para que pull --rebase no falle.
          git stash --include-untracked || true
          # Pull con rebase para resolver si alguien pusheó durante el pipeline
          git pull --rebase origin main || {
            git rebase --abort 2>/dev/null
            git pull --no-rebase -X theirs origin main
            git add dashboard/data.json dashboard/leyes.json dashboard/ultimas_instrumentos.json 2>/dev/null
            git diff --staged --quiet || git commit -m "🔄 Merge automático con cambios remotos"
          }
          # Descartar stash (no lo necesitamos — los JSONs scrapeados se
          # regeneran en cada run idempotente).
          git stash drop 2>/dev/null || true
          git push

  # Deploy a GitHub Pages después del pipeline
  deploy-pages:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo actualizado
        uses: actions/checkout@v4
        with:
          ref: main  # Obtener la versión más reciente (post-pipeline)

      # Hacer pull para obtener el commit del pipeline
      - name: Pull últimos cambios
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Podar del artefacto de Pages los JSON grandes que SOLO usan los scripts
      # scrapers como datos intermedios (el frontend NO los usa: 0 referencias en
      # index.html). Antes se subían ~100MB de peso muerto que inflaban el sitio
      # a ~112MB y hacían fallar intermitente el deploy ("Deployment failed, try
      # again later"). NO borra nada del repo; solo aligera lo que se sube.
      - name: Podar archivos no usados por el frontend
        run: |
          rm -f dashboard/diputados_lxvi_oficial.json \
                dashboard/senadores_lxvi_oficial.json \
                dashboard/diputados_urls_oficial.json
          echo "Tamaño del dashboard a desplegar:"; du -sh dashboard

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard'

      # Pages a veces responde "Deployment failed, try again later" (transitorio
      # de la plataforma, sin incidente publicado). Antes fallábamos al primer
      # intento → correo rojo cada vez. Ahora: hasta 3 intentos con espera.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Espera antes del reintento
        if: steps.deployment.outcome == 'failure'
        run: sleep 120

      - name: Deploy (reintento 2)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Espera antes del reintento final
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 300

      - name: Deploy (reintento 3, definitivo)
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
