name: Evento-Respuesta → D1

# Computa la pieza evento→respuesta por sub-categoría (scripts/
# computar_evento_respuesta.py) y la sincroniza a Cloudflare D1
# (tabla evento_respuesta_subcat). Alimenta el Trigger Desk de la consola.
#
# Lee semaforo.db read-only. Cadencia: domingos (tras calibración) +
# dispatch manual.

on:
  schedule:
    - cron: '0 18 * * 0'   # Domingo 18:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "evento-respuesta"
  cancel-in-progress: false

jobs:
  evento-respuesta:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Obtener semaforo.db (read-only)
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-readonly
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            gh release download db-seed-v4 --pattern "semaforo.db" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          npm install -g wrangler@3

      - name: Computar evento-respuesta + sync a D1
        run: python scripts/computar_evento_respuesta.py --sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
