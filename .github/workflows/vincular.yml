name: Vincular eventos (semanal, juez local $0)

# Vincula instrumentos NUEVOS a su evento mediático con el modelo destilado
# LOCAL (eval/modelo_vinculador.joblib) — $0, sin API de pago. Solo procesa lo
# que no está en eval/vinculados_procesados.json y hace append de vínculos de
# alta confianza (umbral 0.7 ≈ 89% de acuerdo con el juez Haiku, cobertura ~1/3:
# lo que emite es confiable; lo que no ve, no lo inventa).
# Los vínculos alimentan REACCIÓN NAC. (sync_reactividad) y Hit Rate (radar) en
# sus corridas normales.

on:
  schedule:
    - cron: '0 15 * * 0'   # Domingo 15:00 UTC — después del scraper SIL del radar (12:00)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "vincular-eventos"
  cancel-in-progress: false

jobs:
  vincular:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-vincular-${{ hashFiles('requirements.txt') }}

      - name: Cache modelos HF (embeddings + cross-encoder)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-vincular-v1

      - name: Obtener semaforo.db (read-only)
        uses: actions/cache/restore@v4
        with:
          path: semaforo.db
          key: semaforo-db-readonly
          restore-keys: |
            semaforo-db-

      - name: Fallback a release si no hay cache
        run: |
          if [ ! -f semaforo.db ]; then
            echo "No se encontró DB en cache, descargando db-latest..."
            gh release download db-latest --pattern "semaforo.db*" --clobber
            [ -f semaforo.db.gz ] && gunzip -f semaforo.db.gz || true
          fi
          du -h semaforo.db
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Forzar DB en modo solo lectura
        run: chmod 0444 semaforo.db

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          # sklearn fijado a la versión con la que se entrenó el modelo destilado
          pip install sentence-transformers "scikit-learn==1.9.0" joblib

      # Corpus regional (fiat-corpus): shards del mes actual y anterior —
      # suficiente para las ventanas (-21d..+3d) de instrumentos nuevos.
      # Si falla la descarga, el vinculador corre solo con corpus nacional.
      - name: Bajar corpus regional (fiat-corpus)
        run: |
          mkdir -p eval/_corpus_regional
          MES=$(date -u +%Y-%m)
          PREV=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m)
          for M in $MES $PREV; do
            gh release download corpus -R rreubenleon/fiat-corpus \
              --pattern "corpus-$M.jsonl.gz" -D eval/_corpus_regional --clobber || true
          done
          ls -la eval/_corpus_regional/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Vincular instrumentos nuevos (juez local)
        run: python scripts/vincular_produccion.py --relevantes --local --solo-nuevos

      - name: Commit de vínculos y ledger
        run: |
          git config user.name "FIAT Bot"
          git config user.email "fiat-bot@users.noreply.github.com"
          git add eval/vinculos_produccion.json eval/vinculados_procesados.json
          if git diff --cached --quiet; then
            echo "Sin vínculos nuevos esta semana."
            exit 0
          fi
          git commit -m "🔗 Vínculos evento→ley nuevos (juez local, semanal)"
          for i in 1 2 3; do
            git -c rebase.autoStash=true pull --rebase origin main && git push && break
            sleep 10
          done
